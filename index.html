  <style>
    /* ── GLOBAL FONT: Inter — no other font anywhere in the app ── */
    html, body, input, select, textarea, button, h1, h2, h3, h4, h5, h6,
    p, span, div, td, th, label, a, li {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    /* Inlined from css/mobile-app.css — that external file kept being served
       with the wrong MIME type (text/plain instead of text/css) in
       production despite the file content and routing config both looking
       correct, and repeated attempts to diagnose it via Vercel's config
       didn't resolve it. Inlining removes the failure mode entirely: an
       inline <style> block can never have a content-type or static-file-
       routing problem, regardless of what's happening server-side. */

    /* IMPORTANT: do not add a blanket "#root{display:none}" media-query rule
       here. #root is also where the LOGIN FORM renders (see auth.js) — a
       rule that hides #root on any mobile-width viewport hides the login
       screen itself before the user has even logged in, with nothing else
       on screen to replace it (mobile.js's UI only gets built *after* a
       successful login). That exact bug shipped once already and made the
       app unusable on mobile until login. The correct, safely-scoped fix
       lives in mobile.js's initMobileApp(): #root is hidden via JS only at
       the instant mobile.js actually takes over (i.e. only post-login),
       which can't block the login screen. */

    /* These banners were missing CSS entirely at one point, so they had no
       default-hidden state and rendered unconditionally on every page load
       regardless of the platform-detection JS below (beforeinstallprompt /
       isIOS) — invisible before only because #mobileApp's z-index happened
       to cover it. Explicitly hidden until JS adds .show. */
    #pwaInstallBanner, #iosInstallHint {
      display: none;
      position: fixed;
      left: 12px; right: 12px;
      z-index: 10500;
      border-radius: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,.18);
    }
    #pwaInstallBanner.show, #iosInstallHint.show { display: flex; align-items: center; gap: 10px; }
    #pwaInstallBanner {
      bottom: 16px;
      background: var(--bg-body, #fff);
      padding: 12px 14px;
    }
    #iosInstallHint {
      top: 16px;
      background: #111;
      color: #fff;
      padding: 12px 16px;
      font-size: 13px;
    }
  </style>
</head>
<body class="antialiased overflow-hidden">

    <div id="root" class="h-screen flex overflow-hidden"></div>
    <div id="pdf-generation-container" style="display:none;"></div>

    <!--
        LOAD ORDER — each file is a self-contained ES module.
        All functions go on window.* so there is no export/import between them.
        shared.js MUST be first (exports 'sb').
        auth.js MUST come before main.js (defines renderAuthScreen / signIn / logout).
        main.js MUST be last (runs the boot sequence).
    -->
    <script type="module" src="./js/shared.js"></script>
    <script type="module" src="./js/auth.js"></script>
    <script type="module" src="./js/ui-core.js"></script>
    <script type="module" src="./js/ui-panels.js"></script>
    <script type="module" src="./js/ui-feed.js"></script>
    <script type="module" src="./js/ui-settings.js"></script>
    <script type="module" src="./js/messages.js"></script>
    <script type="module" src="./js/tasks.js"></script>
    <script type="module" src="./js/rbac.js"></script>
    <script type="module" src="./js/main.js"></script>

<script type="module" src="./js/notifications.js"></script>
<script type="module" src="./js/mobile.js"></script>

<script>
// ── Service Worker registration ───────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .then(r => console.log('SW registered:', r.scope))
    .catch(e => console.log('SW error:', e));
}

// ── Android/Chrome: capture install prompt ────────────────
let _installPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _installPrompt = e;
  if (!sessionStorage.getItem('pwa_dismissed')) {
    setTimeout(() => {
      document.getElementById('pwaInstallBanner')?.classList.add('show');
    }, 5000);
  }
});

window.installPWA = async () => {
  const b = document.getElementById('pwaInstallBanner');
  if (_installPrompt) {
    _installPrompt.prompt();
    await _installPrompt.userChoice;
    _installPrompt = null;
    b?.classList.remove('show');
  }
};

window.dismissInstall = () => {
  document.getElementById('pwaInstallBanner')?.classList.remove('show');
  document.getElementById('iosInstallHint')?.classList.remove('show');
  sessionStorage.setItem('pwa_dismissed', '1');
};

// ── iOS Safari: show manual instruction ──────────────────
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent)
           && !window.MSStream;
const isInApp = window.navigator.standalone === true;
if (isIOS && !isInApp && !sessionStorage.getItem('pwa_dismissed')) {
  setTimeout(() => {
    document.getElementById('iosInstallHint')?.classList.add('show');
    setTimeout(() => {
      document.getElementById('iosInstallHint')?.classList.remove('show');
    }, 7000);
  }, 4000);
}

window.addEventListener('appinstalled', () => {
  document.getElementById('pwaInstallBanner')?.classList.remove('show');
  _installPrompt = null;
});
</script>

<!-- Android install banner -->
<div id="pwaInstallBanner">
  <div style="width:36px;height:36px;border-radius:9px;background:var(--accent,#6366f1);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
    <i class="fa-solid fa-comments" style="color:#fff;font-size:14px;"></i>
  </div>
  <div style="flex:1;min-width:0;">
    <div style="font-size:13px;font-weight:700;color:var(--text-primary,#111);">Install TaskFlow App</div>
    <div style="font-size:11px;color:var(--text-secondary,#666);">Works offline · No app store needed</div>
  </div>
  <button onclick="window.installPWA()" style="background:var(--accent,#6366f1);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;">
    <i class="fa-solid fa-download"></i> Install
  </button>
  <button onclick="window.dismissInstall()" style="background:none;border:none;color:var(--text-secondary,#666);cursor:pointer;font-size:20px;padding:4px 6px;flex-shrink:0;line-height:1;">×</button>
</div>

<!-- iOS install hint (auto-hides after 7s) -->
<div id="iosInstallHint">
  <i class="fa-solid fa-share-from-square"></i>
  Tap Share → "Add to Home Screen" to install
  <button onclick="window.dismissInstall()" style="background:none;border:none;color:#fff;cursor:pointer;font-size:16px;margin-left:8px;">×</button>
</div>

</body>
