                                                    <i className="fa-regular fa-user text-blue-500"></i> {selectedMessage.taskData.currentAssignee.split('@')[0]}
                                                </p>
                                            </div>
                                            <div>
                                                <p className="text-[10px] font-bold text-gray-400 uppercase">Deadline</p>
                                                <p className="text-sm font-semibold flex items-center gap-1 text-red-600">
                                                    <i className="fa-regular fa-calendar"></i> {new Date(selectedMessage.taskData.deadline).toLocaleDateString()}
                                                </p>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Action Panel for Delegation & Completion */}
                                    {selectedMessage.taskData.status !== "Completed" && (
                                        <div className="bg-blue-50 p-3 rounded-xl border border-blue-100 space-y-3">
                                            <div>
                                                <label className="text-xs font-bold text-blue-800">Delegate to:</label>
                                                <div className="flex gap-2 mt-1">
                                                    <select 
                                                        value={delegateAssignee}
                                                        onChange={(e) => setDelegateAssignee(e.target.value)}
                                                        className="flex-1 p-2 border border-blue-200 rounded-lg text-xs bg-white outline-none"
                                                    >
                                                        <option value="" disabled>Select Team Member</option>
                                                        {dbUsers.map(u => (
                                                            <option key={u.uid} value={u.email}>{u.name} ({u.email})</option>
                                                        ))}
                                                    </select>
                                                    <button 
                                                        onClick={handleDelegateTask} 
                                                        disabled={!delegateAssignee}
                                                        className={`px-3 py-2 rounded-lg text-xs font-bold text-white ${delegateAssignee ? 'bg-blue-600 hover:bg-blue-700' : 'bg-blue-300 cursor-not-allowed'}`}
                                                    >
                                                        Delegate
                                                    </button>
                                                </div>
                                            </div>
                                            
                                            <div className="pt-2 border-t border-blue-200">
                                                <button 
                                                    onClick={handleCompleteTask} 
                                                    className={`w-full py-2 rounded-xl text-sm font-bold flex items-center justify-center gap-2 ${
                                                        user.email === selectedMessage.taskData.currentAssignee 
                                                        ? "bg-green-600 text-white hover:bg-green-700" 
                                                        : "bg-gray-300 text-gray-500 cursor-not-allowed"
                                                    }`}
                                                >
                                                    <i className="fa-solid fa-circle-check"></i> Mark Complete
                                                </button>
                                                {user.email !== selectedMessage.taskData.currentAssignee && (
                                                    <p className="text-[10px] text-center text-red-500 mt-1">Only the current assignee ({selectedMessage.taskData.currentAssignee.split('@')[0]}) can complete this.</p>
                                                )}
                                            </div>
                                        </div>
                                    )}

                                    <div>
                                        <h3 className="font-bold text-gray-800 mb-4 border-b pb-2">Delegation Trail</h3>
                                        <div className="space-y-4">
                                            {selectedMessage.taskData.trail.map((item, idx) => (
                                                <div key={idx} className="flex gap-3">
                                                    <div className="flex flex-col items-center">
                                                        <div className={`w-8 h-8 rounded-full flex items-center justify-center shadow-sm text-white ${item.action === 'Marked Completed' ? 'bg-green-500' : item.action === 'Update Added' ? 'bg-yellow-500' : 'bg-blue-500'}`}>
                                                            {idx === 0 ? <i className="fa-regular fa-square-check"></i> : (item.action === 'Marked Completed' ? <i className="fa-solid fa-check"></i> : item.action === 'Update Added' ? <i className="fa-regular fa-comment"></i> : <i className="fa-solid fa-arrow-right text-xs"></i>)}
                                                        </div>
                                                        {idx !== selectedMessage.taskData.trail.length - 1 && <div className="w-0.5 h-full bg-blue-200 my-1"></div>}
                                                    </div>
                                                    <div className="flex-1 pb-4">
                                                        <div className="flex items-center justify-between">
                                                            <span className="font-bold text-xs text-blue-800">{item.action}</span>
                                                            <span className="text-[10px] text-gray-400">{item.time}</span>
                                                        </div>
                                                        <div className="text-sm text-gray-600">
                                                            By: <span className="font-semibold">{item.by.split('@')[0]}</span>
                                                            {item.to && item.to !== 'System' && <span> → To: <span className="font-semibold">{item.to.split('@')[0]}</span></span>}
                                                            {item.comment && (
                                                                <div className="mt-2 text-xs text-gray-800 bg-white p-2 rounded-lg border border-gray-200 shadow-sm italic">
                                                                    "{item.comment}"
                                                                </div>
                                                            )}
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                                
                                {/* Phase 3.1: Add Comment Input Area */}
                                {selectedMessage.taskData.status !== "Completed" && (
                                    <div className="p-3 bg-gray-100 border-t border-gray-200 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                                        <div className="flex items-center bg-white rounded-full px-4 py-2 border border-gray-300">
                                            <input 
                                                type="text" 
                                                value={trailComment}
                                                onChange={(e) => setTrailComment(e.target.value)}
                                                placeholder="Type an update or comment..." 
                                                className="bg-transparent w-full outline-none text-sm"
                                            />
                                            <button 
                                                onClick={handleAddComment} 
                                                className="text-blue-600 ml-2 hover:text-blue-800 transition-colors"
                                            >
                                                <i className="fa-solid fa-paper-plane"></i>
                                            </button>
                                        </div>
                                    </div>
                                )}

                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // New Main App Component to handle Phase 1: Authentication
        function App() {
            const [user, setUser] = useState(null);
            const [isFirebaseLoaded, setIsFirebaseLoaded] = useState(false);
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [authError, setAuthError] = useState("");

            // Listen for login/logout changes
            useEffect(() => {
                const setupAuth = () => {
                    window.onAuthStateChanged(window.auth, (currentUser) => {
                        setUser(currentUser);
                    });
                    setIsFirebaseLoaded(true);
                };

                if (window.auth) {
                    setupAuth();
                } else {
                    window.addEventListener('firebaseReady', setupAuth);
                }
                return () => window.removeEventListener('firebaseReady', setupAuth);
            }, []);

            const handleLogin = (e) => {
                e.preventDefault();
                setAuthError("");
                window.signInWithEmailAndPassword(window.auth, email, password)
                    .catch(err => setAuthError("Login Failed: " + err.message));
            };

            const handleRegister = async (e) => {
                e.preventDefault();
                setAuthError("");
                try {
                    // Phase 3.2 & 6.1: Registration creates unapproved profile, except for the Vice Principal auto-admin rule
                    const userCredential = await window.createUserWithEmailAndPassword(window.auth, email, password);
                    const isVp = userCredential.user.email.toLowerCase() === 'viceprincipal@mpgs.edu.in';
                    await window.setDoc(window.doc(window.db, "users", userCredential.user.uid), {
                        uid: userCredential.user.uid,
                        email: userCredential.user.email,
                        name: userCredential.user.email.split('@')[0].toUpperCase(),
                        isApproved: isVp, // Auto-approve only if it's the Vice Principal test account
                        isAdmin: isVp
                    });
                } catch (err) {
                    setAuthError("Registration Failed: " + err.message);
                }
            };

            const handleLogout = () => {
                window.signOut(window.auth);
            };

            // Loading Screen
            if (!isFirebaseLoaded) return <div className="flex justify-center items-center h-screen bg-gray-200 font-bold text-blue-800">Connecting to secure server...</div>;

            // Login Screen UI
            if (!user) {
                return (
                    <div className="flex items-center justify-center min-h-screen bg-gray-200 p-4 font-sans text-gray-800">
                        <div className="w-full max-w-md bg-white rounded-3xl shadow-2xl p-8 border-t-8 border-blue-800">
                            <h1 className="text-2xl font-bold text-center text-blue-800 mb-2">Corporate Portal</h1>
                            <p className="text-center text-sm text-gray-500 mb-8">Sign in to access your dashboard</p>
                            
                            {authError && <div className="bg-red-100 text-red-700 p-3 rounded mb-4 text-xs font-bold border border-red-300">{authError}</div>}
                            
                            <form className="space-y-4">
                                <div>
                                    <label className="text-xs font-semibold text-gray-600 uppercase">Email Address</label>
                                    <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} className="w-full mt-1 p-3 border rounded-xl bg-gray-50 outline-none focus:border-blue-500 transition-colors" placeholder="user@anydomain.com" />
                                </div>
                                <div>
                                    <label className="text-xs font-semibold text-gray-600 uppercase">Password (Min 6 chars)</label>
                                    <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full mt-1 p-3 border rounded-xl bg-gray-50 outline-none focus:border-blue-500 transition-colors" placeholder="••••••••" />
                                </div>
                                
                                <div className="flex gap-2 pt-4">
                                    <button onClick={handleLogin} className="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 shadow-md transition-colors">Sign In</button>
                                    <button onClick={handleRegister} className="flex-1 bg-white border-2 border-blue-600 text-blue-600 py-3 rounded-xl font-bold hover:bg-blue-50 transition-colors">Register</button>
                                </div>
                            </form>
                        </div>
                    </div>
                );
            }

            // If Authenticated, show the Chat App
            return <ChatApp user={user} onLogout={handleLogout} />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
