                                            <label htmlFor="editAdminCheck" className="text-xs font-bold text-indigo-800 cursor-pointer">Grant Admin Dashboard Access</label>
                                        </div>
                                        <button type="submit" className="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-sm hover:bg-blue-700 shadow-md">Commit Changes</button>
                                    </form>
                                </div>
                            </div>
                        )}
                        {/* Reminder Modal */}
                        {activeModal === 'reminder' && (
                            <div className="absolute inset-0 bg-black/60 backdrop-blur-sm z-[60] flex items-center justify-center p-4">
                                <div className="bg-white w-full max-w-sm rounded-3xl p-8 shadow-2xl animate-in zoom-in-95">
                                    <div className="flex justify-between items-center mb-6">
                                        <h3 className="font-bold text-xl text-slate-800"><i className="fa-regular fa-clock text-yellow-500 mr-2"></i> Schedule Alert</h3>
                                        <i className="fa-solid fa-xmark cursor-pointer text-slate-400 text-lg hover:text-slate-600" onClick={() => setActiveModal(null)}></i>
                                    </div>
                                    <div className="space-y-6">
                                        <div>
                                            <label className="text-xs font-bold text-slate-500 uppercase block mb-2">Target Date & Time</label>
                                            <input type="datetime-local" value={reminderDateTime} onChange={(e) => setReminderDateTime(e.target.value)} className="w-full p-4 border border-slate-300 rounded-xl text-sm bg-slate-50 focus:border-blue-500 outline-none font-semibold text-slate-700" />
                                        </div>
                                        <button onClick={setReminder} className="w-full bg-yellow-500 text-white py-4 rounded-xl font-bold text-sm hover:bg-yellow-600 shadow-md transition-all">Engage Notification</button>
                                    </div>
                                </div>
                            </div>
                        )}
                        {/* Task Convert Modal */}
                        {activeModal === 'task_convert' && (
                            <div className="absolute inset-0 bg-black/60 backdrop-blur-sm z-[60] flex items-center justify-center p-4">
                                <div className="bg-white w-full max-w-md rounded-3xl p-8 shadow-2xl animate-in zoom-in-95">
                                    <div className="flex justify-between items-center mb-6 border-b border-slate-100 pb-4">
                                        <h3 className="font-bold text-xl text-slate-800"><i className="fa-regular fa-square-check text-blue-600 mr-2"></i> Official Task Assignment</h3>
                                        <i className="fa-solid fa-xmark cursor-pointer text-slate-400 text-lg hover:text-slate-600" onClick={() => setActiveModal(null)}></i>
                                    </div>
                                    <div className="space-y-5">
                                        <div className="bg-slate-50 text-slate-700 text-sm p-4 rounded-xl border border-slate-200 italic font-semibold shadow-inner">"{selectedMessage?.text}"</div>
                                        <div>
                                            <label className="text-xs font-bold text-slate-500 uppercase block mb-1.5">Appoint Assignee</label>
                                            <select value={taskAssignee} onChange={(e) => setTaskAssignee(e.target.value)} className="w-full p-3 border border-slate-300 rounded-xl text-sm bg-white focus:border-blue-500 outline-none font-semibold text-slate-700 cursor-pointer">
                                                <option value="" disabled>Select Core Member...</option>
                                                {dbUsers.map(u => <option key={u.uid} value={u.email}>{u.name} ({u.email})</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-xs font-bold text-slate-500 uppercase block mb-1.5">Strict Deadline</label>
                                            <input type="datetime-local" value={taskDeadline} onChange={(e) => setTaskDeadline(e.target.value)} className="w-full p-3 border border-slate-300 rounded-xl text-sm bg-white focus:border-blue-500 outline-none font-semibold text-slate-700 cursor-pointer" />
                                        </div>
                                        <button onClick={convertToTask} className="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-sm hover:bg-blue-700 shadow-lg mt-4 transition-all">Dispatch Assignment</button>
                                    </div>
                                </div>
                            </div>
                        )}
                        {/* Uploading Overlay */}
                        {isUploading && (
                            <div className="absolute inset-0 bg-white/80 backdrop-blur-md z-[70] flex items-center justify-center p-4">
                                <div className="bg-white w-full max-w-sm rounded-3xl p-8 shadow-2xl border border-slate-100 flex flex-col items-center text-center animate-in zoom-in-95">
                                    <div className="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mb-6 shadow-inner"><i className="fa-solid fa-cloud-arrow-up text-4xl text-blue-600 animate-bounce"></i></div>
                                    <h3 className="font-bold text-slate-800 text-xl mb-2">Transmitting File...</h3>
                                    <p className="text-sm text-slate-500 font-semibold mb-8">Encrypting payload securely.</p>
                                    <div className="w-full bg-slate-100 rounded-full h-4 mb-3 overflow-hidden shadow-inner"><div className="bg-blue-600 h-full rounded-full transition-all duration-300 relative" style={{ width: `${uploadProgress}%` }}><div className="absolute inset-0 bg-white/20 animate-pulse"></div></div></div>
                                    <div className="flex justify-between w-full text-sm font-bold text-blue-800 uppercase tracking-wide"><span>Status</span><span>{Math.round(uploadProgress)}%</span></div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // New Main App Component to handle Phase 1: Authentication
        function App() {
            const [user, setUser] = useState(null);
            const [isFirebaseLoaded, setIsFirebaseLoaded] = useState(false);
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [authError, setAuthError] = useState("");

            useEffect(() => {
                const setupAuth = () => {
                    window.onAuthStateChanged(window.auth, (currentUser) => {
                        setUser(currentUser);
                    });
                    setIsFirebaseLoaded(true);
                };

                if (window.auth) setupAuth();
                else window.addEventListener('firebaseReady', setupAuth);
                return () => window.removeEventListener('firebaseReady', setupAuth);
            }, []);

            const handleLogin = (e) => {
                e.preventDefault();
                setAuthError("");
                window.signInWithEmailAndPassword(window.auth, email, password)
                    .catch(err => setAuthError("Login Failed: " + err.message));
            };

            const handleRegister = async (e) => {
                e.preventDefault();
                setAuthError("");
                try {
                    const userCredential = await window.createUserWithEmailAndPassword(window.auth, email, password);
                    const isVp = userCredential.user.email.toLowerCase() === 'viceprincipal@mpgs.edu.in';
                    await window.setDoc(window.doc(window.db, "users", userCredential.user.uid), {
                        uid: userCredential.user.uid,
                        email: userCredential.user.email,
                        name: userCredential.user.email.split('@')[0].toUpperCase(),
                        isApproved: isVp, 
                        isAdmin: isVp
                    });
                } catch (err) { setAuthError("Registration Failed: " + err.message); }
            };

            const handleLogout = () => { window.signOut(window.auth); };

            if (!isFirebaseLoaded) return <div className="flex justify-center items-center h-screen bg-slate-100 font-bold text-blue-800 text-xl animate-pulse">Establishing Secure Connection...</div>;

            if (!user) {
                return (
                    <div className="flex items-center justify-center min-h-screen bg-slate-100 p-4 font-sans text-slate-800">
                        <div className="w-full max-w-lg bg-white rounded-[2rem] shadow-2xl p-10 border-t-[10px] border-blue-800 flex flex-col items-center animate-in zoom-in-95">
                            <div className="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center text-blue-800 text-4xl mb-6 shadow-inner"><i className="fa-solid fa-building-shield"></i></div>
                            <h1 className="text-3xl font-black text-center text-slate-900 mb-2 tracking-tight">Corporate Portal</h1>
                            <p className="text-center text-sm font-semibold text-slate-500 mb-10">Secure Centralized Communication Node</p>
                            
                            {authError && <div className="w-full bg-red-50 text-red-700 p-4 rounded-xl mb-6 text-sm font-bold border border-red-200 flex items-center gap-3"><i className="fa-solid fa-triangle-exclamation text-lg"></i> {authError}</div>}
                            
                            <form className="w-full space-y-5">
                                <div><label className="text-xs font-bold text-slate-500 uppercase tracking-wide">Corporate Email</label><input type="email" value={email} onChange={(e) => setEmail(e.target.value)} className="w-full mt-2 p-4 border border-slate-200 rounded-xl bg-slate-50 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all font-semibold text-slate-800" placeholder="user@domain.com" /></div>
                                <div><label className="text-xs font-bold text-slate-500 uppercase tracking-wide">Secure Password</label><input type="password" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full mt-2 p-4 border border-slate-200 rounded-xl bg-slate-50 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all font-semibold text-slate-800" placeholder="••••••••" /></div>
                                <div className="flex flex-col sm:flex-row gap-3 pt-6">
                                    <button onClick={handleLogin} className="flex-1 bg-blue-800 text-white py-4 rounded-xl font-bold hover:bg-blue-900 shadow-lg hover:shadow-xl transition-all"><i className="fa-solid fa-right-to-bracket mr-2"></i> Authenticate</button>
                                    <button onClick={handleRegister} className="flex-1 bg-white border-2 border-slate-200 text-slate-700 py-4 rounded-xl font-bold hover:bg-slate-50 hover:border-slate-300 transition-all"><i className="fa-solid fa-user-plus mr-2"></i> Request Access</button>
                                </div>
                            </form>
                        </div>
                    </div>
                );
            }

            return <ChatApp user={user} onLogout={handleLogout} />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
