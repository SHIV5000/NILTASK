    <script>
      // Pre-paint theme guard: on mobile devices, never let the saved WEB theme
      // (e.g. ocean-teal) color the first paint / login page — apply the user's
      // mobile theme choice (system/light/dark) before any CSS renders.
      (function () {
        try {
          var mob = window.innerWidth <= 768 ||
            (window.matchMedia && matchMedia('(pointer:coarse)').matches && window.innerWidth <= 1366);
          if (!mob) return;
          var mode = localStorage.getItem('mob_theme') || 'system';
          var dark = mode === 'dark' ||
            (mode === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.setAttribute('data-theme', 'dark');
          else document.documentElement.removeAttribute('data-theme');
          // Mark so the web boot theme code knows mobile owns the attribute.
          window.__mobThemeLock = true;
          // GREEN GUTTER FIX (definitive): the saved web theme (ocean-teal) tints the
          // <body> background green (#ecfdf5), which shows through the safe-area gutter
          // around the fixed app as a thin margin. Force html+body to the app color on
          // mobile with !important — independent of whatever theme var resolves to.
          var appbg = dark ? '#000000' : '#eef0f8';
          document.documentElement.style.background = appbg;
          var _bl = document.createElement('style');
          _bl.id = 'mobBgLock';
          _bl.textContent = 'html,body{background:' + appbg + ' !important;margin:0 !important;}';
          document.head.appendChild(_bl);
        } catch (e) {}
      })();
    </script>

    /* Inlined from css/mobile-app.css — that external file kept being served
       with the wrong MIME type (text/plain instead of text/css) in
       production despite the file content and routing config both looking
       correct, and repeated attempts to diagnose it via Vercel's config
       didn't resolve it. Inlining removes the failure mode entirely: an
       inline <style> block can never have a content-type or static-file-
       routing problem, regardless of what's happening server-side. */

    /* IMPORTANT: do not add a blanket "#root{display:none}" media-query rule
       here. #root is also where the LOGIN FORM renders (see auth.js) — a
       rule that hides #root on any mobile-width viewport hides the login
       screen itself before the user has even logged in, with nothing else
       on screen to replace it (mobile.js's UI only gets built *after* a
       successful login). That exact bug shipped once already and made the
       app unusable on mobile until login. The correct, safely-scoped fix
       lives in mobile.js's initMobileApp(): #root is hidden via JS only at
       the instant mobile.js actually takes over (i.e. only post-login),
       which can't block the login screen. */

    #pwaInstallBanner, #iosInstallHint {

<div class="pwa-install-banner" id="pwaInstallBanner" style="display:none;">
  <button class="pwa-install-close" id="pwaCloseBanner">✕</button>
  <div class="pwa-install-content">
    <div class="icon-text">
      <i class="fa-solid fa-mobile-screen-button"></i>
      <span id="pwaBannerTitle">
        Get the App
        <small>Install for the best experience</small>
      </span>
    </div>
    <button class="pwa-install-btn" id="pwaMainActionBtn">
      <i class="fa-solid fa-download" id="pwaBtnIcon"></i>

<script>
  (function() {
    'use strict';

    // ─── DOM refs ──────────────────────────────────────────────
    const permBtn = document.getElementById('pwaPermanentInstall');
    const permIcon = document.getElementById('permIcon');
    const permText = document.getElementById('permText');
    const permPlatform = document.getElementById('permPlatform');

    const banner = document.getElementById('pwaInstallBanner');
    const closeBtn = document.getElementById('pwaCloseBanner');
    const mainBtn = document.getElementById('pwaMainActionBtn');
    const btnText = document.getElementById('pwaBtnText');
    const btnIcon = document.getElementById('pwaBtnIcon');
    const bannerTitle = document.getElementById('pwaBannerTitle');
    const iosGuide = document.getElementById('pwaIosGuide');

    // ─── Detect platform ──────────────────────────────────────
    const ua = navigator.userAgent;
    const isAndroid = /android/i.test(ua);
    const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

    // ─── If already installed, hide everything ────────────────
    if (isStandalone) {
      if (banner) banner.style.display = 'none';
      if (permBtn) permBtn.classList.add('hidden');
      return;
    }

    // ─── Dismiss banner (7 days) ─────────────────────────────
    function dismissBanner() {
      if (banner) banner.style.display = 'none';
      try {
        localStorage.setItem('pwa_banner_dismissed', Date.now().toString());
      } catch (_) {}
    }

    // ─── Check if banner was dismissed recently ──────────────
    function isDismissed() {
      try {
        const val = localStorage.getItem('pwa_banner_dismissed');
        if (!val) return false;
        const diff = Date.now() - parseInt(val, 10);
        return diff < 7 * 24 * 60 * 60 * 1000;
      } catch (_) { return false; }
    }

    // ─── Show banner only if not dismissed ───────────────────
    if (!isDismissed()) {
      if (banner) banner.style.display = 'block';
    } else {
      if (banner) banner.style.display = 'none';
    }

    // ─── Close button for banner ─────────────────────────────
    if (closeBtn) {
      closeBtn.addEventListener('click', dismissBanner);
    }

    // ─── Shared action function (used by both buttons) ──────
    function triggerInstall() {
      if (isAndroid) {
        // Android logic (from previous code)
        if (window.deferredPrompt) {
          // Use the stored prompt
          window.deferredPrompt.prompt();
          window.deferredPrompt.userChoice.then(result => {
            if (result.outcome === 'accepted') {
              dismissBanner();
              if (permBtn) permBtn.classList.add('hidden');
            }
            window.deferredPrompt = null;
          });
        } else {
          // Fallback: show instruction
          alert('Tap the "Install" button in your browser\'s address bar.');
        }
      } else if (isIOS) {
        // Toggle the iOS guide
        iosGuide.classList.toggle('show');
        if (iosGuide.classList.contains('show')) {
          iosGuide.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
      } else {
        // Desktop – open the app in browser
        window.location.href = '/';
      }
    }

    // ─── Set up permanent button ─────────────────────────────
    if (permBtn) {
      if (isAndroid) {
        permIcon.className = 'fa-solid fa-download';
        permText.textContent = 'Install App';
        permPlatform.textContent = '(Android)';
        // Listen for the beforeinstallprompt to store it
        window.addEventListener('beforeinstallprompt', (e) => {
          e.preventDefault();
          window.deferredPrompt = e;
          permIcon.className = 'fa-solid fa-download';
          permText.textContent = 'Install App';
          permPlatform.textContent = '(Chrome)';
        });
        // If no prompt after 3s, change text
        setTimeout(() => {
          if (!window.deferredPrompt) {
            permText.textContent = 'Install App';
            permPlatform.textContent = '(Open in Chrome)';
          }
        }, 3000);
      } else if (isIOS) {
        permIcon.className = 'fa-solid fa-plus-circle';
        permText.textContent = 'Add to Home Screen';
        permPlatform.textContent = '(iOS)';
      } else {
        permIcon.className = 'fa-solid fa-arrow-up-right-from-square';
        permText.textContent = 'Open in Browser';
        permPlatform.textContent = '(Desktop)';
      }

      // Click handler for permanent button
      permBtn.addEventListener('click', triggerInstall);
    }

    // ─── Set up big banner button ────────────────────────────
    if (mainBtn) {
      mainBtn.addEventListener('click', triggerInstall);
    }

    // ─── Update banner button text for Android if prompt fires later ──
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      window.deferredPrompt = e;
      if (banner) {
        bannerTitle.innerHTML = 'Get the App <small>Tap to install instantly</small>';
        btnText.textContent = 'Install App';
        btnIcon.className = 'fa-solid fa-download';
        mainBtn.disabled = false;
      }
      if (permBtn) {
        permText.textContent = 'Install App';
        permIcon.className = 'fa-solid fa-download';
        permPlatform.textContent = '(Chrome)';
      }
    });

    // ─── Detect install and hide everything ──────────────────
    window.addEventListener('appinstalled', () => {
      dismissBanner();
      if (permBtn) permBtn.classList.add('hidden');
    });

  })();
</script>

    <!-- Boot splash (Instagram-style): paints INSTANTLY before any JS/CSS loads,
         covers the entire boot (no flashes of any kind), fades out when the app
         signals ready via window._hideSplash() — with a hard safety timeout. -->
    <div id="bootSplash" style="position:fixed;inset:0;z-index:99999;display:flex;flex-direction:column;
        align-items:center;justify-content:center;gap:18px;background:linear-gradient(160deg,#312e81 0%,#4f46e5 55%,#6d28d9 100%);

        </svg>

    <style>@keyframes bootspin{to{transform:rotate(360deg)}}</style>
    <script>
      // App calls this when its first screen is painted; safety timeout guarantees
      // the splash NEVER traps the user even if boot code fails.
      window._hideSplash = function () {
        var s = document.getElementById('bootSplash');
        if (!s || s.dataset.hiding) return;
        s.dataset.hiding = '1';
        s.style.opacity = '0';
        setTimeout(function () { s.remove(); }, 500);
      };
      setTimeout(function () { window._hideSplash(); }, 6000);
    </script>

    <!--

<script type="module">
// ── Logger: global error capture ─────────────────────────
import logger from './js/utils/logger.js';
window.onerror = function(message, source, lineno, colno, error) {
  logger.logError(error || new Error(message), { source, lineno, colno });
  return false;
};
window.addEventListener('unhandledrejection', function(event) {
  logger.logError(event.reason || 'Unhandled rejection', {});
});
</script>
<script>
// ── Service Worker registration ───────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .then(reg => { try { reg.update(); } catch (e) {} })
    .catch(() => {});
  // When a new service worker takes control, reload once so the fresh
  // HTML/JS is used immediately (self-heals stuck cached builds).
  let _swReloaded = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (_swReloaded) return; _swReloaded = true; window.location.reload();
  });
}

// ── Android/Chrome: capture install prompt ────────────────
let _installPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _installPrompt = e;
  if (!sessionStorage.getItem('pwa_dismissed')) {
    setTimeout(() => {
      document.getElementById('pwaInstallBanner')?.classList.add('show');
    }, 5000);
  }
});

window.installPWA = async () => {
  const b = document.getElementById('pwaInstallBanner');
  if (_installPrompt) {
    _installPrompt.prompt();
    await _installPrompt.userChoice;
    _installPrompt = null;
    b?.classList.remove('show');
  }
};

window.dismissInstall = () => {
  document.getElementById('pwaInstallBanner')?.classList.remove('show');
  document.getElementById('iosInstallHint')?.classList.remove('show');
  sessionStorage.setItem('pwa_dismissed', '1');
};

// ── iOS Safari: show manual instruction ──────────────────
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent)
           && !window.MSStream;
const isInApp = window.navigator.standalone === true;
if (isIOS && !isInApp && !sessionStorage.getItem('pwa_dismissed')) {
  setTimeout(() => {
    document.getElementById('iosInstallHint')?.classList.add('show');
    setTimeout(() => {
      document.getElementById('iosInstallHint')?.classList.remove('show');
    }, 7000);
  }, 4000);
}

window.addEventListener('appinstalled', () => {
  document.getElementById('pwaInstallBanner')?.classList.remove('show');
  _installPrompt = null;
});
</script>
