<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Corporate Chat - Modern Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Emoji Picker library -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/emoji-mart@5.5.2/css/emoji-mart.css">
    <script src="https://cdn.jsdelivr.net/npm/emoji-mart@5.5.2/dist/browser.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, updateDoc, setDoc, getDocs, where, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAoOsog2NP6Pf8YNSxn0rRYK4MSLEVNNZc",
            authDomain: "niltask.firebaseapp.com",
            projectId: "niltask",
            storageBucket: "niltask.firebasestorage.app",
            messagingSenderId: "868641827920",
            appId: "1:868641827920:web:70d9db79a361a76468f555"
        };
        const app = initializeApp(firebaseConfig);
        window.auth = getAuth(app);
        window.updateProfile = updateProfile;
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
        window.signOut = signOut;
        window.onAuthStateChanged = onAuthStateChanged;
        window.secondaryApp = initializeApp(firebaseConfig, "Secondary");
        window.secondaryAuth = getAuth(window.secondaryApp);
        window.db = getFirestore(app);
        window.collection = collection;
        window.addDoc = addDoc;
        window.onSnapshot = onSnapshot;
        window.query = query;
        window.orderBy = orderBy;
        window.serverTimestamp = serverTimestamp;
        window.doc = doc;
        window.updateDoc = updateDoc;
        window.setDoc = setDoc;
        window.getDocs = getDocs;
        window.where = where;
        window.deleteDoc = deleteDoc;
        window.storage = getStorage(app);
        window.ref = ref;
        window.uploadBytesResumable = uploadBytesResumable;
        window.getDownloadURL = getDownloadURL;
        window.dispatchEvent(new Event('firebaseReady'));
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); }
        .emoji-mart { position: absolute; bottom: 70px; right: 20px; z-index: 50; }
        @media (max-width: 768px) { .emoji-mart { right: 10px; } }
        .animate-in { animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-100 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const EmojiMart = window.EmojiMart;

        function ChatApp({ user, onLogout }) {
            const [activeModal, setActiveModal] = useState(null);
            const [selectedMessage, setSelectedMessage] = useState(null);
            const [inputText, setInputText] = useState("");
            const [messages, setMessages] = useState([]);
            const messagesEndRef = useRef(null);
            const textareaRef = useRef(null);
            const [showEmojiPicker, setShowEmojiPicker] = useState(false);
            
            // Theme & Profile
            const [showProfilePanel, setShowProfilePanel] = useState(false);
            const [displayName, setDisplayName] = useState("");
            const [theme, setTheme] = useState({
                mode: 'light', // light/dark
                bubbleSent: '#e4ebd3',
                bubbleReceived: '#ffffff',
                textColor: '#1f2937',
                bgPattern: 'cubes'
            });
            
            // Tasks & Delegate
            const [taskAssignee, setTaskAssignee] = useState("");
            const [taskDeadline, setTaskDeadline] = useState("");
            const [delegateAssignee, setDelegateAssignee] = useState("");
            const [trailComment, setTrailComment] = useState("");
            const [dbUsers, setDbUsers] = useState([]);
            
            // Inline task update (no modal) - store expanded task id
            const [expandedTaskId, setExpandedTaskId] = useState(null);
            const [inlineComment, setInlineComment] = useState("");
            const [inlineDelegate, setInlineDelegate] = useState("");
            
            // Groups
            const [groups, setGroups] = useState([]);
            const [activeGroup, setActiveGroup] = useState({ id: "main", name: "Academic Council", admins: [], members: [] });
            const [groupForm, setGroupForm] = useState({ name: "", members: [] });
            
            // Notifications
            const [showNotifications, setShowNotifications] = useState(false);
            const [notifications, setNotifications] = useState([]); // tasks assigned to me
            
            // Search, Admin
            const [searchQuery, setSearchQuery] = useState("");
            const [viewMode, setViewMode] = useState("chat");
            const [currentUserData, setCurrentUserData] = useState(null);
            const [adminForm, setAdminForm] = useState({ uid: '', name: '', email: '', password: '', isAdmin: false, canCreateGroups: false });
            const [adminFilterUser, setAdminFilterUser] = useState("");
            const [adminFilterDate, setAdminFilterDate] = useState("");
            const [allAdminReminders, setAllAdminReminders] = useState([]);
            
            const [uploadProgress, setUploadProgress] = useState(0);
            const [isUploading, setIsUploading] = useState(false);
            const fileInputRef = useRef(null);
            const [reminderDateTime, setReminderDateTime] = useState("");
            const [activeReminders, setActiveReminders] = useState([]);
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
            
            // Load theme from localStorage
            useEffect(() => {
                const saved = localStorage.getItem('chatTheme');
                if (saved) setTheme(JSON.parse(saved));
                const savedName = localStorage.getItem('chatDisplayName');
                if (savedName) setDisplayName(savedName);
            }, []);
            useEffect(() => {
                localStorage.setItem('chatTheme', JSON.stringify(theme));
                if (theme.mode === 'dark') document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [theme]);
            useEffect(() => {
                if (displayName) localStorage.setItem('chatDisplayName', displayName);
                if (currentUserData && displayName && currentUserData.name !== displayName) {
                    window.updateDoc(window.doc(window.db, "users", user.uid), { name: displayName });
                }
            }, [displayName]);

            // Notifications permission
            useEffect(() => {
                if ("Notification" in window && Notification.permission === "default") Notification.requestPermission();
            }, []);
            
            // Real-time tasks for notifications
            useEffect(() => {
                const qMyTasks = window.query(
                    window.collection(window.db, "messages"),
                    window.where("isTask", "==", true),
                    window.where("taskData.currentAssignee", "==", user.email),
                    window.where("taskData.status", "!=", "Completed")
                );
                const unsub = window.onSnapshot(qMyTasks, (snap) => {
                    const tasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setNotifications(tasks);
                });
                return () => unsub();
            }, [user.email]);
            
            // Reminders interval
            useEffect(() => {
                const qPersonal = window.query(window.collection(window.db, "reminders"), window.where("userId", "==", user.uid), window.where("isTriggered", "==", false));
                const unsubPersonal = window.onSnapshot(qPersonal, (snapshot) => setActiveReminders(snapshot.docs.map(d => ({ id: d.id, ...d.data() }))));
                let unsubAdmin = () => {};
                if (currentUserData?.isAdmin) {
                    const qAdmin = window.query(window.collection(window.db, "reminders"), window.orderBy("remindAt", "desc"));
                    unsubAdmin = window.onSnapshot(qAdmin, (snapshot) => setAllAdminReminders(snapshot.docs.map(d => ({ id: d.id, ...d.data() }))));
                }
                return () => { unsubPersonal(); unsubAdmin(); };
            }, [user.uid, currentUserData?.isAdmin]);
            
            useEffect(() => {
                const interval = setInterval(() => {
                    const now = new Date();
                    activeReminders.forEach(async (rem) => {
                        if (new Date(rem.remindAt) <= now) {
                            Notification.permission === "granted" && new Notification("Reminder", { body: rem.messageText });
                            await window.updateDoc(window.doc(window.db, "reminders", rem.id), { isTriggered: true });
                        }
                    });
                }, 15000);
                return () => clearInterval(interval);
            }, [activeReminders]);
            
            // Load user profile & groups
            useEffect(() => {
                const syncUser = async () => {
                    await window.setDoc(window.doc(window.db, "users", user.uid), {
                        uid: user.uid, email: user.email, name: displayName || user.email.split('@')[0].toUpperCase(),
                    }, { merge: true });
                };
                syncUser();
                const unsubCurrent = window.onSnapshot(window.doc(window.db, "users", user.uid), (doc) => {
                    if (doc.exists()) { setCurrentUserData(doc.data()); if (!displayName) setDisplayName(doc.data().name || user.email.split('@')[0]); }
                });
                const unsubUsers = window.onSnapshot(window.query(window.collection(window.db, "users"), window.orderBy("email")), (snapshot) => setDbUsers(snapshot.docs.map(d => d.data())));
                const unsubGroups = window.onSnapshot(window.collection(window.db, "groups"), (snapshot) => setGroups(snapshot.docs.map(d => ({ id: d.id, ...d.data() }))));
                return () => { unsubCurrent(); unsubUsers(); unsubGroups(); };
            }, [user]);
            
            // Messages realtime
            useEffect(() => {
                const q = window.query(window.collection(window.db, "messages"), window.orderBy("timestamp", "asc"));
                const unsubscribe = window.onSnapshot(q, (snapshot) => {
                    const loaded = snapshot.docs.map(doc => {
                        const data = doc.data();
                        return {
                            id: doc.id,
                            text: data.text,
                            sender: data.senderEmail,
                            isMine: data.senderUid === user.uid,
                            time: data.timestamp ? new Date(data.timestamp.toDate()).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '',
                            dateString: data.timestamp ? new Date(data.timestamp.toDate()).toISOString().split('T')[0] : '',
                            isTask: data.isTask === true,
                            hasReminder: data.hasReminder === true,
                            taskData: data.taskData || null,
                            isPrivateMention: data.isPrivateMention || false,
                            allowedUsers: data.allowedUsers || [],
                            fileUrl: data.fileUrl, fileName: data.fileName, fileType: data.fileType,
                            groupId: data.groupId || "main"
                        };
                    });
                    setMessages(loaded);
                    setTimeout(() => messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }), 100);
                });
                return () => unsubscribe();
            }, [user.uid]);
            
            const handleSendMessage = async () => {
                if (!inputText.trim()) return;
                const text = inputText;
                setInputText("");
                // Filter mentions only within current group members
                const groupMembers = activeGroup.id === "main" ? dbUsers.map(u => u.email) : (activeGroup.members || []);
                const mentionedEmails = groupMembers.filter(email => text.includes(`@${dbUsers.find(u => u.email === email)?.name}`));
                const isPrivate = mentionedEmails.length > 0;
                await window.addDoc(window.collection(window.db, "messages"), {
                    text, senderUid: user.uid, senderEmail: user.email, timestamp: window.serverTimestamp(),
                    isTask: false, hasReminder: false, isPrivateMention: isPrivate,
                    allowedUsers: isPrivate ? [user.email, ...mentionedEmails] : [],
                    fileUrl: null, fileName: null, fileType: null, groupId: activeGroup.id
                });
            };
            
            const handleKeyDown = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSendMessage(); }
            };
            
            const addEmoji = (emoji) => { setInputText(prev => prev + emoji.native); setShowEmojiPicker(false); };
            
            // Inline task update
            const submitInlineUpdate = async (msg) => {
                if (!inlineComment && !inlineDelegate) return;
                const now = new Date();
                let newTrail = [...msg.taskData.trail];
                if (inlineComment) newTrail.push({ action: "Update Added", by: user.email, time: now.toLocaleString(), comment: inlineComment });
                let newAssignee = msg.taskData.currentAssignee;
                if (inlineDelegate && inlineDelegate !== msg.taskData.currentAssignee) {
                    newAssignee = inlineDelegate;
                    newTrail.push({ action: "Delegated", by: user.email, time: now.toLocaleString(), to: inlineDelegate });
                }
                await window.updateDoc(window.doc(window.db, "messages", msg.id), {
                    "taskData.currentAssignee": newAssignee,
                    "taskData.status": newAssignee !== msg.taskData.currentAssignee ? "In Progress" : msg.taskData.status,
                    "taskData.trail": newTrail
                });
                setExpandedTaskId(null);
                setInlineComment("");
                setInlineDelegate("");
            };
            
            // Notification clear all
            const clearAllNotifications = async () => {
                for (let t of notifications) {
                    await window.updateDoc(window.doc(window.db, "messages", t.id), { "taskData.status": "Completed" });
                }
                setShowNotifications(false);
            };
            
            // Visibility filters
            const checkVisibility = (msg) => {
                if (msg.groupId !== activeGroup.id) return false;
                if (msg.isTask) return (msg.sender === user.email || msg.taskData?.currentAssignee === user.email || msg.taskData?.trail?.some(t => t.by === user.email || t.to === user.email));
                if (msg.isPrivateMention) return msg.allowedUsers.includes(user.email);
                return true;
            };
            const searchFilter = (msg) => !searchQuery || msg.text?.toLowerCase().includes(searchQuery.toLowerCase()) || msg.sender?.toLowerCase().includes(searchQuery.toLowerCase());
            
            const myGroups = [{ id: "main", name: "Academic Council", admins: [], members: [] }, ...groups.filter(g => g.members?.includes(user.email) || currentUserData?.isAdmin)];
            const notificationCount = notifications.length;
            const groupMembersForMentions = activeGroup.id === "main" ? dbUsers : dbUsers.filter(u => (activeGroup.members || []).includes(u.email));
            
            if (currentUserData && !currentUserData.isApproved && !currentUserData.isAdmin) {
                return <div className="flex h-screen items-center justify-center"><div className="bg-white p-8 rounded-3xl shadow-xl text-center"><i className="fa-solid fa-user-clock text-5xl text-orange-500"></i><h2 className="text-xl font-bold mt-4">Pending Approval</h2><button onClick={onLogout} className="mt-4 bg-gray-200 px-6 py-2 rounded-full">Sign Out</button></div></div>;
            }
            
            // Admin Console render (simplified but full)
            const renderAdmin = () => (
                <div className="flex flex-col h-full w-full bg-slate-100 overflow-auto">
                    <div className="bg-slate-800 text-white p-4 flex justify-between"><h2 className="font-bold"><i className="fa-solid fa-shield"></i> Admin Console</h2><button onClick={() => setViewMode("chat")} className="bg-slate-600 px-3 py-1 rounded">Back</button></div>
                    <div className="p-4 grid md:grid-cols-2 gap-4">
                        <div className="bg-white rounded-xl p-4 shadow"><h3 className="font-bold mb-2"><i className="fa-solid fa-users"></i> Users</h3><div className="space-y-2 max-h-96 overflow-auto">{dbUsers.map(u => (<div key={u.uid} className="flex justify-between items-center border-b py-1"><span>{u.name} ({u.email}) {u.isAdmin && "👑"}</span><div><button onClick={() => handleToggleApprove(u)} className={`px-2 py-0.5 text-xs rounded ${u.isApproved ? 'bg-green-200' : 'bg-yellow-200'}`}>{u.isApproved ? "Approved" : "Pending"}</button><button onClick={() => handleRemoveUser(u.uid)} className="ml-2 text-red-500"><i className="fa-solid fa-trash"></i></button></div></div>))}</div><button onClick={() => setActiveModal('admin_add_user')} className="mt-3 bg-blue-600 text-white px-3 py-1 rounded text-sm">+ Add User</button></div>
                        <div className="bg-white rounded-xl p-4 shadow"><h3 className="font-bold mb-2"><i className="fa-solid fa-layer-group"></i> Groups</h3><div className="space-y-2 max-h-96 overflow-auto">{groups.map(g => (<div key={g.id} className="border-b py-1"><span className="font-semibold">{g.name}</span> ({g.members?.length || 0} members)<br/><span className="text-xs text-gray-500">Admins: {g.admins?.join(', ') || 'none'}</span></div>))}</div><button onClick={() => setActiveModal('create_group')} className="mt-3 bg-emerald-600 text-white px-3 py-1 rounded text-sm">+ New Group</button></div>
                        <div className="bg-white rounded-xl p-4 shadow col-span-2"><h3 className="font-bold mb-2">Audit Log</h3><div className="overflow-auto max-h-64"><table className="w-full text-sm"><thead><tr><th>Time</th><th>User</th><th>Content</th><th>Type</th></tr></thead><tbody>{messages.slice(-20).reverse().map(m => (<tr key={m.id}><td className="text-xs">{m.dateString}</td><td>{m.sender?.split('@')[0]}</td><td className="truncate max-w-xs">{m.text || m.fileName}</td><td>{m.isTask ? "Task" : m.fileUrl ? "File" : "Msg"}</td></tr>))}</tbody></table></div></div>
                    </div>
                </div>
            );
            
            const handleToggleApprove = async (u) => { await window.updateDoc(window.doc(window.db, "users", u.uid), { isApproved: !u.isApproved }); };
            const handleRemoveUser = async (uid) => { if(confirm("Delete user?")) await window.deleteDoc(window.doc(window.db, "users", uid)); };
            const handleAddUserSubmit = async (e) => { e.preventDefault(); try { const cred = await window.createUserWithEmailAndPassword(window.secondaryAuth, adminForm.email, adminForm.password); await window.setDoc(window.doc(window.db, "users", cred.user.uid), { uid: cred.user.uid, email: cred.user.email, name: adminForm.name, isApproved: true, isAdmin: adminForm.isAdmin, canCreateGroups: adminForm.canCreateGroups }); window.signOut(window.secondaryAuth); setActiveModal(null); } catch(err){alert(err.message);} };
            const handleEditUserSubmit = async (e) => { e.preventDefault(); await window.updateDoc(window.doc(window.db, "users", adminForm.uid), { name: adminForm.name, isAdmin: adminForm.isAdmin, canCreateGroups: adminForm.canCreateGroups }); setActiveModal(null); };
            const handleCreateGroup = async (e) => { e.preventDefault(); await window.addDoc(window.collection(window.db, "groups"), { name: groupForm.name, members: [...groupForm.members, user.email], admins: [user.email], createdAt: window.serverTimestamp() }); setActiveModal(null); setGroupForm({name:"", members:[]}); };
            
            // Main UI
            if (viewMode === "admin") return renderAdmin();
            
            const bgClass = theme.mode === 'dark' ? 'bg-gray-900 text-gray-100' : 'bg-gray-100';
            const bubbleSentStyle = { backgroundColor: theme.bubbleSent, color: theme.textColor };
            const bubbleReceivedStyle = { backgroundColor: theme.bubbleReceived, color: theme.textColor };
            
            return (
                <div className={`flex h-screen w-full overflow-hidden ${bgClass}`}>
                    {/* Mobile menu overlay */}
                    {mobileMenuOpen && <div className="fixed inset-0 bg-black/50 z-40 md:hidden" onClick={() => setMobileMenuOpen(false)}></div>}
                    {/* Sidebar / Groups (mobile hidden) */}
                    <div className={`fixed md:relative z-50 w-72 bg-white dark:bg-gray-800 h-full flex flex-col transition-transform duration-300 ${mobileMenuOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'} shadow-xl`}>
                        <div className="p-4 border-b flex items-center justify-between"><div><h2 className="font-bold text-lg"><i className="fa-regular fa-comment-dots text-blue-500"></i> Chat</h2><p className="text-xs text-gray-500">{user.email}</p></div><i className="fa-solid fa-xmark md:hidden cursor-pointer" onClick={() => setMobileMenuOpen(false)}></i></div>
                        <div className="flex-1 overflow-y-auto p-2 space-y-1">
                            {myGroups.map(g => (
                                <div key={g.id} onClick={() => { setActiveGroup({ ...g, admins: g.admins || [], members: g.members || [] }); setMobileMenuOpen(false); }} className={`p-3 rounded-xl cursor-pointer transition ${activeGroup.id === g.id ? 'bg-blue-100 dark:bg-blue-900/50' : 'hover:bg-gray-100 dark:hover:bg-gray-700'}`}>
                                    <div className="font-semibold">{g.name}</div>
                                    <div className="text-xs text-gray-500">{g.id === "main" ? "Organization" : `${g.members?.length || 0} members`}</div>
                                </div>
                            ))}
                        </div>
                        <div className="p-3 border-t space-y-2">
                            <button onClick={() => setShowProfilePanel(true)} className="w-full flex items-center gap-2 p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700"><i className="fa-regular fa-user"></i> Profile & Theme</button>
                            <button onClick={() => setShowNotifications(!showNotifications)} className="w-full flex items-center gap-2 p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700"><i className="fa-regular fa-bell"></i> Notifications {notificationCount > 0 && <span className="bg-red-500 text-white text-xs px-2 rounded-full">{notificationCount}</span>}</button>
                            {currentUserData?.isAdmin && <button onClick={() => setViewMode("admin")} className="w-full flex items-center gap-2 p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700"><i className="fa-solid fa-shield"></i> Admin</button>}
                            <button onClick={onLogout} className="w-full flex items-center gap-2 p-2 rounded-lg text-red-500 hover:bg-red-50"><i className="fa-solid fa-arrow-right-from-bracket"></i> Logout</button>
                        </div>
                    </div>
                    
                    {/* Main chat area */}
                    <div className="flex-1 flex flex-col h-full relative">
                        {/* Top bar */}
                        <div className="h-14 px-4 flex items-center justify-between border-b bg-white/80 dark:bg-gray-800/80 backdrop-blur-sm">
                            <div className="flex items-center gap-3">
                                <i className="fa-solid fa-bars text-xl md:hidden cursor-pointer" onClick={() => setMobileMenuOpen(true)}></i>
                                <div className="font-bold text-lg">{activeGroup.name}</div>
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="relative"><i className="fa-solid fa-magnifying-glass text-gray-400"></i><input type="text" placeholder="Search" className="bg-gray-100 dark:bg-gray-700 rounded-full pl-8 pr-3 py-1 text-sm w-32 focus:w-48 transition-all" value={searchQuery} onChange={e => setSearchQuery(e.target.value)}/></div>
                                <button onClick={() => setShowNotifications(!showNotifications)} className="relative"><i className="fa-regular fa-bell text-xl"></i>{notificationCount > 0 && <span className="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full">{notificationCount}</span>}</button>
                            </div>
                        </div>
                        
                        {/* Notifications dropdown */}
                        {showNotifications && (
                            <div className="absolute top-14 right-4 w-80 bg-white dark:bg-gray-800 rounded-2xl shadow-xl z-30 p-2">
                                <div className="flex justify-between items-center p-2 border-b"><span className="font-bold">Pending Tasks</span><button onClick={clearAllNotifications} className="text-xs text-red-500">Clear All</button><i className="fa-solid fa-xmark cursor-pointer" onClick={()=>setShowNotifications(false)}></i></div>
                                <div className="max-h-64 overflow-auto">{notifications.length === 0 ? <div className="p-4 text-center">All done!</div> : notifications.map(t => (<div key={t.id} className="p-2 border-b hover:bg-gray-100 cursor-pointer" onClick={() => { setShowNotifications(false); setSelectedMessage(t); setActiveModal('task_trail'); }}><div className="text-sm font-semibold">{t.text}</div><div className="text-xs text-gray-500">Due: {new Date(t.taskData.deadline).toLocaleDateString()}</div></div>))}</div>
                            </div>
                        )}
                        
                        {/* Messages */}
                        <div className="flex-1 overflow-y-auto p-4 space-y-3" style={{ backgroundImage: theme.bgPattern === 'cubes' ? "url('https://www.transparenttextures.com/patterns/cubes.png')" : "none", backgroundColor: theme.mode === 'dark' ? '#111827' : '#e5e7eb' }}>
                            {messages.filter(checkVisibility).filter(searchFilter).map(msg => (
                                <div key={msg.id} className={`flex flex-col ${msg.isMine ? 'items-end' : 'items-start'}`}>
                                    {!msg.isMine && <div className="text-xs text-gray-500 ml-1 mb-0.5">{msg.sender?.split('@')[0]}</div>}
                                    {!msg.isTask && (
                                        <div className="max-w-[85%] md:max-w-[65%] p-3 rounded-2xl shadow-sm cursor-pointer" style={msg.isMine ? bubbleSentStyle : bubbleReceivedStyle} onClick={() => handleMessageClick(msg)}>
                                            {msg.isPrivateMention && <div className="text-xs font-bold text-purple-600"><i className="fa-solid fa-lock"></i> Private</div>}
                                            {msg.fileUrl ? (msg.fileType?.startsWith('image/') ? <img src={msg.fileUrl} className="rounded-lg max-h-60" onClick={e => { e.stopPropagation(); window.open(msg.fileUrl); }}/> : <div><i className="fa-regular fa-file"></i> {msg.fileName}</div>) : <p className="whitespace-pre-wrap">{msg.text}</p>}
                                            <div className="text-[10px] text-right opacity-70 mt-1">{msg.time} {msg.hasReminder && <i className="fa-regular fa-clock text-amber-500 ml-1"></i>}</div>
                                        </div>
                                    )}
                                    {msg.isTask && (
                                        <div className="max-w-[90%] md:max-w-[65%] w-full bg-white dark:bg-gray-700 rounded-2xl shadow-md border-l-4 border-blue-500 p-3">
                                            <div className="flex justify-between"><span className="text-xs font-bold text-blue-600">📋 TASK</span><span className={`text-xs px-2 rounded-full ${msg.taskData.status === 'Completed' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}`}>{msg.taskData.status}</span></div>
                                            <p className="mt-1">{msg.text}</p>
                                            <div className="mt-2 flex justify-between text-xs"><span>👤 {msg.taskData.currentAssignee.split('@')[0]}</span><span>📅 {new Date(msg.taskData.deadline).toLocaleDateString()}</span></div>
                                            {msg.taskData.status !== "Completed" && (
                                                <button onClick={() => setExpandedTaskId(expandedTaskId === msg.id ? null : msg.id)} className="mt-2 text-blue-500 text-xs"><i className="fa-regular fa-pen-to-square"></i> Quick Update</button>
                                            )}
                                            {expandedTaskId === msg.id && (
                                                <div className="mt-3 p-2 bg-gray-50 dark:bg-gray-800 rounded-xl space-y-2">
                                                    <textarea rows="2" placeholder="Add comment..." className="w-full p-2 text-sm rounded border" value={inlineComment} onChange={e => setInlineComment(e.target.value)}></textarea>
                                                    <select className="w-full p-2 text-sm rounded border" value={inlineDelegate} onChange={e => setInlineDelegate(e.target.value)}><option value="">Delegate to...</option>{(activeGroup.members || []).map(email => <option key={email} value={email}>{dbUsers.find(u=>u.email===email)?.name || email}</option>)}</select>
                                                    <button onClick={() => submitInlineUpdate(msg)} className="bg-blue-600 text-white px-4 py-1 rounded-full text-sm w-full">Submit</button>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            ))}
                            <div ref={messagesEndRef} className="h-4"></div>
                        </div>
                        
                        {/* Input area */}
                        <div className="p-3 bg-white dark:bg-gray-800 border-t flex items-center gap-2">
                            <button onClick={() => fileInputRef.current?.click()} className="p-2"><i className="fa-solid fa-paperclip text-gray-500"></i></button>
                            <input type="file" ref={fileInputRef} hidden onChange={(e) => { const f=e.target.files[0]; if(f) handleFileUpload(f); }}/>
                            <button onClick={() => setShowEmojiPicker(!showEmojiPicker)} className="p-2"><i className="fa-regular fa-face-smile text-gray-500"></i></button>
                            <div className="flex-1 bg-gray-100 dark:bg-gray-700 rounded-full px-4 py-2">
                                <textarea ref={textareaRef} rows="1" placeholder="Message... (Shift+Enter for new line)" className="w-full bg-transparent outline-none resize-none" value={inputText} onChange={e => setInputText(e.target.value)} onKeyDown={handleKeyDown}></textarea>
                            </div>
                            <button onClick={handleSendMessage} className="bg-blue-500 text-white w-10 h-10 rounded-full flex items-center justify-center"><i className="fa-solid fa-paper-plane"></i></button>
                        </div>
                        {showEmojiPicker && <EmojiMart.Picker onSelect={addEmoji} theme={theme.mode} set="apple" className="emoji-mart" />}
                    </div>
                    
                    {/* Profile & Theme Panel */}
                    {showProfilePanel && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onClick={() => setShowProfilePanel(false)}>
                            <div className="bg-white dark:bg-gray-800 rounded-2xl max-w-md w-full p-6" onClick={e => e.stopPropagation()}>
                                <h3 className="text-xl font-bold mb-4">Profile & Theme</h3>
                                <div className="space-y-4">
                                    <div><label className="block text-sm font-medium">Display Name</label><input type="text" value={displayName} onChange={e => setDisplayName(e.target.value)} className="w-full p-2 border rounded-lg" /></div>
                                    <div><label className="block text-sm font-medium">Theme Mode</label><select value={theme.mode} onChange={e => setTheme({...theme, mode: e.target.value})} className="w-full p-2 border rounded-lg"><option value="light">Light</option><option value="dark">Dark</option></select></div>
                                    <div><label className="block text-sm font-medium">Sent Bubble Color</label><input type="color" value={theme.bubbleSent} onChange={e => setTheme({...theme, bubbleSent: e.target.value})} className="w-full h-10" /></div>
                                    <div><label className="block text-sm font-medium">Received Bubble Color</label><input type="color" value={theme.bubbleReceived} onChange={e => setTheme({...theme, bubbleReceived: e.target.value})} className="w-full h-10" /></div>
                                    <div><label className="block text-sm font-medium">Text Color</label><input type="color" value={theme.textColor} onChange={e => setTheme({...theme, textColor: e.target.value})} className="w-full h-10" /></div>
                                    <button onClick={() => setShowProfilePanel(false)} className="w-full bg-blue-600 text-white py-2 rounded-lg">Close</button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* Other modals (reminder, task convert, etc) kept minimal but functional */}
                    {activeModal === 'context' && selectedMessage && (<div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50"><div className="bg-white rounded-2xl p-6 w-80"><p className="mb-4 italic">"{selectedMessage.text}"</p><button onClick={() => setActiveModal('reminder')} className="block w-full mb-2 p-2 bg-yellow-100 rounded">Set Reminder</button><button onClick={() => setActiveModal('task_convert')} className="block w-full p-2 bg-blue-100 rounded">Convert to Task</button><button onClick={() => setActiveModal(null)} className="mt-3 text-gray-500">Cancel</button></div></div>)}
                    {activeModal === 'reminder' && (<div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4"><div className="bg-white p-6 rounded-2xl"><input type="datetime-local" value={reminderDateTime} onChange={e => setReminderDateTime(e.target.value)} className="border p-2 rounded"/><button onClick={setReminder} className="ml-2 bg-blue-600 text-white px-4 py-2 rounded">Save</button></div></div>)}
                    {activeModal === 'task_convert' && (<div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4"><div className="bg-white p-6 rounded-2xl"><select value={taskAssignee} onChange={e=>setTaskAssignee(e.target.value)} className="border p-2 w-full mb-2"><option>Select assignee</option>{groupMembersForMentions.map(u=><option key={u.email} value={u.email}>{u.name}</option>)}</select><input type="datetime-local" value={taskDeadline} onChange={e=>setTaskDeadline(e.target.value)} className="border p-2 w-full mb-2"/><button onClick={convertToTask} className="bg-blue-600 text-white px-4 py-2 rounded">Create Task</button></div></div>)}
                    {activeModal === 'admin_add_user' && (<div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4"><div className="bg-white p-6 rounded-2xl w-96"><form onSubmit={handleAddUserSubmit}><input placeholder="Name" value={adminForm.name} onChange={e=>setAdminForm({...adminForm,name:e.target.value})} className="border p-2 w-full mb-2"/><input placeholder="Email" value={adminForm.email} onChange={e=>setAdminForm({...adminForm,email:e.target.value})} className="border p-2 w-full mb-2"/><input type="password" placeholder="Password" value={adminForm.password} onChange={e=>setAdminForm({...adminForm,password:e.target.value})} className="border p-2 w-full mb-2"/><label className="flex items-center"><input type="checkbox" checked={adminForm.isAdmin} onChange={e=>setAdminForm({...adminForm,isAdmin:e.target.checked})}/><span className="ml-2">Admin</span></label><button type="submit" className="bg-blue-600 text-white p-2 w-full mt-4 rounded">Add</button></form></div></div>)}
                    {activeModal === 'task_trail' && selectedMessage?.taskData && (<div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50"><div className="bg-white dark:bg-gray-800 rounded-2xl max-w-lg w-full max-h-[80vh] overflow-auto p-4"><h3 className="font-bold">Task Trail</h3><div className="space-y-2 mt-2">{selectedMessage.taskData.trail.map((t,i)=> <div key={i} className="border-l-2 border-blue-300 pl-2 py-1 text-sm"><b>{t.action}</b> by {t.by.split('@')[0]} {t.comment && <div className="italic">"{t.comment}"</div>}</div>)}</div><button onClick={()=>setActiveModal(null)} className="mt-4 bg-gray-200 px-4 py-1 rounded">Close</button></div></div>)}
                    {activeModal === 'create_group' && (<div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4"><div className="bg-white p-6 rounded-2xl w-96"><form onSubmit={handleCreateGroup}><input placeholder="Group Name" value={groupForm.name} onChange={e=>setGroupForm({...groupForm,name:e.target.value})} className="border p-2 w-full mb-2"/><div className="mb-2 font-semibold">Members</div><div className="max-h-40 overflow-auto">{dbUsers.map(u=><label key={u.uid} className="flex items-center"><input type="checkbox" value={u.email} checked={groupForm.members.includes(u.email)} onChange={e=>{if(e.target.checked) setGroupForm({...groupForm, members:[...groupForm.members, u.email]}); else setGroupForm({...groupForm, members: groupForm.members.filter(m=>m!==u.email)})}}/><span className="ml-2">{u.name}</span></label>)}</div><button type="submit" className="bg-emerald-600 text-white p-2 w-full mt-4 rounded">Create</button></form></div></div>)}
                    
                    {isUploading && (<div className="fixed inset-0 bg-black/50 flex items-center justify-center"><div className="bg-white p-4 rounded-xl text-center"><i className="fa-solid fa-spinner fa-spin text-2xl"></i><div className="mt-2">Uploading {Math.round(uploadProgress)}%</div></div></div>)}
                </div>
            );
            
            async function handleFileUpload(file) {
                setIsUploading(true); setUploadProgress(0);
                const storageRef = window.ref(window.storage, `chat_uploads/${Date.now()}_${file.name}`);
                const uploadTask = window.uploadBytesResumable(storageRef, file);
                uploadTask.on('state_changed', (snap) => setUploadProgress((snap.bytesTransferred/snap.totalBytes)*100), (err)=>{alert("Upload failed"); setIsUploading(false);}, async () => {
                    const url = await window.getDownloadURL(uploadTask.snapshot.ref);
                    await window.addDoc(window.collection(window.db, "messages"), { text: `📎 ${file.name}`, senderUid: user.uid, senderEmail: user.email, timestamp: window.serverTimestamp(), isTask: false, fileUrl: url, fileName: file.name, fileType: file.type, groupId: activeGroup.id });
                    setIsUploading(false);
                });
            }
            async function setReminder() { if(!selectedMessage||!reminderDateTime) return; await window.addDoc(window.collection(window.db,"reminders"),{userId:user.uid, messageId:selectedMessage.id, messageText:selectedMessage.text, remindAt:reminderDateTime, isTriggered:false}); await window.updateDoc(window.doc(window.db,"messages",selectedMessage.id),{hasReminder:true}); setActiveModal(null); setReminderDateTime(""); }
            async function convertToTask() { if(!selectedMessage||!taskDeadline||!taskAssignee) return; await window.setDoc(window.doc(window.db,"messages",selectedMessage.id),{isTask:true,taskData:{deadline:taskDeadline,currentAssignee:taskAssignee,status:"Pending",trail:[{action:"Task Created",by:user.email,time:new Date().toLocaleString(),to:taskAssignee}]}},{merge:true}); setActiveModal(null); }
            function handleMessageClick(msg) { setSelectedMessage(msg); setActiveModal(msg.isTask?'task_trail':'context'); }
        }
        
        function App() {
            const [user, setUser] = useState(null);
            const [firebaseReady, setFirebaseReady] = useState(false);
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [authErr, setAuthErr] = useState("");
            useEffect(() => {
                const cb = () => { window.onAuthStateChanged(window.auth, setUser); setFirebaseReady(true); };
                if (window.auth) cb(); else window.addEventListener('firebaseReady', cb);
                return () => window.removeEventListener('firebaseReady', cb);
            }, []);
            const handleLogin = (e) => { e.preventDefault(); window.signInWithEmailAndPassword(window.auth, email, password).catch(err => setAuthErr(err.message)); };
            const handleRegister = async (e) => { e.preventDefault(); try { const cred = await window.createUserWithEmailAndPassword(window.auth, email, password); const isVP = email.toLowerCase() === 'viceprincipal@mpgs.edu.in'; await window.setDoc(window.doc(window.db, "users", cred.user.uid), { uid: cred.user.uid, email, name: email.split('@')[0], isApproved: isVP, isAdmin: isVP, canCreateGroups: isVP }); } catch(err){ setAuthErr(err.message); } };
            if (!firebaseReady) return <div className="flex h-screen items-center justify-center">Loading...</div>;
            if (!user) return (
                <div className="flex h-screen items-center justify-center bg-gray-100 p-4"><div className="bg-white rounded-3xl shadow-xl p-8 w-full max-w-md"><h1 className="text-2xl font-black mb-6 text-center">Corporate Chat</h1>{authErr && <div className="bg-red-100 p-2 rounded mb-4 text-red-700 text-sm">{authErr}</div>}<input type="email" placeholder="Email" className="w-full p-3 border rounded-xl mb-3" value={email} onChange={e=>setEmail(e.target.value)}/><input type="password" placeholder="Password" className="w-full p-3 border rounded-xl mb-3" value={password} onChange={e=>setPassword(e.target.value)}/><div className="flex gap-2"><button onClick={handleLogin} className="flex-1 bg-blue-800 text-white py-3 rounded-xl font-bold">Sign In</button><button onClick={handleRegister} className="flex-1 border py-3 rounded-xl">Register</button></div></div></div>
            );
            return <ChatApp user={user} onLogout={() => window.signOut(window.auth)} />;
        }
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
