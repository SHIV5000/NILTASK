<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MPGS TaskFlow – Grey/White Theme</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <style>
        /* ========== Grey/White Theme (WhatsApp inspired) ========== */
        :root {
            --bg-body: #f0f2f5;
            --bg-sidebar: #ffffff;
            --bg-chat: #efeae2;
            --bg-message-own: #d9f0ec;
            --bg-message-other: #ffffff;
            --text-primary: #111b21;
            --text-secondary: #667781;
            --accent: #00a884;
            --accent-hover: #008f6f;
            --border-color: #e9edef;
        }
        [data-theme="dark"] {
            --bg-body: #111b21;
            --bg-sidebar: #202c33;
            --bg-chat: #0b141a;
            --bg-message-own: #005c4b;
            --bg-message-other: #202c33;
            --text-primary: #e9edef;
            --text-secondary: #8696a0;
            --accent: #00a884;
            --accent-hover: #02c299;
            --border-color: #2a3942;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-primary);
            transition: background-color 0.2s;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 10px; }
        .sidebar { background: var(--bg-sidebar); border-right: 1px solid var(--border-color); }
        .chat-header, .input-area { background: var(--bg-sidebar); border-bottom: 1px solid var(--border-color); }
        .message-bubble { max-width: 75%; margin-bottom: 0.75rem; display: flex; flex-direction: column; }
        .message-bubble.sent { align-self: flex-end; }
        .message-bubble.received { align-self: flex-start; }
        .message-bubble .bubble-content {
            padding: 8px 12px;
            word-wrap: break-word;
            box-shadow: 0 1px 1px rgba(0,0,0,0.05);
        }
        .sent .bubble-content {
            background: var(--bg-message-own);
            border-radius: 16px 0px 16px 16px;
        }
        .received .bubble-content {
            background: var(--bg-message-other);
            border-radius: 0px 16px 16px 16px;
        }
        .message-meta {
            font-size: 0.7rem;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            gap: 12px;
            color: var(--text-secondary);
        }
        .reply-btn, .menu-dots {
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        .reply-btn:hover, .menu-dots:hover { opacity: 1; color: var(--accent); }
        .inline-reply { display: none; margin-top: 8px; border-top: 1px solid var(--border-color); padding-top: 6px; }
        .inline-reply.active { display: block; }
        .task-card {
            background: var(--bg-sidebar);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
            border-left: 4px solid var(--accent);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .channel-item {
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .channel-item:hover { background: var(--border-color); }
        .btn-primary {
            background: var(--accent);
            color: white;
            border-radius: 20px;
            padding: 8px 20px;
            font-weight: 600;
        }
        .btn-primary:hover { background: var(--accent-hover); }
        .modal-content {
            background: var(--bg-sidebar);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .ql-container { border: none; font-family: 'Inter', sans-serif; }
        .ql-toolbar { border: none !important; border-bottom: 1px solid var(--border-color) !important; background: transparent; }
        .ql-editor { min-height: 60px; }
        .ui-input {
            background: var(--bg-body);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 8px 12px;
            color: var(--text-primary);
        }
        .ui-input:focus { outline: none; border-color: var(--accent); }
    </style>
</head>
<body class="antialiased overflow-hidden">
    <div id="root" class="h-screen flex overflow-hidden"></div>
    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
        const SUPABASE_URL = 'https://apfymygzwkzjhhgmtkaj.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFwZnlteWd6d2t6amhoZ210a2FqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MjM5MTIsImV4cCI6MjA5NjQ5OTkxMn0.RiV6kDDeSq5ZIP68RGwtpLtqPALFloq23owoNm2aA-c';
        const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null, currentRoom = 'general';
        let messageSubscription, taskSubscription, assigneeSubscription, notificationSubscription;
        let currentTheme = localStorage.getItem('theme') || 'light';
        let quillEditor = null;

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m] || m)); }
        function showToast(msg) { const t=document.createElement('div'); t.className='fixed bottom-6 right-6 bg-black/70 text-white px-4 py-2 rounded-full z-50 text-sm'; t.innerText=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }
        function applyTheme() { document.documentElement.setAttribute('data-theme', currentTheme); }

        // Auth & Profile
        async function ensureProfile() { if(!currentUser) return; const {data:ex}=await sb.from('profiles').select('id').eq('id',currentUser.id).maybeSingle(); if(!ex) await sb.from('profiles').insert({id:currentUser.id, email:currentUser.email, full_name:currentUser.email.split('@')[0], role:'teacher'}); }
        async function signIn(email,pwd) { const {data,error}=await sb.auth.signInWithPassword({email,password:pwd}); if(!error && data?.user) { currentUser=data.user; await ensureProfile(); renderMainApp(); startSubscriptions(); return true; } return false; }
        async function signUp(email,pwd) { const {error}=await sb.auth.signUp({email,password:pwd}); if(error) throw error; alert('Check email!'); }
        async function logout() { await sb.auth.signOut(); currentUser=null; renderAuthScreen(); }

        function renderAuthScreen() {
            applyTheme();
            document.getElementById('root').innerHTML=`
                <div class="min-h-screen flex items-center justify-center" style="background:var(--bg-body)">
                    <div class="modal-content p-8 w-96 text-center">
                        <div class="w-16 h-16 rounded-full mx-auto flex items-center justify-center mb-4" style="background:var(--accent); color:white"><i class="fas fa-school text-2xl"></i></div>
                        <h1 class="text-2xl font-bold mb-2">MPGS TaskFlow</h1>
                        <p class="text-sm mb-6" style="color:var(--text-secondary)">Team collaboration</p>
                        <input id="email" placeholder="Email" class="ui-input w-full mb-3">
                        <input id="password" type="password" placeholder="Password" class="ui-input w-full mb-4">
                        <div class="flex gap-3">
                            <button id="loginBtn" class="flex-1 btn-primary">Login</button>
                            <button id="signupBtn" class="flex-1 py-2 rounded-full border" style="border-color:var(--border-color)">Sign Up</button>
                        </div>
                        <div id="authMsg" class="mt-4 text-red-500 text-sm"></div>
                    </div>
                </div>`;
            document.getElementById('loginBtn').onclick=async()=>{ const ok=await signIn(document.getElementById('email').value,document.getElementById('password').value); if(!ok) document.getElementById('authMsg').innerText='Invalid credentials'; };
            document.getElementById('signupBtn').onclick=async()=>{ try{ await signUp(document.getElementById('email').value,document.getElementById('password').value); document.getElementById('authMsg').innerText='Check email!'; } catch(e){ document.getElementById('authMsg').innerText=e.message; } };
        }

        function renderMainApp() {
            applyTheme();
            document.getElementById('root').innerHTML = `
                <div class="flex h-full w-full">
                    <!-- Left Sidebar: Chats -->
                    <div class="w-80 sidebar flex flex-col">
                        <div class="p-4 flex justify-between items-center border-b" style="border-color:var(--border-color)">
                            <h2 class="text-lg font-semibold flex items-center gap-2"><i class="fas fa-comments" style="color:var(--accent)"></i> Chats</h2>
                            <div class="flex gap-2">
                                <button id="themeToggleBtn" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700"><i class="fas fa-moon"></i></button>
                                ${currentUser?.role === 'admin' ? '<button id="adminPanelBtn" class="p-2 rounded-full bg-green-600 text-white"><i class="fas fa-user-shield"></i></button>' : ''}
                                <button id="logoutBtn" class="p-2 rounded-full hover:bg-red-100 hover:text-red-500"><i class="fas fa-sign-out-alt"></i></button>
                            </div>
                        </div>
                        <div class="p-3"><input type="text" id="globalSearch" placeholder="Search chats..." class="ui-input w-full pl-9" style="background:var(--bg-body)"></div>
                        <div id="chatsList" class="flex-1 overflow-y-auto"></div>
                    </div>

                    <!-- Center: Chat Area -->
                    <div class="flex-1 flex flex-col" style="background:var(--bg-chat)">
                        <div class="chat-header p-3 flex justify-between items-center">
                            <div class="flex items-center gap-2">
                                <div class="w-8 h-8 rounded-full bg-gray-300 flex items-center justify-center"><i class="fas fa-hashtag"></i></div>
                                <span class="font-semibold" id="currentRoomTitle">${currentRoom}</span>
                            </div>
                            <input type="text" id="messageSearchBar" placeholder="Search messages..." class="ui-input text-sm w-48">
                        </div>
                        <div id="messagesContainer" class="flex-1 overflow-y-auto p-4 flex flex-col"></div>
                        <div class="input-area p-3">
                            <div class="editor-wrapper border rounded-xl" style="border-color:var(--border-color); background:var(--bg-sidebar)">
                                <div id="richEditor" style="height: 70px;"></div>
                            </div>
                            <div class="flex justify-between mt-2">
                                <button id="scheduleMsgBtn" class="text-sm flex items-center gap-1 text-gray-500"><i class="far fa-clock"></i> Schedule</button>
                                <button id="sendBtn" class="btn-primary flex items-center gap-2"><span>Send</span> <i class="fas fa-paper-plane"></i></button>
                            </div>
                        </div>
                    </div>

                    <!-- Right Sidebar: Tasks -->
                    <div class="w-80 sidebar border-l flex flex-col" style="border-left-color:var(--border-color)">
                        <div class="p-4 border-b" style="border-color:var(--border-color)"><h3 class="font-semibold flex items-center gap-2"><i class="fas fa-tasks" style="color:var(--accent)"></i> Task Hub</h3></div>
                        <div id="tasksPanel" class="flex-1 overflow-y-auto p-3"></div>
                    </div>
                </div>

                <!-- Modals -->
                <div id="taskModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50"><div class="modal-content p-6 w-96"><h3 class="text-lg font-bold mb-3">Convert to Task</h3><input id="taskTitle" class="ui-input w-full mb-2"><select id="taskAssignees" multiple size="4" class="ui-input w-full mb-2"></select><input type="date" id="taskDeadline" class="ui-input w-full mb-2"><select id="taskPriority" class="ui-input w-full mb-2"><option>Low</option><option>Medium</option><option>High</option></select><label><input type="checkbox" id="taskRequireProof"> Require proof</label><div class="flex gap-2 mt-4"><button id="cancelTaskBtn" class="flex-1 py-2 rounded-full border">Cancel</button><button id="saveTaskBtn" class="flex-1 btn-primary">Create</button></div></div></div>
                <div id="reminderModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50"><div class="modal-content p-6 w-96"><h3 class="text-lg font-bold mb-3">Set Reminder</h3><p id="reminderMessagePreview" class="text-sm bg-gray-100 p-2 rounded mb-3"></p><input type="datetime-local" id="reminderDateTime" class="ui-input w-full mb-4"><div class="flex gap-2"><button id="cancelReminderBtn" class="flex-1 py-2 rounded-full border">Cancel</button><button id="saveReminderBtn" class="flex-1 btn-primary">Set</button></div></div></div>
                <div id="scheduleModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50"><div class="modal-content p-6 w-96"><h3 class="text-lg font-bold mb-3">Schedule Message</h3><textarea id="scheduleMessageText" rows="3" class="ui-input w-full mb-2"></textarea><select id="scheduleChannel" class="ui-input w-full mb-2"><option>general</option><option>math</option><option>science</option></select><input type="datetime-local" id="scheduleDateTime" class="ui-input w-full mb-4"><div class="flex gap-2"><button id="cancelScheduleBtn" class="flex-1 py-2 rounded-full border">Cancel</button><button id="saveScheduleBtn" class="flex-1 btn-primary">Schedule</button></div></div></div>
                <div id="adminModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50"><div class="modal-content p-6 w-80 text-center"><h3 class="text-lg font-bold mb-2">Admin Panel</h3><p class="text-sm text-gray-500">Coming soon: user management, statistics, exports.</p><button id="closeAdminBtn" class="mt-4 w-full py-2 rounded-full border">Close</button></div></div>
            `;
            // Init Quill
            quillEditor = new Quill('#richEditor', { theme: 'snow', placeholder: 'Type a message...', modules: { toolbar: [['bold','italic','underline']] } });
            // Event listeners
            document.getElementById('sendBtn').onclick = sendMessage;
            quillEditor.root.addEventListener('keydown', (e) => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); } });
            document.getElementById('themeToggleBtn')?.addEventListener('click',()=>{ currentTheme=currentTheme==='light'?'dark':'light'; localStorage.setItem('theme',currentTheme); applyTheme(); });
            document.getElementById('logoutBtn')?.addEventListener('click', logout);
            document.getElementById('adminPanelBtn')?.addEventListener('click',()=>document.getElementById('adminModal').classList.remove('hidden'));
            document.getElementById('closeAdminBtn')?.addEventListener('click',()=>document.getElementById('adminModal').classList.add('hidden'));
            document.getElementById('scheduleMsgBtn')?.addEventListener('click',()=>showScheduleModal(quillEditor.root.innerText));
            document.getElementById('messageSearchBar')?.addEventListener('input',(e)=>filterMessages(e.target.value));
            document.getElementById('globalSearch')?.addEventListener('input',(e)=>filterChats(e.target.value));
            loadChatsList(); loadMessages(); loadTasksForPanel(); attachModalButtons();
        }

        // ========== CHATS (Groups + Direct Messages) ==========
        async function loadChatsList() {
            const groups = ['general', 'math', 'science'];
            const {data: users} = await sb.from('profiles').select('id, email, full_name').neq('id', currentUser.id);
            let html = `<div class="px-3 py-2 text-xs font-semibold text-gray-500">GROUPS</div>`;
            groups.forEach(g => { html += `<div class="channel-item" data-room="${g}"><i class="fas fa-users mr-3 w-5"></i># ${g}</div>`; });
            html += `<div class="px-3 py-2 text-xs font-semibold text-gray-500 mt-2">DIRECT MESSAGES</div>`;
            users?.forEach(u => { html += `<div class="channel-item" data-room="dm_${u.id}"><div class="w-6 h-6 rounded-full inline-flex items-center justify-center mr-2 bg-gray-300 text-xs">${(u.full_name||u.email).charAt(0)}</div>${u.full_name||u.email}</div>`; });
            document.getElementById('chatsList').innerHTML = html;
            document.querySelectorAll('.channel-item').forEach(el => {
                el.addEventListener('click', () => { currentRoom = el.dataset.room; renderMainApp(); });
            });
        }
        function filterChats(keyword) { document.querySelectorAll('.channel-item').forEach(el => { el.style.display = el.innerText.toLowerCase().includes(keyword.toLowerCase()) ? 'flex' : 'none'; }); }

        // ========== MESSAGES ==========
        async function sendMessage() {
            const text = quillEditor.root.innerText.trim();
            if (!text) return;
            await sb.from('messages').insert({ room_id: currentRoom, sender_id: currentUser.id, text, created_at: new Date().toISOString() });
            quillEditor.root.innerHTML = '';
            loadMessages();
        }
        async function loadMessages() {
            const {data: msgs} = await sb.from('messages').select('*, profiles(full_name, email)').eq('room_id', currentRoom).order('created_at', {ascending: true});
            renderMessages(msgs || []);
            document.getElementById('messagesContainer').scrollTop = document.getElementById('messagesContainer').scrollHeight;
        }
        function renderMessages(messages) {
            const c = document.getElementById('messagesContainer');
            if (!c) return;
            if (!messages.length) { c.innerHTML = '<div class="text-center text-gray-500">No messages yet</div>'; return; }
            c.innerHTML = messages.map(msg => {
                const isOwn = msg.sender_id === currentUser.id;
                const senderName = msg.profiles?.full_name || msg.profiles?.email || 'Unknown';
                const time = new Date(msg.created_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
                return `<div id="msg-${msg.id}" class="message-bubble ${isOwn ? 'sent' : 'received'}">
                            <div class="bubble-content">
                                <div class="message-meta">
                                    <span>${!isOwn ? escapeHtml(senderName) : ''}</span>
                                    <span>${time} ${isOwn ? '<i class="fas fa-check-double text-blue-500 ml-1"></i>' : ''}</span>
                                </div>
                                <div class="text-sm">${escapeHtml(msg.text)}</div>
                                <div class="flex justify-end gap-3 mt-1 text-xs">
                                    <button class="reply-btn" data-msg-id="${msg.id}"><i class="fas fa-reply"></i> Reply</button>
                                    <div class="menu-dots" data-msg-id="${msg.id}" data-msg-text="${escapeHtml(msg.text)}"><i class="fas fa-ellipsis-h"></i></div>
                                </div>
                                <div id="reply-${msg.id}" class="inline-reply"><div class="flex gap-2"><input type="text" placeholder="Write a reply..." class="ui-input flex-1 text-sm"><button class="send-reply-btn bg-gray-200 rounded-full px-3 py-1 text-sm">Send</button></div></div>
                            </div>
                        </div>`;
            }).join('');
            // Attach reply & menu events
            document.querySelectorAll('.reply-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const msgId = btn.dataset.msgId;
                    const replyDiv = document.getElementById(`reply-${msgId}`);
                    replyDiv.classList.toggle('active');
                    if (replyDiv.classList.contains('active')) {
                        const input = replyDiv.querySelector('input');
                        input.focus();
                        const sendReply = replyDiv.querySelector('.send-reply-btn');
                        const sendReplyFn = async () => {
                            const text = input.value.trim();
                            if (text) {
                                await sb.from('messages').insert({ room_id: currentRoom, sender_id: currentUser.id, text, parent_message_id: msgId, created_at: new Date().toISOString() });
                                input.value = '';
                                replyDiv.classList.remove('active');
                                loadMessages();
                            }
                        };
                        input.onkeypress = (e) => { if(e.key === 'Enter') sendReplyFn(); };
                        sendReply.onclick = sendReplyFn;
                    }
                });
            });
            document.querySelectorAll('.menu-dots').forEach(el => {
                el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const mid = el.dataset.msgId, mtext = el.dataset.msgText;
                    const menu = document.createElement('div');
                    menu.className = 'absolute bg-white dark:bg-gray-800 rounded-lg shadow-lg p-2 z-50 border';
                    menu.style.minWidth = '140px';
                    menu.innerHTML = `<div class="cursor-pointer px-3 py-2 text-sm hover:bg-gray-100 dark:hover:bg-gray-700" data-action="reminder">🔔 Reminder</div>
                                     <div class="cursor-pointer px-3 py-2 text-sm hover:bg-gray-100 dark:hover:bg-gray-700" data-action="task">📋 Convert to Task</div>
                                     <div class="cursor-pointer px-3 py-2 text-sm hover:bg-gray-100 dark:hover:bg-gray-700" data-action="schedule">📅 Schedule</div>
                                     <div class="cursor-pointer px-3 py-2 text-sm hover:bg-gray-100 dark:hover:bg-gray-700" data-action="bookmark">⭐ Bookmark</div>`;
                    document.body.appendChild(menu);
                    const rect = el.getBoundingClientRect();
                    menu.style.top = (rect.bottom + window.scrollY) + 'px';
                    menu.style.left = (rect.left - 100 + window.scrollX) + 'px';
                    menu.querySelector('[data-action="reminder"]').onclick = () => { showReminderModal(mid, mtext); menu.remove(); };
                    menu.querySelector('[data-action="task"]').onclick = () => { openTaskModal(mid, mtext); menu.remove(); };
                    menu.querySelector('[data-action="schedule"]').onclick = () => { showScheduleModal(mtext); menu.remove(); };
                    menu.querySelector('[data-action="bookmark"]').onclick = () => { toggleBookmark(mid, mtext, null); menu.remove(); };
                    setTimeout(() => menu.remove(), 5000);
                });
            });
        }
        function filterMessages(kwd) { document.querySelectorAll('.message-bubble').forEach(m => { m.style.display = m.innerText.toLowerCase().includes(kwd.toLowerCase()) ? 'flex' : 'none'; }); }
        function subscribeToMessages() { if(messageSubscription) messageSubscription.unsubscribe(); messageSubscription = sb.channel('public:messages').on('postgres_changes', {event:'INSERT', schema:'public', table:'messages'}, (payload) => { if(payload.new.room_id === currentRoom) loadMessages(); }).subscribe(); }

        // ========== TASKS (Multi-assignee, lifecycle) ==========
        async function loadTasksForPanel() {
            const {data: tasks} = await sb.from('tasks').select('*, creator:profiles!assigned_by(full_name, email)').order('created_at', {ascending: false});
            if (!tasks) return;
            const ids = tasks.map(t => t.id);
            const {data: assignees} = await sb.from('task_assignees').select('task_id, assignee_id, status, profiles!assignee_id(full_name, email)').in('task_id', ids);
            const assigneesMap = {};
            if (assignees) assignees.forEach(a => { if (!assigneesMap[a.task_id]) assigneesMap[a.task_id] = []; assigneesMap[a.task_id].push({ assignee_id: a.assignee_id, status: a.status, profiles: a.profiles }); });
            const filtered = tasks.filter(t => t.assigned_by === currentUser.id || (assigneesMap[t.id] && assigneesMap[t.id].some(a => a.assignee_id === currentUser.id)));
            const tasksWith = filtered.map(t => ({ ...t, assignees: assigneesMap[t.id] || [] }));
            renderTasksPanel(tasksWith);
        }
        function renderTasksPanel(tasks) {
            const container = document.getElementById('tasksPanel');
            if (!container) return;
            if (!tasks.length) { container.innerHTML = '<div class="text-center text-gray-500 mt-10">No tasks</div>'; return; }
            container.innerHTML = tasks.map(task => {
                const isCreator = task.assigned_by === currentUser.id;
                const assignees = task.assignees;
                const allAccepted = assignees.length && assignees.every(a => a.status === 'accepted');
                const borderClass = allAccepted ? 'border-green-500 border-2' : '';
                const assigneeHtml = assignees.map(ass => {
                    const name = ass.profiles?.full_name || ass.profiles?.email || 'Unknown';
                    const status = ass.status;
                    let actions = '';
                    if (ass.assignee_id === currentUser.id && status === 'pending_ack') actions = `<button data-task-id="${task.id}" data-assignee-id="${ass.assignee_id}" data-action="ack" class="task-action bg-yellow-500 text-white text-xs px-2 py-1 rounded w-full mt-1">Acknowledge</button>`;
                    if (ass.assignee_id === currentUser.id && (status === 'in_progress' || status === 'needs_review')) actions = `<button data-task-id="${task.id}" data-assignee-id="${ass.assignee_id}" data-action="submit" class="task-action bg-blue-500 text-white text-xs px-2 py-1 rounded w-full mt-1">Submit</button>`;
                    if (isCreator && status === 'submitted') actions = `<div class="flex gap-1 mt-1"><button data-task-id="${task.id}" data-assignee-id="${ass.assignee_id}" data-action="accept" class="task-action bg-green-500 text-white text-xs px-2 py-1 rounded flex-1">Accept</button><button data-task-id="${task.id}" data-assignee-id="${ass.assignee_id}" data-action="review_again" class="task-action bg-red-500 text-white text-xs px-2 py-1 rounded flex-1">Review</button></div>`;
                    return `<div class="mt-2 p-2 bg-gray-100 dark:bg-gray-800 rounded"><div class="flex justify-between text-xs"><span>${escapeHtml(name)}</span><span>${status}</span></div>${actions}</div>`;
                }).join('');
                return `<div class="task-card ${borderClass}"><div class="font-semibold">${escapeHtml(task.title)}</div><div class="text-xs text-gray-500 mt-1">Deadline: ${task.deadline || '—'}</div>${assigneeHtml}</div>`;
            }).join('');
            document.querySelectorAll('.task-action').forEach(btn => btn.addEventListener('click', async (e) => {
                const tid = btn.dataset.taskId, aid = btn.dataset.assigneeId, act = btn.dataset.action;
                await performTaskAction(tid, aid, act);
            }));
        }
        async function performTaskAction(taskId, assigneeId, action) {
            let newStatus = '';
            if (action === 'ack') newStatus = 'in_progress';
            else if (action === 'submit') newStatus = 'submitted';
            else if (action === 'accept') newStatus = 'accepted';
            else if (action === 'review_again') newStatus = 'needs_review';
            else return;
            await sb.from('task_assignees').update({ status: newStatus }).eq('task_id', taskId).eq('assignee_id', assigneeId);
            await sb.from('task_trails').insert({ task_id: taskId, user_id: currentUser.id, action, comment: `${action} performed` });
            loadTasksForPanel();
        }

        // ========== TASK CREATION (from message) ==========
        let currentMessageId = null;
        async function openTaskModal(mid, text) { currentMessageId = mid; document.getElementById('taskModal').classList.remove('hidden'); document.getElementById('taskModal').classList.add('flex'); document.getElementById('taskTitle').value = text.substring(0,100); const {data: users} = await sb.from('profiles').select('id,email,full_name'); document.getElementById('taskAssignees').innerHTML = users.map(u => `<option value="${u.id}">${u.full_name || u.email}</option>`).join(''); }
        function closeTaskModal() { document.getElementById('taskModal').classList.add('hidden'); document.getElementById('taskModal').classList.remove('flex'); currentMessageId = null; }
        async function saveTaskMultiAssignee() { if(!currentMessageId) return; const title = document.getElementById('taskTitle').value; const aids = Array.from(document.getElementById('taskAssignees').selectedOptions).map(opt => opt.value); if(!title || !aids.length){ alert('Title and assignee required'); return; } const {data: task} = await sb.from('tasks').insert({ original_message_id: currentMessageId, title, assigned_by: currentUser.id, deadline: document.getElementById('taskDeadline').value || null, priority: document.getElementById('taskPriority').value, require_proof: document.getElementById('taskRequireProof').checked, status: 'pending' }).select().single(); if(!task) return; await sb.from('task_assignees').insert(aids.map(aid => ({ task_id: task.id, assignee_id: aid, status: 'pending_ack' }))); showToast('Task created!'); closeTaskModal(); loadTasksForPanel(); loadMessages(); }

        // ========== REMINDERS ==========
        let currentReminderId = null;
        function showReminderModal(mid,text) { currentReminderId = mid; document.getElementById('reminderMessagePreview').innerText = text; document.getElementById('reminderModal').classList.remove('hidden'); document.getElementById('reminderModal').classList.add('flex'); }
        function closeReminderModal() { document.getElementById('reminderModal').classList.add('hidden'); document.getElementById('reminderModal').classList.remove('flex'); }
        async function saveReminder() { const dt = document.getElementById('reminderDateTime').value; if(!dt) return; await sb.from('reminders').insert({ user_id: currentUser.id, message_id: currentReminderId, reminder_time: new Date(dt).toISOString(), triggered: false }); showToast('Reminder set'); closeReminderModal(); }

        // ========== SCHEDULED MESSAGES ==========
        let currSchedText = '';
        function showScheduleModal(text) { currSchedText = text; document.getElementById('scheduleMessageText').value = text; document.getElementById('scheduleModal').classList.remove('hidden'); document.getElementById('scheduleModal').classList.add('flex'); }
        function closeScheduleModal() { document.getElementById('scheduleModal').classList.add('hidden'); document.getElementById('scheduleModal').classList.remove('flex'); }
        async function saveScheduledMessage() { const msg = document.getElementById('scheduleMessageText').value.trim(), room = document.getElementById('scheduleChannel').value, time = document.getElementById('scheduleDateTime').value; if(!msg||!time) return; await sb.from('scheduled_messages').insert({ sender_id: currentUser.id, room_id: room, message_text: msg, scheduled_time: new Date(time).toISOString(), status: 'pending' }); showToast('Message scheduled'); closeScheduleModal(); }

        // ========== BOOKMARKS ==========
        async function toggleBookmark(mid,text,btn) { const {data: ex} = await sb.from('bookmarks').select('id').eq('user_id',currentUser.id).eq('message_id',mid).maybeSingle(); if(ex) { await sb.from('bookmarks').delete().eq('id',ex.id); showToast('Bookmark removed'); } else { await sb.from('bookmarks').insert({ user_id: currentUser.id, message_id: mid }); showToast('Bookmarked'); } }

        // ========== UTILITIES ==========
        function attachModalButtons() {
            document.getElementById('cancelTaskBtn')?.addEventListener('click', closeTaskModal);
            document.getElementById('saveTaskBtn')?.addEventListener('click', saveTaskMultiAssignee);
            document.getElementById('cancelReminderBtn')?.addEventListener('click', closeReminderModal);
            document.getElementById('saveReminderBtn')?.addEventListener('click', saveReminder);
            document.getElementById('cancelScheduleBtn')?.addEventListener('click', closeScheduleModal);
            document.getElementById('saveScheduleBtn')?.addEventListener('click', saveScheduledMessage);
        }
        function startSubscriptions() { subscribeToMessages(); if(taskSubscription) taskSubscription.unsubscribe(); taskSubscription = sb.channel('tasks-changes').on('postgres_changes', {event:'*', schema:'public', table:'tasks'}, () => loadTasksForPanel()).subscribe(); if(assigneeSubscription) assigneeSubscription.unsubscribe(); assigneeSubscription = sb.channel('assignees-changes').on('postgres_changes', {event:'*', schema:'public', table:'task_assignees'}, () => loadTasksForPanel()).subscribe(); if(notificationSubscription) notificationSubscription.unsubscribe(); notificationSubscription = sb.channel('notifications-channel').on('postgres_changes', {event:'INSERT', schema:'public', table:'notifications', filter:`user_id=eq.${currentUser.id}`}, (payload) => showToast(payload.new.message)).subscribe(); }

        (async() => { const {data: {session}} = await sb.auth.getSession(); if(!session) renderAuthScreen(); else { currentUser = session.user; await ensureProfile(); renderMainApp(); startSubscriptions(); } })();
    </script>
</body>
</html>
