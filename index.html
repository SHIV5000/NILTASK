<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Corporate Chat - Industrial Edition</title>
    
    <!-- Industrial Fonts & Minimal Tailwind (for utilities only) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700;800&family=Teko:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase (original config, keeps all chat data) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, updateDoc, setDoc, getDocs, where, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAoOsog2NP6Pf8YNSxn0rRYK4MSLEVNNZc",
            authDomain: "niltask.firebaseapp.com",
            projectId: "niltask",
            storageBucket: "niltask.firebasestorage.app",
            messagingSenderId: "868641827920",
            appId: "1:868641827920:web:70d9db79a361a76468f555"
        };

        const app = initializeApp(firebaseConfig);
        window.auth = getAuth(app);
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
        window.signOut = signOut;
        window.onAuthStateChanged = onAuthStateChanged;
        
        window.secondaryApp = initializeApp(firebaseConfig, "Secondary");
        window.secondaryAuth = getAuth(window.secondaryApp);

        window.db = getFirestore(app);
        window.collection = collection;
        window.addDoc = addDoc;
        window.onSnapshot = onSnapshot;
        window.query = query;
        window.orderBy = orderBy;
        window.serverTimestamp = serverTimestamp;
        window.doc = doc;
        window.updateDoc = updateDoc;
        window.setDoc = setDoc;
        window.getDocs = getDocs;
        window.where = where;
        window.deleteDoc = deleteDoc;
        
        window.storage = getStorage(app);
        window.ref = ref;
        window.uploadBytesResumable = uploadBytesResumable;
        window.getDownloadURL = getDownloadURL;

        window.dispatchEvent(new Event('firebaseReady'));
    </script>

    <!-- Industrial Theme Overrides (metal + red/mustard) -->
    <style>
        :root {
            --red: #D93B3B;
            --dark: #121212;
            --white: #ffffff;
            --mustard: #F2C029;
            --teal: #2B9EB3;
            --wood-dark: #5d4037;
            --wood-light: #8d6e63;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #1a1a1a;
            font-family: 'Rajdhani', sans-serif;
            color: #e0e0e0;
            overflow: hidden;
        }
        /* Custom scrollbar (industrial) */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #2a2a2a; }
        ::-webkit-scrollbar-thumb { background: var(--red); border-radius: 3px; }
        .chat-bg { 
            background-color: #2c2c2c; 
            background-image: radial-gradient(circle at 25% 40%, rgba(217,59,59,0.05) 2%, transparent 2.5%);
            background-size: 40px 40px;
        }
        /* Industrial clip-path buttons */
        .btn-industrial {
            display: inline-block;
            background: var(--red);
            color: white;
            padding: 8px 20px;
            font-family: 'Teko', sans-serif;
            font-weight: 600;
            font-size: 1.2rem;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
            transition: 0.2s;
            cursor: pointer;
            border: none;
        }
        .btn-industrial:hover {
            background: var(--mustard);
            color: var(--dark);
            transform: translateX(4px);
        }
        /* Message bubbles (industrial rounded + subtle border) */
        .message-bubble-sent {
            background: linear-gradient(135deg, var(--teal), #1a5f6e);
            color: white;
            border-radius: 20px 8px 20px 20px;
            border-left: 3px solid var(--mustard);
        }
        .message-bubble-received {
            background: #3a3a3a;
            color: #e0e0e0;
            border-radius: 8px 20px 20px 20px;
            border-right: 3px solid var(--red);
        }
        /* Sidebar industrial */
        .industrial-sidebar {
            background: #0f0f0f;
            border-right: 2px solid var(--red);
        }
        .industrial-group-item {
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }
        .industrial-group-item.active {
            background: rgba(217,59,59,0.2);
            border-left-color: var(--mustard);
        }
        /* Input area */
        .industrial-input {
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 30px;
            transition: all 0.2s;
        }
        .industrial-input:focus-within {
            border-color: var(--mustard);
            box-shadow: 0 0 0 2px rgba(242,192,41,0.3);
        }
        /* Modal industrial skin */
        .industrial-modal {
            background: #1e1e1e;
            border: 1px solid var(--red);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        /* Typing indicator */
        .typing-dots span {
            width: 6px;
            height: 6px;
            background: var(--mustard);
            display: inline-block;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }
    </style>
</head>
<body class="bg-black overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function ChatApp({ user, onLogout }) {
            const [activeModal, setActiveModal] = useState(null);
            const [selectedMessage, setSelectedMessage] = useState(null);
            const [inputText, setInputText] = useState("");
            const [messages, setMessages] = useState([]); 
            const messagesEndRef = useRef(null); 

            // Task & Delegate States
            const [taskAssignee, setTaskAssignee] = useState("");
            const [taskDeadline, setTaskDeadline] = useState("");
            const [delegateAssignee, setDelegateAssignee] = useState("");
            const [trailComment, setTrailComment] = useState(""); 
            const [dbUsers, setDbUsers] = useState([]); 
            
            // Search, Notifications & Admin
            const [searchQuery, setSearchQuery] = useState("");
            const [showNotifications, setShowNotifications] = useState(false);
            const [viewMode, setViewMode] = useState("chat"); 
            const [currentUserData, setCurrentUserData] = useState(null);
            const [adminForm, setAdminForm] = useState({ uid: '', name: '', email: '', password: '', isAdmin: false, canCreateGroups: false });
            
            // Group Management States
            const [groups, setGroups] = useState([]);
            const [activeGroup, setActiveGroup] = useState({ id: "main", name: "Executive Board" });
            const [groupForm, setGroupForm] = useState({ name: "", members: [] });

            // Admin Filters
            const [adminFilterUser, setAdminFilterUser] = useState("");
            const [adminFilterDate, setAdminFilterDate] = useState("");
            const [allAdminReminders, setAllAdminReminders] = useState([]);

            const [uploadProgress, setUploadProgress] = useState(0);
            const [isUploading, setIsUploading] = useState(false);
            const fileInputRef = useRef(null);

            const [reminderDateTime, setReminderDateTime] = useState("");
            const [activeReminders, setActiveReminders] = useState([]);

            // --- All original business logic (unchanged) ---
            useEffect(() => {
                if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") {
                    Notification.requestPermission();
                }
            }, []);

            useEffect(() => {
                const qPersonal = window.query(
                    window.collection(window.db, "reminders"),
                    window.where("userId", "==", user.uid),
                    window.where("isTriggered", "==", false)
                );
                const unsubPersonal = window.onSnapshot(qPersonal, (snapshot) => {
                    setActiveReminders(snapshot.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                let unsubAdmin = () => {};
                if (currentUserData?.isAdmin) {
                    const qAdmin = window.query(window.collection(window.db, "reminders"), window.orderBy("remindAt", "desc"));
                    unsubAdmin = window.onSnapshot(qAdmin, (snapshot) => {
                        setAllAdminReminders(snapshot.docs.map(d => ({ id: d.id, ...d.data() })));
                    });
                }
                return () => { unsubPersonal(); unsubAdmin(); };
            }, [user.uid, currentUserData?.isAdmin]);

            useEffect(() => {
                const interval = setInterval(() => {
                    const now = new Date();
                    activeReminders.forEach(async (rem) => {
                        const remindTime = new Date(rem.remindAt);
                        if (remindTime <= now) {
                            if ("Notification" in window && Notification.permission === "granted") {
                                new Notification("Corporate Chat Reminder", { body: `⏰ "${rem.messageText}"`, icon: "https://cdn-icons-png.flaticon.com/512/825/825590.png" });
                            } else {
                                alert(`⏰ Reminder: "${rem.messageText}"`);
                            }
                            try { await window.updateDoc(window.doc(window.db, "reminders", rem.id), { isTriggered: true }); } 
                            catch (error) {}
                        }
                    });
                }, 15000); 
                return () => clearInterval(interval);
            }, [activeReminders]);

            useEffect(() => {
                const syncUserToDB = async () => {
                    try {
                        await window.setDoc(window.doc(window.db, "users", user.uid), {
                            uid: user.uid, email: user.email, name: user.email.split('@')[0].toUpperCase(), 
                        }, { merge: true });
                    } catch (error) {}
                };
                syncUserToDB();

                const unsubCurrent = window.onSnapshot(window.doc(window.db, "users", user.uid), (doc) => {
                    if (doc.exists()) setCurrentUserData(doc.data());
                });

                const unsubUsers = window.onSnapshot(window.query(window.collection(window.db, "users"), window.orderBy("email", "asc")), (snapshot) => {
                    setDbUsers(snapshot.docs.map(doc => doc.data()));
                });

                const unsubGroups = window.onSnapshot(window.collection(window.db, "groups"), (snapshot) => {
                    let loadedGroups = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setGroups(loadedGroups);
                });

                return () => { unsubCurrent(); unsubUsers(); unsubGroups(); };
            }, [user]);

            useEffect(() => {
                const q = window.query(window.collection(window.db, "messages"), window.orderBy("timestamp", "asc"));
                const unsubscribe = window.onSnapshot(q, (snapshot) => {
                    const loadedMessages = snapshot.docs.map(doc => {
                        const data = doc.data();
                        return {
                            id: doc.id,
                            text: data.text,
                            sender: data.senderEmail,
                            isMine: data.senderUid === user.uid, 
                            time: data.timestamp ? new Date(data.timestamp.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'Sending...',
                            dateString: data.timestamp ? new Date(data.timestamp.toDate()).toISOString().split('T')[0] : '', 
                            isTask: data.isTask === true, 
                            hasReminder: data.hasReminder === true,
                            taskData: data.taskData || null,
                            isPrivateMention: data.isPrivateMention || false,
                            allowedUsers: data.allowedUsers || [],
                            fileUrl: data.fileUrl || null, fileName: data.fileName || null, fileType: data.fileType || null,
                            groupId: data.groupId || "main"
                        };
                    });
                    setMessages(loadedMessages);
                    setTimeout(() => messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }), 150);
                });
                return () => unsubscribe();
            }, [user.uid]);

            const handleSendMessage = async () => {
                if (!inputText.trim()) return;
                const messageText = inputText;
                setInputText(""); 
                
                const mentions = [];
                dbUsers.forEach(u => { if (messageText.includes(`@${u.name}`)) mentions.push(u.email); });
                const isPrivate = mentions.length > 0;
                const allowedUsers = isPrivate ? [user.email, ...mentions] : [];

                try {
                    await window.addDoc(window.collection(window.db, "messages"), {
                        text: messageText, senderUid: user.uid, senderEmail: user.email,
                        timestamp: window.serverTimestamp(),
                        isTask: false, hasReminder: false, isPrivateMention: isPrivate, allowedUsers: allowedUsers,
                        fileUrl: null, fileName: null, fileType: null,
                        groupId: activeGroup.id
                    });
                } catch (error) { alert("Failed to send message."); }
            };

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsUploading(true);
                setUploadProgress(0);

                const uniqueFileName = `${Date.now()}_${file.name}`;
                const storageRef = window.ref(window.storage, `chat_uploads/${uniqueFileName}`);
                const uploadTask = window.uploadBytesResumable(storageRef, file);

                uploadTask.on('state_changed', 
                    (snapshot) => setUploadProgress((snapshot.bytesTransferred / snapshot.totalBytes) * 100), 
                    (error) => { setIsUploading(false); alert("File upload failed."); }, 
                    async () => {
                        try {
                            const downloadURL = await window.getDownloadURL(uploadTask.snapshot.ref);
                            await window.addDoc(window.collection(window.db, "messages"), {
                                text: `Shared a file: ${file.name}`, senderUid: user.uid, senderEmail: user.email,
                                timestamp: window.serverTimestamp(),
                                isTask: false, hasReminder: false, isPrivateMention: false, allowedUsers: [],
                                fileUrl: downloadURL, fileName: file.name, fileType: file.type,
                                groupId: activeGroup.id
                            });
                        } catch (err) {} 
                        finally {
                            setIsUploading(false); setUploadProgress(0);
                            if(fileInputRef.current) fileInputRef.current.value = ""; 
                        }
                    }
                );
            };

            // Group Management Functions
            const handleCreateGroup = async (e) => {
                e.preventDefault();
                if(!groupForm.name.trim()) return;
                try {
                    const finalMembers = [...new Set([...groupForm.members, user.email])];
                    await window.addDoc(window.collection(window.db, "groups"), {
                        name: groupForm.name,
                        members: finalMembers,
                        admins: [user.email],
                        createdBy: user.email,
                        createdAt: window.serverTimestamp()
                    });
                    setActiveModal(null);
                    setGroupForm({name: "", members: []});
                } catch (error) { alert("Failed to create group."); }
            };

            const handleUpdateGroupMembers = async (e) => {
                e.preventDefault();
                try {
                    const finalMembers = [...new Set([...groupForm.members, ...activeGroup.admins])];
                    await window.updateDoc(window.doc(window.db, "groups", activeGroup.id), {
                        members: finalMembers
                    });
                    setActiveModal(null);
                    setActiveGroup({...activeGroup, members: finalMembers});
                } catch (error) { alert("Failed to update members."); }
            };

            const checkVisibility = (msg) => {
                if (msg.groupId !== activeGroup.id) return false;
                if (msg.isTask) {
                    if (msg.sender === user.email) return true;
                    if (msg.taskData?.currentAssignee === user.email) return true;
                    if (msg.taskData?.trail?.some(t => t.by === user.email || t.to === user.email)) return true;
                    return false; 
                }
                if (msg.isPrivateMention) return msg.allowedUsers.includes(user.email);
                return true;
            };

            const handleSearchFilter = (msg) => {
                if (!searchQuery.trim()) return true;
                const q = searchQuery.toLowerCase();
                return msg.text?.toLowerCase().includes(q) || msg.sender?.toLowerCase().includes(q) || (msg.isTask && msg.taskData?.currentAssignee?.toLowerCase().includes(q));
            };

            const activeActionableTasks = messages.filter(m => m.isTask && m.taskData?.currentAssignee === user.email && m.taskData?.status !== "Completed");
            const notificationCount = activeActionableTasks.length;

            const handleMessageClick = (msg) => {
                setSelectedMessage(msg);
                setActiveModal(msg.isTask ? 'task_trail' : 'context');
            };

            const setReminder = async () => {
                if (!selectedMessage || !reminderDateTime) return alert("Please select a valid date and time.");
                try {
                    await window.addDoc(window.collection(window.db, "reminders"), {
                        userId: user.uid, userEmail: user.email, messageId: selectedMessage.id,
                        messageText: selectedMessage.text || selectedMessage.fileName || "File Attachment",
                        remindAt: reminderDateTime, isTriggered: false
                    });
                    await window.updateDoc(window.doc(window.db, "messages", selectedMessage.id), { hasReminder: true });
                    setActiveModal(null); setReminderDateTime("");
                } catch (error) { alert("Failed to save reminder."); }
            };

            const convertToTask = async () => {
                if (!selectedMessage || !taskDeadline || !taskAssignee) return alert("Please select Assignee and Deadline.");
                try {
                    const now = new Date();
                    await window.setDoc(window.doc(window.db, "messages", selectedMessage.id), {
                        isTask: true,
                        taskData: {
                            deadline: taskDeadline, currentAssignee: taskAssignee, status: "Pending",
                            trail: [{ action: "Task Created", by: user.email, time: now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + ', ' + now.toLocaleDateString(), to: taskAssignee }]
                        }
                    }, { merge: true });
                    setActiveModal(null);
                } catch (error) { alert("Failed to create task."); }
            };

            const handleDelegateTask = async () => {
                if (!selectedMessage || !delegateAssignee) return;
                try {
                    const now = new Date();
                    const updatedTrail = [...selectedMessage.taskData.trail, { action: "Delegated", by: user.email, time: now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + ', ' + now.toLocaleDateString(), to: delegateAssignee }];
                    await window.updateDoc(window.doc(window.db, "messages", selectedMessage.id), {
                        "taskData.currentAssignee": delegateAssignee, "taskData.status": "In Progress", "taskData.trail": updatedTrail
                    });
                    setActiveModal(null);
                } catch (error) { alert("Failed to delegate task."); }
            };

            const handleCompleteTask = async () => {
                if (!selectedMessage) return;
                if (user.email !== selectedMessage.taskData.currentAssignee && !currentUserData?.isAdmin) return alert("Only the Assignee or Admin can complete this.");
                try {
                    const now = new Date();
                    const updatedTrail = [...selectedMessage.taskData.trail, { action: "Marked Completed", by: user.email, time: now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + ', ' + now.toLocaleDateString(), to: "System" }];
                    await window.updateDoc(window.doc(window.db, "messages", selectedMessage.id), { "taskData.status": "Completed", "taskData.trail": updatedTrail });
                    setActiveModal(null);
                } catch (error) { alert("Failed to complete task."); }
            };

            const handleAddComment = async () => {
                if (!selectedMessage || !trailComment.trim()) return;
                try {
                    const now = new Date();
                    const updatedTrail = [...selectedMessage.taskData.trail, { action: "Update Added", by: user.email, time: now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + ', ' + now.toLocaleDateString(), comment: trailComment }];
                    await window.updateDoc(window.doc(window.db, "messages", selectedMessage.id), { "taskData.trail": updatedTrail });
                    setTrailComment(""); 
                    setSelectedMessage(prev => ({...prev, taskData: {...prev.taskData, trail: updatedTrail}}));
                } catch (error) { alert("Failed to post update."); }
            };

            // Admin Functions
            const handleRemoveUser = async (targetUid) => {
                if (window.confirm("Delete user entirely?")) await window.deleteDoc(window.doc(window.db, "users", targetUid));
            };
            const handleToggleApprove = async (u) => await window.updateDoc(window.doc(window.db, "users", u.uid), { isApproved: !u.isApproved });
            const handleAddUserSubmit = async (e) => { 
                e.preventDefault(); 
                try { 
                    const cred = await window.createUserWithEmailAndPassword(window.secondaryAuth, adminForm.email, adminForm.password); 
                    await window.setDoc(window.doc(window.db, "users", cred.user.uid), { uid: cred.user.uid, email: cred.user.email, name: adminForm.name || cred.user.email.split('@')[0].toUpperCase(), isApproved: true, isAdmin: adminForm.isAdmin, canCreateGroups: adminForm.canCreateGroups }); 
                    window.signOut(window.secondaryAuth); setActiveModal(null); setAdminForm({ uid: '', name: '', email: '', password: '', isAdmin: false, canCreateGroups: false }); 
                } catch(err){alert(err.message);} 
            };
            const handleEditUserSubmit = async (e) => { e.preventDefault(); await window.updateDoc(window.doc(window.db, "users", adminForm.uid), { name: adminForm.name, isAdmin: adminForm.isAdmin, canCreateGroups: adminForm.canCreateGroups }); setActiveModal(null); };
            const handleAdminDeleteMessage = async (msgId) => {
                if(window.confirm("Delete this record globally?")) await window.deleteDoc(window.doc(window.db, "messages", msgId));
            };

            if (currentUserData && currentUserData.isApproved !== true && currentUserData.isAdmin !== true) {
                return (
                    <div className="flex items-center justify-center h-screen bg-black p-4 font-sans text-gray-300">
                        <div className="w-full max-w-md bg-[#1e1e1e] rounded-2xl shadow-2xl p-8 border-t-8 border-red-600 text-center">
                            <i className="fa-solid fa-user-clock text-5xl text-red-500 mb-4 animate-pulse"></i>
                            <h1 className="text-2xl font-bold text-white mb-2">Pending Approval</h1>
                            <p className="text-sm text-gray-400 mb-6">Account requires Admin verification.</p>
                            <button onClick={onLogout} className="btn-industrial">Sign Out</button>
                        </div>
                    </div>
                );
            }

            // Admin Dashboard (simplified but fully functional – same as original)
            const filteredAuditMessages = [...messages].reverse().filter(msg => {
                const safeSender = msg.sender || "";
                const safeAssignee = msg.taskData?.currentAssignee || "";
                const safeDate = msg.dateString || "";
                const matchUser = adminFilterUser === "" || safeSender === adminFilterUser || (msg.isTask && safeAssignee === adminFilterUser);
                const matchDate = adminFilterDate === "" || safeDate === adminFilterDate;
                return matchUser && matchDate;
            });

            const filteredAdminReminders = [...allAdminReminders].filter(rem => {
                const safeEmail = rem.userEmail || rem.userId || "";
                const safeDate = rem.remindAt || "";
                const matchUser = adminFilterUser === "" || safeEmail === adminFilterUser;
                const matchDate = adminFilterDate === "" || safeDate.startsWith(adminFilterDate);
                return matchUser && matchDate;
            });

            const myGroups = [{id: "main", name: "Executive Board"}, ...groups.filter(g => g.members?.includes(user.email) || currentUserData?.isAdmin)];

            // MAIN RENDER (Industrial Theme)
            if (viewMode === "admin") {
                return (
                    <div className="flex flex-col h-full w-full bg-black overflow-hidden">
                        <div className="bg-[#111] text-white p-4 flex items-center justify-between border-b border-red-600">
                            <div className="flex items-center gap-3"><i className="fa-solid fa-shield-halved text-2xl text-red-500"></i><h1 className="font-bold text-lg tracking-wide">ADMIN CONTROL</h1></div>
                            <button onClick={() => setViewMode("chat")} className="btn-industrial">← Back to Chat</button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-6">
                            <div className="bg-[#1a1a1a] p-4 rounded-lg border border-red-800 flex flex-wrap gap-4 items-end">
                                <div><label className="text-xs font-bold text-gray-400 uppercase">Filter by User</label><select value={adminFilterUser} onChange={(e)=>setAdminFilterUser(e.target.value)} className="p-2 border border-gray-700 rounded bg-black text-white"><option value="">All Users</option>{dbUsers.map(u => <option key={u.uid} value={u.email}>{u.name}</option>)}</select></div>
                                <div><label className="text-xs font-bold text-gray-400 uppercase">Filter by Date</label><input type="date" value={adminFilterDate} onChange={(e)=>setAdminFilterDate(e.target.value)} className="p-2 border border-gray-700 rounded bg-black text-white" /></div>
                                <button onClick={()=>{setAdminFilterUser(""); setAdminFilterDate("");}} className="btn-industrial text-sm py-1">Clear</button>
                            </div>
                            <div className="bg-[#1a1a1a] rounded-lg p-4">
                                <h2 className="font-bold text-red-500 mb-3">User Directory</h2>
                                <div className="space-y-2 max-h-96 overflow-auto">
                                    {dbUsers.map(u => (
                                        <div key={u.uid} className="flex justify-between items-center border-b border-gray-800 py-2">
                                            <div><span className="font-semibold">{u.name}</span><span className="text-xs text-gray-400 ml-2">{u.email}</span>{u.isAdmin && <span className="ml-2 text-xs bg-red-800 px-1 py-0.5 rounded">ADMIN</span>}</div>
                                            <div><button onClick={() => handleToggleApprove(u)} className={`mr-2 px-2 py-0.5 text-xs rounded ${u.isApproved ? 'bg-green-800' : 'bg-yellow-800'}`}>{u.isApproved ? 'Approved' : 'Pending'}</button><button onClick={() => { setAdminForm({ ...u, canCreateGroups: u.canCreateGroups || false }); setActiveModal('admin_edit_user'); }} className="text-blue-400 mr-2"><i className="fa-solid fa-pen"></i></button><button onClick={() => handleRemoveUser(u.uid)} disabled={u.email === user.email} className="text-red-500"><i className="fa-solid fa-trash"></i></button></div>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => { setAdminForm({ uid: '', name: '', email: '', password: '', isAdmin: false, canCreateGroups: false }); setActiveModal('admin_add_user'); }} className="btn-industrial w-full mt-4 text-center">+ Add User</button>
                            </div>
                            <div className="bg-[#1a1a1a] rounded-lg p-4">
                                <h2 className="font-bold text-red-500 mb-3">Global Audit</h2>
                                <div className="overflow-auto max-h-96"><table className="w-full text-sm"><thead className="text-gray-400 border-b border-gray-700"><tr><th className="p-2 text-left">Time</th><th className="p-2 text-left">Type</th><th className="p-2 text-left">Details</th><th className="p-2 text-left">Action</th></tr></thead><tbody>{filteredAuditMessages.map(msg => (<tr key={msg.id} className="border-b border-gray-800"><td className="p-2 text-xs">{msg.dateString}<br/>{msg.time}</td><td className="p-2">{msg.isTask ? "TASK" : msg.fileUrl ? "FILE" : "MSG"}</td><td className="p-2 truncate max-w-xs">{msg.text}</td><td className="p-2"><button onClick={() => handleAdminDeleteMessage(msg.id)} className="text-red-500 text-xs">Delete</button></td></tr>))}</tbody></table></div>
                            </div>
                        </div>
                    </div>
                );
            }

            // Chat UI – Industrial style
            return (
                <div className="flex h-screen w-full bg-black text-gray-200">
                    {/* Sidebar – industrial dark */}
                    <div className="hidden md:flex w-80 bg-[#0a0a0a] border-r border-red-800 flex-col shrink-0">
                        <div className="p-5 border-b border-red-800 flex items-center gap-3">
                            <div className="w-12 h-12 rounded-full bg-red-600 flex items-center justify-center text-white font-bold text-xl shadow-sm">{user.email.substring(0,1).toUpperCase()}</div>
                            <div className="overflow-hidden flex-1"><h2 className="font-bold text-lg text-white truncate">{currentUserData?.name || user.email.split('@')[0]}</h2><p className="text-xs text-gray-400 truncate">{user.email}</p></div>
                            {(currentUserData?.isAdmin || currentUserData?.canCreateGroups) && (<button onClick={()=>setActiveModal('create_group')} className="text-gray-400 hover:text-red-500"><i className="fa-solid fa-pen-to-square"></i></button>)}
                        </div>
                        <div className="flex-1 overflow-y-auto p-3">
                            <div className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 px-2">Departments</div>
                            {myGroups.map(g => (
                                <div key={g.id} onClick={() => setActiveGroup(g)} className={`industrial-group-item ${activeGroup.id === g.id ? 'active' : ''} flex items-center gap-3 p-3 rounded-lg cursor-pointer transition-colors hover:bg-red-900/20`}>
                                    <div className={`w-10 h-10 rounded-full flex items-center justify-center text-white font-bold text-sm ${g.id==='main' ? 'bg-red-700' : 'bg-teal-700'}`}>{g.name.substring(0,1).toUpperCase()}</div>
                                    <div className="flex-1 overflow-hidden"><div className="font-bold text-sm text-white truncate">{g.name}</div><div className="text-[11px] text-gray-400">{g.id==='main' ? 'All Staff' : `${g.members?.length || 0} Members`}</div></div>
                                </div>
                            ))}
                        </div>
                        <div className="p-4 border-t border-red-800 space-y-2">
                            <button onClick={() => setShowNotifications(!showNotifications)} className="w-full flex items-center gap-3 p-2 rounded-lg hover:bg-red-900/30 transition"><i className="fa-regular fa-bell text-gray-400 w-5"></i><span>Notifications</span>{notificationCount > 0 && <span className="bg-red-600 text-white text-xs px-2 py-0.5 rounded-full ml-auto">{notificationCount}</span>}</button>
                            {currentUserData?.isAdmin && <button onClick={() => setViewMode("admin")} className="w-full flex items-center gap-3 p-2 rounded-lg hover:bg-red-900/30"><i className="fa-solid fa-shield-halved text-gray-400 w-5"></i><span>Admin Dashboard</span></button>}
                            <button onClick={onLogout} className="w-full flex items-center gap-3 p-2 rounded-lg text-red-400 hover:bg-red-900/30"><i className="fa-solid fa-arrow-right-from-bracket w-5"></i><span>Logout</span></button>
                        </div>
                    </div>

                    {/* Main chat area */}
                    <div className="flex-1 flex flex-col relative">
                        {/* Header industrial */}
                        <div className="h-16 px-5 flex items-center justify-between border-b border-red-800 bg-[#111] shadow-sm">
                            <div className="flex items-center gap-3">
                                <div className={`w-10 h-10 rounded-full flex items-center justify-center text-white font-bold shadow-sm ${activeGroup.id==='main' ? 'bg-red-700' : 'bg-teal-700'}`}>{activeGroup.name.substring(0,1).toUpperCase()}</div>
                                <div><h1 className="font-bold text-lg text-white">{activeGroup.name}</h1><p className="text-xs text-gray-400" onClick={()=>{ if(activeGroup.id!=='main') setActiveModal('group_settings'); }}>{activeGroup.id==='main' ? 'Company-wide' : `${activeGroup.members?.length||0} Members`}</p></div>
                            </div>
                            <div className="relative"><i className="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i><input type="text" placeholder="Search" className="pl-9 pr-4 py-2 bg-gray-800 rounded-full text-sm w-44 focus:w-64 transition-all outline-none text-white border border-gray-700" value={searchQuery} onChange={e => setSearchQuery(e.target.value)}/></div>
                        </div>

                        {/* Notifications dropdown */}
                        {showNotifications && (
                            <div className="absolute top-16 right-4 w-80 bg-[#1e1e1e] rounded-xl shadow-2xl border border-red-700 z-30 overflow-hidden">
                                <div className="bg-red-900 p-3 flex justify-between items-center"><span className="font-bold text-white">Pending Tasks</span><i className="fa-solid fa-xmark cursor-pointer text-white" onClick={() => setShowNotifications(false)}></i></div>
                                <div className="max-h-80 overflow-auto">{activeActionableTasks.length === 0 ? <div className="p-4 text-center text-gray-400">All caught up</div> : activeActionableTasks.map(task => (<div key={task.id} className="p-3 border-b border-gray-700 hover:bg-red-900/20 cursor-pointer" onClick={() => { setShowNotifications(false); handleMessageClick(task); }}><div className="text-xs font-bold text-red-400 mb-1"><i className="fa-regular fa-square-check"></i> Pending</div><div className="text-sm">{task.text}</div><div className="text-[10px] text-gray-400 mt-1">Due {new Date(task.taskData.deadline).toLocaleDateString()}</div></div>))}</div>
                            </div>
                        )}

                        {/* Messages container */}
                        <div className="flex-1 overflow-y-auto p-5 chat-bg">
                            <div className="max-w-4xl mx-auto space-y-4">
                                {messages.filter(checkVisibility).filter(handleSearchFilter).map(msg => (
                                    <div key={msg.id} className={`flex ${msg.isMine ? 'justify-end' : 'justify-start'} animate-in`}>
                                        {!msg.isMine && (
                                            <div className="flex items-start gap-2 max-w-[85%] md:max-w-[65%]">
                                                <div className="w-8 h-8 rounded-full bg-gray-700 flex items-center justify-center text-white text-xs font-bold">{msg.sender?.charAt(0).toUpperCase()}</div>
                                                <div className="flex flex-col">
                                                    <div className="text-xs text-gray-400 mb-1 ml-1">{msg.sender?.split('@')[0]}</div>
                                                    {!msg.isTask ? (
                                                        <div onClick={() => handleMessageClick(msg)} className="message-bubble-received p-3 shadow-md cursor-pointer">
                                                            {msg.isPrivateMention && <div className="text-xs text-red-400 mb-1"><i className="fa-solid fa-lock"></i> Private</div>}
                                                            {msg.fileUrl ? (msg.fileType?.startsWith('image/') ? <img src={msg.fileUrl} className="rounded-lg max-h-60" onClick={e=>{e.stopPropagation(); window.open(msg.fileUrl);}}/> : <div><i className="fa-regular fa-file"></i> {msg.fileName}</div>) : <p className="whitespace-pre-wrap">{msg.text}</p>}
                                                            <div className="text-right text-[10px] text-gray-400 mt-1">{msg.time} {msg.hasReminder && <i className="fa-regular fa-clock text-yellow-400 ml-1"></i>}</div>
                                                        </div>
                                                    ) : (
                                                        <div onClick={() => handleMessageClick(msg)} className="bg-gray-800 border-l-4 border-red-500 p-3 rounded-xl cursor-pointer">
                                                            <div className="flex justify-between"><span className="text-xs font-bold text-red-400">📋 TASK</span><span className={`text-xs px-2 rounded-full ${msg.taskData.status==='Completed'?'bg-green-800 text-green-300':'bg-yellow-800 text-yellow-300'}`}>{msg.taskData.status}</span></div>
                                                            <p className="mt-1 text-sm">{msg.text}</p>
                                                            <div className="mt-2 flex justify-between text-xs text-gray-400"><span>👤 {msg.taskData.currentAssignee.split('@')[0]}</span><span>📅 {new Date(msg.taskData.deadline).toLocaleDateString()}</span></div>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        )}
                                        {msg.isMine && (
                                            <div className="flex flex-col items-end max-w-[85%] md:max-w-[65%]">
                                                {!msg.isTask ? (
                                                    <div onClick={() => handleMessageClick(msg)} className="message-bubble-sent p-3 shadow-md cursor-pointer">
                                                        {msg.isPrivateMention && <div className="text-xs text-yellow-300 mb-1"><i className="fa-solid fa-lock"></i> Private</div>}
                                                        {msg.fileUrl ? (msg.fileType?.startsWith('image/') ? <img src={msg.fileUrl} className="rounded-lg max-h-60" onClick={e=>{e.stopPropagation(); window.open(msg.fileUrl);}}/> : <div><i className="fa-regular fa-file"></i> {msg.fileName}</div>) : <p className="whitespace-pre-wrap">{msg.text}</p>}
                                                        <div className="text-right text-[10px] text-gray-200 mt-1">{msg.time} {msg.hasReminder && <i className="fa-regular fa-clock text-yellow-300 ml-1"></i>}<i className="fa-regular fa-check-double ml-1"></i></div>
                                                    </div>
                                                ) : (
                                                    <div onClick={() => handleMessageClick(msg)} className="bg-teal-800 border-l-4 border-yellow-500 p-3 rounded-xl cursor-pointer">
                                                        <div className="flex justify-between"><span className="text-xs font-bold text-yellow-300">📋 TASK</span><span className={`text-xs px-2 rounded-full ${msg.taskData.status==='Completed'?'bg-green-700 text-green-200':'bg-yellow-700 text-yellow-200'}`}>{msg.taskData.status}</span></div>
                                                        <p className="mt-1 text-sm">{msg.text}</p>
                                                        <div className="mt-2 flex justify-between text-xs text-gray-200"><span>👤 {msg.taskData.currentAssignee.split('@')[0]}</span><span>📅 {new Date(msg.taskData.deadline).toLocaleDateString()}</span></div>
                                                    </div>
                                                )}
                                                <div className="text-[10px] text-gray-500 mt-1 mr-1">{msg.time}</div>
                                            </div>
                                        )}
                                    </div>
                                ))}
                                <div ref={messagesEndRef} className="h-4"></div>
                            </div>
                        </div>

                        {/* Typing indicator placeholder */}
                        <div className="px-5 py-1 text-xs text-gray-400 italic h-6"></div>

                        {/* Input area industrial */}
                        <div className="bg-[#111] border-t border-red-800 p-3 flex items-center gap-2">
                            <input type="file" ref={fileInputRef} className="hidden" onChange={handleFileUpload} accept="image/*,.pdf,.doc,.docx,.xls,.xlsx"/>
                            <button onClick={() => fileInputRef.current.click()} className="p-2 text-gray-400 hover:text-red-500" disabled={isUploading}><i className="fa-solid fa-paperclip text-xl"></i></button>
                            <div className="flex-1 industrial-input px-4 py-2 flex items-center">
                                <input type="text" placeholder="Type a message..." className="bg-transparent w-full outline-none text-white text-[15px]" value={inputText} onChange={e => setInputText(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleSendMessage()}/>
                            </div>
                            <button onClick={handleSendMessage} className="btn-industrial py-2 px-4"><i className="fa-solid fa-paper-plane"></i></button>
                        </div>
                    </div>

                    {/* Modals – same logic, industrial skin */}
                    {activeModal === 'create_group' && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={() => setActiveModal(null)}>
                            <div className="industrial-modal w-full max-w-md rounded-xl p-6" onClick={e => e.stopPropagation()}>
                                <h3 className="font-bold text-xl text-red-500 mb-4"><i className="fa-solid fa-layer-group"></i> Create Department</h3>
                                <form onSubmit={handleCreateGroup} className="space-y-4">
                                    <input type="text" placeholder="Group Name" value={groupForm.name} onChange={e => setGroupForm({...groupForm, name: e.target.value})} className="w-full p-2 bg-gray-800 border border-gray-600 rounded text-white" required/>
                                    <div className="max-h-40 overflow-auto space-y-1 bg-gray-800 p-2 rounded">{dbUsers.map(u => (<label key={u.uid} className="flex items-center gap-2 text-white"><input type="checkbox" checked={groupForm.members.includes(u.email)} onChange={e => { if(e.target.checked) setGroupForm({...groupForm, members:[...groupForm.members, u.email]}); else setGroupForm({...groupForm, members: groupForm.members.filter(m=>m!==u.email)}) }}/> {u.name}</label>))}</div>
                                    <button type="submit" className="btn-industrial w-full">Create</button>
                                </form>
                            </div>
                        </div>
                    )}
                    {activeModal === 'group_settings' && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4" onClick={() => setActiveModal(null)}>
                            <div className="industrial-modal w-full max-w-md rounded-xl p-6" onClick={e => e.stopPropagation()}>
                                <h3 className="font-bold text-xl text-red-500 mb-4">{activeGroup.name} Settings</h3>
                                <div className="max-h-60 overflow-auto space-y-2">{dbUsers.map(u => (<label key={u.uid} className="flex items-center gap-2 text-white"><input type="checkbox" disabled={!activeGroup.admins?.includes(user.email) && !currentUserData?.isAdmin} checked={activeGroup.members?.includes(u.email)} onChange={e => { if(e.target.checked) setGroupForm({...groupForm, members:[...groupForm.members, u.email]}); else setGroupForm({...groupForm, members: groupForm.members.filter(m=>m!==u.email)}) }}/> {u.name}</label>))}</div>
                                <button onClick={handleUpdateGroupMembers} className="btn-industrial w-full mt-4">Update Members</button>
                            </div>
                        </div>
                    )}
                    {activeModal === 'context' && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4" onClick={() => setActiveModal(null)}>
                            <div className="industrial-modal w-96 p-6 rounded-xl" onClick={e => e.stopPropagation()}>
                                <p className="italic text-gray-300 mb-4">"{selectedMessage?.text}"</p>
                                <button onClick={() => setActiveModal('reminder')} className="btn-industrial w-full mb-2">Set Reminder</button>
                                <button onClick={() => setActiveModal('task_convert')} className="btn-industrial w-full">Convert to Task</button>
                            </div>
                        </div>
                    )}
                    {activeModal === 'reminder' && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4" onClick={() => setActiveModal(null)}>
                            <div className="industrial-modal w-96 p-6 rounded-xl" onClick={e => e.stopPropagation()}>
                                <h3 className="font-bold text-red-500 mb-2">Set Reminder</h3>
                                <input type="datetime-local" value={reminderDateTime} onChange={e => setReminderDateTime(e.target.value)} className="w-full p-2 bg-gray-800 border border-gray-600 rounded text-white mb-3"/>
                                <button onClick={setReminder} className="btn-industrial w-full">Save</button>
                            </div>
                        </div>
                    )}
                    {activeModal === 'task_convert' && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4" onClick={() => setActiveModal(null)}>
                            <div className="industrial-modal w-96 p-6 rounded-xl" onClick={e => e.stopPropagation()}>
                                <h3 className="font-bold text-red-500 mb-3">Create Task</h3>
                                <select value={taskAssignee} onChange={e => setTaskAssignee(e.target.value)} className="w-full p-2 bg-gray-800 border border-gray-600 rounded mb-2 text-white"><option value="">Assign to...</option>{dbUsers.map(u => <option key={u.uid} value={u.email}>{u.name}</option>)}</select>
                                <input type="datetime-local" value={taskDeadline} onChange={e => setTaskDeadline(e.target.value)} className="w-full p-2 bg-gray-800 border border-gray-600 rounded mb-3 text-white"/>
                                <button onClick={convertToTask} className="btn-industrial w-full">Assign Task</button>
                            </div>
                        </div>
                    )}
                    {activeModal === 'task_trail' && selectedMessage?.taskData && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4" onClick={() => setActiveModal(null)}>
                            <div className="industrial-modal w-full max-w-2xl max-h-[80vh] overflow-auto p-6 rounded-xl" onClick={e => e.stopPropagation()}>
                                <h3 className="font-bold text-red-500 mb-3">Task Trail</h3>
                                <div className="space-y-3">{selectedMessage.taskData.trail.map((item, idx) => (<div key={idx} className="border-l-2 border-red-500 pl-3 py-1"><div className="text-xs font-bold text-red-400">{item.action}</div><div className="text-sm text-gray-300">by {item.by?.split('@')[0]} {item.to && `→ ${item.to.split('@')[0]}`}</div>{item.comment && <div className="text-xs italic text-gray-400">"{item.comment}"</div>}</div>))}</div>
                                {selectedMessage.taskData.status !== "Completed" && (
                                    <div className="mt-4 flex gap-2"><input type="text" placeholder="Add comment" value={trailComment} onChange={e => setTrailComment(e.target.value)} className="flex-1 bg-gray-800 border border-gray-600 rounded p-2 text-white"/><button onClick={handleAddComment} className="btn-industrial">Send</button></div>
                                )}
                            </div>
                        </div>
                    )}
                    {activeModal === 'admin_add_user' && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4" onClick={() => setActiveModal(null)}>
                            <div className="industrial-modal w-96 p-6 rounded-xl" onClick={e => e.stopPropagation()}>
                                <form onSubmit={handleAddUserSubmit}>
                                    <input type="text" placeholder="Name" value={adminForm.name} onChange={e=>setAdminForm({...adminForm, name:e.target.value})} className="w-full p-2 bg-gray-800 border border-gray-600 rounded mb-2 text-white"/>
                                    <input type="email" placeholder="Email" value={adminForm.email} onChange={e=>setAdminForm({...adminForm, email:e.target.value})} className="w-full p-2 bg-gray-800 border border-gray-600 rounded mb-2 text-white"/>
                                    <input type="password" placeholder="Password" value={adminForm.password} onChange={e=>setAdminForm({...adminForm, password:e.target.value})} className="w-full p-2 bg-gray-800 border border-gray-600 rounded mb-2 text-white"/>
                                    <label className="flex items-center gap-2 text-white mb-2"><input type="checkbox" checked={adminForm.isAdmin} onChange={e=>setAdminForm({...adminForm, isAdmin:e.target.checked})}/> Admin</label>
                                    <button type="submit" className="btn-industrial w-full">Add User</button>
                                </form>
                            </div>
                        </div>
                    )}
                    {activeModal === 'admin_edit_user' && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4" onClick={() => setActiveModal(null)}>
                            <div className="industrial-modal w-96 p-6 rounded-xl" onClick={e => e.stopPropagation()}>
                                <form onSubmit={handleEditUserSubmit}>
                                    <input type="text" value={adminForm.email} disabled className="w-full p-2 bg-gray-700 border border-gray-600 rounded mb-2 text-white"/>
                                    <input type="text" value={adminForm.name} onChange={e=>setAdminForm({...adminForm, name:e.target.value})} className="w-full p-2 bg-gray-800 border border-gray-600 rounded mb-2 text-white"/>
                                    <label className="flex items-center gap-2 text-white mb-2"><input type="checkbox" checked={adminForm.isAdmin} onChange={e=>setAdminForm({...adminForm, isAdmin:e.target.checked})}/> Admin</label>
                                    <label className="flex items-center gap-2 text-white mb-2"><input type="checkbox" checked={adminForm.canCreateGroups} onChange={e=>setAdminForm({...adminForm, canCreateGroups:e.target.checked})}/> Can Create Groups</label>
                                    <button type="submit" className="btn-industrial w-full">Save Changes</button>
                                </form>
                            </div>
                        </div>
                    )}
                    {isUploading && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center">
                            <div className="industrial-modal p-6 rounded-xl text-center"><i className="fa-solid fa-cloud-arrow-up text-4xl text-red-500 animate-pulse"></i><div className="mt-2">Uploading {Math.round(uploadProgress)}%</div></div>
                        </div>
                    )}
                </div>
            );
        }

        function App() {
            const [user, setUser] = useState(null);
            const [isFirebaseLoaded, setIsFirebaseLoaded] = useState(false);
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [authError, setAuthError] = useState("");

            useEffect(() => {
                const setupAuth = () => { window.onAuthStateChanged(window.auth, setUser); setIsFirebaseLoaded(true); };
                if (window.auth) setupAuth();
                else window.addEventListener('firebaseReady', setupAuth);
                return () => window.removeEventListener('firebaseReady', setupAuth);
            }, []);

            const handleLogin = (e) => {
                e.preventDefault(); setAuthError("");
                window.signInWithEmailAndPassword(window.auth, email, password).catch(err => setAuthError("Login Failed: " + err.message));
            };

            const handleRegister = async (e) => {
                e.preventDefault(); setAuthError("");
                try {
                    const cred = await window.createUserWithEmailAndPassword(window.auth, email, password);
                    const isVp = cred.user.email.toLowerCase() === 'viceprincipal@mpgs.edu.in';
                    await window.setDoc(window.doc(window.db, "users", cred.user.uid), {
                        uid: cred.user.uid, email: cred.user.email, name: cred.user.email.split('@')[0].toUpperCase(),
                        isApproved: isVp, isAdmin: isVp, canCreateGroups: isVp
                    });
                } catch (err) { setAuthError("Registration Failed: " + err.message); }
            };

            if (!isFirebaseLoaded) return <div className="flex justify-center items-center h-screen bg-black text-red-500 text-xl animate-pulse">Connecting to Industrial Server...</div>;

            if (!user) {
                return (
                    <div className="flex items-center justify-center min-h-screen bg-black p-4">
                        <div className="w-full max-w-md bg-[#1a1a1a] rounded-2xl shadow-2xl p-8 border-t-8 border-red-600">
                            <h1 className="text-3xl font-black text-center text-white mb-8"><i className="fa-solid fa-industry text-red-500 mr-2"></i> Industrial Chat Portal</h1>
                            {authError && <div className="bg-red-900 text-red-200 p-3 rounded mb-4 text-xs">{authError}</div>}
                            <form className="space-y-4">
                                <input type="email" placeholder="Corporate Email" value={email} onChange={(e) => setEmail(e.target.value)} className="w-full p-4 border border-gray-700 rounded bg-black text-white outline-none focus:border-red-500" />
                                <input type="password" placeholder="Password" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full p-4 border border-gray-700 rounded bg-black text-white outline-none focus:border-red-500" />
                                <div className="flex gap-2 pt-4">
                                    <button onClick={handleLogin} className="flex-1 btn-industrial py-3">Sign In</button>
                                    <button onClick={handleRegister} className="flex-1 bg-gray-800 text-white py-3 rounded hover:bg-gray-700">Register</button>
                                </div>
                            </form>
                        </div>
                    </div>
                );
            }
            return <ChatApp user={user} onLogout={() => window.signOut(window.auth)} />;
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
