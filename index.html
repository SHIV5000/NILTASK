<!DOCTYPE html>
<html>
<head>
    <title>MPGS TaskFlow - Complete</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100">
    <div id="root" class="container mx-auto p-4"></div>

    <script type="module">
        // -------------------- Supabase configuration --------------------
        const SUPABASE_URL = 'https://apfymygzwkzjhhgmtkaj.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFwZnlteWd6d2t6amhoZ210a2FqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MjM5MTIsImV4cCI6MjA5NjQ5OTkxMn0.RiV6kDDeSq5ZIP68RGwtpLtqPALFloq23owoNm2aA-c';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // -------------------- Global variables --------------------
        let currentUser = null;
        let currentRoom = 'general';
        let messageSubscription = null;
        let taskSubscription = null;
        let assigneeSubscription = null;
        let trailSubscription = null;
        let notificationSubscription = null;
        let bookmarkSubscription = null;

        const root = document.getElementById('root');

        // -------------------- Helper functions --------------------
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-4 right-4 bg-yellow-500 text-white px-4 py-2 rounded shadow-lg z-50 animate-pulse';
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }

        // -------------------- Authentication & Profile --------------------
        async function ensureProfile() {
            const { data: existing } = await sb
                .from('profiles')
                .select('id')
                .eq('id', currentUser.id)
                .maybeSingle();
            if (!existing) {
                await sb.from('profiles').insert({
                    id: currentUser.id,
                    email: currentUser.email,
                    full_name: currentUser.email.split('@')[0],
                    role: 'teacher'
                });
            }
        }

        async function renderApp() {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) {
                renderAuth();
                return;
            }
            currentUser = session.user;
            await ensureProfile();
            renderMainUI();
            subscribeToMessages();
            subscribeToTasks();
            subscribeToAssignees();
            subscribeToTrails();
            subscribeToNotifications();
            subscribeToBookmarks();
        }

        function renderAuth() {
            root.innerHTML = `
                <div class="max-w-md mx-auto bg-white p-6 rounded shadow mt-10">
                    <h1 class="text-2xl font-bold text-green-600 mb-4">MPGS TaskFlow</h1>
                    <input type="email" id="email" placeholder="Email" class="border p-2 w-full mb-2 rounded">
                    <input type="password" id="password" placeholder="Password" class="border p-2 w-full mb-2 rounded">
                    <div class="flex gap-2">
                        <button id="loginBtn" class="bg-green-600 text-white p-2 rounded flex-1">Login</button>
                        <button id="signupBtn" class="bg-blue-600 text-white p-2 rounded flex-1">Sign Up</button>
                    </div>
                    <div id="authMsg" class="mt-4 text-sm text-red-500"></div>
                </div>
            `;
            document.getElementById('loginBtn').onclick = async () => {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const { error } = await sb.auth.signInWithPassword({ email, password });
                if (error) document.getElementById('authMsg').innerText = error.message;
                else renderApp();
            };
            document.getElementById('signupBtn').onclick = async () => {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const { error } = await sb.auth.signUp({ email, password });
                if (error) document.getElementById('authMsg').innerText = error.message;
                else document.getElementById('authMsg').innerText = 'Check email for confirmation!';
            };
        }

        // -------------------- Main UI --------------------
        function renderMainUI() {
            root.innerHTML = `
                <div class="flex h-screen max-h-screen">
                    <!-- Left: Task + Bookmark Sidebar -->
                    <div class="w-80 bg-white border-r flex flex-col overflow-y-auto">
                        <div class="p-4 border-b">
                            <h2 class="font-bold text-lg">My Tasks</h2>
                        </div>
                        <div id="tasksList" class="flex-1 overflow-y-auto p-2 space-y-2">
                            Loading tasks...
                        </div>
                        <div class="border-t mt-4 pt-4 p-4">
                            <h2 class="font-bold text-lg mb-2">📌 Bookmarks</h2>
                            <div id="bookmarksList" class="space-y-2 max-h-48 overflow-y-auto">
                                Loading bookmarks...
                            </div>
                        </div>
                    </div>
                    <!-- Middle: Channels -->
                    <div class="w-64 bg-white border-r flex flex-col">
                        <h2 class="font-bold p-4 border-b">Channels</h2>
                        <div id="channelList" class="flex-1 p-2">
                            <div class="channel-item p-2 rounded cursor-pointer hover:bg-gray-100" data-room="general"># general</div>
                            <div class="channel-item p-2 rounded cursor-pointer hover:bg-gray-100" data-room="math"># math</div>
                            <div class="channel-item p-2 rounded cursor-pointer hover:bg-gray-100" data-room="science"># science</div>
                        </div>
                        <div class="p-4 border-t">
                            <button id="logoutBtn" class="text-red-500 text-sm">Logout</button>
                        </div>
                    </div>
                    <!-- Right: Chat -->
                    <div class="flex-1 flex flex-col">
                        <div class="bg-white border-b p-4">
                            <h2 class="text-xl font-semibold"># ${currentRoom}</h2>
                        </div>
                        <div id="messagesContainer" class="flex-1 overflow-y-auto p-4 space-y-2"></div>
                        <div class="bg-white border-t p-4">
                            <div class="flex gap-2">
                                <input type="text" id="messageInput" placeholder="Type a message..." class="flex-1 border rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                                <button id="sendBtn" class="bg-green-600 text-white px-4 py-2 rounded-full">Send</button>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Task Modal (Multi-assignee) -->
                <div id="taskModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden items-center justify-center z-50">
                    <div class="bg-white rounded-lg p-6 w-96">
                        <h3 class="text-lg font-bold mb-4">Convert to Task</h3>
                        <input type="text" id="taskTitle" placeholder="Task title" class="border p-2 w-full mb-2 rounded">
                        <select id="taskAssignees" multiple size="4" class="border p-2 w-full mb-2 rounded">
                        </select>
                        <input type="date" id="taskDeadline" class="border p-2 w-full mb-2 rounded">
                        <select id="taskPriority" class="border p-2 w-full mb-2 rounded">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                        </select>
                        <label class="flex items-center mb-4">
                            <input type="checkbox" id="taskRequireProof" class="mr-2"> Require proof
                        </label>
                        <div class="flex justify-end gap-2">
                            <button id="cancelTaskBtn" class="px-4 py-2 bg-gray-300 rounded">Cancel</button>
                            <button id="saveTaskBtn" class="px-4 py-2 bg-green-600 text-white rounded">Create Task</button>
                        </div>
                    </div>
                </div>
                <!-- Reminder Modal -->
                <div id="reminderModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden items-center justify-center z-50">
                    <div class="bg-white rounded-lg p-6 w-96">
                        <h3 class="text-lg font-bold mb-4">Set Reminder</h3>
                        <p class="text-sm text-gray-600 mb-2" id="reminderMessagePreview"></p>
                        <input type="datetime-local" id="reminderDateTime" class="border p-2 w-full mb-4 rounded">
                        <div class="flex justify-end gap-2">
                            <button id="cancelReminderBtn" class="px-4 py-2 bg-gray-300 rounded">Cancel</button>
                            <button id="saveReminderBtn" class="px-4 py-2 bg-green-600 text-white rounded">Set Reminder</button>
                        </div>
                    </div>
                </div>
                <!-- Scheduled Message Modal -->
                <div id="scheduleModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden items-center justify-center z-50">
                    <div class="bg-white rounded-lg p-6 w-96">
                        <h3 class="text-lg font-bold mb-4">Schedule Message</h3>
                        <textarea id="scheduleMessageText" rows="3" placeholder="Message to send later..." class="border p-2 w-full mb-2 rounded"></textarea>
                        <select id="scheduleChannel" class="border p-2 w-full mb-2 rounded">
                            <option value="general"># general</option>
                            <option value="math"># math</option>
                            <option value="science"># science</option>
                        </select>
                        <input type="datetime-local" id="scheduleDateTime" class="border p-2 w-full mb-4 rounded">
                        <div class="flex justify-end gap-2">
                            <button id="cancelScheduleBtn" class="px-4 py-2 bg-gray-300 rounded">Cancel</button>
                            <button id="saveScheduleBtn" class="px-4 py-2 bg-blue-600 text-white rounded">Schedule</button>
                        </div>
                    </div>
                </div>
            `;

            // Channel switching
            document.querySelectorAll('.channel-item').forEach(el => {
                el.addEventListener('click', () => {
                    currentRoom = el.getAttribute('data-room');
                    renderMainUI();
                });
            });
            document.getElementById('logoutBtn').onclick = async () => {
                await sb.auth.signOut();
                if (messageSubscription) messageSubscription.unsubscribe();
                if (taskSubscription) taskSubscription.unsubscribe();
                if (assigneeSubscription) assigneeSubscription.unsubscribe();
                if (trailSubscription) trailSubscription.unsubscribe();
                if (notificationSubscription) notificationSubscription.unsubscribe();
                if (bookmarkSubscription) bookmarkSubscription.unsubscribe();
                renderApp();
            };
            document.getElementById('sendBtn').onclick = sendMessage;
            document.getElementById('messageInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });
            document.getElementById('cancelTaskBtn').onclick = closeTaskModal;
            document.getElementById('saveTaskBtn').onclick = saveTaskMultiAssignee;
            document.getElementById('cancelReminderBtn').onclick = closeReminderModal;
            document.getElementById('saveReminderBtn').onclick = saveReminder;
            document.getElementById('cancelScheduleBtn').onclick = closeScheduleModal;
            document.getElementById('saveScheduleBtn').onclick = saveScheduledMessage;

            loadMessages();
            loadTasks();
            loadBookmarks();
        }

        // -------------------- Chat functions --------------------
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            const { error } = await sb.from('messages').insert({
                room_id: currentRoom,
                sender_id: currentUser.id,
                text: text,
                created_at: new Date().toISOString()
            });
            if (error) console.error('Send error:', error);
            else input.value = '';
        }

        async function loadMessages() {
            const { data: messages, error } = await sb
                .from('messages')
                .select('*, profiles(full_name, email)')
                .eq('room_id', currentRoom)
                .order('created_at', { ascending: true });
            if (error) { console.error(error); return; }
            renderMessages(messages);
        }

        function renderMessages(messages) {
            const container = document.getElementById('messagesContainer');
            if (!container) return;
            if (!messages || messages.length === 0) {
                container.innerHTML = '<div class="text-gray-500 text-center">No messages yet. Say hello!</div>';
                return;
            }
            container.innerHTML = messages.map(msg => {
                const senderName = msg.profiles?.full_name || msg.profiles?.email || 'Unknown';
                const isOwn = msg.sender_id === currentUser.id;
                return `
                    <div class="flex ${isOwn ? 'justify-end' : 'justify-start'} group">
                        <div class="max-w-xs ${isOwn ? 'bg-green-100' : 'bg-white'} rounded-lg p-2 shadow relative">
                            <div class="text-xs text-gray-500">${senderName}</div>
                            <div class="text-sm">${escapeHtml(msg.text)}</div>
                            <div class="text-xs text-gray-400 text-right">${new Date(msg.created_at).toLocaleTimeString()}</div>
                            <div class="absolute top-1 right-1 flex gap-1 opacity-0 group-hover:opacity-100 transition">
                                <button class="schedule-btn text-gray-400 hover:text-blue-500" data-message-text="${escapeHtml(msg.text)}">📅</button>
                                <button class="bookmark-btn text-gray-400 hover:text-yellow-500" data-message-id="${msg.id}" data-message-text="${escapeHtml(msg.text)}">⭐</button>
                                <button class="reminder-btn text-gray-400 hover:text-yellow-600" data-message-id="${msg.id}" data-message-text="${escapeHtml(msg.text)}">🔔</button>
                                <button class="task-convert-btn text-gray-400 hover:text-green-600" data-message-id="${msg.id}" data-message-text="${escapeHtml(msg.text)}">📋</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            container.scrollTop = container.scrollHeight;
            attachMessageButtonListeners();
        }

        function attachMessageButtonListeners() {
            document.querySelectorAll('.task-convert-btn').forEach(btn => {
                btn.removeEventListener('click', handleTaskConvert);
                btn.addEventListener('click', handleTaskConvert);
            });
            document.querySelectorAll('.reminder-btn').forEach(btn => {
                btn.removeEventListener('click', handleReminder);
                btn.addEventListener('click', handleReminder);
            });
            document.querySelectorAll('.bookmark-btn').forEach(btn => {
                btn.removeEventListener('click', handleBookmark);
                btn.addEventListener('click', handleBookmark);
            });
            document.querySelectorAll('.schedule-btn').forEach(btn => {
                btn.removeEventListener('click', handleSchedule);
                btn.addEventListener('click', handleSchedule);
            });
        }

        function handleTaskConvert(e) {
            e.stopPropagation();
            const btn = e.currentTarget;
            openTaskModal(btn.getAttribute('data-message-id'), btn.getAttribute('data-message-text'));
        }
        function handleReminder(e) {
            e.stopPropagation();
            const btn = e.currentTarget;
            showReminderModal(btn.getAttribute('data-message-id'), btn.getAttribute('data-message-text'));
        }
        async function handleBookmark(e) {
            e.stopPropagation();
            const btn = e.currentTarget;
            const messageId = btn.getAttribute('data-message-id');
            const messageText = btn.getAttribute('data-message-text');
            await toggleBookmark(messageId, messageText, btn);
        }
        function handleSchedule(e) {
            e.stopPropagation();
            const btn = e.currentTarget;
            const messageText = btn.getAttribute('data-message-text');
            showScheduleModal(messageText);
        }

        function subscribeToMessages() {
            if (messageSubscription) messageSubscription.unsubscribe();
            messageSubscription = sb
                .channel('public:messages')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (payload) => {
                    if (payload.new.room_id === currentRoom) {
                        sb.from('profiles').select('full_name, email').eq('id', payload.new.sender_id).then(({ data }) => {
                            const newMsg = { ...payload.new, profiles: data?.[0] || null };
                            const container = document.getElementById('messagesContainer');
                            if (!container) return;
                            const isOwn = newMsg.sender_id === currentUser.id;
                            const msgHtml = `
                                <div class="flex ${isOwn ? 'justify-end' : 'justify-start'} group">
                                    <div class="max-w-xs ${isOwn ? 'bg-green-100' : 'bg-white'} rounded-lg p-2 shadow relative">
                                        <div class="text-xs text-gray-500">${newMsg.profiles?.full_name || newMsg.profiles?.email || 'Unknown'}</div>
                                        <div class="text-sm">${escapeHtml(newMsg.text)}</div>
                                        <div class="text-xs text-gray-400 text-right">${new Date(newMsg.created_at).toLocaleTimeString()}</div>
                                        <div class="absolute top-1 right-1 flex gap-1 opacity-0 group-hover:opacity-100 transition">
                                            <button class="schedule-btn text-gray-400 hover:text-blue-500" data-message-text="${escapeHtml(newMsg.text)}">📅</button>
                                            <button class="bookmark-btn text-gray-400 hover:text-yellow-500" data-message-id="${newMsg.id}" data-message-text="${escapeHtml(newMsg.text)}">⭐</button>
                                            <button class="reminder-btn text-gray-400 hover:text-yellow-600" data-message-id="${newMsg.id}" data-message-text="${escapeHtml(newMsg.text)}">🔔</button>
                                            <button class="task-convert-btn text-gray-400 hover:text-green-600" data-message-id="${newMsg.id}" data-message-text="${escapeHtml(newMsg.text)}">📋</button>
                                        </div>
                                    </div>
                                </div>
                            `;
                            container.insertAdjacentHTML('beforeend', msgHtml);
                            container.scrollTop = container.scrollHeight;
                            attachMessageButtonListeners();
                        });
                    }
                })
                .subscribe();
        }

        // -------------------- Reminders --------------------
        let currentReminderMessageId = null;
        function showReminderModal(messageId, messageText) {
            currentReminderMessageId = messageId;
            const modal = document.getElementById('reminderModal');
            document.getElementById('reminderMessagePreview').innerText = messageText.substring(0, 100);
            const defaultDateTime = new Date(Date.now() + 60*60*1000).toISOString().slice(0, 16);
            document.getElementById('reminderDateTime').value = defaultDateTime;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }
        function closeReminderModal() {
            const modal = document.getElementById('reminderModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            currentReminderMessageId = null;
        }
        async function saveReminder() {
            if (!currentReminderMessageId) return;
            const reminderTime = document.getElementById('reminderDateTime').value;
            if (!reminderTime) {
                alert('Please select a date and time');
                return;
            }
            const { error } = await sb.from('reminders').insert({
                user_id: currentUser.id,
                message_id: currentReminderMessageId,
                reminder_time: new Date(reminderTime).toISOString(),
                triggered: false
            });
            if (error) alert('Failed to set reminder: ' + error.message);
            else { alert('Reminder set!'); closeReminderModal(); }
        }

        // -------------------- Scheduled Messages --------------------
        let currentScheduleMessageText = '';
        function showScheduleModal(messageText) {
            currentScheduleMessageText = messageText;
            const modal = document.getElementById('scheduleModal');
            document.getElementById('scheduleMessageText').value = messageText;
            document.getElementById('scheduleDateTime').value = '';
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }
        function closeScheduleModal() {
            const modal = document.getElementById('scheduleModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }
        async function saveScheduledMessage() {
            const messageText = document.getElementById('scheduleMessageText').value.trim();
            const roomId = document.getElementById('scheduleChannel').value;
            const scheduledTime = document.getElementById('scheduleDateTime').value;
            if (!messageText || !scheduledTime) {
                alert('Please enter a message and select a time');
                return;
            }
            const { error } = await sb.from('scheduled_messages').insert({
                sender_id: currentUser.id,
                room_id: roomId,
                message_text: messageText,
                scheduled_time: new Date(scheduledTime).toISOString(),
                status: 'pending'
            });
            if (error) alert('Failed to schedule message: ' + error.message);
            else { alert('Message scheduled!'); closeScheduleModal(); }
        }

        // -------------------- Bookmarks --------------------
        async function toggleBookmark(messageId, messageText, btnElement) {
            const { data: existing } = await sb
                .from('bookmarks')
                .select('id')
                .eq('user_id', currentUser.id)
                .eq('message_id', messageId)
                .maybeSingle();
            if (existing) {
                await sb.from('bookmarks').delete().eq('id', existing.id);
                btnElement.classList.remove('text-yellow-500');
                btnElement.classList.add('text-gray-400');
            } else {
                await sb.from('bookmarks').insert({
                    user_id: currentUser.id,
                    message_id: messageId
                });
                btnElement.classList.remove('text-gray-400');
                btnElement.classList.add('text-yellow-500');
            }
            loadBookmarks();
        }

        async function loadBookmarks() {
            const { data: bookmarks, error } = await sb
                .from('bookmarks')
                .select('*, messages(id, text, room_id, profiles(full_name, email))')
                .eq('user_id', currentUser.id)
                .order('created_at', { ascending: false });
            const container = document.getElementById('bookmarksList');
            if (!container) return;
            if (error || !bookmarks || bookmarks.length === 0) {
                container.innerHTML = '<div class="text-xs text-gray-500">No saved messages</div>';
                return;
            }
            container.innerHTML = bookmarks.map(bm => {
                const msg = bm.messages;
                const sender = msg?.profiles?.full_name || msg?.profiles?.email || 'Unknown';
                return `
                    <div class="border rounded p-2 text-xs bg-gray-50">
                        <div class="font-semibold">${escapeHtml(sender)}</div>
                        <div class="truncate">${escapeHtml(msg?.text || '')}</div>
                        <button class="text-blue-500 text-xs mt-1 view-message-btn" data-message-id="${msg?.id}" data-room-id="${msg?.room_id}">View in chat →</button>
                    </div>
                `;
            }).join('');
            document.querySelectorAll('.view-message-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const messageId = btn.getAttribute('data-message-id');
                    const roomId = btn.getAttribute('data-room-id');
                    if (roomId && messageId) {
                        currentRoom = roomId;
                        renderMainUI();
                    }
                });
            });
        }

        // -------------------- Multi-assignee Task Creation --------------------
        let currentMessageId = null;
        async function openTaskModal(messageId, messageText) {
            currentMessageId = messageId;
            const modal = document.getElementById('taskModal');
            document.getElementById('taskTitle').value = messageText.substring(0, 100);
            document.getElementById('taskDeadline').value = '';
            document.getElementById('taskPriority').value = 'medium';
            document.getElementById('taskRequireProof').checked = false;
            const { data: users, error } = await sb.from('profiles').select('id, email, full_name');
            if (!error && users) {
                const select = document.getElementById('taskAssignees');
                select.innerHTML = users.map(u => `<option value="${u.id}">${u.full_name || u.email}</option>`).join('');
            }
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }
        function closeTaskModal() {
            const modal = document.getElementById('taskModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            currentMessageId = null;
        }
        async function saveTaskMultiAssignee() {
            if (!currentMessageId) return;
            const title = document.getElementById('taskTitle').value;
            const assigneeIds = Array.from(document.getElementById('taskAssignees').selectedOptions).map(opt => opt.value);
            const deadline = document.getElementById('taskDeadline').value;
            const priority = document.getElementById('taskPriority').value;
            const requireProof = document.getElementById('taskRequireProof').checked;
            if (!title || assigneeIds.length === 0) {
                alert('Please provide title and at least one assignee');
                return;
            }
            // Insert task
            const { data: task, error: taskError } = await sb.from('tasks').insert({
                original_message_id: currentMessageId,
                title: title,
                assigned_by: currentUser.id,
                deadline: deadline || null,
                priority: priority,
                require_proof: requireProof,
                status: 'pending'
            }).select().single();
            if (taskError) {
                alert('Failed to create task: ' + taskError.message);
                return;
            }
            // Insert assignees
            const assigneeInserts = assigneeIds.map(assigneeId => ({
                task_id: task.id,
                assignee_id: assigneeId,
                status: 'pending_ack'
            }));
            const { error: assigneeError } = await sb.from('task_assignees').insert(assigneeInserts);
            if (assigneeError) {
                alert('Failed to assign users: ' + assigneeError.message);
                await sb.from('tasks').delete().eq('id', task.id);
                return;
            }
            alert('Task created with ' + assigneeIds.length + ' assignee(s)!');
            closeTaskModal();
            loadTasks();
        }

        // -------------------- Task Actions (per assignee) --------------------
        async function performAssigneeAction(taskId, assigneeId, action) {
            let newStatus = '';
            let comment = '';
            switch (action) {
                case 'ack':
                    newStatus = 'in_progress';
                    comment = 'acknowledged task';
                    break;
                case 'submit':
                    newStatus = 'submitted';
                    comment = 'submitted for review';
                    break;
                case 'accept':
                    newStatus = 'accepted';
                    comment = 'accepted by creator';
                    break;
                case 'review_again':
                    newStatus = 'needs_review';
                    comment = 'needs rework (creator)';
                    break;
                default: return;
            }
            const { error } = await sb.from('task_assignees').update({ status: newStatus }).eq('task_id', taskId).eq('assignee_id', assigneeId);
            if (error) {
                alert('Action failed: ' + error.message);
                return;
            }
            await addTaskTrail(taskId, comment, `User ${assigneeId} - ${comment}`);
            loadTasks();
        }

        // -------------------- Task Trail --------------------
        async function addTaskTrail(taskId, action, comment, fileUrl = null) {
            await sb.from('task_trails').insert({
                task_id: taskId,
                user_id: currentUser.id,
                action: action,
                comment: comment,
                file_url: fileUrl
            });
        }

        async function loadTaskTrail(taskId) {
            const { data: trails, error } = await sb
                .from('task_trails')
                .select('*')
                .eq('task_id', taskId)
                .order('created_at', { ascending: true });
            if (error || !trails || trails.length === 0) return;
            const trailContainer = document.getElementById(`trail-${taskId}`);
            if (trailContainer) {
                trailContainer.innerHTML = trails.map(t => {
                    let line = `${new Date(t.created_at).toLocaleString()} - ${t.action}: ${t.comment || ''}`;
                    if (t.file_url) line += ` <a href="${t.file_url}" target="_blank" class="text-blue-500">[file]</a>`;
                    return `<div>${escapeHtml(line)}</div>`;
                }).join('');
                trailContainer.classList.remove('hidden');
            }
        }

        // -------------------- Load and render tasks (fixed) --------------------
        async function loadTasks() {
            // Fetch all tasks (with creator info)
            const { data: tasks, error: tasksError } = await sb
                .from('tasks')
                .select(`
                    *,
                    creator:profiles!assigned_by(full_name, email)
                `)
                .order('created_at', { ascending: false });
            
            if (tasksError) {
                console.error('Tasks error:', tasksError);
                const container = document.getElementById('tasksList');
                if (container) container.innerHTML = '<div class="text-red-500">Error loading tasks</div>';
                return;
            }
            
            if (!tasks || tasks.length === 0) {
                renderTasks([]);
                return;
            }
            
            // Fetch all assignees for these tasks
            const taskIds = tasks.map(t => t.id);
            const { data: assignees, error: assigneesError } = await sb
                .from('task_assignees')
                .select(`
                    task_id,
                    assignee_id,
                    status,
                    profiles!assignee_id(full_name, email)
                `)
                .in('task_id', taskIds);
            
            if (assigneesError) {
                console.error('Assignees error:', assigneesError);
            }
            
            // Build assignees map
            const assigneesMap = {};
            if (assignees) {
                assignees.forEach(ass => {
                    if (!assigneesMap[ass.task_id]) assigneesMap[ass.task_id] = [];
                    assigneesMap[ass.task_id].push({
                        assignee_id: ass.assignee_id,
                        status: ass.status,
                        profiles: ass.profiles
                    });
                });
            }
            
            // Filter tasks: user is creator OR assignee
            const filteredTasks = tasks.filter(task => {
                const isCreator = task.assigned_by === currentUser.id;
                const isAssignee = assigneesMap[task.id]?.some(a => a.assignee_id === currentUser.id);
                return isCreator || isAssignee;
            });
            
            // Attach assignees to each task
            const tasksWithAssignees = filteredTasks.map(task => ({
                ...task,
                assignees: assigneesMap[task.id] || []
            }));
            
            renderTasks(tasksWithAssignees);
        }

        function renderTasks(tasks) {
            const container = document.getElementById('tasksList');
            if (!container) return;
            
            if (!tasks || tasks.length === 0) {
                container.innerHTML = '<div class="text-gray-500 text-center p-4">No tasks yet</div>';
                return;
            }
            
            container.innerHTML = tasks.map(task => {
                const isCreator = task.assigned_by === currentUser.id;
                const assignees = task.assignees || [];
                const allAccepted = assignees.length > 0 && assignees.every(a => a.status === 'accepted');
                const borderClass = allAccepted ? 'border-green-500 border-2' : 'border';
                
                // Build assignee list HTML
                const assigneeHtml = assignees.map(ass => {
                    const assigneeName = ass.profiles?.full_name || ass.profiles?.email || 'Unknown';
                    const status = ass.status;
                    const statusColors = {
                        pending_ack: 'bg-yellow-100 text-yellow-800',
                        in_progress: 'bg-blue-100 text-blue-800',
                        submitted: 'bg-purple-100 text-purple-800',
                        accepted: 'bg-green-100 text-green-800',
                        needs_review: 'bg-red-100 text-red-800'
                    };
                    const statusColor = statusColors[status] || 'bg-gray-100';
                    let actionButtons = '';
                    if (ass.assignee_id === currentUser.id) {
                        if (status === 'pending_ack') {
                            actionButtons = `<button data-task-id="${task.id}" data-assignee-id="${ass.assignee_id}" data-action="ack" class="task-assignee-action bg-green-500 text-white text-xs px-2 py-1 rounded mt-1">Acknowledge</button>`;
                        } else if (status === 'in_progress' || status === 'needs_review') {
                            actionButtons = `<button data-task-id="${task.id}" data-assignee-id="${ass.assignee_id}" data-action="submit" class="task-assignee-action bg-blue-500 text-white text-xs px-2 py-1 rounded mt-1">Submit for Review</button>`;
                        }
                    } else if (isCreator && status === 'submitted') {
                        actionButtons = `
                            <button data-task-id="${task.id}" data-assignee-id="${ass.assignee_id}" data-action="accept" class="task-assignee-action bg-green-500 text-white text-xs px-2 py-1 rounded mt-1">Accept</button>
                            <button data-task-id="${task.id}" data-assignee-id="${ass.assignee_id}" data-action="review_again" class="task-assignee-action bg-red-500 text-white text-xs px-2 py-1 rounded mt-1">Review Again</button>
                        `;
                    }
                    return `
                        <div class="flex justify-between items-center border-b py-1 text-xs">
                            <span>${escapeHtml(assigneeName)}</span>
                            <span class="px-2 py-0.5 rounded-full ${statusColor}">${status.replace('_', ' ')}</span>
                            ${actionButtons ? `<div>${actionButtons}</div>` : ''}
                        </div>
                    `;
                }).join('');
                
                // Update form for current user if they are an assignee and status allows updates
                let updateFormHtml = '';
                const myAssignee = assignees.find(a => a.assignee_id === currentUser.id);
                if (myAssignee && (myAssignee.status === 'in_progress' || myAssignee.status === 'needs_review')) {
                    updateFormHtml = `
                        <div class="mt-3 border-t pt-2">
                            <textarea id="comment-${task.id}" placeholder="Add progress update..." class="w-full text-xs border rounded p-1" rows="2"></textarea>
                            <div class="flex gap-2 mt-1">
                                <input type="file" id="file-${task.id}" class="text-xs">
                                <button data-task-id="${task.id}" class="task-update-btn bg-indigo-500 text-white text-xs px-2 py-1 rounded">Add Update</button>
                            </div>
                        </div>
                    `;
                }
                
                return `
                    <div class="rounded-lg p-3 bg-white shadow-sm ${borderClass}" data-task-id="${task.id}">
                        <div class="font-semibold text-sm">${escapeHtml(task.title)}</div>
                        <div class="text-xs text-gray-500 mt-1">Creator: ${task.creator?.full_name || task.creator?.email || 'Unknown'}</div>
                        ${task.deadline ? `<div class="text-xs text-gray-500">Deadline: ${new Date(task.deadline).toLocaleDateString()}</div>` : ''}
                        <div class="mt-2 text-xs font-semibold">Assignees:</div>
                        <div class="space-y-1">${assigneeHtml || '<div class="text-xs text-gray-400">No assignees</div>'}</div>
                        ${updateFormHtml}
                        <div id="trail-${task.id}" class="mt-2 text-xs text-gray-500 max-h-24 overflow-y-auto border-t pt-1 hidden"></div>
                    </div>
                `;
            }).join('');
            
            // Attach assignee action buttons
            document.querySelectorAll('.task-assignee-action').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const taskId = btn.dataset.taskId;
                    const assigneeId = btn.dataset.assigneeId;
                    const action = btn.dataset.action;
                    await performAssigneeAction(taskId, assigneeId, action);
                });
            });
            
            // Attach update buttons (comments/files)
            document.querySelectorAll('.task-update-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const taskId = btn.dataset.taskId;
                    const comment = document.getElementById(`comment-${taskId}`)?.value.trim() || '';
                    const fileInput = document.getElementById(`file-${taskId}`);
                    let fileUrl = null;
                    if (fileInput && fileInput.files.length > 0) {
                        const file = fileInput.files[0];
                        const fileName = `${taskId}_${Date.now()}_${file.name}`;
                        const { error } = await sb.storage.from('task-proofs').upload(fileName, file);
                        if (error) {
                            alert('File upload failed: ' + error.message);
                            return;
                        }
                        const { data: { publicUrl } } = sb.storage.from('task-proofs').getPublicUrl(fileName);
                        fileUrl = publicUrl;
                    }
                    if (comment || fileUrl) {
                        await addTaskTrail(taskId, 'update', comment, fileUrl);
                        if (document.getElementById(`comment-${taskId}`)) document.getElementById(`comment-${taskId}`).value = '';
                        if (fileInput) fileInput.value = '';
                        loadTasks();
                    } else {
                        alert('Please enter a comment or select a file');
                    }
                });
            });
            
            // Load trails for each task
            tasks.forEach(task => loadTaskTrail(task.id));
        }

        // -------------------- Real-time subscriptions --------------------
        function subscribeToTasks() {
            if (taskSubscription) taskSubscription.unsubscribe();
            taskSubscription = sb
                .channel('tasks-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'tasks' }, () => loadTasks())
                .subscribe();
        }
        function subscribeToAssignees() {
            if (assigneeSubscription) assigneeSubscription.unsubscribe();
            assigneeSubscription = sb
                .channel('assignees-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'task_assignees' }, () => loadTasks())
                .subscribe();
        }
        function subscribeToTrails() {
            if (trailSubscription) trailSubscription.unsubscribe();
            trailSubscription = sb
                .channel('trails-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'task_trails' }, () => loadTasks())
                .subscribe();
        }
        function subscribeToNotifications() {
            if (notificationSubscription) notificationSubscription.unsubscribe();
            notificationSubscription = sb
                .channel('notifications-channel')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'notifications', filter: `user_id=eq.${currentUser.id}` }, (payload) => showToast(payload.new.message))
                .subscribe();
        }
        function subscribeToBookmarks() {
            if (bookmarkSubscription) bookmarkSubscription.unsubscribe();
            bookmarkSubscription = sb
                .channel('bookmarks-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'bookmarks', filter: `user_id=eq.${currentUser.id}` }, () => loadBookmarks())
                .subscribe();
        }

        // Start the app
        renderApp();
    </script>
</body>
</html>
