                                        {dbUsers.filter(u => u.uid !== user.uid).map(u => {
                                            const dmIdList = [user.uid, u.uid].sort();
                                            const dmIdStr = dmIdList.join('_');
                                            const hasUnread = messages.some(m => m.groupId === dmIdStr && m.senderUid !== user.uid && !(m.seenBy || []).includes(user.email));
                                            return (
                                                <div key={u.uid} onClick={() => { setActiveGroup({id: dmIdStr, name: u.name, isDM: true, members: [user.email, u.email]}); setShowRightSidebar(false); }} className={`flex items-center gap-3 p-2.5 rounded-2xl cursor-pointer transition-all ${activeGroup.id === dmIdStr ? 'bg-white shadow-sm border border-slate-200/60' : 'hover:bg-slate-100 border border-transparent'}`}>
                                                    <div className="relative">
                                                        {u.profilePicUrl ? <img src={u.profilePicUrl} className="w-10 h-10 rounded-xl object-cover shadow-sm" /> : <div className="w-10 h-10 rounded-xl bg-slate-200 flex items-center justify-center text-[12px] font-bold text-slate-500 shadow-inner">{toSentenceCase(u.name).substring(0,2)}</div>}
                                                        {u.lastActive && (Date.now() - u.lastActive.toMillis() < 900000) && <div className="absolute -bottom-1 -right-1 w-3 h-3 bg-emerald-500 border-2 border-white rounded-full"></div>}
                                                    </div>
                                                    <div className="flex-1 overflow-hidden flex justify-between items-center">
                                                        <div className="overflow-hidden pr-2">
                                                            <div className={`font-semibold text-[14px] truncate ${hasUnread ? 'text-slate-900 font-bold' : activeGroup.id === dmIdStr ? 'text-[#008069]' : 'text-slate-700'}`}>{toSentenceCase(u.name)}</div>
                                                            <div className={`text-[11px] truncate ${hasUnread ? 'text-[#008069] font-bold' : 'text-slate-400 font-medium'}`}>Private Chat</div>
                                                        </div>
                                                        {hasUnread && <div className="w-2.5 h-2.5 bg-[#008069] rounded-full shadow-sm shrink-0"></div>}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                <div className="p-3 bg-white border-t border-slate-200">
                                    {currentUserData?.isAdmin && (
                                        <button onClick={() => setViewMode("admin")} className="w-full flex items-center justify-center gap-2 py-3 px-4 mb-2 hover:bg-slate-50 rounded-xl text-sm font-bold text-slate-600 transition-colors border border-transparent hover:border-slate-200"><i className="fa-solid fa-shield-halved text-blue-500"></i> Admin Panel</button>
                                    )}
                                    <button onClick={onLogout} className="w-full flex items-center justify-center gap-2 py-3 px-4 bg-red-50 hover:bg-red-100 rounded-xl text-sm font-bold text-red-600 transition-colors"><i className="fa-solid fa-power-off"></i> Secure Logout</button>
                                </div>
                            </div>

                            {/* MIDDLE CHAT AREA */}
                            <div className="flex-1 flex flex-col relative h-full bg-white">
                                {/* HEADER */}
                                <div className="h-[68px] glass-header flex items-center justify-between px-5 shrink-0 z-30 sticky top-0">
                                    <div className="flex items-center gap-3.5 cursor-pointer group" onClick={()=>{ if(!activeGroup.isDM) setActiveModal('group_settings'); }}>
                                        {activeGroup.isDM ? <div className="w-11 h-11 rounded-2xl bg-gradient-to-br from-purple-100 to-purple-200 flex items-center justify-center text-purple-600 shadow-sm border border-purple-50 group-hover:scale-105 transition-transform"><i className="fa-solid fa-user"></i></div> : activeGroup.profilePicUrl ? <img src={activeGroup.profilePicUrl} className="w-11 h-11 rounded-2xl object-cover shadow-sm group-hover:scale-105 transition-transform"/> : <div className="w-11 h-11 rounded-2xl bg-gradient-to-br from-teal-100 to-teal-200 flex items-center justify-center text-teal-600 shadow-sm border border-teal-50 group-hover:scale-105 transition-transform"><i className="fa-solid fa-people-group"></i></div>}
                                        <div><h1 className="text-[17px] font-bold text-slate-800 tracking-tight">{toSentenceCase(activeGroup.name)}</h1><p className="text-[12px] font-medium text-slate-500">{activeGroup.isDM ? 'End-to-End Encrypted' : `${activeGroup.members?.length||0} Members`}</p></div>
                                    </div>

                                    <div className="flex items-center gap-3">
                                        <div className="hidden lg:flex items-center bg-slate-100/80 rounded-full px-4 py-2 border border-slate-200/60 transition-all focus-within:bg-white focus-within:ring-2 focus-within:ring-[#008069]/20 focus-within:border-transparent mr-2"><i className="fa-solid fa-magnifying-glass text-xs text-slate-400"></i><input type="text" placeholder="Search in chat..." className="bg-transparent outline-none text-[13px] font-medium ml-2 w-32 focus:w-48 transition-all text-slate-700" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} /></div>
                                        
                                        <div className="relative">
                                            <button onClick={() => setShowNotifications(!showNotifications)} className={`w-10 h-10 rounded-full flex items-center justify-center transition-all ${showNotifications ? 'bg-slate-200 text-slate-800' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`} title="Notifications">
                                                <i className="fa-solid fa-bell"></i>
                                                {totalNotifications > 0 && <span className="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-4 h-4 flex items-center justify-center rounded-full font-bold shadow-sm border-2 border-white">{totalNotifications}</span>}
                                            </button>
                                            {showNotifications && (
                                                <div className="absolute top-full right-0 mt-3 w-80 glass-panel rounded-2xl shadow-[0_10px_40px_rgba(0,0,0,0.1)] border border-slate-200/60 z-50 overflow-hidden animate-in slide-in-from-top-2">
                                                    <div className="p-4 flex justify-between items-center border-b border-slate-100">
                                                        <span className="text-[14px] font-bold text-slate-800">Alerts</span>
                                                        <button onClick={handleClearNotifications} className="text-[11px] text-[#008069] font-bold hover:bg-teal-50 px-2 py-1 rounded transition-colors">Clear All</button>
                                                    </div>
                                                    <div className="max-h-80 overflow-y-auto p-2">
                                                        {totalNotifications === 0 ? <div className="p-8 text-center text-[13px] text-slate-400 font-medium">No new alerts</div> : 
                                                            <div className="space-y-1.5">
                                                                {activeActionableTasks.map(task => (
                                                                    <div key={task.id} className="p-3 bg-white hover:bg-slate-50 border border-slate-100 rounded-xl cursor-pointer shadow-sm transition-all" onClick={() => { setShowNotifications(false); if (activeGroup.id !== task.groupId) { setActiveGroup(groups.find(g=>g.id===task.groupId)||{id:'demo',name:'Default Group'}); } setTimeout(()=>scrollToMessage(task.id), 300); }}>
                                                                        <div className="text-[12px] font-bold text-[#008069] mb-1 flex items-center gap-1.5"><div className="w-5 h-5 rounded bg-teal-50 flex items-center justify-center"><i className="fa-regular fa-square-check"></i></div> Pending Task</div>
                                                                        <div className="text-[13px] text-slate-700 font-medium line-clamp-2 px-1">"{task.text}"</div>
                                                                        <div className="text-[10px] font-bold text-red-500 mt-2 px-1">Due: {new Date(task.taskData.deadline).toLocaleDateString()}</div>
                                                                    </div>
                                                                ))}
                                                                {genericNotifications.map(n => (
                                                                    <div key={n.id} className="p-3 bg-white hover:bg-slate-50 border border-slate-100 rounded-xl cursor-pointer shadow-sm transition-all flex items-start gap-3" onClick={() => { setShowNotifications(false); if(n.messageId) scrollToMessage(n.messageId); }}>

                                                                        <div>
                                                                            <div className="text-[13px] font-bold text-slate-800">{n.type === 'reply' ? 'New Reply' : 'New Reaction'}</div>
                                                                            <div className="text-[12px] text-slate-500 font-medium mt-0.5">{n.text}</div>
                                                                        </div>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        }
                                                    </div>
                                                </div>
                                            )}
                                        </div>

                                        <div className="relative">
                                            <button onClick={() => setShowFilterMenu(!showFilterMenu)} className={`w-10 h-10 rounded-full flex items-center justify-center transition-all ${chatFilter !== 'all' || showFilterMenu ? 'bg-teal-50 text-[#008069]' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}><i className="fa-solid fa-filter"></i></button>

                                                    {['all', 'tasks-pending', 'tasks-completed', 'messages', 'today', 'bookmarked'].map(f => (
                                                        <div key={f} onClick={() => { setChatFilter(f); setShowFilterMenu(false); }} className={`px-4 py-2.5 text-[13px] font-semibold cursor-pointer rounded-xl transition-colors flex items-center gap-3 ${chatFilter === f ? 'bg-[#008069] text-white shadow-sm' : 'text-slate-600 hover:bg-slate-100'}`}>
                                                            {f === 'all' && <i className="fa-solid fa-layer-group w-5 text-center"></i>}
                                                            {f === 'tasks-pending' && <i className="fa-regular fa-clock w-5 text-center"></i>}
                                                            {f === 'tasks-completed' && <i className="fa-regular fa-square-check w-5 text-center"></i>}
                                                            {f === 'messages' && <i className="fa-regular fa-comment w-5 text-center"></i>}
                                                            {f === 'today' && <i className="fa-regular fa-calendar-day w-5 text-center"></i>}
                                                            {f === 'bookmarked' && <i className="fa-solid fa-bookmark w-5 text-center"></i>}
                                                            {f === 'bookmarked' ? 'Saved Messages' : f === 'all' ? 'All Content' : f.replace('-', ' ').replace(/\b\w/g, l => l.toUpperCase())}
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                        
                                        <button onClick={() => setShowRightSidebar(!showRightSidebar)} className={`w-10 h-10 rounded-full flex items-center justify-center transition-all shadow-sm ${showRightSidebar ? 'bg-[#008069] text-white shadow-md' : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-50'}`} title="Task Hub"><i className="fa-solid fa-clipboard-list"></i></button>
                                    </div>
                                </div>

                                {/* CHAT FEED */}
                                <div ref={chatContainerRef} onScroll={handleChatScroll} className="flex-1 overflow-y-auto p-4 md:px-[6%] space-y-3 wa-bg relative" onClick={() => setShowFilterMenu(false)}>

                                    {pinnedMessages.length > 0 && (
                                        <div className="sticky top-2 z-10 glass-panel shadow-md rounded-2xl p-3 mb-6 animate-in slide-in-from-top-4 cursor-pointer border border-[#008069]/20 transform-gpu hover:scale-[1.01] transition-all" onClick={() => scrollToMessage(pinnedMessages[0].id)}>
                                            <div className="flex justify-between items-center text-[11px] text-[#008069] font-bold mb-1 uppercase tracking-widest"><span><i className="fa-solid fa-thumbtack mr-1"></i> Pinned Announcement</span></div>
                                            <div className="text-[14px] font-semibold text-slate-800 line-clamp-2 pl-4 border-l-2 border-[#008069]">{pinnedMessages[0].text || pinnedMessages[0].fileName}</div>
                                        </div>
                                    )}

                                    {messagesToRender.map(m => renderMessageNode(m))}

                                        <div className="flex items-start animate-in fade-in slide-in-from-bottom-2 mt-2">
                                            <div className="bg-white/90 backdrop-blur px-4 py-2 rounded-2xl rounded-tl-sm shadow-sm text-[12px] text-[#008069] font-bold italic border border-slate-100 flex items-center gap-2">
                                                <span>{typingStatus.map(t => toSentenceCase(t.name)).join(', ')} {typingStatus.length > 1 ? 'are' : 'is'} typing</span>
                                                <div className="flex gap-1 items-center h-full pt-1">
                                                    <div className="w-1.5 h-1.5 bg-[#008069] rounded-full animate-bounce" style={{animationDelay: '0ms'}}></div>
                                                    <div className="w-1.5 h-1.5 bg-[#008069] rounded-full animate-bounce" style={{animationDelay: '150ms'}}></div>
                                                    <div className="w-1.5 h-1.5 bg-[#008069] rounded-full animate-bounce" style={{animationDelay: '300ms'}}></div>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                    <div ref={messagesEndRef} className="h-6"></div>
                                </div>

                                    <i className={`fa-solid ${isAtBottom ? 'fa-arrow-up' : 'fa-arrow-down'} text-lg`}></i>
                                </button>

                                            <div className="w-1 bg-[#008069] h-8 rounded-full"></div>
                                            <div className="flex flex-col">
                                                <div className="text-[12px] font-bold text-[#008069] uppercase tracking-wide">{toSentenceCase(replyingTo.sender.split('@')[0])}</div>

                                            </div>
                                        </div>
                                        <button onClick={()=>setReplyingTo(null)} className="w-8 h-8 rounded-full bg-slate-200 text-slate-500 hover:bg-red-100 hover:text-red-500 transition-colors flex items-center justify-center"><i className="fa-solid fa-xmark"></i></button>
                                    </div>

                                                {toSentenceCase(u.name)}
                                            </div>
                                        ))}

                                                {toSentenceCase(g.name)}
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {/* CLEAN FLOATING PILL INPUT AREA */}
                                <div className="bg-white/80 backdrop-blur border-t border-slate-200 px-4 py-4 shrink-0 z-10 relative pb-safe">
                                    <div className="max-w-4xl mx-auto flex items-end gap-3">
                                        <input type="file" ref={fileInputRef} className="hidden" onChange={handleFileUpload} accept="image/*,.pdf,.doc,.docx,.xls,.xlsx"/>
                                        
                                        <div className="flex-1 bg-white rounded-3xl flex items-end shadow-sm border border-slate-200 p-1.5 focus-within:ring-2 focus-within:ring-[#008069]/20 focus-within:border-transparent transition-all">

                                            <textarea ref={chatInputRef} rows={1} placeholder="Type a message..." className="bg-transparent flex-1 outline-none text-[15px] font-medium text-slate-800 resize-none py-2.5 px-2" style={{ minHeight: '40px', maxHeight: '120px' }} value={inputText} onChange={(e) => { setInputText(e.target.value); handleTypingEvent(); e.target.style.height = 'auto'; e.target.style.height = (e.target.scrollHeight < 120 ? e.target.scrollHeight : 120) + 'px'; }} onKeyDown={handleKeyDown} />
                                        </div>
                                        
                                        <button onClick={handleSendMessage} className={`shrink-0 w-12 h-12 rounded-full transition-all flex justify-center items-center shadow-md transform-gpu hover:scale-105 ${inputText.trim() ? 'bg-[#008069] text-white hover:bg-[#006e5a]' : 'bg-slate-200 text-white cursor-not-allowed shadow-none'}`} disabled={!inputText.trim()}><i className="fa-solid fa-paper-plane text-[18px] ml-[-2px] mt-[2px]"></i></button>
                                    </div>
                                </div>
                            </div>
                            
                            {/* RIGHT SIDEBAR (Tasks) */}
                            {showRightSidebar && (
                                <div className="absolute right-0 md:relative w-80 h-full bg-[#f8fafc] border-l border-slate-200 flex flex-col shrink-0 z-40 animate-in slide-in-from-right shadow-2xl md:shadow-[rgba(0,0,0,0.03)_-2px_0_15px]">
                                    <div className="h-[68px] glass-header flex items-center justify-between px-5 shrink-0 z-10">
                                        <div className="font-bold text-[15px] text-slate-800 flex items-center gap-2"><div className="w-8 h-8 rounded-lg bg-teal-50 text-[#008069] flex items-center justify-center"><i className="fa-solid fa-list-check"></i></div> Task Hub</div>
                                        <button onClick={() => setShowRightSidebar(false)} className="w-8 h-8 rounded-full hover:bg-slate-100 text-slate-400 hover:text-red-500 transition-colors flex items-center justify-center"><i className="fa-solid fa-xmark"></i></button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto flex flex-col p-3 gap-4">
                                        
                                        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden flex flex-col flex-1 min-h-0">
                                            <div className="px-4 py-3 text-[10px] font-bold text-slate-400 uppercase tracking-widest bg-slate-50 border-b border-slate-100 flex items-center gap-2"><i className="fa-solid fa-inbox text-blue-500"></i> Assigned To Me</div>
                                            <div className="overflow-y-auto flex-1 p-2 space-y-2">
                                                {tasksAssignedToMe.length === 0 ? (
                                                    <div className="text-[12px] font-medium text-slate-400 text-center p-6 bg-slate-50/50 rounded-xl border border-dashed border-slate-200 m-2">Inbox zero!</div>
                                                ) : (
                                                    tasksAssignedToMe.map(task => (
                                                        <div key={task.id} onClick={() => { setActiveGroup(groups.find(g=>g.id===task.groupId)||{id:'demo',name:'Demo', isDM: false}); setSelectedMessage(task); setActiveModal('task_trail'); }} className="p-3 bg-white hover:bg-blue-50/50 rounded-xl cursor-pointer border border-slate-100 hover:border-blue-200 transition-all shadow-sm">
                                                            <div className="font-bold text-[13px] text-slate-800 truncate mb-1">{task.text || 'File Task'}</div>
                                                            <div className="flex justify-between items-center mt-2">
                                                                <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">{groups.find(g=>g.id===task.groupId)?.name || 'Main'}</span>
                                                                <span className="text-[10px] font-bold text-red-500 bg-red-50 px-2 py-0.5 rounded-md">Due {new Date(task.taskData.deadline).toLocaleDateString()}</span>
                                                            </div>
                                                        </div>
                                                    ))
                                                )}
                                            </div>
                                        </div>

                                        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden flex flex-col flex-1 min-h-0">
                                            <div className="px-4 py-3 text-[10px] font-bold text-slate-400 uppercase tracking-widest bg-slate-50 border-b border-slate-100 flex items-center gap-2"><i className="fa-solid fa-paper-plane text-purple-500"></i> Assigned By Me</div>
                                            <div className="overflow-y-auto flex-1 p-2 space-y-2">
                                                {tasksAssignedByMe.length === 0 ? (
                                                    <div className="text-[12px] font-medium text-slate-400 text-center p-6 bg-slate-50/50 rounded-xl border border-dashed border-slate-200 m-2">No active delegations</div>
                                                ) : (
                                                    tasksAssignedByMe.map(task => (
                                                        <div key={task.id} onClick={() => { setActiveGroup(groups.find(g=>g.id===task.groupId)||{id:'demo',name:'Demo', isDM: false}); setSelectedMessage(task); setActiveModal('task_trail'); }} className="p-3 bg-white hover:bg-purple-50/50 rounded-xl cursor-pointer border border-slate-100 hover:border-purple-200 transition-all shadow-sm">
                                                            <div className="font-bold text-[13px] text-slate-800 truncate mb-1">{task.text || 'File Task'}</div>
                                                            <div className="text-[11px] font-medium text-slate-500 truncate mb-2">To: {(task.taskData.assignees||[]).map(a=>toSentenceCase(a.split('@')[0])).join(', ')}</div>
                                                            <div className="flex justify-between items-center">
                                                                <span className={`text-[10px] font-bold px-2 py-0.5 rounded-md uppercase tracking-wider ${task.taskData.status==='Pending'?'bg-amber-50 text-amber-600':'bg-blue-50 text-blue-600'}`}>{task.taskData.status}</span>
                                                                <span className="text-[10px] font-bold text-red-500 bg-red-50 px-2 py-0.5 rounded-md">Due {new Date(task.taskData.deadline).toLocaleDateString()}</span>
                                                            </div>
                                                        </div>
                                                    ))
                                                )}
                                            </div>
                                        </div>

                                    </div>
                                </div>
                            )}

                        </div>
                    )}

                    {/* MODALS */}
                    {activeModal === 'context' && selectedMessage && (
                        <div className="absolute inset-0 bg-black/40 backdrop-blur-[2px] z-[60] flex items-end justify-center p-4 animate-in fade-in" onClick={() => setActiveModal(null)}>
                            <div className="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl animate-in slide-in-from-bottom-8 transform-gpu" onClick={e => e.stopPropagation()}>
                                <div className="flex items-center gap-3 mb-5 border-b border-slate-100 pb-5">
                                    <div className="w-12 h-12 rounded-2xl bg-slate-50 text-slate-400 flex items-center justify-center text-xl shadow-inner"><i className="fa-solid fa-quote-left"></i></div>
                                    <p className="text-[14px] font-medium text-slate-700 line-clamp-2 flex-1 italic">"{selectedMessage.text || selectedMessage.fileName}"</p>
                                </div>
                                <div className="space-y-2.5">
                                    <button onClick={() => { setActiveModal(null); setReplyingTo(selectedMessage); setTimeout(()=>chatInputRef.current?.focus(), 100); }} className="w-full flex items-center gap-4 p-3 hover:bg-slate-50 rounded-2xl transition-all border border-transparent hover:border-slate-200 text-left group">
                                        <div className="bg-teal-50 w-10 h-10 flex items-center justify-center rounded-xl text-teal-600 group-hover:scale-110 transition-transform shadow-sm"><i className="fa-solid fa-reply"></i></div>
                                        <div><div className="font-bold text-[14px] text-slate-800">Reply</div><div className="text-[11px] font-semibold text-slate-400 mt-0.5 tracking-wide uppercase">Quote in chat</div></div>
                                    </button>
                                    <button onClick={() => setActiveModal('reminder')} className="w-full flex items-center gap-4 p-3 hover:bg-slate-50 rounded-2xl transition-all border border-transparent hover:border-slate-200 text-left group">
                                        <div className="bg-yellow-50 w-10 h-10 flex items-center justify-center rounded-xl text-yellow-600 group-hover:scale-110 transition-transform shadow-sm"><i className="fa-regular fa-clock"></i></div>
                                        <div><div className="font-bold text-[14px] text-slate-800">Set Reminder</div><div className="text-[11px] font-semibold text-slate-400 mt-0.5 tracking-wide uppercase">Push alert</div></div>
                                    </button>
                                    <button onClick={() => setActiveModal('task_convert')} className="w-full flex items-center gap-4 p-3 hover:bg-slate-50 rounded-2xl transition-all border border-transparent hover:border-slate-200 text-left group">
                                        <div className="bg-blue-50 w-10 h-10 flex items-center justify-center rounded-xl text-blue-600 group-hover:scale-110 transition-transform shadow-sm"><i className="fa-regular fa-square-check"></i></div>
                                        <div><div className="font-bold text-[14px] text-slate-800">Convert to Task</div><div className="text-[11px] font-semibold text-slate-400 mt-0.5 tracking-wide uppercase">Assign & Track</div></div>
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {activeModal === 'edit_profile' && (
                        <div className="absolute inset-0 bg-black/40 backdrop-blur-[2px] z-[60] flex items-center justify-center p-4 animate-in fade-in" onClick={() => setActiveModal(null)}>
                            <div className="bg-white w-full max-w-sm rounded-3xl shadow-2xl animate-in zoom-in-95 overflow-hidden transform-gpu" onClick={e => e.stopPropagation()}>
                                <div className="bg-gradient-to-r from-[#008069] to-teal-500 text-white px-6 py-5 flex items-center gap-4"><i className="fa-solid fa-arrow-left cursor-pointer hover:bg-white/20 p-2 rounded-full transition-colors -ml-2" onClick={() => setActiveModal(null)}></i><h3 className="font-bold text-lg tracking-wide">Profile Settings</h3></div>
                                <div className="p-8 space-y-8">
                                    <div className="flex flex-col items-center gap-4">
                                        <div className="w-32 h-32 rounded-3xl bg-slate-100 flex items-center justify-center overflow-hidden relative cursor-pointer group shadow-inner border-4 border-white ring-1 ring-slate-200" onClick={() => profilePicInputRef.current?.click()}>
                                            {currentUserData?.profilePicUrl ? <img src={currentUserData.profilePicUrl} className="w-full h-full object-cover" /> : <i className="fa-solid fa-user text-5xl text-slate-300"></i>}
                                            <div className="absolute inset-0 bg-black/50 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity backdrop-blur-sm"><i className="fa-solid fa-camera text-white text-2xl"></i></div>
                                        </div>
                                        <input type="file" ref={profilePicInputRef} className="hidden" accept="image/*" />
                                        <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Tap to change avatar</div>
                                    </div>
                                    <div className="relative">
                                        <label className="text-[11px] text-[#008069] font-bold uppercase tracking-widest absolute -top-2.5 left-3 bg-white px-1">Display Name</label>
                                        <input required type="text" value={profileForm.name} onChange={(e) => setProfileForm({...profileForm, name: e.target.value})} className="w-full p-4 pt-5 border border-slate-300 rounded-2xl text-[15px] outline-none bg-white focus:border-[#008069] focus:ring-2 focus:ring-[#008069]/20 transition-all font-semibold text-slate-800" />
                                    </div>
                                    <button onClick={handleProfileSubmit} disabled={profileUploadProgress > 0} className="w-full bg-[#008069] text-white py-4 rounded-2xl shadow-[0_4px_15px_rgba(0,128,105,0.3)] hover:bg-[#006e5a] font-bold text-[15px] transition-all hover:scale-[1.02] active:scale-[0.98]">{profileUploadProgress > 0 ? `Uploading ${Math.round(profileUploadProgress)}%` : 'Save Changes'}</button>
                                </div>
                            </div>
                        </div>

                    )}

                    {isUploading && (
                        <div className="absolute inset-0 bg-white/80 backdrop-blur-sm z-[80] flex items-center justify-center p-4 animate-in fade-in"><div className="bg-white w-full max-w-xs rounded-3xl p-8 shadow-2xl flex flex-col items-center text-center transform-gpu"><div className="w-14 h-14 border-4 border-[#008069] border-t-transparent rounded-full animate-spin mb-5 shadow-sm"></div><h3 className="font-bold text-lg text-slate-800 tracking-wide">Sending File...</h3><div className="text-[11px] font-bold text-[#008069] uppercase tracking-widest mt-1">{Math.round(uploadProgress)}% Complete</div></div></div>
                    )}

                </div>
            );
        }

        function App() {
            const [user, setUser] = useState(null);
            const [isFirebaseLoaded, setIsFirebaseLoaded] = useState(false);
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [showPassword, setShowPassword] = useState(false);
            const [authError, setAuthError] = useState("");

            useEffect(() => {
                const setupAuth = () => { window.onAuthStateChanged(window.auth, setUser); setIsFirebaseLoaded(true); };
                if (window.auth) setupAuth(); else window.addEventListener('firebaseReady', setupAuth);
                return () => window.removeEventListener('firebaseReady', setupAuth);
            }, []);

            const handleLogin = (e) => { e.preventDefault(); setAuthError(""); window.signInWithEmailAndPassword(window.auth, email, password).catch(err => setAuthError("Login Failed")); };
            const handleRegister = async (e) => {
                e.preventDefault(); setAuthError("");
                try {
                    const cred = await window.createUserWithEmailAndPassword(window.auth, email, password);
                    const isVp = cred.user.email.toLowerCase() === 'viceprincipal@mpgs.edu.in';
                    await window.setDoc(window.doc(window.db, "users", cred.user.uid), { uid: cred.user.uid, email: cred.user.email, name: toSentenceCase(cred.user.email.split('@')[0]), isApproved: isVp, isAdmin: isVp, canCreateGroups: isVp });
                } catch (err) { setAuthError("Registration Failed"); }
            };

            if (!isFirebaseLoaded) return <div className="flex justify-center items-center h-screen bg-[#f0f2f5] font-semibold text-[#54656f]">Connecting...</div>;

            if (!user) {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen bg-[#f0f2f5] p-4 relative">
                        <div className="absolute top-0 left-0 w-full h-48 bg-[#00a884] z-0"></div>
                        <div className="w-full max-w-sm bg-white rounded-xl shadow-lg p-8 z-10">
                            <div className="flex justify-center mb-6">
                                <div className="w-20 h-20 bg-[#00a884] rounded-full flex items-center justify-center text-white text-3xl shadow-md">
                                    <i className="fa-regular fa-comments"></i>
                                    <i className="fa-solid fa-list-check ml-1 text-2xl"></i>
                                </div>
                            </div>
                            <h1 className="text-xl font-bold text-center text-[#111b21] mb-2 tracking-wide">Talk & Task</h1>
                            <p className="text-xs text-[#54656f] text-center mb-6 font-semibold uppercase tracking-wider">Enterprise Portal</p>
                            
                            {authError && <div className="bg-red-50 text-red-600 p-3 rounded mb-4 text-[13px]">{authError}</div>}
                            <form className="space-y-4">
                                <input type="email" placeholder="Email Address" value={email} onChange={(e) => setEmail(e.target.value)} className="w-full p-3 border-b-2 border-gray-300 focus:border-[#00a884] outline-none transition-colors text-[15px]" />
                                <div className="relative">
                                    <input type={showPassword ? "text" : "password"} placeholder="Password" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full p-3 border-b-2 border-gray-300 focus:border-[#00a884] outline-none transition-colors text-[15px] pr-10" />
                                    <i className={`fa-solid ${showPassword ? 'fa-eye-slash' : 'fa-eye'} absolute right-3 top-4 text-gray-400 hover:text-[#00a884] cursor-pointer`} onClick={() => setShowPassword(!showPassword)}></i>
                                </div>
                                <div className="pt-4"><button onClick={handleLogin} className="w-full bg-[#00a884] text-white py-3 rounded shadow hover:bg-[#008f6f] font-semibold transition-colors mb-3">Log In</button><button onClick={handleRegister} className="w-full bg-white border border-[#00a884] text-[#00a884] py-3 rounded hover:bg-[#f0f2f5] font-semibold transition-colors">Create Account</button></div>
                            </form>
                        </div>
                    </div>
                );
            }
            return <ChatApp user={user} onLogout={() => window.signOut(window.auth)} />;
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
