<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corporate Chat App - Enterprise Edition</title>
    
    <!-- Professional Assets -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase 10.8.1 Engine -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, updateDoc, setDoc, getDocs, where, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAoOsog2NP6Pf8YNSxn0rRYK4MSLEVNNZc",
            authDomain: "niltask.firebaseapp.com",
            projectId: "niltask",
            storageBucket: "niltask.firebasestorage.app",
            messagingSenderId: "868641827920",
            appId: "1:868641827920:web:70d9db79a361a76468f555"
        };

        const app = initializeApp(firebaseConfig);
        
        // Locked Stable Flat Architecture
        window.auth = getAuth(app);
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
        window.signOut = signOut;
        window.onAuthStateChanged = onAuthStateChanged;

        window.db = getFirestore(app);
        window.collection = collection;
        window.addDoc = addDoc;
        window.onSnapshot = onSnapshot;
        window.query = query;
        window.orderBy = orderBy;
        window.serverTimestamp = serverTimestamp;
        window.doc = doc;
        window.updateDoc = updateDoc;
        window.setDoc = setDoc;
        window.getDocs = getDocs;
        window.where = where;
        window.deleteDoc = deleteDoc;
        window.writeBatch = writeBatch;
        
        window.storage = getStorage(app);
        window.ref = ref;
        window.uploadBytesResumable = uploadBytesResumable;
        window.getDownloadURL = getDownloadURL;

        window.secondaryApp = initializeApp(firebaseConfig, "Secondary");
        window.secondaryAuth = getAuth(window.secondaryApp);

        window.dispatchEvent(new Event('firebaseReady'));
    </script>

    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); }
        .telegram-bg { background-color: #E6EBE9; background-image: url('https://www.transparenttextures.com/patterns/cubes.png'); }
        @keyframes pop { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop { animation: pop 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body class="bg-gray-100 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const NOTIFICATION_SOUND = "https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3";

        function ChatApp({ user, onLogout }) {
            const [activeModal, setActiveModal] = useState(null);
            const [selectedMessage, setSelectedMessage] = useState(null);
            const [replyingTo, setReplyingTo] = useState(null);
            const [inputText, setInputText] = useState("");
            const [messages, setMessages] = useState([]); 
            const messagesEndRef = useRef(null); 
            const audioRef = useRef(new Audio(NOTIFICATION_SOUND));

            // States
            const [dbUsers, setDbUsers] = useState([]); 
            const [groups, setGroups] = useState([]);
            const [activeGroup, setActiveGroup] = useState({ id: "main", name: "Academic Council Group" });
            const [currentUserData, setCurrentUserData] = useState(null);
            const [activeReminders, setActiveReminders] = useState([]);
            
            // Admin Tabs & Filters
            const [viewMode, setViewMode] = useState("chat"); 
            const [adminTab, setAdminTab] = useState("users");
            const [adminFilterUser, setAdminFilterUser] = useState("");
            const [adminFilterDate, setAdminFilterDate] = useState("");
            const [allAdminReminders, setAllAdminReminders] = useState([]);
            const [searchQuery, setSearchQuery] = useState("");
            const [showNotifications, setShowNotifications] = useState(false);
            
            // Forms
            const [adminForm, setAdminForm] = useState({ uid: '', name: '', email: '', password: '', isAdmin: false, canCreateGroups: false });
            const [groupForm, setGroupForm] = useState({ id: null, name: "", members: [] });
            const [taskAssignee, setTaskAssignee] = useState("");
            const [taskDeadline, setTaskDeadline] = useState("");
            const [trailComment, setTrailComment] = useState("");
            const [reminderDateTime, setReminderDateTime] = useState("");
            const [isUploading, setIsUploading] = useState(false);
            const [uploadProgress, setUploadProgress] = useState(0);
            const fileInputRef = useRef(null);

            const playSound = () => audioRef.current.play().catch(()=>{});

            const openGroupSettings = () => {
                if (activeGroup.id === 'main') return;
                setGroupForm({ id: activeGroup.id, name: activeGroup.name, members: activeGroup.members || [] });
                setActiveModal('group_settings');
            };

            // 1. Core Data Listeners
            useEffect(() => {
                const unsubCurrent = window.onSnapshot(window.doc(window.db, "users", user.uid), (doc) => {
                    if (doc.exists()) setCurrentUserData(doc.data());
                });
                const unsubUsers = window.onSnapshot(window.query(window.collection(window.db, "users"), window.orderBy("email", "asc")), (snapshot) => {
                    setDbUsers(snapshot.docs.map(doc => doc.data()));
                });
                const unsubGroups = window.onSnapshot(window.collection(window.db, "groups"), (snapshot) => {
                    setGroups(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                const qMsg = window.query(window.collection(window.db, "messages"), window.orderBy("timestamp", "asc"));
                const unsubMsg = window.onSnapshot(qMsg, (snapshot) => {
                    const loaded = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    
                    setMessages(prev => {
                        if (loaded.length > prev.length && prev.length > 0) {
                            const last = loaded[loaded.length - 1];
                            if (!last.isMine && last.isPrivateMention && last.allowedUsers?.includes(user.email)) playSound();
                        }
                        return loaded;
                    });
                    setTimeout(() => messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }), 150);
                });
                const qRem = window.query(window.collection(window.db, "reminders"), window.where("userId", "==", user.uid), window.where("isTriggered", "==", false));
                const unsubRem = window.onSnapshot(qRem, (snapshot) => {
                    const newRems = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    if (newRems.length > activeReminders.length && activeReminders.length > 0) playSound();
                    setActiveReminders(newRems);
                });
                if (currentUserData?.isAdmin) {
                    const qAdmin = window.query(window.collection(window.db, "reminders"), window.orderBy("remindAt", "desc"));
                    window.onSnapshot(qAdmin, (snapshot) => {
                        setAllAdminReminders(snapshot.docs.map(d => ({ id: d.id, ...d.data() })));
                    });
                }
                return () => { unsubCurrent(); unsubUsers(); unsubGroups(); unsubMsg(); unsubRem(); };
            }, [user.uid, currentUserData?.isAdmin]);

            // 2. Messaging & Reactions
            const handleKeyDown = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSendMessage();
                }
            };

            const handleSendMessage = async () => {
                if (!inputText.trim()) return;
                const text = inputText;
                const parentId = replyingTo?.id || null;
                const threadNum = parentId ? messages.filter(m => m.replyTo === parentId).length + 1 : null;

                setInputText(""); 
                setReplyingTo(null);
                const inputEl = document.getElementById('chatInput');
                if (inputEl) inputEl.style.height = 'auto';

                const mentions = dbUsers.filter(u => text.includes(`@${u.name}`)).map(u => u.email);
                const isPrivate = mentions.length > 0;
                
                try {
                    await window.addDoc(window.collection(window.db, "messages"), {
                        text, senderUid: user.uid, senderEmail: user.email,
                        timestamp: window.serverTimestamp(),
                        groupId: activeGroup.id,
                        isPrivateMention: isPrivate,
                        allowedUsers: isPrivate ? [user.email, ...mentions] : [],
                        replyTo: parentId, threadNumber: threadNum, reactions: {}
                    });
                } catch (e) { console.error(e); }
            };

            const handleReaction = async (msgId, emoji) => {
                const msg = messages.find(m => m.id === msgId);
                const reactions = msg.reactions || {};
                const users = reactions[emoji] || [];
                const newUsers = users.includes(user.email) ? users.filter(u => u !== user.email) : [...users, user.email];
                await window.updateDoc(window.doc(window.db, "messages", msgId), { [`reactions.${emoji}`]: newUsers });
            };

            const clearAllNotifications = async () => {
                const batch = window.writeBatch(window.db);
                activeReminders.forEach(rem => batch.update(window.doc(window.db, "reminders", rem.id), { isTriggered: true }));
                await batch.commit();
                setShowNotifications(false);
            };

            // 3. Admin & Functional Logic
            const convertToTask = async () => {
                if (!selectedMessage || !taskDeadline || !taskAssignee) return alert("Select assignee and deadline.");
                await window.setDoc(window.doc(window.db, "messages", selectedMessage.id), {
                    isTask: true,
                    taskData: {
                        deadline: taskDeadline, currentAssignee: taskAssignee, status: "Pending",
                        trail: [{ action: "Task Created", by: user.email, time: new Date().toLocaleTimeString(), to: taskAssignee }]
                    }
                }, { merge: true });
                setActiveModal(null);
            };

            const handleCreateGroup = async (e) => {
                e.preventDefault();
                const members = [...new Set([...groupForm.members, user.email])];
                await window.addDoc(window.collection(window.db, "groups"), { name: groupForm.name, members, admins: [user.email] });
                setActiveModal(null); setGroupForm({ name: "", members: [] });
            };

            const handleUpdateGroupMembers = async (e) => {
                e.preventDefault();
                const finalMembers = [...new Set([...groupForm.members, ...(activeGroup.admins || [])])];
                await window.updateDoc(window.doc(window.db, "groups", activeGroup.id), { members: finalMembers });
                setActiveModal(null);
            };

            const handleFileUpload = async (e) => {
                if (isUploading) return;
                const file = e.target.files[0];
                if (!file) return;
                setIsUploading(true);
                setUploadProgress(0);
                const storageRef = window.ref(window.storage, `chat_uploads/${Date.now()}_${file.name}`);
                const uploadTask = window.uploadBytesResumable(storageRef, file);
                uploadTask.on('state_changed', (s) => setUploadProgress((s.bytesTransferred / s.totalBytes) * 100), 
                () => { setIsUploading(false); alert("Failed."); }, 
                async () => {
                    const url = await window.getDownloadURL(uploadTask.snapshot.ref);
                    await window.addDoc(window.collection(window.db, "messages"), { text: `File: ${file.name}`, senderUid: user.uid, senderEmail: user.email, timestamp: window.serverTimestamp(), fileUrl: url, fileName: file.name, fileType: file.type, groupId: activeGroup.id });
                    setIsUploading(false); setUploadProgress(0);
                });
            };

            const handleAdminDeleteMessage = async (msgId) => {
                if(window.confirm("Delete this record globally?")) await window.deleteDoc(window.doc(window.db, "messages", msgId));
            };

            const checkVisibility = (msg) => {
                if (msg.groupId !== activeGroup.id) return false;
                if (msg.isTask) {
                    if (msg.sender === user.email) return true;
                    if (msg.taskData?.currentAssignee === user.email) return true;
                    if (msg.taskData?.trail?.some(t => t.by === user.email || t.to === user.email)) return true;
                    return false; 
                }
                if (msg.isPrivateMention) return msg.allowedUsers.includes(user.email);
                return true;
            };

            const handleSearchFilter = (msg) => {
                if (!searchQuery.trim()) return true;
                const q = searchQuery.toLowerCase();
                return msg.text?.toLowerCase().includes(q) || msg.sender?.toLowerCase().includes(q) || (msg.isTask && msg.taskData?.currentAssignee?.toLowerCase().includes(q));
            };

            const activeActionableTasks = messages.filter(m => m.isTask && m.taskData?.currentAssignee === user.email && m.taskData?.status !== "Completed");
            const notificationCount = activeActionableTasks.length;

            const handleMessageClick = (msg) => {
                setSelectedMessage(msg);
                setActiveModal(msg.isTask ? 'task_trail' : 'context');
            };

            const setReminder = async () => {
                if (!selectedMessage || !reminderDateTime) return alert("Please select a valid date and time.");
                try {
                    await window.addDoc(window.collection(window.db, "reminders"), {
                        userId: user.uid, userEmail: user.email, messageId: selectedMessage.id,
                        messageText: selectedMessage.text || selectedMessage.fileName || "File Attachment",
                        remindAt: reminderDateTime, isTriggered: false
                    });
                    await window.updateDoc(window.doc(window.db, "messages", selectedMessage.id), { hasReminder: true });
                    setActiveModal(null); setReminderDateTime("");
                } catch (error) { alert("Failed to save reminder."); }
            };

            const filteredAuditMessages = [...messages].reverse().filter(msg => {
                const safeSender = msg.sender || "";
                const safeAssignee = msg.taskData?.currentAssignee || "";
                const safeDate = msg.dateString || "";
                const matchUser = adminFilterUser === "" || safeSender === adminFilterUser || (msg.isTask && safeAssignee === adminFilterUser);
                const matchDate = adminFilterDate === "" || safeDate === adminFilterDate;
                return matchUser && matchDate;
            });

            const myGroups = [{id: "main", name: "Academic Council Group"}, ...groups.filter(g => g.members?.includes(user.email) || currentUserData?.isAdmin)];

            return (
                <div className="flex h-screen w-full bg-white font-sans text-gray-800 overflow-hidden">
                    
                    {viewMode === "admin" ? (
                        /* --- ADMIN CONSOLE --- */
                        <div className="flex flex-col h-full w-full bg-slate-100 overflow-hidden animate-in fade-in">
                            <div className="bg-slate-900 text-white p-4 flex justify-between items-center shrink-0">
                                <div className="flex items-center gap-3"><i className="fa-solid fa-shield-halved text-blue-400 text-xl"></i><h1 className="font-bold">Enterprise Console</h1></div>
                                <button onClick={() => setViewMode("chat")} className="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg text-sm font-bold transition-colors">Exit Admin</button>
                            </div>
                            <div className="flex border-b bg-white shrink-0">
                                {['users', 'groups', 'audit'].map(t => (
                                    <button key={t} onClick={()=>setAdminTab(t)} className={`px-8 py-3 text-xs font-black uppercase tracking-widest ${adminTab === t ? 'border-b-4 border-blue-600 text-blue-600' : 'text-slate-400 hover:text-slate-600 transition-colors'}`}>{t}</button>
                                ))}
                            </div>
                            <div className="flex-1 overflow-y-auto p-6">
                                {adminTab === 'users' && (
                                    <div className="bg-white rounded-2xl shadow-sm border overflow-hidden">
                                        <table className="w-full text-left text-sm">
                                            <thead className="bg-slate-50 text-slate-500 uppercase text-[10px] font-black border-b">
                                                <tr><th className="p-4">Staff Member</th><th className="p-4">Email</th><th className="p-4">Status</th><th className="p-4 text-right">Action</th></tr>
                                            </thead>
                                            <tbody className="divide-y">
                                                {dbUsers.map(u => (
                                                    <tr key={u.uid} className="hover:bg-slate-50">
                                                        <td className="p-4 font-bold">{u.name} {u.isAdmin && <i className="fa-solid fa-star text-yellow-500 text-xs ml-1"></i>}</td>
                                                        <td className="p-4 text-slate-500">{u.email}</td>
                                                        <td className="p-4"><span className={`px-3 py-1 rounded-full text-[10px] font-black ${u.isApproved ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'}`}>{u.isApproved ? 'VERIFIED' : 'PENDING'}</span></td>
                                                        <td className="p-4 text-right">
                                                            <button onClick={() => window.updateDoc(window.doc(window.db, "users", u.uid), { isApproved: !u.isApproved })} className="text-blue-600 mr-4 font-bold text-xs uppercase tracking-tighter">Toggle Auth</button>
                                                            <button onClick={() => { if(window.confirm("Remove user?")) window.deleteDoc(window.doc(window.db, "users", u.uid)); }} className="text-red-500 p-2"><i className="fa-solid fa-trash-can"></i></button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}
                                {adminTab === 'groups' && (
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        {groups.map(g => (
                                            <div key={g.id} className="bg-white p-5 rounded-2xl border shadow-sm flex flex-col justify-between hover:shadow-md transition-shadow">
                                                <div>
                                                    <div className="flex justify-between items-start mb-4">
                                                        <div className="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center text-blue-600 text-xl font-black">{g.name[0]}</div>
                                                        <button onClick={()=>{ if(window.confirm("Dissolve department?")) window.deleteDoc(window.doc(window.db, "groups", g.id)); }} className="text-slate-300 hover:text-red-500"><i className="fa-solid fa-trash-can"></i></button>
                                                    </div>
                                                    <h3 className="font-black text-slate-800 text-lg mb-1">{g.name}</h3>
                                                    <p className="text-xs text-slate-400 font-bold uppercase mb-4">{g.members?.length} Members</p>
                                                </div>
                                                <button onClick={()=>{ setActiveGroup(g); openGroupSettings(); }} className="w-full bg-slate-50 text-slate-600 font-black text-[10px] py-2 rounded-lg uppercase border hover:bg-slate-100 transition-colors">Edit Staff List</button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                {adminTab === 'audit' && (
                                    <div className="bg-white rounded-xl shadow-sm border overflow-hidden max-h-[600px] flex flex-col">
                                        <div className="bg-slate-50 p-4 border-b flex gap-2">
                                            <select value={adminFilterUser} onChange={(e)=>setAdminFilterUser(e.target.value)} className="p-2 border rounded-lg text-xs font-bold outline-none"><option value="">All Users</option>{dbUsers.map(u => <option key={u.uid} value={u.email}>{u.name}</option>)}</select>
                                            <input type="date" value={adminFilterDate} onChange={(e)=>setAdminFilterDate(e.target.value)} className="p-2 border rounded-lg text-xs font-bold outline-none" />
                                        </div>
                                        <div className="flex-1 overflow-y-auto">
                                            <table className="w-full text-left text-sm">
                                                <thead className="bg-slate-50 text-slate-500 text-[10px] uppercase sticky top-0 border-b"><tr><th className="p-4">Time</th><th className="p-4">Type</th><th className="p-4">Content</th><th className="p-4 text-right">Delete</th></tr></thead>
                                                <tbody className="divide-y">
                                                    {filteredAuditMessages.map(msg => (
                                                        <tr key={msg.id} className="hover:bg-slate-50 text-xs">
                                                            <td className="p-4 text-slate-400">{msg.dateString}<br/>{msg.time}</td>
                                                            <td className="p-4 font-black uppercase text-blue-600 tracking-tighter">{msg.isTask ? 'Task' : msg.isPrivateMention ? 'Private' : 'Public'}</td>
                                                            <td className="p-4 italic truncate max-w-[200px] text-slate-700">"{msg.text || msg.fileName}"</td>
                                                            <td className="p-4 text-right"><button onClick={() => handleAdminDeleteMessage(msg.id)} className="text-red-500"><i className="fa-solid fa-trash"></i></button></td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    ) : (
                        /* --- TELEGRAM UI --- */
                        <div className="flex h-full w-full">
                            <div className="hidden md:flex w-72 bg-slate-50 border-r flex-col shrink-0">
                                <div className="p-4 flex items-center gap-3 bg-white border-b shadow-sm z-10">
                                    <div className="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center text-white font-black shadow-inner">{user.email[0].toUpperCase()}</div>
                                    <div className="overflow-hidden"><div className="font-bold text-sm truncate">{currentUserData?.name || user.email.split('@')[0]}</div><div className="text-[10px] text-green-500 font-bold uppercase tracking-widest">Secured</div></div>
                                    <button onClick={()=>setActiveModal('create_group')} className="ml-auto text-blue-500 hover:scale-110 transition-transform"><i className="fa-solid fa-plus-circle text-lg"></i></button>
                                </div>
                                <div className="flex-1 overflow-y-auto py-2">
                                    {myGroups.map(g => (
                                        <div key={g.id} onClick={() => setActiveGroup(g)} className={`flex items-center gap-3 p-3 mx-2 rounded-xl cursor-pointer mb-1 transition-all ${activeGroup.id === g.id ? 'bg-blue-600 text-white shadow-md' : 'hover:bg-slate-200 text-slate-600 font-semibold'}`}>
                                            <div className={`w-10 h-10 rounded-lg flex items-center justify-center font-black shrink-0 shadow-inner ${activeGroup.id === g.id ? 'bg-white/20' : 'bg-slate-100 text-slate-400'}`}>{g.name[0]}</div>
                                            <div className="overflow-hidden"><div className="font-bold text-sm truncate">{g.name}</div><div className={`text-[10px] truncate ${activeGroup.id === g.id ? 'text-white/70' : 'text-slate-400'}`}>{g.id === 'main' ? 'Global' : 'Dept'}</div></div>
                                        </div>
                                    ))}
                                </div>
                                <div className="p-3 border-t bg-white space-y-1">
                                    <button onClick={() => setShowNotifications(!showNotifications)} className="w-full flex items-center gap-3 p-2 rounded-lg text-sm font-bold text-slate-600 hover:bg-slate-100 transition-colors">
                                        <i className="fa-solid fa-bell w-5 text-center"></i> Alerts
                                        {activeReminders.length > 0 && <span className="bg-red-500 text-white text-[10px] px-2 rounded-full ml-auto animate-pulse">{activeReminders.length}</span>}
                                    </button>
                                    {currentUserData?.isAdmin && <button onClick={() => setViewMode("admin")} className="w-full flex items-center gap-3 p-2 rounded-lg text-sm font-bold text-slate-600 hover:bg-slate-100 transition-colors"><i className="fa-solid fa-shield-halved w-5"></i> Dashboard</button>}
                                    <button onClick={onLogout} className="w-full flex items-center gap-3 p-2 rounded-lg text-sm font-bold text-red-500 hover:bg-red-50 transition-colors"><i className="fa-solid fa-power-off w-5"></i> Logout</button>
                                </div>
                            </div>

                            <div className="flex-1 flex flex-col relative h-full bg-white">
                                <div className="h-16 bg-white/90 backdrop-blur-sm border-b flex items-center justify-between px-6 shrink-0 shadow-sm z-10">
                                    <div className="flex items-center gap-3">
                                        <div className="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center text-slate-400 font-black shadow-inner">{activeGroup.name[0]}</div>
                                        <div className="cursor-pointer" onClick={openGroupSettings}>
                                            <h1 className="font-black text-sm">{activeGroup.name}</h1>
                                            <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">{activeGroup.id === 'main' ? 'Broadcast' : `${activeGroup.members?.length} Members`}</p>
                                        </div>
                                    </div>
                                    <div className="hidden md:flex items-center bg-slate-100 rounded-full px-4 py-1.5 border border-slate-200">
                                        <i className="fa-solid fa-magnifying-glass text-slate-400 text-xs"></i>
                                        <input type="text" placeholder="Archive search..." className="bg-transparent outline-none text-xs ml-2 w-32 focus:w-48 transition-all font-bold text-slate-600" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                                    </div>
                                </div>

                                {showNotifications && (
                                    <div className="absolute top-16 right-6 w-80 bg-white rounded-2xl shadow-2xl border z-30 overflow-hidden animate-pop">
                                        <div className="bg-slate-900 text-white p-3 flex justify-between items-center"><span className="font-bold text-xs uppercase tracking-widest">Pending Alerts</span><button onClick={clearAllNotifications} className="text-[10px] bg-white/20 px-2 py-1 rounded font-black hover:bg-white/30 transition-all uppercase">Clear All</button></div>
                                        <div className="max-h-80 overflow-y-auto">
                                            {activeReminders.length === 0 ? <div className="p-8 text-center text-xs text-slate-400 font-bold italic uppercase tracking-widest opacity-50">System Clear</div> : 
                                                activeReminders.map(rem => ( <div key={rem.id} className="p-4 border-b hover:bg-slate-50"><div className="text-[9px] font-black text-blue-600 mb-1 tracking-widest uppercase">⏰ Reminder</div><div className="text-sm text-slate-700 font-semibold leading-snug">"{rem.messageText}"</div></div> ))
                                            }
                                        </div>
                                    </div>
                                )}

                                <div className="flex-1 overflow-y-auto p-4 md:p-10 space-y-6 telegram-bg relative">
                                    {visibleMessages.map((msg) => {
                                        const parentMsg = msg.replyTo ? messages.find(m => m.id === msg.replyTo) : null;
                                        
                                        // Enterprise Visual Bubbles
                                        let bubbleClass = msg.isMine ? "bg-[#e2ffc9] border-l-2 border-green-200 ml-auto rounded-tr-none shadow-sm" : "bg-white border-r-2 border-slate-100 rounded-tl-none shadow-sm";
                                        if (msg.isTask) bubbleClass = "bg-white border-l-4 border-l-blue-600 shadow-xl w-full md:w-[75%]";
                                        if (msg.isPrivateMention) bubbleClass = msg.isMine ? "bg-purple-600 text-white ml-auto shadow-md" : "bg-purple-50 text-purple-900 border-l-4 border-purple-300 shadow-md";
                                        if (msg.replyTo) bubbleClass = msg.isMine ? "bg-[#dcf8c6] ml-auto border-r-4 border-green-400 shadow-sm" : "bg-cyan-50 border-l-4 border-blue-400 shadow-sm";

                                        return (
                                            <div key={msg.id} className={`flex flex-col ${msg.isMine ? 'items-end' : 'items-start'} animate-pop relative group`}>
                                                {!msg.isMine && <div className="text-[10px] font-black text-slate-400 mb-0.5 ml-2 uppercase tracking-widest opacity-80">{msg.sender.split('@')[0]}</div>}
                                                
                                                <div className={`max-w-[90%] md:max-w-[65%] p-3 rounded-[1rem] relative transition-all group-hover:shadow-md ${bubbleClass}`}>
                                                    
                                                    {/* Thread / Reply Context */}
                                                    {parentMsg && (
                                                        <div className="mb-3 p-2 rounded-xl bg-black/5 border-l-2 border-blue-400 text-[11px] overflow-hidden opacity-70">
                                                            <div className="font-black text-blue-600 mb-0.5 flex justify-between uppercase tracking-tighter"><span>{parentMsg.sender.split('@')[0]}</span><span>Thread #{msg.threadNumber}</span></div>
                                                            <div className="truncate font-bold italic">"{parentMsg.text || parentMsg.fileName}"</div>
                                                        </div>
                                                    )}

                                                    {msg.isPrivateMention && <div className="text-[9px] font-black uppercase mb-1 flex items-center gap-1.5 opacity-60 tracking-widest"><i className="fa-solid fa-lock"></i> Private Access</div>}
                                                    
                                                    <div onClick={() => handleMessageClick(msg)} className="cursor-pointer">
                                                        {msg.isTask ? (
                                                            <div>
                                                                <div className="flex justify-between items-center mb-3"><span className="text-[10px] font-black bg-blue-100 text-blue-600 px-2 py-0.5 rounded-lg tracking-widest">OFFICIAL TASK</span><span className={`text-[9px] uppercase font-black px-2 py-0.5 rounded-full ${msg.taskData.status === 'Completed' ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-400'}`}>{msg.taskData.status}</span></div>
                                                                <p className="text-[15px] font-bold mb-3 leading-snug">{msg.text}</p>
                                                                <div className="bg-slate-50 p-2.5 rounded-xl text-[10px] flex justify-between border font-black uppercase tracking-tighter"><span className="text-slate-500"><i className="fa-regular fa-user mr-1.5"></i>{msg.taskData.currentAssignee.split('@')[0]}</span><span className="text-red-500"><i className="fa-regular fa-clock mr-1.5"></i>DUE: {new Date(msg.taskData.deadline).toLocaleDateString()}</span></div>
                                                            </div>
                                                        ) : (
                                                            msg.fileUrl ? ( msg.fileType?.startsWith('image/') ? <img src={msg.fileUrl} className="rounded-xl mb-1 max-h-72 w-full object-cover border" /> : <div className="flex items-center gap-4 p-4 bg-white/50 rounded-2xl border-2 border-dashed border-slate-200 hover:bg-white transition-colors"><div className="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center text-blue-600 shadow-sm"><i className="fa-solid fa-file-invoice text-2xl"></i></div><div className="text-[11px] font-black truncate text-slate-600 uppercase tracking-tighter">{msg.fileName}</div></div> ) : <p className="text-[15px] font-medium leading-relaxed whitespace-pre-wrap text-slate-800">{msg.text}</p>
                                                        )}
                                                    </div>

                                                    <div className="flex items-center justify-end gap-1.5 mt-2 text-[9px] font-black opacity-30 uppercase tracking-tighter">
                                                        {msg.hasReminder && <i className="fa-regular fa-clock text-amber-600"></i>}
                                                        <span>{msg.time}</span>
                                                        {msg.isMine && <i className="fa-solid fa-check-double text-blue-500"></i>}
                                                    </div>

                                                    {/* Emoji Interaction Tray */}
                                                    <div className="absolute -bottom-3 left-2 flex gap-1.5 z-10">
                                                        {Object.entries(msg.reactions || {}).map(([emoji, users]) => users.length > 0 && (
                                                            <div key={emoji} onClick={(e)=>{e.stopPropagation(); handleReaction(msg.id, emoji);}} className="bg-white border-2 border-slate-50 rounded-full px-2 py-0.5 text-[11px] shadow-sm flex items-center gap-1.5 hover:scale-110 transition-all font-black cursor-pointer">{emoji} <span>{users.length}</span></div>
                                                        ))}
                                                    </div>

                                                    {/* Hover Panel */}
                                                    <div className={`absolute top-1 ${msg.isMine ? '-left-20' : '-right-20'} opacity-0 group-hover:opacity-100 transition-opacity flex gap-1 bg-white/90 shadow-xl border p-1 z-20 rounded-xl`}>
                                                        <button onClick={(e)=>{e.stopPropagation(); setReplyingTo(msg); setTimeout(()=>document.getElementById('chatInput').focus(),50);}} className="w-7 h-7 rounded-lg hover:bg-slate-100 flex items-center justify-center text-xs text-slate-600 transition-colors" title="Thread Reply"><i className="fa-solid fa-reply"></i></button>
                                                        <button onClick={(e)=>{e.stopPropagation(); handleReaction(msg.id, '👍');}} className="w-7 h-7 rounded-lg hover:bg-slate-100 flex items-center justify-center text-[12px] transition-transform active:scale-125">👍</button>
                                                        <button onClick={(e)=>{e.stopPropagation(); handleReaction(msg.id, '❤️');}} className="w-7 h-7 rounded-lg hover:bg-slate-100 flex items-center justify-center text-[12px] transition-transform active:scale-125">❤️</button>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                    <div ref={messagesEndRef} className="h-10"></div>
                                </div>

                                {/* Ergonomic Input Bar */}
                                <div className="bg-white border-t p-4 shrink-0 z-10 shadow-[0_-8px_20px_rgba(0,0,0,0.02)]">
                                    {replyingTo && (
                                        <div className="p-3 mb-3 bg-blue-50 border-l-[6px] border-blue-500 rounded-2xl flex justify-between items-center animate-pop mx-2">
                                            <div className="text-[11px] overflow-hidden"><div className="font-black text-blue-700 uppercase tracking-widest mb-0.5">Thread Ref: {replyingTo.sender.split('@')[0]}</div><div className="truncate font-bold text-slate-500 italic opacity-80">"{replyingTo.text || replyingTo.fileName}"</div></div>
                                            <button onClick={()=>setReplyingTo(null)} className="text-slate-400 p-2 hover:text-red-500 transition-colors"><i className="fa-solid fa-circle-xmark text-xl"></i></button>
                                        </div>
                                    )}
                                    <div className="flex items-end gap-4 max-w-6xl mx-auto">
                                        <button className="p-3 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-2xl transition-all mb-1" onClick={() => fileInputRef.current.click()} disabled={isUploading}><i className="fa-solid fa-paperclip text-2xl"></i></button>
                                        <input type="file" ref={fileInputRef} className="hidden" onChange={handleFileUpload} />
                                        <div className="flex-1 bg-slate-100 rounded-[1.5rem] p-2 transition-all border-2 border-transparent focus-within:border-blue-400 focus-within:bg-white shadow-inner">
                                            <textarea id="chatInput" placeholder="Write message... (Enter to Send)" className="bg-transparent w-full outline-none text-[15px] px-3 py-2 resize-none max-h-40 font-bold text-slate-700" rows="1" value={inputText} onChange={(e) => setInputText(e.target.value)} onKeyDown={handleKeyDown} onInput={(e) => { e.target.style.height = 'auto'; e.target.style.height = (e.target.scrollHeight) + 'px'; }} />
                                        </div>
                                        <button onClick={handleSendMessage} className="w-14 h-14 bg-blue-600 text-white rounded-[1.5rem] flex items-center justify-center shadow-xl shadow-blue-200 hover:bg-blue-700 active:scale-95 transition-all shrink-0 mb-1"><i className="fa-solid fa-paper-plane text-xl"></i></button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ENTERPRISE MODALS */}
                    {activeModal === 'create_group' && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[100] flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-md rounded-[2.5rem] p-10 shadow-2xl animate-pop border-t-[10px] border-blue-600">
                                <h3 className="font-black text-2xl mb-8 flex items-center gap-4 text-slate-900 uppercase tracking-tight"><i className="fa-solid fa-building-circle-check text-blue-600"></i> New Dept</h3>
                                <form onSubmit={handleCreateGroup} className="space-y-6">
                                    <input required placeholder="Department Identifier" className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-3xl outline-none font-black text-slate-700 transition-all focus:border-blue-400" value={groupForm.name} onChange={(e)=>setGroupForm({...groupForm, name: e.target.value})} />
                                    <div className="h-48 overflow-y-auto border-2 border-slate-50 p-2 rounded-[1.5rem] bg-slate-50 space-y-1 shadow-inner">
                                        {dbUsers.map(u => ( <label key={u.uid} className={`flex items-center gap-4 p-4 rounded-2xl cursor-pointer transition-all ${groupForm.members.includes(u.email) ? 'bg-blue-600 text-white shadow-xl shadow-blue-100' : 'hover:bg-white text-slate-500 font-bold'}`}><input type="checkbox" className="hidden" checked={groupForm.members.includes(u.email)} onChange={(e)=>setGroupForm({...groupForm, members: e.target.checked ? [...groupForm.members, u.email] : groupForm.members.filter(m=>m!==u.email)})} /><div className={`w-10 h-10 rounded-xl flex items-center justify-center font-black text-sm ${groupForm.members.includes(u.email) ? 'bg-white/20' : 'bg-slate-200'}`}>{u.name[0]}</div><span className="text-sm">{u.name}</span></label> ))}
                                    </div>
                                    <button type="submit" className="w-full bg-blue-600 text-white py-6 rounded-3xl font-black shadow-2xl shadow-blue-200 uppercase tracking-[0.2em] transition-all hover:bg-blue-700">Establish Dept</button>
                                    <button type="button" onClick={()=>setActiveModal(null)} className="w-full font-black text-slate-300 py-1 uppercase text-xs tracking-widest hover:text-slate-400">Close</button>
                                </form>
                            </div>
                        </div>
                    )}
                    
                    {activeModal === 'task_convert' && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[100] flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-lg rounded-[3rem] p-12 shadow-2xl animate-pop border-t-[10px] border-blue-600">
                                <h3 className="font-black text-3xl mb-8 text-slate-900 uppercase tracking-tighter">Allocate Task</h3>
                                <div className="space-y-8">
                                    <div className="p-5 bg-slate-50 border-2 border-slate-100 rounded-3xl italic font-bold text-slate-500 text-sm leading-relaxed">"{selectedMessage?.text}"</div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div><label className="text-[10px] font-black uppercase text-slate-400 tracking-[0.2em] block mb-3 ml-2">Assignee</label><select className="w-full p-5 bg-slate-100 rounded-2xl font-black text-sm outline-none border-2 border-transparent focus:border-blue-500 transition-all" value={taskAssignee} onChange={(e)=>setTaskAssignee(e.target.value)}><option value="">Select Staff...</option>{dbUsers.map(u => <option key={u.uid} value={u.email}>{u.name}</option>)}</select></div>
                                        <div><label className="text-[10px] font-black uppercase text-slate-400 tracking-[0.2em] block mb-3 ml-2">Deadline</label><input type="datetime-local" className="w-full p-5 bg-slate-100 rounded-2xl font-black text-sm outline-none border-2 border-transparent focus:border-blue-500 transition-all" value={taskDeadline} onChange={(e)=>setTaskDeadline(e.target.value)} /></div>
                                    </div>
                                    <button onClick={convertToTask} className="w-full bg-blue-600 text-white py-6 rounded-3xl font-black shadow-2xl shadow-blue-200 uppercase tracking-[0.2em] transition-all hover:bg-blue-700">Dispatch Directive</button>
                                    <button onClick={()=>setActiveModal(null)} className="w-full font-black text-slate-300 py-2 uppercase text-xs tracking-widest hover:text-slate-400 transition-all">Cancel Transfer</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {activeModal === 'group_settings' && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-md rounded-[2.5rem] p-10 shadow-2xl animate-pop border-t-[8px] border-blue-600">
                                <div className="flex items-center justify-between mb-8 border-b pb-4"><h3 className="font-black text-xl text-slate-900 uppercase tracking-tighter"><i className="fa-solid fa-users-gear text-blue-600 mr-3"></i> {activeGroup.name}</h3><i className="fa-solid fa-circle-xmark cursor-pointer text-slate-300 hover:text-slate-500 text-2xl transition-colors" onClick={() => setActiveModal(null)}></i></div>
                                <div className="space-y-6">
                                    <div className="h-64 overflow-y-auto border-2 border-slate-50 p-3 rounded-[1.8rem] bg-slate-50 space-y-2 shadow-inner">
                                        {dbUsers.map(u => {
                                            const isStaffMember = activeGroup.members?.includes(u.email);
                                            const isAlreadyAdmin = activeGroup.admins?.includes(u.email);
                                            return ( <label key={u.uid} className={`flex items-center gap-4 p-4 rounded-2xl cursor-pointer transition-all ${groupForm.members.includes(u.email) ? 'bg-blue-600 text-white shadow-lg' : 'hover:bg-white text-slate-500 font-bold'}`}><input type="checkbox" className="hidden" disabled={isAlreadyAdmin} checked={groupForm.members.includes(u.email)} onChange={(e)=>{ const members = e.target.checked ? [...groupForm.members, u.email] : groupForm.members.filter(m=>m!==u.email); setGroupForm({...groupForm, members}); }} /><div className={`w-10 h-10 rounded-xl flex items-center justify-center font-black text-xs ${groupForm.members.includes(u.email) ? 'bg-white/20' : 'bg-slate-200'}`}>{u.name[0]}</div><span className="text-sm font-black">{u.name} {isAlreadyAdmin && '⭐'}</span></label> );
                                        })}
                                    </div>
                                    <button onClick={handleUpdateGroupMembers} className="w-full bg-slate-900 text-white py-5 rounded-3xl font-black shadow-xl uppercase tracking-widest hover:bg-slate-800 transition-all">Update Authorized Staff</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function App() {
            const [user, setUser] = useState(null);
            const [ready, setReady] = useState(false);
            const [email, setEmail] = useState("");
            const [pass, setPass] = useState("");
            const [err, setErr] = useState("");

            useEffect(() => {
                const setup = () => { 
                    if (window.auth && window.onAuthStateChanged) {
                        window.onAuthStateChanged(window.auth, (u) => { setUser(u); setReady(true); });
                    }
                };
                if (window.auth && window.onAuthStateChanged) setup(); 
                else window.addEventListener('firebaseReady', setup);
                return () => window.removeEventListener('firebaseReady', setup);
            }, []);

            const authenticate = (mode) => {
                setErr("");
                if (!email || !pass) return setErr("Staff ID and Passkey required.");
                const act = mode === 'in' ? window.signInWithEmailAndPassword : window.createUserWithEmailAndPassword;
                act(window.auth, email, pass).catch(e => setErr(e.message));
            };

            if (!ready) return <div className="h-screen w-full flex flex-col items-center justify-center bg-slate-900 text-blue-400 font-black tracking-[0.5em] uppercase text-xs animate-pulse"><i className="fa-solid fa-satellite-dish text-4xl mb-8 animate-bounce"></i> Syncing Node...</div>;

            if (!user) return (
                <div className="h-screen w-full flex items-center justify-center telegram-bg p-4">
                    <div className="w-full max-w-md bg-white rounded-[4rem] shadow-2xl p-14 flex flex-col items-center border-t-[12px] border-blue-600 animate-pop">
                        <div className="w-24 h-24 bg-blue-600 rounded-[2.2rem] flex items-center justify-center text-white text-4xl shadow-2xl shadow-blue-200 mb-10"><i className="fa-solid fa-building-circle-check"></i></div>
                        <h1 className="text-3xl font-black text-slate-900 mb-2">Corporate Node</h1>
                        <p className="text-[11px] text-slate-400 font-black mb-12 uppercase tracking-[0.4em] text-center ml-1">MPGS Academic Portal</p>
                        {err && <div className="w-full bg-red-50 text-red-500 p-5 rounded-3xl text-[10px] font-black border border-red-100 mb-8 text-center leading-relaxed">{err}</div>}
                        <div className="w-full space-y-5">
                            <input type="email" placeholder="Corporate ID" className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-3xl outline-none focus:border-blue-500 font-black text-base transition-all shadow-inner" value={email} onChange={(e)=>setEmail(e.target.value)} />
                            <input type="password" placeholder="Passkey" className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-3xl outline-none focus:border-blue-500 font-black text-base transition-all shadow-inner" value={pass} onChange={(e)=>setPass(e.target.value)} />
                            <div className="flex gap-4 pt-8">
                                <button onClick={()=>authenticate('in')} className="flex-1 bg-blue-600 text-white py-6 rounded-3xl font-black shadow-2xl shadow-blue-100 hover:bg-blue-700 transition-all uppercase tracking-widest text-xs">Authorize</button>
                                <button onClick={()=>authenticate('up')} className="flex-1 bg-white border-2 border-slate-200 text-slate-400 py-6 rounded-3xl font-black hover:bg-slate-50 transition-all uppercase tracking-widest text-xs">Request</button>
                            </div>
                        </div>
                    </div>
                </div>
            );

            return <ChatApp user={user} onLogout={() => window.signOut(window.auth)} />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
