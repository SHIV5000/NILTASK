<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talk & Task - Enterprise Edition</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Load React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Load jsPDF for Beautiful PDF Generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <!-- Initialize Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, updateDoc, setDoc, getDocs, where, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAoOsog2NP6Pf8YNSxn0rRYK4MSLEVNNZc",
            authDomain: "niltask.firebaseapp.com",
            projectId: "niltask",
            storageBucket: "niltask.firebasestorage.app",
            messagingSenderId: "868641827920",
            appId: "1:868641827920:web:70d9db79a361a76468f555"
        };

        const app = initializeApp(firebaseConfig);
        window.auth = getAuth(app);
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
        window.signOut = signOut;
        window.onAuthStateChanged = onAuthStateChanged;
        
        window.secondaryApp = initializeApp(firebaseConfig, "Secondary");
        window.secondaryAuth = getAuth(window.secondaryApp);

        window.db = getFirestore(app);
        window.collection = collection;
        window.addDoc = addDoc;
        window.onSnapshot = onSnapshot;
        window.query = query;
        window.orderBy = orderBy;
        window.serverTimestamp = serverTimestamp;
        window.doc = doc;
        window.updateDoc = updateDoc;
        window.setDoc = setDoc;
        window.getDocs = getDocs;
        window.where = where;
        window.deleteDoc = deleteDoc;
        
        window.storage = getStorage(app);
        window.ref = ref;
        window.uploadBytesResumable = uploadBytesResumable;
        window.getDownloadURL = getDownloadURL;

        window.dispatchEvent(new Event('firebaseReady'));
    </script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif !important; background-color: #f3f4f6; color: #1e293b; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.2); }
        .wa-bg { background-color: #f8fafc; scroll-behavior: smooth; }
        .highlight-msg { transition: background-color 1s ease-out; transform: translateZ(0); }
        .glass-header { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
    </style>
</head>
<body class="overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;
        const notificationSound = new Audio('https://cdn.freesound.org/previews/536/536420_4397472-lq.mp3');

        const toSentenceCase = (str) => {
            if (!str) return "";
            return str.toLowerCase().replace(/(^\w{1})|(\s+\w{1})/g, letter => letter.toUpperCase());
        };

        // ========== AUTH COMPONENT ==========
        function AuthPage({ onLogin }) {
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [isLogin, setIsLogin] = useState(true);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState("");

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError("");
                setLoading(true);

                try {
                    let user;
                    if (isLogin) {
                        const result = await window.signInWithEmailAndPassword(window.auth, email, password);
                        user = result.user;
                    } else {
                        const result = await window.createUserWithEmailAndPassword(window.auth, email, password);
                        user = result.user;
                        await window.setDoc(window.doc(window.db, "users", user.uid), {
                            uid: user.uid,
                            email: user.email,
                            name: toSentenceCase(email.split('@')[0]),
                            isAdmin: false,
                            isApproved: false,
                            fontSize: "text-[15px] md:text-[16px]",
                            fontFamily: "font-sans",
                            lastActive: window.serverTimestamp()
                        });
                    }
                    onLogin(user);
                } catch (err) {
                    setError(err.message);
                }
                setLoading(false);
            };

            return (
                <div className="flex items-center justify-center h-screen bg-gradient-to-br from-[#008069] to-teal-600 p-4">
                    <div className="w-full max-w-md bg-white rounded-3xl shadow-2xl p-8">
                        <h1 className="text-3xl font-bold text-center mb-2 text-slate-800">Talk & Task</h1>
                        <p className="text-center text-slate-500 mb-8">Enterprise Communication & Task Manager</p>
                        
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <input
                                type="email"
                                placeholder="Email"
                                value={email}
                                onChange={(e) => setEmail(e.target.value)}
                                className="w-full px-4 py-3 border border-slate-300 rounded-xl focus:outline-none focus:border-[#008069] transition"
                                required
                            />
                            <input
                                type="password"
                                placeholder="Password"
                                value={password}
                                onChange={(e) => setPassword(e.target.value)}
                                className="w-full px-4 py-3 border border-slate-300 rounded-xl focus:outline-none focus:border-[#008069] transition"
                                required
                            />
                            {error && <p className="text-red-600 text-sm">{error}</p>}
                            <button
                                type="submit"
                                disabled={loading}
                                className="w-full bg-[#008069] hover:bg-[#006e5a] text-white font-bold py-3 rounded-xl transition disabled:opacity-50"
                            >
                                {loading ? "Loading..." : isLogin ? "Sign In" : "Sign Up"}
                            </button>
                        </form>
                        
                        <div className="mt-6 text-center">
                            <button
                                onClick={() => setIsLogin(!isLogin)}
                                className="text-[#008069] hover:underline font-semibold"
                            >
                                {isLogin ? "Need an account? Sign Up" : "Have an account? Sign In"}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // ========== ADMIN FUNCTIONS (PLACEHOLDER) ==========
        function ChatApp({ user, onLogout }) {
            const [activeModal, setActiveModal] = useState(null);
            const [messages, setMessages] = useState([]);
            const [currentUserData, setCurrentUserData] = useState(null);
            const [groups, setGroups] = useState([]);
            const [activeGroup, setActiveGroup] = useState({ id: "demo", name: "Demo" });
            const [inputText, setInputText] = useState("");
            const [dbUsers, setDbUsers] = useState([]);
            const [viewMode, setViewMode] = useState("chat");

            // MISSING FUNCTION - ADD THIS
            const handleRemoveUser = async (uid) => {
                if(window.confirm("Permanently remove this user?")) {
                    try {
                        await window.deleteDoc(window.doc(window.db, "users", uid));
                        alert("User removed successfully");
                    } catch(error) { 
                        alert("Failed to remove user: " + error.message); 
                    }
                }
            };

            const logImmutableAction = useCallback(async (actionType, content, target = "") => {
                try {
                    await window.addDoc(window.collection(window.db, "audit_logs"), {
                        type: actionType, 
                        user: user.email, 
                        content: content, 
                        target: target,
                        groupId: activeGroup.id, 
                        groupName: activeGroup.name, 
                        timestamp: window.serverTimestamp()
                    });
                } catch(e) { console.error("Audit Log Error:", e); }
            }, [user.email, activeGroup.id, activeGroup.name]);

            // Initialize user data
            useEffect(() => {
                const unsubCurrent = window.onSnapshot(window.doc(window.db, "users", user.uid), (doc) => {
                    if (doc.exists()) {
                        setCurrentUserData(doc.data());
                    }
                });
                return () => unsubCurrent();
            }, [user.uid]);

            // Load groups
            useEffect(() => {
                const unsubGroups = window.onSnapshot(window.collection(window.db, "groups"), (snapshot) => {
                    const fetchedGroups = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setGroups(fetchedGroups);
                });
                return () => unsubGroups();
            }, []);

            // Load messages
            useEffect(() => {
                const q = window.query(window.collection(window.db, "messages"), window.orderBy("timestamp", "asc"));
                const unsubscribe = window.onSnapshot(q, (snapshot) => {
                    const loadedMessages = snapshot.docs.map(doc => {
                        const data = doc.data();
                        return { 
                            id: doc.id, 
                            ...data, 
                            sender: data.senderEmail, 
                            isMine: data.senderUid === user.uid, 
                            time: data.timestamp ? new Date(data.timestamp.toDate()).toLocaleTimeString() : '' 
                        };
                    });
                    setMessages(loadedMessages);
                });
                return () => unsubscribe();
            }, [user.uid]);

            const handleSendMessage = async () => {
                if (!inputText.trim()) return;
                try {
                    await window.addDoc(window.collection(window.db, "messages"), {
                        text: inputText,
                        senderUid: user.uid,
                        senderEmail: user.email,
                        timestamp: window.serverTimestamp(),
                        groupId: activeGroup.id,
                        reactions: {},
                        seenBy: [user.email]
                    });
                    setInputText("");
                } catch (error) {
                    alert("Failed to send message");
                }
            };

            if (currentUserData && currentUserData.isApproved !== true && currentUserData.isAdmin !== true) {
                return (
                    <div className="flex items-center justify-center h-screen bg-gray-100">
                        <div className="text-center bg-white p-8 rounded-3xl shadow-lg">
                            <p className="text-2xl font-bold text-slate-800 mb-4">Pending Approval</p>
                            <p className="text-slate-600">Your account is waiting for admin approval.</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen w-full bg-[#f3f4f6]">
                    {/* Sidebar */}
                    <div className="hidden md:flex w-80 bg-[#f8fafc] border-r border-slate-200 flex-col">
                        <div className="p-5 border-b">
                            <h2 className="font-bold text-slate-800">{toSentenceCase(user.email.split('@')[0])}</h2>
                            <p className="text-sm text-slate-500">{user.email}</p>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-2">
                            {groups.map(g => (
                                <div key={g.id} onClick={() => setActiveGroup(g)} className={`p-3 rounded-lg cursor-pointer ${activeGroup.id === g.id ? 'bg-[#008069] text-white' : 'hover:bg-slate-100'}`}>
                                    {g.name}
                                </div>
                            ))}
                        </div>
                        <div className="p-3 border-t space-y-2">
                            {currentUserData?.isAdmin && (
                                <button onClick={() => setViewMode("admin")} className="w-full bg-slate-200 hover:bg-slate-300 px-4 py-2 rounded-lg">
                                    Admin Panel
                                </button>
                            )}
                            <button onClick={onLogout} className="w-full bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg">
                                Logout
                            </button>
                        </div>
                    </div>

                    {/* Chat Area */}
                    <div className="flex-1 flex flex-col">
                        <div className="flex-1 overflow-y-auto p-4 space-y-2">
                            {messages.filter(m => m.groupId === activeGroup.id).map(msg => (
                                <div key={msg.id} className={`flex ${msg.isMine ? 'justify-end' : 'justify-start'}`}>
                                    <div className={`max-w-xs p-3 rounded-lg ${msg.isMine ? 'bg-[#dcfce7]' : 'bg-white border border-slate-200'}`}>
                                        {!msg.isMine && <div className="text-xs font-bold text-[#008069] mb-1">{toSentenceCase(msg.sender.split('@')[0])}</div>}
                                        <p>{msg.text}</p>
                                        <div className="text-xs text-slate-500 mt-1">{msg.time}</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="p-4 border-t flex gap-2">
                            <input
                                type="text"
                                value={inputText}
                                onChange={(e) => setInputText(e.target.value)}
                                onKeyDown={(e) => e.key === 'Enter' && handleSendMessage()}
                                placeholder="Type a message..."
                                className="flex-1 px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-[#008069]"
                            />
                            <button onClick={handleSendMessage} className="bg-[#008069] hover:bg-[#006e5a] text-white px-6 py-2 rounded-lg font-bold">
                                Send
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // ========== MAIN APP WRAPPER ==========
        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const unsubscribe = window.onAuthStateChanged(window.auth, (currentUser) => {
                    setUser(currentUser);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            if (loading) return <div className="flex items-center justify-center h-screen"><p>Loading...</p></div>;

            return user ? (
                <ChatApp user={user} onLogout={() => window.signOut(window.auth)} />
            ) : (
                <AuthPage onLogin={setUser} />
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        window.addEventListener('firebaseReady', () => {
            root.render(<App />);
        });
    </script>
</body>
</html>
