    <style>
        /* WhatsApp‑style custom scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #c0c0c0; border-radius: 10px; }

            background-color: #f0f2f5;
            background-image: radial-gradient(circle at 10% 30%, rgba(0,0,0,0.02) 2%, transparent 2.5%);
            background-size: 40px 40px;
        }
        /* Message bubbles – WhatsApp style */
        .bubble-sent {
            background: #d9fdd3;
            color: #111b21;
            border-radius: 18px 6px 18px 18px;
            box-shadow: 0 1px 0.5px rgba(0,0,0,0.05);
        }
        .bubble-received {
            background: white;
            color: #111b21;
            border-radius: 6px 18px 18px 18px;

        }

            opacity: 1;
        }

            opacity: 0;

        }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

            const filteredAuditMessages = [...messages].reverse().filter(msg => { const safeSender = msg.sender || ""; const safeAssignee = msg.taskData?.currentAssignee || ""; const safeDate = msg.dateString || ""; const matchUser = adminFilterUser === "" || safeSender === adminFilterUser || (msg.isTask && safeAssignee === adminFilterUser); const matchDate = adminFilterDate === "" || safeDate === adminFilterDate; return matchUser && matchDate; });
            let visibleMessages = messages.filter(checkVisibility).filter(handleSearchFilter);
            let messagesToRender = visibleMessages.filter(m => { if (chatFilter === 'tasks-pending') return m.isTask && m.taskData?.status !== 'Completed'; if (chatFilter === 'tasks-completed') return m.isTask && m.taskData?.status === 'Completed'; if (chatFilter === 'messages') return !m.isTask && !m.fileUrl; if (chatFilter === 'today') return m.dateString === new Date().toISOString().split('T')[0]; return true; });
            const getBubbleStyles = (msg) => { if (msg.isTask) return "bg-white border-l-4 border-green-500 shadow-sm"; if (msg.isPrivateMention) return msg.isMine ? "bg-[#e1f7e1] border border-green-200" : "bg-white border border-gray-200"; return msg.isMine ? "bubble-sent" : "bubble-received"; };

            const renderMessageNode = (msg) => {
                const hasReactions = Object.keys(msg.reactions || {}).length > 0;

                return (
                    <div id={`msg-${msg.id}`} className={`msg-wrapper relative flex ${msg.isMine ? 'justify-end' : 'justify-start'} mb-3`}>

                        {msg.isMine && ( <div className="flex flex-col items-end max-w-[85%]"><div className={`p-3 ${getBubbleStyles(msg)}`} onClick={()=>handleMessageClick(msg)}>{msg.replyToId && (<div className="text-[10px] border-l-2 border-gray-300 pl-2 mb-1 italic text-gray-500">{msg.originalSender}: {msg.originalText}</div>)}{isEditingThis ? (<textarea value={editMessageText} onChange={e=>setEditMessageText(e.target.value)} className="w-full p-1 border rounded" rows="2"/><div className="flex gap-1 mt-1"><button onClick={()=>setEditingMessageId(null)} className="text-xs text-gray-500">Cancel</button><button onClick={()=>handleSaveEdit(msg.id)} className="text-xs bg-green-600 text-white px-2 rounded">Save</button></div>) : (<div>{msg.fileUrl ? (msg.fileType?.startsWith('image/') ? <img src={msg.fileUrl} className="max-h-48 rounded cursor-pointer" onClick={e=>{e.stopPropagation(); window.open(msg.fileUrl);}}/> : <div className="flex items-center gap-2"><i className="fa-regular fa-file-lines"></i> {msg.fileName}</div>) : <p className="whitespace-pre-wrap">{msg.text}</p>}<div className="flex justify-end gap-1 text-[10px] text-gray-400 mt-1"><span>{msg.time}</span>{msg.isEdited && <i className="fa-regular fa-pen-to-square"></i>}{msg.hasReminder && <i className="fa-regular fa-bell"></i>}</div></div>)}</div><div className="text-[10px] text-gray-400 mt-0.5 mr-1">{msg.time}</div></div> )}
                        <ActionBar />

                    </div>
                );
            };
            
            const myGroups = [{id: "main", name: "Academic Council Group"}, ...groups.filter(g => g.members?.includes(user.email) || currentUserData?.isAdmin)];
            const myActiveTasksSidebar = messages.filter(m => m.isTask && m.taskData?.currentAssignee === user.email && m.taskData?.status !== "Completed").sort((a,b) => new Date(a.taskData.deadline) - new Date(b.taskData.deadline));
            
            // ========== RENDER ADMIN DASHBOARD (unchanged but styled minimally) ==========
            if (viewMode === "admin") {

ength||0} members</span></div>)}<button onClick={()=>setActiveModal('create_group')} className="mt-4 bg-green-600 text-white px-3 py-1 rounded w-full">+ New Group</button></div></div><div className="mt-6 bg-white rounded-xl p-4"><h2 className="font-bold mb-3">Audit Log</h2><div className="overflow-auto max-h-96"><table className="w-full text-sm"><thead className="bg-gray-50"><tr><th>Date</th><th>From</th><th>Content</th><th>Type</th><th></th></tr></thead><tbody>{filteredAuditMessages.map(msg=><tr key={msg.id} className="border-b"><td className="p-2 text-xs">{msg.dateString}<br/>{msg.time}</td><td className="p-2">{msg.sender?.split('@')[0]}</td><td className="truncate max-w-xs">{msg.text}</td><td className="p-2">{msg.isTask?"Task":"Msg"}</td><td className="p-2"><button onClick={()=>handleAdminDeleteMessage(msg.id)} className="text-red-400 text-xs">Del</button></td></tr>)}</tbody></table></div></div></div></div> );
            }
            
            // ========== MAIN CHAT UI – WHATSAPP STYLE ==========
            return (
                <div className="flex h-screen bg-[#f0f2f5]">
                    {/* Sidebar */}
                    <div className="hidden md:flex w-80 bg-white border-r flex-col">
                        <div className="p-4 border-b flex items-center gap-3">
                            <div className="w-10 h-10 rounded-full bg-green-600 text-white flex items-center justify-center font-bold text-lg">{user.email[0].toUpperCase()}</div>
                            <div className="flex-1"><h2 className="font-semibold">{currentUserData?.name || user.email.split('@')[0]}</h2><p className="text-xs text-gray-500">{user.email}</p></div>
                            {(currentUserData?.isAdmin || currentUserData?.canCreateGroups) && <button onClick={()=>setActiveModal('group_form_modal')} className="text-green-600"><i className="fa-solid fa-plus"></i></button>}
                        </div>
                        <div className="flex-1 overflow-auto p-2">
                            {myGroups.map(g => (
                                <div key={g.id} onClick={() => setActiveGroup(g)} className={`sidebar-item flex items-center gap-3 p-3 rounded-lg cursor-pointer ${activeGroup.id === g.id ? 'active bg-[#edf3f7]' : 'hover:bg-gray-100'}`}>
                                    <div className={`w-10 h-10 rounded-full flex items-center justify-center text-white text-sm font-bold ${g.id==='main' ? 'bg-green-600' : 'bg-blue-500'}`}>{g.name[0].toUpperCase()}</div>
                                    <div><div className="font-medium">{g.name}</div><div className="text-xs text-gray-400">{g.id==='main' ? 'Company' : `${g.members?.length||0} members`}</div></div>
                                </div>

                        </div>
                        <div className="p-4 border-t space-y-2">
                            <button onClick={()=>setShowNotifications(!showNotifications)} className="w-full flex items-center gap-3 p-2 rounded-lg hover:bg-gray-100"><i className="fa-regular fa-bell"></i> Notifications {totalNotifications>0 && <span className="bg-red-500 text-white text-xs px-2 rounded-full ml-auto">{totalNotifications}</span>}</button>
                            {currentUserData?.isAdmin && <button onClick={()=>setViewMode("admin")} className="w-full flex items-center gap-3 p-2 rounded-lg hover:bg-gray-100"><i className="fa-solid fa-chart-simple"></i> Admin</button>}
                            <button onClick={onLogout} className="w-full flex items-center gap-3 p-2 rounded-lg text-red-500 hover:bg-red-50"><i className="fa-solid fa-arrow-right-from-bracket"></i> Logout</button>
                        </div>
                    </div>
                    
                    {/* Main chat */}
                    <div className="flex-1 flex flex-col relative">
                        <div className="h-16 bg-white px-4 flex items-center justify-between shadow-sm border-b">
                            <div className="flex items-center gap-3">
                                <div className={`w-9 h-9 rounded-full flex items-center justify-center text-white font-bold ${activeGroup.id==='main' ? 'bg-green-600' : 'bg-blue-500'}`}>{activeGroup.name[0].toUpperCase()}</div>
                                <div><h1 className="font-semibold">{activeGroup.name}</h1><p className="text-xs text-gray-400">{activeGroup.id==='main' ? 'All staff' : `${activeGroup.members?.length||0} participants`}</p></div>
                            </div>
                            <div className="relative"><i className="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i><input type="text" placeholder="Search" className="pl-9 pr-4 py-2 bg-gray-100 rounded-full text-sm w-44 focus:w-64 outline-none" value={searchQuery} onChange={e=>setSearchQuery(e.target.value)}/></div>
                        </div>
                        
                        {showNotifications && ( <div className="absolute top-16 right-4 w-72 bg-white rounded-xl shadow-lg border z-30"><div className="p-3 border-b font-semibold flex justify-between">Pending Tasks <i className="fa-solid fa-xmark cursor-pointer" onClick={()=>setShowNotifications(false)}></i></div><div className="max-h-80 overflow-auto">{activeActionableTasks.length===0?<div className="p-4 text-center text-gray-400">All done</div>:activeActionableTasks.map(t=><div key={t.id} className="p-3 border-b hover:bg-gray-50 cursor-pointer" onClick={()=>{setShowNotifications(false); handleMessageClick(t);}}><div className="text-xs font-semibold text-green-600">Task</div><div className="text-sm">{t.text}</div><div className="text-xs text-red-500 mt-1">Due {new Date(t.taskData.deadline).toLocaleDateString()}</div></div>)}</div></div> )}
                        
                        <div className="flex-1 overflow-y-auto p-5 whatsapp-bg">
                            <div className="max-w-3xl mx-auto space-y-1">
                                {messagesToRender.map(m => renderMessageNode(m))}
                                {typingStatus.length > 0 && ( <div className="flex items-start mt-2"><div className="bg-white px-3 py-2 rounded-2xl shadow-sm text-sm text-gray-500 flex items-center gap-2"> {typingStatus.map(t => t.name).join(', ')} is typing <div className="flex gap-1"><span className="animate-bounce">.</span><span className="animate-bounce delay-100">.</span><span className="animate-bounce delay-200">.</span></div></div></div> )}
                                <div ref={messagesEndRef} className="h-2"></div>
                            </div>
                        </div>
                        
                        {replyingTo && ( <div className="bg-gray-100 px-4 py-2 flex justify-between items-center text-sm border-t"><div><i className="fa-regular fa-reply text-green-600 mr-2"></i>Replying to {replyingTo.sender.split('@')[0]}: <span className="italic">{replyingTo.text}</span></div><button onClick={()=>setReplyingTo(null)} className="text-gray-500"><i className="fa-solid fa-xmark"></i></button></div> )}
                        
                        <div className="bg-white px-3 py-2 flex items-center gap-2 border-t">
                            <input type="file" ref={fileInputRef} hidden onChange={handleFileUpload} accept="image/*,.pdf,.doc,.docx"/>
                            <button onClick={()=>fileInputRef.current.click()} className="text-gray-500 hover:text-green-600"><i className="fa-solid fa-paperclip text-xl"></i></button>
                            <div className="flex-1 bg-gray-100 rounded-full px-4 py-2"><input type="text" ref={chatInputRef} placeholder="Type a message" className="bg-transparent w-full outline-none text-sm" value={inputText} onChange={e=>setInputText(e.target.value)} onKeyDown={handleKeyDown} onKeyUp={handleTypingEvent}/></div>
                            <button onClick={handleSendMessage} className="bg-green-600 text-white rounded-full w-10 h-10 flex items-center justify-center"><i className="fa-solid fa-paper-plane"></i></button>
                        </div>
                    </div>
                    
                    {/* Modals – same logic, minimal styling */}
                    {activeModal === 'edit_profile' && (<div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50" onClick={()=>setActiveModal(null)}><div className="bg-white rounded-2xl p-6 w-96" onClick={e=>e.stopPropagation()}><h3 className="font-bold text-lg mb-4">Edit Profile</h3><form onSubmit={handleProfileSubmit}><div className="flex justify-center mb-4"><div className="w-20 h-20 rounded-full bg-gray-200 flex items-center justify-center cursor-pointer" onClick={()=>profilePicInputRef.current.click()}>{currentUserData?.profilePicUrl ? <img src={currentUserData.profilePicUrl} className="w-full h-full rounded-full object-cover"/> : <i className="fa-solid fa-user text-3xl text-gray-400"></i>}</div><input type="file" ref={profilePicInputRef} hidden accept="image/*"/></div><input placeholder="Name" className="w-full border p-2 rounded mb-2" value={profileForm.name} onChange={e=>setProfileForm({...profileForm,name:e.target.value})}/><select className="w-full border p-2 rounded mb-2" value={profileForm.fontSize} onChange={e=>setProfileForm({...profileForm,fontSize:e.target.value})}><option value="text-sm">Small</option><option value="text-[15px]">Medium</option><option value="text-lg">Large</option></select><select className="w-full border p-2 rounded mb-2" value={profileForm.fontFamily} onChange={e=>setProfileForm({...profileForm,fontFamily:e.target.value})}><option value="font-sans">Sans</option><option value="font-serif">Serif</option><option value="font-mono">Mono</option></select><button type="submit" className="bg-green-600 text-white w-full py-2 rounded">Save</button></form></div></div>)}
                    {activeModal === 'group_form_modal' && (<div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50" onClick={()=>setActiveModal(null)}><div className="bg-white rounded-2xl p-6 w-96" onClick={e=>e.stopPropagation()}><h3 className="font-bold text-lg mb-4">{editingGroup ? 'Edit Group' : 'New Group'}</h3><form onSubmit={handleGroupSubmit}><input placeholder="Group name" className="w-full border p-2 rounded mb-2" value={groupForm.name} onChange={e=>setGroupForm({...groupForm,name:e.target.value})} required/><div className="max-h-40 overflow-auto border rounded p-2 mb-2">{dbUsers.map(u=><label key={u.uid} className="flex items-center gap-2"><input type="checkbox" checked={groupForm.members.includes(u.email)} onChange={e=>{if(e.target.checked) setGroupForm({...groupForm,members:[...groupForm.members,u.email]}); else setGroupForm({...groupForm,members:groupForm.members.filter(m=>m!==u.email)})}}/><span>{u.name}</span></label>)}</div><button type="submit" className="bg-green-600 text-white w-full py-2 rounded">Save</button></form></div></div>)}
                    {activeModal === 'group_settings' && (<div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50" onClick={()=>setActiveModal(null)}><div className="bg-white rounded-2xl p-6 w-96" onClick={e=>e.stopPropagation()}><h3 className="font-bold text-lg mb-4">{activeGroup.name} Members</h3><div className="max-h-60 overflow-auto border rounded p-2 mb-2">{dbUsers.map(u=><label key={u.uid} className="flex items-center gap-2"><input type="checkbox" disabled={!activeGroup.admins?.includes(user.email) && !currentUserData?.isAdmin} checked={activeGroup.members?.includes(u.email)} onChange={e=>{if(e.target.checked) setGroupForm({...groupForm,members:[...groupForm.members,u.email]}); else setGroupForm({...groupForm,members:groupForm.members.filter(m=>m!==u.email)})}}/><span>{u.name}</span></label>)}</div><button onClick={handleUpdateGroupMembers} className="bg-green-600 text-white w-full py-2 rounded">Update</button></div></div>)}
                    {activeModal === 'context' && selectedMessage && (<div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50"><div className="bg-white rounded-2xl p-5 w-80"><p className="italic text-gray-600 mb-4">"{selectedMessage.text}"</p><button onClick={()=>setActiveModal('reminder')} className="w-full mb-2 bg-yellow-100 p-2 rounded">⏰ Reminder</button><button onClick={()=>setActiveModal('task_convert')} className="w-full bg-blue-100 p-2 rounded">📋 Convert to Task</button><button onClick={()=>setActiveModal(null)} className="mt-2 text-gray-400 text-sm w-full">Cancel</button></div></div>)}
                    {activeModal === 'reminder' && (<div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50"><div className="bg-white rounded-2xl p-5 w-80"><input type="datetime-local" className="w-full border p-2 rounded mb-3" value={reminderDateTime} onChange={e=>setReminderDateTime(e.target.value)}/><button onClick={setReminder} className="bg-yellow-500 text-white w-full py-2 rounded">Save</button></div></div>)}
                    {activeModal === 'task_convert' && (<div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50"><div className="bg-white rounded-2xl p-5 w-96"><select className="w-full border p-2 rounded mb-2" value={taskAssignee} onChange={e=>setTaskAssignee(e.target.value)}><option value="">Assign to...</option>{dbUsers.map(u=><option key={u.uid} value={u.email}>{u.name}</option>)}</select><input type="datetime-local" className="w-full border p-2 rounded mb-3" value={taskDeadline} onChange={e=>setTaskDeadline(e.target.value)}/><button onClick={convertToTask} className="bg-green-600 text-white w-full py-2 rounded">Create Task</button></div></div>)}
                    {activeModal === 'task_trail' && selectedMessage?.taskData && (<div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50"><div className="bg-white rounded-2xl p-5 max-w-lg w-full max-h-[80vh] overflow-auto"><h3 className="font-bold text-lg mb-3">Task Trail</h3><div className="space-y-2">{selectedMessage.taskData.trail.map((item,i)=><div key={i} className="border-l-2 border-green-400 pl-3 py-1"><div className="text-xs font-bold text-green-700">{item.action}</div><div className="text-sm">{item.by?.split('@')[0]} {item.to && `→ ${item.to.split('@')[0]}`}</div>{item.comment && <div className="text-xs italic text-gray-500">"{item.comment}"</div>}</div>)}</div><div className="mt-3"><input type="text" placeholder="Add comment" className="w-full border p-2 rounded" value={trailComment} onChange={e=>setTrailComment(e.target.value)}/><button onClick={handleAddComment} className="mt-2 bg-blue-500 text-white px-4 py-1 rounded">Post</button></div></div></div>)}
                    {activeModal === 'admin_add_user' && (<div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50"><div className="bg-white rounded-2xl p-5 w-96"><form onSubmit={handleAddUserSubmit}><input className="border p-2 w-full mb-2" placeholder="Name" value={adminForm.name} onChange={e=>setAdminForm({...adminForm,name:e.target.value})}/><input className="border p-2 w-full mb-2" placeholder="Email" value={adminForm.email} onChange={e=>setAdminForm({...adminForm,email:e.target.value})}/><input type="password" className="border p-2 w-full mb-2" placeholder="Password" value={adminForm.password} onChange={e=>setAdminForm({...adminForm,password:e.target.value})}/><label className="flex items-center gap-2 mb-2"><input type="checkbox" checked={adminForm.isAdmin} onChange={e=>setAdminForm({...adminForm,isAdmin:e.target.checked})}/> Admin</label><button type="submit" className="bg-green-600 text-white w-full py-2 rounded">Add User</button></form></div></div>)}
                    {activeModal === 'admin_edit_user' && (<div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50"><div className="bg-white rounded-2xl p-5 w-96"><form onSubmit={handleEditUserSubmit}><input className="border p-2 w-full mb-2" value={adminForm.email} disabled/><input className="border p-2 w-full mb-2" value={adminForm.name} onChange={e=>setAdminForm({...adminForm,name:e.target.value})}/><label className="flex items-center gap-2 mb-2"><input type="checkbox" checked={adminForm.isAdmin} onChange={e=>setAdminForm({...adminForm,isAdmin:e.target.checked})}/> Admin</label><button type="submit" className="bg-green-600 text-white w-full py-2 rounded">Save</button></form></div></div>)}
                    {isUploading && (<div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50"><div className="bg-white p-5 rounded-2xl text-center"><i className="fa-solid fa-spinner fa-spin text-2xl text-green-600"></i><div>Uploading {Math.round(uploadProgress)}%</div></div></div>)}
                </div>
            );
        }

        // ========== APP WRAPPER ==========
        function App() {
            const [user, setUser] = useState(null);
            const [firebaseReady, setFirebaseReady] = useState(false);
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [authErr, setAuthErr] = useState("");
            useEffect(() => {
                const ready = () => { window.onAuthStateChanged(window.auth, setUser); setFirebaseReady(true); };
                if (window.auth) ready(); else window.addEventListener('firebaseReady', ready);
                return () => window.removeEventListener('firebaseReady', ready);
            }, []);
            const handleLogin = (e) => { e.preventDefault(); window.signInWithEmailAndPassword(window.auth, email, password).catch(err => setAuthErr(err.message)); };
            const handleRegister = async (e) => { e.preventDefault(); try { const cred = await window.createUserWithEmailAndPassword(window.auth, email, password); const isVP = email === 'viceprincipal@mpgs.edu.in'; await window.setDoc(window.doc(window.db, "users", cred.user.uid), { uid: cred.user.uid, email, name: email.split('@')[0], isApproved: isVP, isAdmin: isVP, canCreateGroups: isVP }); } catch(err){ setAuthErr(err.message); } };
            if (!firebaseReady) return <div className="flex h-screen items-center justify-center bg-[#f0f2f5] text-green-600">Loading...</div>;
            if (!user) return (
                <div className="flex h-screen items-center justify-center bg-[#f0f2f5] p-4"><div className="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md"><h1 className="text-2xl font-bold text-center mb-6">Corporate Portal</h1>{authErr && <div className="bg-red-100 text-red-700 p-2 rounded mb-4 text-sm">{authErr}</div>}<input type="email" placeholder="Email" className="w-full p-3 border rounded-lg mb-3" value={email} onChange={e=>setEmail(e.target.value)}/><input type="password" placeholder="Password" className="w-full p-3 border rounded-lg mb-4" value={password} onChange={e=>setPassword(e.target.value)}/><div className="flex gap-3"><button onClick={handleLogin} className="flex-1 bg-green-600 text-white py-3 rounded-lg">Sign In</button><button onClick={handleRegister} className="flex-1 border py-3 rounded-lg">Register</button></div></div></div>
            );
            return <ChatApp user={user} onLogout={() => window.signOut(window.auth)} />;
        }
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
