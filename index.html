<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talk & Task - Enterprise Edition</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Load React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Load jsPDF for Beautiful PDF Generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <!-- Initialize Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, updateDoc, setDoc, getDocs, where, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAoOsog2NP6Pf8YNSxn0rRYK4MSLEVNNZc",
            authDomain: "niltask.firebaseapp.com",
            projectId: "niltask",
            storageBucket: "niltask.firebasestorage.app",
            messagingSenderId: "868641827920",
            appId: "1:868641827920:web:70d9db79a361a76468f555"
        };

        const app = initializeApp(firebaseConfig);
        window.auth = getAuth(app);
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
        window.signOut = signOut;
        window.onAuthStateChanged = onAuthStateChanged;
        
        window.secondaryApp = initializeApp(firebaseConfig, "Secondary");
        window.secondaryAuth = getAuth(window.secondaryApp);

        window.db = getFirestore(app);
        window.collection = collection;
        window.addDoc = addDoc;
        window.onSnapshot = onSnapshot;
        window.query = query;
        window.orderBy = orderBy;
        window.serverTimestamp = serverTimestamp;
        window.doc = doc;
        window.updateDoc = updateDoc;
        window.setDoc = setDoc;
        window.getDocs = getDocs;
        window.where = where;
        window.deleteDoc = deleteDoc;
        
        window.storage = getStorage(app);
        window.ref = ref;
        window.uploadBytesResumable = uploadBytesResumable;
        window.getDownloadURL = getDownloadURL;

        window.dispatchEvent(new Event('firebaseReady'));
    </script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif !important; background-color: #f0f2f5; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); }
        .wa-bg { 
            background-color: #e5dbd3; 
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); 
            background-repeat: repeat; 
            background-blend-mode: multiply;
            opacity: 0.95;
            scroll-behavior: smooth;
        }
        .highlight-msg { transition: background-color 1s ease-out; }
    </style>
</head>
<body class="overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const notificationSound = new Audio('https://cdn.freesound.org/previews/536/536420_4397472-lq.mp3');

        // Helper: Convert to Sentence Case
        const toSentenceCase = (str) => {
            if (!str) return "";
            return str.toLowerCase().replace(/(^\w{1})|(\s+\w{1})/g, letter => letter.toUpperCase());
        };

        function ChatApp({ user, onLogout }) {
            const [activeModal, setActiveModal] = useState(null);
            const [selectedMessage, setSelectedMessage] = useState(null);
            const [inputText, setInputText] = useState("");
            const [messages, setMessages] = useState([]); 
            const messagesEndRef = useRef(null); 
            const chatContainerRef = useRef(null);
            const chatInputRef = useRef(null);
            const [isAtBottom, setIsAtBottom] = useState(true); 

            const [showRightSidebar, setShowRightSidebar] = useState(false);

            const [replyingTo, setReplyingTo] = useState(null);
            const [editingMessageId, setEditingMessageId] = useState(null);
            const [editMessageText, setEditMessageText] = useState("");

            // Task Multi-Assignee States
            const [taskAssignees, setTaskAssignees] = useState([]);
            const [taskDeadline, setTaskDeadline] = useState("");
            const [delegateAssignees, setDelegateAssignees] = useState([]);
            const [trailComment, setTrailComment] = useState(""); 
            const [dbUsers, setDbUsers] = useState([]); 
            
            const [searchQuery, setSearchQuery] = useState("");
            const [chatFilter, setChatFilter] = useState("all"); 
            const [showFilterMenu, setShowFilterMenu] = useState(false);
            const [showNotifications, setShowNotifications] = useState(false);
            const [viewMode, setViewMode] = useState("chat"); 
            const [currentUserData, setCurrentUserData] = useState(null);
            const [adminForm, setAdminForm] = useState({ uid: '', name: '', email: '', password: '', isAdmin: false, canCreateGroups: false });
            
            const [profileForm, setProfileForm] = useState({ name: "", fontSize: "text-[15px] md:text-[16px]", fontFamily: "font-sans" });
            const [profileUploadProgress, setProfileUploadProgress] = useState(0);
            const profilePicInputRef = useRef(null);

            const [groups, setGroups] = useState([]);
            const [activeGroup, setActiveGroup] = useState({ id: "demo", name: "Demo" });
            
            const [groupForm, setGroupForm] = useState({ name: "", members: [], profilePicUrl: null });
            const [editingGroup, setEditingGroup] = useState(null);
            const [groupPicUploadProgress, setGroupPicUploadProgress] = useState(0);
            const groupPicInputRef = useRef(null);

            const [adminFilterUser, setAdminFilterUser] = useState("");
            const [adminFilterDate, setAdminFilterDate] = useState("");
            const [adminFilterType, setAdminFilterType] = useState("");
            const [adminFilterGroup, setAdminFilterGroup] = useState("");
            
            const [allAdminReminders, setAllAdminReminders] = useState([]);
            const [immutableAuditLogs, setImmutableAuditLogs] = useState([]);

            const [uploadProgress, setUploadProgress] = useState(0);
            const [isUploading, setIsUploading] = useState(false);
            const fileInputRef = useRef(null);
            const trailFileInputRef = useRef(null);
            const [trailFileUploading, setTrailFileUploading] = useState(false);

            const [reminderDateTime, setReminderDateTime] = useState("");
            const [activeReminders, setActiveReminders] = useState([]);
            const [genericNotifications, setGenericNotifications] = useState([]);
            const prevNotifCountRef = useRef(0);

            const [typingStatus, setTypingStatus] = useState([]);
            const lastTypingTime = useRef(0); 

            const logImmutableAction = async (actionType, content, target = "") => {
                try {
                    await window.addDoc(window.collection(window.db, "audit_logs"), {
                        type: actionType,
                        user: user.email,
                        content: content,
                        target: target,
                        groupId: activeGroup.id,
                        groupName: activeGroup.name,
                        timestamp: window.serverTimestamp()
                    });
                } catch(e) { console.error("Audit Log Error:", e); }
            };

            // Audio Unlocker
            useEffect(() => {
                const unlockAudio = () => {
                    if (!window.audioPrimed) {
                        notificationSound.volume = 1.0;
                        notificationSound.play().then(() => {
                            notificationSound.pause();
                            notificationSound.currentTime = 0;
                            window.audioPrimed = true;
                        }).catch(err => {});
                    }
                };
                document.addEventListener('click', unlockAudio, { once: true });
                document.addEventListener('keydown', unlockAudio, { once: true });
                document.addEventListener('touchstart', unlockAudio, { once: true });
                if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") Notification.requestPermission();
                return () => {
                    document.removeEventListener('click', unlockAudio);
                    document.removeEventListener('keydown', unlockAudio);
                    document.removeEventListener('touchstart', unlockAudio);
                };
            }, []);

            useEffect(() => {
                const qPersonal = window.query(window.collection(window.db, "reminders"), window.where("userId", "==", user.uid), window.where("isTriggered", "==", false));
                const unsubPersonal = window.onSnapshot(qPersonal, (snapshot) => setActiveReminders(snapshot.docs.map(d => ({ id: d.id, ...d.data() }))));
                const qAlerts = window.query(window.collection(window.db, "notifications"), window.where("userId", "==", user.uid), window.where("isRead", "==", false));
                const unsubAlerts = window.onSnapshot(qAlerts, (snapshot) => setGenericNotifications(snapshot.docs.map(d => ({ id: d.id, ...d.data() }))));
                
                let unsubAdmin = () => {};
                let unsubAudit = () => {};
                if (currentUserData?.isAdmin) {
                    const qAdmin = window.query(window.collection(window.db, "reminders"), window.orderBy("remindAt", "desc"));
                    unsubAdmin = window.onSnapshot(qAdmin, (snapshot) => setAllAdminReminders(snapshot.docs.map(d => ({ id: d.id, ...d.data() }))));

                    const qAudit = window.query(window.collection(window.db, "audit_logs"), window.orderBy("timestamp", "desc"));
                    unsubAudit = window.onSnapshot(qAudit, (snapshot) => {
                        setImmutableAuditLogs(snapshot.docs.map(d => {
                            const data = d.data();
                            return { id: d.id, ...data, time: data.timestamp ? new Date(data.timestamp.toDate()).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '', dateString: data.timestamp ? new Date(data.timestamp.toDate()).toISOString().split('T')[0] : ''};
                        }));
                    });
                }
                return () => { unsubPersonal(); unsubAlerts(); unsubAdmin(); unsubAudit(); };
            }, [user.uid, currentUserData?.isAdmin]);

            useEffect(() => {
                const interval = setInterval(() => {
                    const now = new Date();
                    activeReminders.forEach(async (rem) => {
                        const remindTime = new Date(rem.remindAt);
                        if (remindTime <= now) {
                            notificationSound.play().catch(e => console.log("Sound play prevented"));
                            if ("Notification" in window && Notification.permission === "granted") new Notification("Talk & Task Reminder", { body: `⏰ "${rem.messageText}"`, icon: "https://cdn-icons-png.flaticon.com/512/825/825590.png" });
                            else alert(`⏰ Reminder: "${rem.messageText}"`);
                            try { await window.updateDoc(window.doc(window.db, "reminders", rem.id), { isTriggered: true }); } catch (error) {}
                        }
                    });
                }, 15000); 
                return () => clearInterval(interval);
            }, [activeReminders]);

            // Database Synchronizations
            useEffect(() => {
                const syncUserToDB = async () => { try { await window.setDoc(window.doc(window.db, "users", user.uid), { uid: user.uid, email: user.email, name: toSentenceCase(user.email.split('@')[0]), lastActive: window.serverTimestamp() }, { merge: true }); } catch (error) {} };
                syncUserToDB();
                const heartbeatInterval = setInterval(() => { window.updateDoc(window.doc(window.db, "users", user.uid), { lastActive: window.serverTimestamp() }).catch(()=>{}); }, 60000);
                const unsubCurrent = window.onSnapshot(window.doc(window.db, "users", user.uid), (doc) => { 
                    if (doc.exists()) {
                        const data = doc.data(); setCurrentUserData(data);
                        if(!profileForm.name && data.name) setProfileForm({ name: toSentenceCase(data.name), fontSize: data.fontSize || "text-[15px] md:text-[16px]", fontFamily: data.fontFamily || "font-sans" });
                    }
                });
                const unsubUsers = window.onSnapshot(window.query(window.collection(window.db, "users"), window.orderBy("email", "asc")), (snapshot) => setDbUsers(snapshot.docs.map(doc => doc.data())));
                
                // Auto-create Dynamic "Demo" group if DB is completely empty and user is admin.
                const unsubGroups = window.onSnapshot(window.collection(window.db, "groups"), (snapshot) => {
                    const fetchedGroups = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    if (fetchedGroups.length === 0 && currentUserData?.isAdmin) {
                        window.addDoc(window.collection(window.db, "groups"), { name: "Demo", members: [user.email], admins: [user.email], createdBy: user.email, createdAt: window.serverTimestamp(), isArchived: false });
                    } else {
                        setGroups(fetchedGroups);
                    }
                });
                
                return () => { clearInterval(heartbeatInterval); unsubCurrent(); unsubUsers(); unsubGroups(); };
            }, [user, currentUserData?.isAdmin]);

            useEffect(() => {
                const q = window.query(window.collection(window.db, "messages"), window.orderBy("timestamp", "asc"));
                const unsubscribe = window.onSnapshot(q, (snapshot) => {
                    const loadedMessages = snapshot.docs.map(doc => {
                        const data = doc.data();
                        return { id: doc.id, ...data, sender: data.senderEmail, isMine: data.senderUid === user.uid, time: data.timestamp ? new Date(data.timestamp.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'Sending...', dateString: data.timestamp ? new Date(data.timestamp.toDate()).toISOString().split('T')[0] : '', isTask: data.isTask === true, groupId: data.groupId || "demo", reactions: data.reactions || {}, seenBy: data.seenBy || [], bookmarkedBy: data.bookmarkedBy || [], isPinned: data.isPinned || false };
                    });
                    setMessages(loadedMessages);
                    setTimeout(() => messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }), 150);
                });
                return () => unsubscribe();
            }, [user.uid]);

            useEffect(() => {
                const unreadMessages = messages.filter(m => m.groupId === activeGroup.id && !m.isMine && !(m.seenBy || []).includes(user.email));
                if (unreadMessages.length > 0) {
                    const timer = setTimeout(() => { unreadMessages.slice(0, 20).forEach(msg => { window.updateDoc(window.doc(window.db, "messages", msg.id), { seenBy: [...(msg.seenBy || []), user.email] }).catch(()=>{}); }); }, 2000); 
                    return () => clearTimeout(timer);
                }
            }, [messages, activeGroup.id, user.email]);

            const activeActionableTasks = messages.filter(m => m.isTask && m.taskData?.assignees?.includes(user.email) && m.taskData?.status !== "Completed" && !(m.taskData?.dismissedBy || []).includes(user.uid));
            const totalNotifications = activeActionableTasks.length + genericNotifications.length;

            useEffect(() => {
                if (totalNotifications > prevNotifCountRef.current) {
                    if(window.audioPrimed) notificationSound.play().catch(e => console.log("Sound play prevented"));
                }
                prevNotifCountRef.current = totalNotifications;
            }, [totalNotifications]);

            const myGroups = groups.filter(g => !g.isArchived && (g.members?.includes(user.email) || currentUserData?.isAdmin));
            
            useEffect(() => {
                if (activeGroup.id === 'demo' && !activeGroup.isDM && myGroups.length > 0 && !myGroups.some(g => g.id === 'demo')) {
                    setActiveGroup(myGroups[0]);
                }
            }, [myGroups, activeGroup]);

            const scrollToMessage = (msgId) => {
                const el = document.getElementById(`msg-${msgId}`);
                if (el) {
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    el.style.backgroundColor = 'rgba(253, 224, 71, 0.5)'; 
                    setTimeout(() => { el.style.backgroundColor = ''; }, 2000);
                }
            };

            const handleTypingEvent = () => {
                const now = Date.now();
                if (now - lastTypingTime.current > 1500) { 
                    lastTypingTime.current = now;
                    try { window.setDoc(window.doc(window.db, "typing", `${activeGroup.id}_${user.uid}`), { groupId: activeGroup.id, name: currentUserData?.name || user.email.split('@')[0], timestamp: now }, { merge: true }); } catch (e) {}
                }
            };

            useEffect(() => {
                const q = window.query(window.collection(window.db, "typing"), window.where("groupId", "==", activeGroup.id));
                const unsubTyping = window.onSnapshot(q, (snapshot) => {
                    const now = Date.now();
                    const typingUsers = snapshot.docs.map(d => ({ id: d.id, ...d.data() })).filter(d => d.id !== `${activeGroup.id}_${user.uid}`).filter(d => d.timestamp && (now - d.timestamp < 3500)); 
                    setTypingStatus(typingUsers);
                });
                return () => unsubTyping();
            }, [activeGroup.id, user.uid]);

            const formatMessage = (txt) => {
                if(!txt.trim()) return txt;
                let formatted = txt.trim();
                formatted = formatted.charAt(0).toUpperCase() + formatted.slice(1);
                if (!/[.!?]$/.test(formatted) && !formatted.includes('\n')) formatted += '.';
                return formatted;
            };

            const handleSendMessage = async () => {
                if (!inputText.trim()) return;
                const messageText = formatMessage(inputText);
                setInputText(""); 
                try { window.deleteDoc(window.doc(window.db, "typing", `${activeGroup.id}_${user.uid}`)); } catch(e) {}
                
                const mentions = [];
                dbUsers.forEach(u => { if (messageText.toLowerCase().includes(`@${u.name.toLowerCase()}`)) mentions.push(u.email); });
                groups.forEach(g => {
                    const teamTag = `@${g.name.replace(/\s+/g, '').toLowerCase()}`;
                    if (messageText.toLowerCase().includes(teamTag) && !g.isArchived) { (g.members || []).forEach(m => mentions.push(m)); }
                });

                const uniqueMentions = [...new Set(mentions)];
                const isPrivate = uniqueMentions.length > 0;
                const allowedUsers = isPrivate ? [...new Set([user.email, ...uniqueMentions])] : [];

                let replyData = null;
                if (replyingTo) {
                    replyData = { replyToId: replyingTo.id, originalText: replyingTo.text || replyingTo.fileName || 'Attachment', originalSender: replyingTo.sender.split('@')[0] };
                    if (replyingTo.senderUid !== user.uid) {
                        try { await window.addDoc(window.collection(window.db, "notifications"), { userId: replyingTo.senderUid, type: "reply", text: `${toSentenceCase(user.email.split('@')[0])} replied to your message.`, messageId: replyingTo.id, timestamp: window.serverTimestamp(), isRead: false }); } catch (e) {}
                    }
                }

                try {
                    await window.addDoc(window.collection(window.db, "messages"), {
                        text: messageText, senderUid: user.uid, senderEmail: user.email, timestamp: window.serverTimestamp(),
                        isTask: false, hasReminder: false, isPrivateMention: isPrivate, allowedUsers: allowedUsers,
                        seenBy: [user.email], isPinned: false, bookmarkedBy: [], fileUrl: null, fileName: null, fileType: null, groupId: activeGroup.id, reactions: {}, ...(replyData || {})
                    });
                    
                    logImmutableAction("MESSAGE_CREATE", `Sent message: "${messageText}"`, isPrivate ? `Private: ${uniqueMentions.join(', ')}` : "Public");
                    setReplyingTo(null);
                } catch (error) { alert("Failed to send message."); }
            };

            const handleKeyDown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSendMessage(); } };

            const handleReaction = async (msgId, emoji) => {
                const msg = messages.find(m => m.id === msgId);
                if(!msg) return;
                let updatedReactions = { ...msg.reactions };
                let usersForEmoji = updatedReactions[emoji] || [];
                const isAdding = !usersForEmoji.includes(user.email);
                if (isAdding) usersForEmoji = [...usersForEmoji, user.email]; else usersForEmoji = usersForEmoji.filter(e => e !== user.email);
                if (usersForEmoji.length === 0) delete updatedReactions[emoji]; else updatedReactions[emoji] = usersForEmoji;
                try {
                    await window.updateDoc(window.doc(window.db, "messages", msgId), { reactions: updatedReactions });
                    if (isAdding && msg.senderUid !== user.uid) await window.addDoc(window.collection(window.db, "notifications"), { userId: msg.senderUid, type: "reaction", text: `${toSentenceCase(user.email.split('@')[0])} reacted ${emoji}.`, messageId: msgId, timestamp: window.serverTimestamp(), isRead: false });
                    if (isAdding) logImmutableAction("REACTION", `Reacted ${emoji} to message`, `Message ID: ${msgId}`);
                } catch (err) {}
            };

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsUploading(true); setUploadProgress(0);
                const uniqueFileName = `${Date.now()}_${file.name}`;
                const uploadTask = window.uploadBytesResumable(window.ref(window.storage, `chat_uploads/${uniqueFileName}`), file);
                uploadTask.on('state_changed', (snapshot) => setUploadProgress((snapshot.bytesTransferred / snapshot.totalBytes) * 100), (error) => { setIsUploading(false); alert("File upload failed."); }, async () => {
                    try {
                        const downloadURL = await window.getDownloadURL(uploadTask.snapshot.ref);
                        await window.addDoc(window.collection(window.db, "messages"), { text: `Shared a file: ${file.name}`, senderUid: user.uid, senderEmail: user.email, timestamp: window.serverTimestamp(), isTask: false, hasReminder: false, isPrivateMention: false, allowedUsers: [], seenBy: [user.email], isPinned: false, bookmarkedBy: [], fileUrl: downloadURL, fileName: file.name, fileType: file.type, groupId: activeGroup.id, reactions: {} });
                        logImmutableAction("FILE_UPLOAD", `Uploaded file: ${file.name}`, "Public");
                    } catch (err) {} finally { setIsUploading(false); setUploadProgress(0); if(fileInputRef.current) fileInputRef.current.value = ""; }
                });
            };

            const handleTogglePin = async (msg) => {
                if (!currentUserData?.isAdmin && activeGroup.admins && !activeGroup.admins.includes(user.email)) return alert("Only Department Admins can pin announcements.");
                try { await window.updateDoc(window.doc(window.db, "messages", msg.id), { isPinned: !msg.isPinned }); } catch (e) {}
            };

            const handleToggleBookmark = async (msg) => {
                let bookmarks = msg.bookmarkedBy || [];
                if (bookmarks.includes(user.email)) bookmarks = bookmarks.filter(e => e !== user.email); else bookmarks.push(user.email);
                try { await window.updateDoc(window.doc(window.db, "messages", msg.id), { bookmarkedBy: bookmarks }); } catch(e) {}
            };

            const handleProfileSubmit = async (e) => {
                e.preventDefault();
                const file = profilePicInputRef.current?.files[0];
                try {
                    let updateData = { name: toSentenceCase(profileForm.name), fontSize: profileForm.fontSize, fontFamily: profileForm.fontFamily };
                    if (file) {
                        setProfileUploadProgress(10);
                        const uniqueFileName = `${user.uid}_${Date.now()}_avatar`;
                        const uploadTask = window.uploadBytesResumable(window.ref(window.storage, `avatars/${uniqueFileName}`), file);
                        await new Promise((resolve, reject) => { uploadTask.on('state_changed', (snapshot) => setProfileUploadProgress((snapshot.bytesTransferred / snapshot.totalBytes) * 100), reject, async () => { updateData.profilePicUrl = await window.getDownloadURL(uploadTask.snapshot.ref); resolve(); }); });
                    }
                    await window.updateDoc(window.doc(window.db, "users", user.uid), updateData);
                    setActiveModal(null); setProfileUploadProgress(0);
                } catch (error) { alert("Profile update failed."); setProfileUploadProgress(0); }
            };

            const notifyInvolvedInTask = async (taskMsg, actionText) => {
                const involvedEmails = new Set([ taskMsg.senderEmail, ...(taskMsg.taskData?.assignees || []), ...(taskMsg.taskData?.trail?.map(t => t.by) || []) ]);
                involvedEmails.delete(user.email); 
                const uidsToNotify = dbUsers.filter(u => involvedEmails.has(u.email)).map(u => u.uid);
                for (const uid of uidsToNotify) {
                    try { await window.addDoc(window.collection(window.db, "notifications"), { userId: uid, type: "task", text: actionText, messageId: taskMsg.id, timestamp: window.serverTimestamp(), isRead: false }); } catch (e) {}
                }
            };

            const handleTrailFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file || !selectedMessage) return;
                setTrailFileUploading(true);
                const uniqueFileName = `${Date.now()}_${file.name}`;
                const uploadTask = window.uploadBytesResumable(window.ref(window.storage, `task_updates/${uniqueFileName}`), file);
                uploadTask.on('state_changed', null, (error) => { setTrailFileUploading(false); alert("Upload failed."); }, async () => {
                    try {
                        const downloadURL = await window.getDownloadURL(uploadTask.snapshot.ref);
                        const now = new Date();
                        const updatedTrail = [...selectedMessage.taskData.trail, { action: "File Uploaded", by: user.email, time: now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + ', ' + now.toLocaleDateString(), comment: "Attached file via system", fileUrl: downloadURL, fileName: file.name }];
                        await window.updateDoc(window.doc(window.db, "messages", selectedMessage.id), { "taskData.trail": updatedTrail });
                        
                        logImmutableAction("TASK_FILE", `Attached file ${file.name}`, `Task ID: ${selectedMessage.id}`);
                        await notifyInvolvedInTask(selectedMessage, `${toSentenceCase(user.email.split('@')[0])} attached a file to a task.`);
                        
                        setSelectedMessage(prev => ({...prev, taskData: {...prev.taskData, trail: updatedTrail}}));
                    } catch(e) {} finally { setTrailFileUploading(false); if(trailFileInputRef.current) trailFileInputRef.current.value = ""; }
                });
            };

            const handleGroupPicUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setGroupPicUploadProgress(10);
                const uniqueFileName = `group_${Date.now()}_${file.name}`;
                const uploadTask = window.uploadBytesResumable(window.ref(window.storage, `group_avatars/${uniqueFileName}`), file);
                uploadTask.on('state_changed', 
                    (snapshot) => setGroupPicUploadProgress((snapshot.bytesTransferred / snapshot.totalBytes) * 100),
                    (error) => { setGroupPicUploadProgress(0); alert("Upload failed."); },
                    async () => {
                        const url = await window.getDownloadURL(uploadTask.snapshot.ref);
                        setGroupForm(prev => ({...prev, profilePicUrl: url}));
                        setGroupPicUploadProgress(0);
                    }
                );
            };

            const handleGroupSubmit = async (e) => {
                e.preventDefault();
                if(!groupForm.name.trim()) return;
                try {
                    const finalMembers = [...new Set([...groupForm.members, user.email])];
                    const groupData = { name: toSentenceCase(groupForm.name), members: finalMembers, profilePicUrl: groupForm.profilePicUrl };
                    
                    if (editingGroup) {
                        await window.updateDoc(window.doc(window.db, "groups", editingGroup.id), groupData);
                    } else {
                        await window.addDoc(window.collection(window.db, "groups"), { ...groupData, admins: [user.email], createdBy: user.email, createdAt: window.serverTimestamp(), isArchived: false });
                    }
                    setActiveModal(null); setEditingGroup(null); setGroupForm({name: "", members: [], profilePicUrl: null});
                } catch (error) { alert("Failed to save group."); }
            };

            const handleUpdateGroupMembers = async (e) => {
                e.preventDefault();
                try {
                    const finalMembers = [...new Set([...groupForm.members, ...activeGroup.admins])];
                    await window.updateDoc(window.doc(window.db, "groups", activeGroup.id), { members: finalMembers });
                    setActiveModal(null); setActiveGroup({...activeGroup, members: finalMembers});
                } catch (error) { alert("Failed to update members."); }
            };

            const checkVisibility = (msg) => {
                if (msg.groupId !== activeGroup.id) return false;
                if (msg.isTask) {
                    if (msg.sender === user.email || msg.taskData?.assignees?.includes(user.email)) return true;
                    if (msg.taskData?.trail?.some(t => t.by === user.email || t.to === user.email)) return true;
                    return false; 
                }
                if (msg.isPrivateMention) return msg.allowedUsers.includes(user.email);
                return true;
            };

            const handleSearchFilter = (msg) => {
                if (!searchQuery.trim()) return true;
                const q = searchQuery.toLowerCase();
                return msg.text?.toLowerCase().includes(q) || msg.sender?.toLowerCase().includes(q) || (msg.isTask && msg.taskData?.assignees?.some(a=>a.toLowerCase().includes(q)));
            };

            const handleClearNotifications = async () => {
                const taskPromises = activeActionableTasks.map(task => window.updateDoc(window.doc(window.db, "messages", task.id), { "taskData.dismissedBy": [...(task.taskData.dismissedBy || []), user.uid] }));
                const alertPromises = genericNotifications.map(n => window.updateDoc(window.doc(window.db, "notifications", n.id), { isRead: true }));
                await Promise.all([...taskPromises, ...alertPromises]);
                setShowNotifications(false);
            };

            const handleDeleteMessage = async (msg) => { 
                if(window.confirm("Permanently delete this message?")) {
                    await window.deleteDoc(window.doc(window.db, "messages", msg.id));
                    logImmutableAction("MESSAGE_DELETE", `Deleted content: "${msg.text || msg.fileName}"`, `Message ID: ${msg.id}`);
                }
            };

            const handleSaveEdit = async (msg) => {
                if (!editMessageText.trim()) { setEditingMessageId(null); return; }
                await window.updateDoc(window.doc(window.db, "messages", msg.id), { text: editMessageText, isEdited: true });
                logImmutableAction("MESSAGE_EDIT", `Original: "${msg.text}" | Edited: "${editMessageText}"`, `Message ID: ${msg.id}`);
                setEditingMessageId(null);
            };

            const setReminder = async () => {
                if (!selectedMessage || !reminderDateTime) return;
                try {
                    await window.addDoc(window.collection(window.db, "reminders"), { userId: user.uid, userEmail: user.email, messageId: selectedMessage.id, messageText: selectedMessage.text || selectedMessage.fileName || "File Attachment", remindAt: reminderDateTime, isTriggered: false });
                    await window.updateDoc(window.doc(window.db, "messages", selectedMessage.id), { hasReminder: true });
                    setActiveModal(null); setReminderDateTime("");
                } catch (error) { alert("Failed to save reminder."); }
            };

            const convertToTask = async () => {
                if (!selectedMessage || !taskDeadline || taskAssignees.length === 0) return alert("Please select Assignees and Deadline.");
                try {
                    const now = new Date();
                    await window.setDoc(window.doc(window.db, "messages", selectedMessage.id), {
                        isTask: true, taskData: { deadline: taskDeadline, assignees: taskAssignees, status: "Pending", dismissedBy: [], trail: [{ action: "Task Created", by: user.email, time: now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + ', ' + now.toLocaleDateString(), to: taskAssignees.map(a=>a.split('@')[0]).join(', ') }] }
                    }, { merge: true });
                    
                    logImmutableAction("TASK_CREATE", `Converted to Task: "${selectedMessage.text}"`, `Assignees: ${taskAssignees.join(', ')}`);
                    
                    setActiveModal(null);
                    setTaskAssignees([]);
                } catch (error) {}
            };

            const handleDelegateTask = async () => {
                if (!selectedMessage || delegateAssignees.length === 0) return;
                try {
                    const now = new Date();
                    const updatedTrail = [...selectedMessage.taskData.trail, { action: "Delegated", by: user.email, time: now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + ', ' + now.toLocaleDateString(), to: delegateAssignees.map(a=>a.split('@')[0]).join(', ') }];
                    await window.updateDoc(window.doc(window.db, "messages", selectedMessage.id), { "taskData.assignees": delegateAssignees, "taskData.status": "In Progress", "taskData.trail": updatedTrail, "taskData.dismissedBy": [] });
                    
                    logImmutableAction("TASK_DELEGATE", `Delegated Task ID: ${selectedMessage.id}`, `To: ${delegateAssignees.join(', ')}`);
                    await notifyInvolvedInTask(selectedMessage, `${toSentenceCase(user.email.split('@')[0])} transferred a task.`);
                    
                    setActiveModal(null);
                    setDelegateAssignees([]);
                } catch (error) {}
            };

            const handleCompleteTask = async () => {
                if (!selectedMessage) return;
                if (!selectedMessage.taskData.assignees?.includes(user.email) && !currentUserData?.isAdmin) return alert("Only the Assignees or an Admin can complete this task.");
                try {
                    const now = new Date();
                    const updatedTrail = [...selectedMessage.taskData.trail, { action: "Marked Completed", by: user.email, time: now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + ', ' + now.toLocaleDateString(), to: "System" }];
                    await window.updateDoc(window.doc(window.db, "messages", selectedMessage.id), { "taskData.status": "Completed", "taskData.trail": updatedTrail });
                    
                    logImmutableAction("TASK_COMPLETE", `Completed Task ID: ${selectedMessage.id}`, "");
                    await notifyInvolvedInTask(selectedMessage, `${toSentenceCase(user.email.split('@')[0])} marked a task as Completed.`);
                    
                    setActiveModal(null);
                } catch (error) {}
            };

            const handleAddComment = async () => {
                if (!selectedMessage || !trailComment.trim()) return;
                try {
                    const now = new Date();
                    const updatedTrail = [...selectedMessage.taskData.trail, { action: "Update Added", by: user.email, time: now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + ', ' + now.toLocaleDateString(), comment: trailComment }];
                    await window.updateDoc(window.doc(window.db, "messages", selectedMessage.id), { "taskData.trail": updatedTrail });
                    
                    logImmutableAction("TASK_COMMENT", `Comment: "${trailComment}"`, `Task ID: ${selectedMessage.id}`);
                    await notifyInvolvedInTask(selectedMessage, `${toSentenceCase(user.email.split('@')[0])} updated a task.`);
                    
                    setTrailComment(""); setSelectedMessage(prev => ({...prev, taskData: {...prev.taskData, trail: updatedTrail}}));
                } catch (error) {}
            };

            const handleChatScroll = (e) => {
                const { scrollTop, scrollHeight, clientHeight } = e.target;
                const isBottom = Math.abs(scrollHeight - clientHeight - scrollTop) < 50;
                setIsAtBottom(isBottom);
            };

            const scrollToPosition = () => {
                if (chatContainerRef.current) {
                    if (isAtBottom) chatContainerRef.current.scrollTo({ top: 0, behavior: 'smooth' });
                    else chatContainerRef.current.scrollTo({ top: chatContainerRef.current.scrollHeight, behavior: 'smooth' });
                }
            };

            const handleToggleApprove = async (u) => { await window.updateDoc(window.doc(window.db, "users", u.uid), { isApproved: !u.isApproved }); };
            const handleAddUserSubmit = async (e) => { 
                e.preventDefault(); 
                try { 
                    const cred = await window.createUserWithEmailAndPassword(window.secondaryAuth, adminForm.email, adminForm.password); 
                    await window.setDoc(window.doc(window.db, "users", cred.user.uid), { uid: cred.user.uid, email: cred.user.email, name: toSentenceCase(adminForm.name || cred.user.email.split('@')[0]), isApproved: true, isAdmin: adminForm.isAdmin, canCreateGroups: adminForm.canCreateGroups }); 
                    window.signOut(window.secondaryAuth); setActiveModal(null); setAdminForm({ uid: '', name: '', email: '', password: '', isAdmin: false, canCreateGroups: false }); 
                } catch(err){alert(err.message);} 
            };
            const handleEditUserSubmit = async (e) => { e.preventDefault(); await window.updateDoc(window.doc(window.db, "users", adminForm.uid), { name: toSentenceCase(adminForm.name), isAdmin: adminForm.isAdmin, canCreateGroups: adminForm.canCreateGroups }); setActiveModal(null); };

            const handleAdminArchiveGroup = async (groupId, groupName) => { 
                if(window.confirm("Archive this department? Users will no longer see it.")) {
                    await window.updateDoc(window.doc(window.db, "groups", groupId), { isArchived: true }); 
                    logImmutableAction("GROUP_ARCHIVE", `Archived Group: "${groupName}"`, `Group ID: ${groupId}`);
                }
            };
            const handleAdminRecoverGroup = async (groupId, groupName) => { 
                if(window.confirm("Recover this department?")) {
                    await window.updateDoc(window.doc(window.db, "groups", groupId), { isArchived: false }); 
                    logImmutableAction("GROUP_RECOVER", `Recovered Group: "${groupName}"`, `Group ID: ${groupId}`);
                }
            };

            if (currentUserData && currentUserData.isApproved !== true && currentUserData.isAdmin !== true) {
                return (
                    <div className="flex items-center justify-center h-screen bg-gray-100 p-4 text-gray-800">
                        <div className="w-full max-w-md bg-white rounded-3xl shadow-2xl p-8 border-t-8 border-orange-500 text-center"><i className="fa-solid fa-user-clock text-5xl text-orange-500 mb-4 animate-pulse"></i><h1 className="text-2xl font-bold mb-2">Pending Approval</h1><p className="text-sm text-gray-600 mb-6">Account requires Admin verification.</p><button onClick={onLogout} className="bg-gray-100 border text-gray-700 py-2 px-6 rounded-xl font-bold shadow-sm">Sign Out</button></div>
                    </div>
                );
            }

            const filteredAuditLogs = [...immutableAuditLogs].filter(log => {
                const matchUser = adminFilterUser === "" || log.user === adminFilterUser;
                const matchDate = adminFilterDate === "" || log.dateString === adminFilterDate;
                const matchGroup = adminFilterGroup === "" || log.groupId === adminFilterGroup;
                
                let matchType = true;
                if (adminFilterType) {
                    if (adminFilterType === 'task-all') matchType = log.type.includes('TASK');
                    else if (adminFilterType === 'task-pending') matchType = log.type === 'TASK_CREATE' || log.type === 'TASK_DELEGATE';
                    else if (adminFilterType === 'task-completed') matchType = log.type === 'TASK_COMPLETE';
                    else matchType = log.type === adminFilterType;
                }
                return matchUser && matchDate && matchType && matchGroup;
            });

            const handleDownloadAudit = () => {
                if (!window.jspdf || !window.jspdf.jsPDF) {
                    alert("PDF library is loading, please try again in 5 seconds.");
                    return;
                }
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('landscape');
                
                doc.setFontSize(22);
                doc.setTextColor(0, 128, 105);
                doc.text("Talk & Task - Immutable Audit Ledger", 14, 22);
                doc.setFontSize(10);
                doc.setTextColor(100);
                doc.text(`Secure Report Generated on: ${new Date().toLocaleString()}`, 14, 30);
                
                const tableColumn = ["Date & Time", "Action Type", "Initiated By", "Group/Target", "Encrypted Details"];
                const tableRows = [];

                filteredAuditLogs.forEach(log => {
                    tableRows.push([
                        `${log.dateString}\n${log.time}`,
                        log.type,
                        toSentenceCase((log.user||'').split('@')[0]),
                        log.groupName || log.target || '-',
                        log.content || ''
                    ]);
                });

                doc.autoTable({
                    startY: 36,
                    head: [tableColumn],
                    body: tableRows,
                    theme: 'grid',
                    styles: { fontSize: 9, cellPadding: 3, font: 'helvetica' },
                    headStyles: { fillColor: [0, 128, 105], textColor: [255, 255, 255] },
                    alternateRowStyles: { fillColor: [240, 242, 245] },
                    columnStyles: { 0: { cellWidth: 30 }, 1: { cellWidth: 35 }, 2: { cellWidth: 35 }, 3: { cellWidth: 40 }, 4: { cellWidth: 'auto' } }
                });

                doc.save(`Secure_Audit_Ledger_${new Date().toISOString().split('T')[0]}.pdf`);
            };

            let visibleMessages = messages.filter(checkVisibility).filter(handleSearchFilter);
            let messagesToRender = visibleMessages.filter(m => {
                if (chatFilter === 'tasks-pending') return m.isTask && m.taskData?.status !== 'Completed';
                if (chatFilter === 'tasks-completed') return m.isTask && m.taskData?.status === 'Completed';
                if (chatFilter === 'messages') return !m.isTask && !m.fileUrl;
                if (chatFilter === 'today') return m.dateString === new Date().toISOString().split('T')[0];
                if (chatFilter === 'bookmarked') return m.bookmarkedBy?.includes(user.email);
                return true; 
            });

            const pinnedMessages = visibleMessages.filter(m => m.isPinned);

            const getBubbleStyles = (msg) => {
                let baseStyles = "";
                if (msg.isTask) baseStyles = "bg-[#d1e8ff] text-gray-900 border-none";
                else if (msg.isPrivateMention) baseStyles = msg.isMine ? "bg-[#e5d5fb] text-gray-900" : "bg-[#f3ebff] text-gray-900";
                else baseStyles = msg.isMine ? "bg-[#d9fdd3] text-[#111b21]" : "bg-white text-[#111b21]";
                return `${baseStyles} ${msg.isMine ? 'rounded-xl rounded-tr-sm' : 'rounded-xl rounded-tl-sm'} shadow-sm`;
            };

            const userFontClass = `${currentUserData?.fontSize || 'text-[15px]'}`;

            const renderMessageNode = (msg) => {
                const hasReactions = Object.keys(msg.reactions || {}).length > 0;
                const hasReplies = messages.some(m => m.replyToId === msg.id);
                const canModify = msg.isMine && !msg.isTask && !hasReplies && !hasReactions;
                const isEditingThis = editingMessageId === msg.id;
                const isBookmarked = msg.bookmarkedBy?.includes(user.email);

                const ActionBar = () => (
                    <div className="opacity-0 group-hover/msg:opacity-100 transition-opacity flex items-center gap-2 bg-white shadow-sm border border-gray-200 rounded-full px-3 py-1 shrink-0 z-20">
                        {canModify && (
                            <>
                                <button onClick={(e)=>{e.stopPropagation(); handleDeleteMessage(msg);}} className="text-gray-400 hover:text-red-500 text-xs" title="Delete"><i className="fa-solid fa-trash"></i></button>
                                <button onClick={(e)=>{e.stopPropagation(); setEditingMessageId(msg.id); setEditMessageText(msg.text);}} className="text-gray-400 hover:text-[#008069] text-xs" title="Edit"><i className="fa-solid fa-pen"></i></button>
                            </>
                        )}
                        <button onClick={(e)=>{e.stopPropagation(); handleToggleBookmark(msg);}} className={`${isBookmarked ? 'text-[#008069]' : 'text-gray-400 hover:text-[#008069]'} text-xs`} title="Bookmark"><i className="fa-solid fa-bookmark"></i></button>
                        {(currentUserData?.isAdmin || activeGroup.admins?.includes(user.email)) && (
                            <button onClick={(e)=>{e.stopPropagation(); handleTogglePin(msg);}} className={`${msg.isPinned ? 'text-[#008069]' : 'text-gray-400 hover:text-[#008069]'} text-xs`} title="Pin"><i className="fa-solid fa-thumbtack"></i></button>
                        )}
                        <button onClick={(e)=>{e.stopPropagation(); setReplyingTo(msg); setTimeout(()=>chatInputRef.current?.focus(), 100);}} className="text-gray-400 hover:text-[#008069] text-xs" title="Reply"><i className="fa-solid fa-reply"></i></button>
                        {['👍', '❤️', '😂', '😮'].map(e => <button key={e} onClick={(ev)=>{ev.stopPropagation(); handleReaction(msg.id, e);}} className="hover:scale-125 transition-transform text-sm">{e}</button>)}
                    </div>
                );

                return (
                    <div id={`msg-${msg.id}`} key={`msg-node-${msg.id}`} className={`w-full flex flex-col highlight-msg ${msg.isMine ? 'items-end' : 'items-start'} mb-1.5`}>
                        <div className="flex items-center gap-2 relative max-w-full group/msg">
                            {msg.isMine && <ActionBar />}

                            <div className={`max-w-[85vw] md:max-w-[65vw] relative p-1.5 px-2.5 ${getBubbleStyles(msg)}`}>
                                
                                {!msg.isMine && !msg.isTask && <div className="text-[12px] font-bold text-[#02b289] mb-0.5">{toSentenceCase(msg.sender.split('@')[0])}</div>}

                                {msg.replyToId && (
                                    <div onClick={(e) => { e.stopPropagation(); scrollToMessage(msg.replyToId); }} className={`p-1.5 rounded bg-black/5 mb-1.5 border-l-4 cursor-pointer opacity-90 transition-opacity hover:opacity-100 ${msg.isMine ? 'border-[#02b289]' : 'border-[#02b289]'}`}>
                                        <div className="font-bold text-[11px] text-[#02b289]">{toSentenceCase(msg.originalSender)}</div>
                                        <div className="line-clamp-3 text-xs text-gray-600 truncate">{msg.originalText}</div>
                                    </div>
                                )}

                                {isEditingThis ? (
                                    <div className="flex flex-col gap-2 min-w-[200px] md:min-w-[300px] my-1" onClick={e=>e.stopPropagation()}>
                                        <textarea value={editMessageText} onChange={(e)=>setEditMessageText(e.target.value)} className="w-full text-sm p-2 rounded border border-[#008069] text-black outline-none resize-none" rows="2"></textarea>
                                        <div className="flex justify-end gap-2">
                                            <button onClick={()=>setEditingMessageId(null)} className="text-xs text-gray-500 font-bold px-2 py-1">Cancel</button>
                                            <button onClick={()=>handleSaveEdit(msg)} className="text-xs bg-[#008069] text-white px-3 py-1 rounded-full font-bold">Save</button>
                                        </div>
                                    </div>
                                ) : (
                                    <div onClick={() => { setSelectedMessage(msg); setActiveModal(msg.isTask ? 'task_trail' : 'context'); }} className="cursor-pointer">
                                        
                                        {msg.isTask && (
                                            <div className="flex justify-between mb-1.5 pb-1.5 border-b border-black/5">
                                                <span className="flex items-center gap-1 text-[11px] font-bold text-blue-800"><i className="fa-regular fa-square-check"></i> OFFICIAL TASK</span>
                                                <span className={`text-[9px] uppercase font-bold px-1.5 py-0.5 rounded-sm ${msg.taskData.status === 'Completed' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}`}>{msg.taskData.status}</span>
                                            </div>
                                        )}
                                        {msg.isPrivateMention && <div className="text-[11px] font-bold flex items-center gap-1 mb-1 pb-1 border-b border-black/5 text-purple-700"><i className="fa-solid fa-lock"></i> Private Mention</div>}
                                        
                                        {msg.fileUrl ? (
                                            <div className="flex flex-col gap-1 my-1">
                                                {msg.fileType?.startsWith('image/') ? <img src={msg.fileUrl} alt="Shared" className="rounded-lg max-w-full max-h-64 object-cover cursor-pointer" onClick={(e) => { e.stopPropagation(); window.open(msg.fileUrl, '_blank'); }}/> : 
                                                <div className="flex items-center gap-2 p-2 rounded-lg bg-black/5 cursor-pointer" onClick={(e) => { e.stopPropagation(); window.open(msg.fileUrl, '_blank'); }}><div className="w-8 h-8 rounded flex items-center justify-center text-lg text-gray-600"><i className="fa-solid fa-file-alt"></i></div><div className="flex-1 overflow-hidden"><p className="text-sm font-semibold truncate text-blue-600 hover:underline">{msg.fileName}</p></div></div>}
                                            </div>
                                        ) : <p className={`leading-relaxed whitespace-pre-wrap ${userFontClass}`}>{msg.text}</p>}

                                        {msg.isTask && (
                                            <div className="mt-2 bg-white/40 p-1.5 rounded-lg flex flex-col gap-1">
                                                <span className="flex items-center gap-1 text-[11px] font-semibold text-blue-900">
                                                    <div className="w-4 h-4 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center"><i className="fa-solid fa-people-group text-[8px]"></i></div> 
                                                    {msg.taskData.assignees?.map(a => toSentenceCase(a.split('@')[0])).join(', ')}
                                                </span>
                                                <span className="text-[10px] text-red-600 font-bold self-end"><i className="fa-regular fa-calendar mr-1"></i>{new Date(msg.taskData.deadline).toLocaleDateString()}</span>
                                            </div>
                                        )}
                                        
                                        <div className="flex items-center justify-end gap-1 mt-0.5 text-[10px] text-gray-500/80">
                                            {msg.isEdited && <span className="italic mr-1">(edited)</span>}
                                            {msg.hasReminder && <i className="fa-regular fa-clock text-amber-600 text-[10px] mr-0.5"></i>}
                                            {isBookmarked && <i className="fa-solid fa-bookmark text-[#008069] text-[10px] mr-0.5"></i>}
                                            <span className="mt-0.5">{msg.time}</span>
                                            {msg.isMine && msg.seenBy && msg.seenBy.length > 1 && (
                                                <span title={`Seen by: ${msg.seenBy.filter(e=>e!==user.email).map(e=>toSentenceCase(e.split('@')[0])).join(', ')}`} className="ml-1 text-[#53bdeb] flex items-center">
                                                    <i className="fa-solid fa-check-double text-[11px]"></i>
                                                </span>
                                            )}
                                            {msg.isMine && (!msg.seenBy || msg.seenBy.length <= 1) && <i className="fa-solid fa-check text-gray-400 ml-1 text-[11px]"></i>}
                                        </div>
                                    </div>
                                )}

                                {Object.keys(msg.reactions || {}).length > 0 && (
                                    <div className={`absolute -bottom-2.5 ${msg.isMine ? 'right-2' : 'left-2'} flex gap-1 z-10`}>
                                        {Object.entries(msg.reactions).map(([emoji, users]) => (
                                            <div key={emoji} onClick={(e)=>{e.stopPropagation(); handleReaction(msg.id, emoji);}} className={`text-[10px] bg-white border border-gray-100 rounded-full px-1.5 py-0.5 shadow-sm flex items-center gap-0.5 cursor-pointer ${users.includes(user.email) ? 'bg-gray-50' : ''}`}>
                                                <span>{emoji}</span><span className="font-bold text-gray-500">{users.length}</span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                            {!msg.isMine && <ActionBar />}
                        </div>
                    </div>
                );
            };

            const tasksAssignedToMe = messages.filter(m => m.isTask && m.taskData?.assignees?.includes(user.email) && m.taskData?.status !== "Completed").sort((a,b) => new Date(a.taskData.deadline) - new Date(b.taskData.deadline));
            const tasksAssignedByMe = messages.filter(m => m.isTask && m.senderUid === user.uid && m.taskData?.status !== "Completed").sort((a,b) => new Date(a.taskData.deadline) - new Date(b.taskData.deadline));

            return (
                <div className="flex h-screen w-full bg-white text-gray-800 overflow-hidden relative">
                    {viewMode === "admin" ? (
                        <div className="flex flex-col h-full w-full bg-slate-100 overflow-hidden animate-in fade-in z-40">
                            <div className="bg-[#008069] text-white p-4 flex items-center justify-between shadow-md shrink-0">
                                <div className="flex items-center gap-3"><i className="fa-solid fa-shield-halved text-2xl"></i><div><h1 className="font-bold text-lg">Admin Control Center</h1></div></div>
                                <button onClick={() => setViewMode("chat")} className="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 transition-colors"><i className="fa-solid fa-arrow-left"></i> Back to Chat</button>
                            </div>
                            <div className="flex-1 overflow-y-auto p-4 md:p-8 space-y-6">
                                
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col max-h-[600px]">
                                    <div className="bg-slate-50 p-4 border-b border-slate-200 flex justify-between items-center shrink-0">
                                        <h2 className="font-bold text-slate-800 flex items-center gap-2"><i className="fa-solid fa-list-check text-[#008069]"></i> Immutable Action Audit Log</h2>
                                        <button onClick={handleDownloadAudit} className="bg-[#008069] hover:bg-[#006e5a] text-white px-3 py-1.5 rounded-lg text-xs font-bold transition-colors flex items-center gap-1 shadow-sm"><i className="fa-solid fa-file-pdf"></i> Download PDF Report</button>
                                    </div>
                                    <div className="p-4 border-b border-slate-100 bg-white flex flex-wrap gap-4 items-end">
                                        <div><label className="text-xs font-bold text-slate-500 uppercase block mb-1">By User</label><select value={adminFilterUser} onChange={(e)=>setAdminFilterUser(e.target.value)} className="p-2 border border-slate-300 rounded-lg text-sm bg-slate-50 min-w-[150px] outline-none"><option value="">All Users</option>{dbUsers.map(u => <option key={u.uid} value={u.email}>{toSentenceCase(u.name)}</option>)}</select></div>
                                        <div><label className="text-xs font-bold text-slate-500 uppercase block mb-1">By Type</label><select value={adminFilterType} onChange={(e)=>setAdminFilterType(e.target.value)} className="p-2 border border-slate-300 rounded-lg text-sm bg-slate-50 min-w-[150px] outline-none"><option value="">All Types</option><option value="MESSAGE_CREATE">Public</option><option value="MESSAGE_EDIT">Edited Messages</option><option value="MESSAGE_DELETE">Deleted Messages</option><option value="REACTION">Reactions</option><option value="task-all">All Tasks</option><option value="task-pending">Tasks - Pending</option><option value="task-completed">Tasks - Completed</option><option value="GROUP_ARCHIVE">Group Archived</option><option value="GROUP_RECOVER">Group Recovered</option></select></div>
                                        <div><label className="text-xs font-bold text-slate-500 uppercase block mb-1">By Group</label><select value={adminFilterGroup} onChange={(e)=>setAdminFilterGroup(e.target.value)} className="p-2 border border-slate-300 rounded-lg text-sm bg-slate-50 min-w-[150px] outline-none"><option value="">All Groups</option>{groups.map(g => <option key={g.id} value={g.id}>{toSentenceCase(g.name)} {g.isArchived ? '(Archived)' : ''}</option>)}</select></div>
                                        <div><label className="text-xs font-bold text-slate-500 uppercase block mb-1">By Date</label><input type="date" value={adminFilterDate} onChange={(e)=>setAdminFilterDate(e.target.value)} className="p-2 border border-slate-300 rounded-lg text-sm bg-slate-50 outline-none" /></div>
                                        <button onClick={()=>{setAdminFilterUser(""); setAdminFilterDate(""); setAdminFilterType(""); setAdminFilterGroup("");}} className="bg-slate-200 text-slate-700 px-4 py-2 rounded-lg text-sm font-bold hover:bg-slate-300">Clear</button>
                                    </div>
                                    <div className="p-0 overflow-y-auto flex-1">
                                        <table className="w-full text-left text-sm">
                                            <thead className="bg-slate-50 text-slate-500 text-xs uppercase sticky top-0 shadow-sm z-10"><tr><th className="px-4 py-2">Time</th><th className="px-4 py-2">Action Type</th><th className="px-4 py-2">Initiated By</th><th className="px-4 py-2">Details & Content</th></tr></thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {filteredAuditLogs.length === 0 && <tr><td colSpan="4" className="text-center py-4 text-slate-500 italic">No records found matching filters.</td></tr>}
                                                {filteredAuditLogs.map(log => (
                                                    <tr key={log.id} className="hover:bg-slate-50">
                                                        <td className="px-4 py-2 text-xs text-slate-500">{log.dateString}<br/>{log.time}</td>
                                                        <td className="px-4 py-2"><span className="text-[10px] font-bold bg-slate-100 text-slate-700 px-2 py-1 rounded border border-slate-200">{log.type}</span></td>
                                                        <td className="px-4 py-2 font-semibold text-slate-700 text-xs">{toSentenceCase((log.user||'').split('@')[0])}</td>
                                                        <td className="px-4 py-2"><div className="text-slate-600 text-xs whitespace-pre-wrap">{log.content}</div><div className="text-[10px] text-blue-500 mt-1">{log.target}</div></td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col max-h-[400px]">
                                        <div className="bg-slate-50 p-4 border-b border-slate-200 flex justify-between items-center shrink-0"><h2 className="font-bold text-slate-800 flex items-center gap-2"><i className="fa-solid fa-users text-[#008069]"></i> Users & Roles</h2><button onClick={() => { setAdminForm({ uid: '', name: '', email: '', password: '', isAdmin: false, canCreateGroups: false }); setActiveModal('admin_add_user'); }} className="bg-[#008069] text-white text-xs font-bold px-2 py-1 rounded"><i className="fa-solid fa-plus"></i></button></div>
                                        <div className="p-0 overflow-y-auto flex-1">
                                            <table className="w-full text-left text-sm">
                                                <tbody className="divide-y divide-slate-100">
                                                    {dbUsers.map(u => (
                                                        <tr key={u.uid} className="hover:bg-slate-50">
                                                            <td className="px-4 py-3"><div className="font-semibold text-slate-800 flex items-center gap-1">{toSentenceCase(u.name)}{u.isAdmin && <i className="fa-solid fa-star text-yellow-400 text-[10px]"></i>}</div><div className="text-[10px] text-slate-500">{u.email}</div></td>
                                                            <td className="px-4 py-3 text-right">
                                                                <button onClick={() => handleToggleApprove(u)} className={`mr-2 px-2 py-1 rounded-full text-[9px] font-bold ${u.isApproved ? 'bg-green-100 text-[#008069]' : 'bg-orange-100 text-orange-700'}`}>{u.isApproved ? 'Approved' : 'Pending'}</button>
                                                                <button onClick={() => { setAdminForm({ ...u, canCreateGroups: u.canCreateGroups || false }); setActiveModal('admin_edit_user'); }} className="text-blue-500 hover:text-blue-700 mr-2"><i className="fa-solid fa-pen"></i></button>
                                                                <button onClick={() => handleRemoveUser(u.uid)} disabled={u.email === user.email} className="text-red-500 hover:text-red-700"><i className="fa-solid fa-trash"></i></button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col max-h-[400px]">
                                        <div className="bg-slate-50 p-4 border-b border-slate-200 flex justify-between items-center shrink-0"><h2 className="font-bold text-slate-800 flex items-center gap-2"><i className="fa-solid fa-people-group text-[#008069]"></i> Departments & Groups</h2></div>
                                        <div className="p-0 overflow-y-auto flex-1">
                                            <table className="w-full text-left text-sm">
                                                <tbody className="divide-y divide-slate-100">
                                                    {groups.length === 0 && <tr><td className="p-4 text-center text-gray-500 italic">No custom groups created yet.</td></tr>}
                                                    {groups.map(g => (
                                                        <tr key={g.id} className="hover:bg-slate-50">
                                                            <td className="px-4 py-3"><div className="font-bold text-slate-800">{toSentenceCase(g.name)} {g.isArchived && <span className="text-[9px] bg-orange-100 text-orange-600 px-1 rounded ml-1">Archived</span>}</div><div className="text-[10px] text-slate-500">{g.members?.length || 0} Members | Created by {toSentenceCase(g.createdBy?.split('@')[0])}</div></td>
                                                            <td className="px-4 py-3 text-right">
                                                                <button onClick={() => { setGroupForm({name: g.name, members: g.members, profilePicUrl: g.profilePicUrl}); setEditingGroup(g); setActiveModal('group_form_modal'); }} className="text-[#008069] text-xs font-bold bg-[#d9fdd3] px-2 py-1 rounded mr-2"><i className="fa-solid fa-pen"></i> Edit</button>
                                                                {g.isArchived ? (
                                                                    <button onClick={() => handleAdminRecoverGroup(g.id, g.name)} className="text-blue-500 text-xs font-bold bg-blue-50 px-2 py-1 rounded"><i className="fa-solid fa-rotate-left"></i> Recover</button>
                                                                ) : (
                                                                    <button onClick={() => handleAdminArchiveGroup(g.id, g.name)} className="text-orange-500 text-xs font-bold bg-orange-50 px-2 py-1 rounded"><i className="fa-solid fa-box-archive"></i> Archive</button>
                                                                )}
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    ) : (
                        /* --- CHAT UI --- */
                        <div className="flex h-full w-full relative">
                            
                            {/* LEFT SIDEBAR (All Users, Groups, Profile) */}
                            <div className="hidden md:flex w-72 bg-white border-r border-gray-200 flex-col shrink-0 z-20">
                                <div className="p-4 bg-[#f0f2f5] flex items-center gap-3 relative group">
                                    {currentUserData?.profilePicUrl ? (
                                        <img src={currentUserData.profilePicUrl} className="w-10 h-10 rounded-full object-cover shadow-sm" />
                                    ) : (
                                        <div className="w-10 h-10 rounded-full bg-[#008069] text-white flex items-center justify-center font-bold text-lg shadow-sm">{user.email.substring(0,1).toUpperCase()}</div>
                                    )}
                                    <div className="overflow-hidden flex-1">
                                        <h2 className="font-bold text-sm text-[#111b21] truncate">{toSentenceCase(currentUserData?.name || user.email.split('@')[0])}</h2>
                                        <p className="text-[10px] text-[#54656f] truncate">{user.email}</p>
                                    </div>
                                    <button onClick={()=>{setActiveModal('edit_profile');}} className="text-[#54656f] hover:text-[#008069] absolute right-4 transition-colors" title="Settings"><i className="fa-solid fa-ellipsis-vertical"></i></button>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto flex flex-col bg-white">
                                    <div className="px-4 pt-4 pb-2 text-[11px] font-semibold text-[#54656f] uppercase tracking-wider flex justify-between items-center border-b border-gray-100">
                                        Departments & Groups
                                        {(currentUserData?.isAdmin || currentUserData?.canCreateGroups) && (
                                            <button onClick={()=>{setEditingGroup(null); setGroupForm({name:"", members:[], profilePicUrl: null}); setActiveModal('group_form_modal');}} className="text-[#008069]" title="New Group"><i className="fa-solid fa-plus"></i></button>
                                        )}
                                    </div>
                                    <div className="mb-2 shrink-0 pt-2">
                                        {myGroups.map(g => (
                                            <div key={g.id} onClick={() => { setActiveGroup(g); setShowRightSidebar(false); }} className={`flex items-center gap-3 p-3 cursor-pointer transition-colors ${activeGroup.id === g.id ? 'bg-[#f0f2f5]' : 'hover:bg-[#f5f6f6]'}`}>
                                                {g.profilePicUrl ? <img src={g.profilePicUrl} className="w-10 h-10 rounded-full object-cover shadow-sm" /> : <div className="w-10 h-10 rounded-full bg-[#dfe5e7] flex items-center justify-center text-[#54656f] text-sm shadow-sm"><i className="fa-solid fa-people-group"></i></div>}
                                                <div className="flex-1 overflow-hidden border-b border-gray-100 pb-2"><div className="font-semibold text-[14px] text-[#111b21] truncate">{toSentenceCase(g.name)}</div><div className="text-[12px] text-[#54656f] truncate">{g.id==='demo' ? 'Default Group' : `${g.members?.length || 0} Members`}</div></div>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="px-4 pt-4 pb-2 text-[11px] font-semibold text-[#54656f] uppercase tracking-wider border-t border-b border-gray-100 bg-white">Direct Messages</div>
                                    <div className="shrink-0 mb-4 pt-2">
                                        {dbUsers.filter(u => u.uid !== user.uid).map(u => {
                                            const dmIdList = [user.uid, u.uid].sort();
                                            const dmIdStr = dmIdList.join('_');
                                            const hasUnread = messages.some(m => m.groupId === dmIdStr && m.senderUid !== user.uid && !(m.seenBy || []).includes(user.email));
                                            return (
                                                <div key={u.uid} onClick={() => { setActiveGroup({id: dmIdStr, name: u.name, isDM: true, members: [user.email, u.email]}); setShowRightSidebar(false); }} className={`flex items-center gap-3 p-3 cursor-pointer transition-colors ${activeGroup.id === dmIdStr ? 'bg-[#f0f2f5]' : 'hover:bg-[#f5f6f6]'}`}>
                                                    {u.profilePicUrl ? <img src={u.profilePicUrl} className="w-10 h-10 rounded-full object-cover shadow-sm" /> : <div className="w-10 h-10 rounded-full bg-[#dfe5e7] flex items-center justify-center text-[12px] font-bold text-[#54656f] shadow-sm">{toSentenceCase(u.name).substring(0,2)}</div>}
                                                    <div className="flex-1 overflow-hidden border-b border-gray-100 pb-2 flex justify-between items-center">
                                                        <div>
                                                            <div className="font-semibold text-[14px] text-[#111b21] truncate">{toSentenceCase(u.name)}</div>
                                                            <div className="text-[12px] text-[#54656f] truncate">Private Chat</div>
                                                        </div>
                                                        {hasUnread && <div className="w-2.5 h-2.5 bg-[#00a884] rounded-full mr-2 shadow-sm"></div>}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                <div className="bg-white border-t border-gray-200">
                                    {currentUserData?.isAdmin && (
                                        <button onClick={() => setViewMode("admin")} className="w-full flex items-center gap-3 p-4 hover:bg-[#f5f6f6] text-left text-sm text-[#111b21] transition-colors"><i className="fa-solid fa-shield-halved text-[#54656f] w-5 text-center"></i> Admin Dashboard</button>
                                    )}
                                    <button onClick={onLogout} className="w-full flex items-center gap-3 p-4 hover:bg-red-50 text-left text-sm text-red-600 transition-colors"><i className="fa-solid fa-right-from-bracket w-5 text-center"></i> Logout</button>
                                </div>
                            </div>

                            {/* MIDDLE CHAT AREA */}
                            <div className="flex-1 flex flex-col relative h-full">
                                {/* HEADER */}
                                <div className="h-[60px] bg-[#f0f2f5] flex items-center justify-between px-4 shrink-0 z-10 border-b border-gray-200">
                                    <div className="flex items-center gap-3 cursor-pointer" onClick={()=>{ if(!activeGroup.isDM) setActiveModal('group_settings'); }}>
