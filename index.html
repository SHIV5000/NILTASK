<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corporate Chat App - Enterprise Edition</title>
    
    <!-- Load Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Load React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Load Babel to compile JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Initialize Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, updateDoc, setDoc, getDocs, where, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAoOsog2NP6Pf8YNSxn0rRYK4MSLEVNNZc",
            authDomain: "niltask.firebaseapp.com",
            projectId: "niltask",
            storageBucket: "niltask.firebasestorage.app",
            messagingSenderId: "868641827920",
            appId: "1:868641827920:web:70d9db79a361a76468f555"
        };

        const app = initializeApp(firebaseConfig);
        window.auth = getAuth(app);
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
        window.signOut = signOut;
        window.onAuthStateChanged = onAuthStateChanged;
        
        window.secondaryApp = initializeApp(firebaseConfig, "Secondary");
        window.secondaryAuth = getAuth(window.secondaryApp);

        window.db = getFirestore(app);
        window.collection = collection;
        window.addDoc = addDoc;
        window.onSnapshot = onSnapshot;
        window.query = query;
        window.orderBy = orderBy;
        window.serverTimestamp = serverTimestamp;
        window.doc = doc;
        window.updateDoc = updateDoc;
        window.setDoc = setDoc;
        window.getDocs = getDocs;
        window.where = where;
        window.deleteDoc = deleteDoc;
        
        window.storage = getStorage(app);
        window.ref = ref;
        window.uploadBytesResumable = uploadBytesResumable;
        window.getDownloadURL = getDownloadURL;

        window.dispatchEvent(new Event('firebaseReady'));
    </script>

    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); }
        .telegram-bg { background-color: #E6EBE9; background-image: url('https://www.transparenttextures.com/patterns/cubes.png'); }
    </style>
</head>
<body class="bg-gray-100 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // Feature: Corporate Notification Sound
        const notificationSound = new Audio('https://cdn.freesound.org/previews/536/536420_4397472-lq.mp3');

        function ChatApp({ user, onLogout }) {
            const [activeModal, setActiveModal] = useState(null);
            const [selectedMessage, setSelectedMessage] = useState(null);
            const [inputText, setInputText] = useState("");
            const [messages, setMessages] = useState([]); 
            const messagesEndRef = useRef(null); 

            // Feature: Thread Reply & Edit States
            const [replyingTo, setReplyingTo] = useState(null);
            const [editingMessageId, setEditingMessageId] = useState(null);
            const [editMessageText, setEditMessageText] = useState("");

            // Task & Delegate States
            const [taskAssignee, setTaskAssignee] = useState("");
            const [taskDeadline, setTaskDeadline] = useState("");
            const [delegateAssignee, setDelegateAssignee] = useState("");
            const [trailComment, setTrailComment] = useState(""); 
            const [dbUsers, setDbUsers] = useState([]); 
            
            // Search, Notifications & Admin
            const [searchQuery, setSearchQuery] = useState("");
            const [showNotifications, setShowNotifications] = useState(false);
            const [viewMode, setViewMode] = useState("chat"); 
            const [currentUserData, setCurrentUserData] = useState(null);
            const [adminForm, setAdminForm] = useState({ uid: '', name: '', email: '', password: '', isAdmin: false, canCreateGroups: false });
            
            // Group Management States
            const [groups, setGroups] = useState([]);
            const [activeGroup, setActiveGroup] = useState({ id: "main", name: "Academic Council Group" });
            const [groupForm, setGroupForm] = useState({ name: "", members: [] });
            const [editingGroup, setEditingGroup] = useState(null);

            // Admin Filters (RESTORED)
            const [adminFilterUser, setAdminFilterUser] = useState("");
            const [adminFilterDate, setAdminFilterDate] = useState("");
            const [allAdminReminders, setAllAdminReminders] = useState([]);

            // Upload States
            const [uploadProgress, setUploadProgress] = useState(0);
            const [isUploading, setIsUploading] = useState(false);
            const fileInputRef = useRef(null);
            const trailFileInputRef = useRef(null);
            const [trailFileUploading, setTrailFileUploading] = useState(false);

            // Reminders & Alerts
            const [reminderDateTime, setReminderDateTime] = useState("");
            const [activeReminders, setActiveReminders] = useState([]);
            const [genericNotifications, setGenericNotifications] = useState([]);
            const prevNotifCountRef = useRef(0);

            // Feature: Typing and Online States
            const [typingStatus, setTypingStatus] = useState([]);

            // Request Notification Permission
            useEffect(() => {
                if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") {
                    Notification.requestPermission();
                }
            }, []);

            // Feature: Fetch Reminders & Real-time Alerts
            useEffect(() => {
                const qPersonal = window.query(window.collection(window.db, "reminders"), window.where("userId", "==", user.uid), window.where("isTriggered", "==", false));
                const unsubPersonal = window.onSnapshot(qPersonal, (snapshot) => {
                    setActiveReminders(snapshot.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                const qAlerts = window.query(window.collection(window.db, "notifications"), window.where("userId", "==", user.uid), window.where("isRead", "==", false));
                const unsubAlerts = window.onSnapshot(qAlerts, (snapshot) => {
                    setGenericNotifications(snapshot.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                let unsubAdmin = () => {};
                if (currentUserData?.isAdmin) {
                    const qAdmin = window.query(window.collection(window.db, "reminders"), window.orderBy("remindAt", "desc"));
                    unsubAdmin = window.onSnapshot(qAdmin, (snapshot) => {
                        setAllAdminReminders(snapshot.docs.map(d => ({ id: d.id, ...d.data() })));
                    });
                }
                return () => { unsubPersonal(); unsubAlerts(); unsubAdmin(); };
            }, [user.uid, currentUserData?.isAdmin]);

            // Feature: Reminder Trigger Loop
            useEffect(() => {
                const interval = setInterval(() => {
                    const now = new Date();
                    activeReminders.forEach(async (rem) => {
                        const remindTime = new Date(rem.remindAt);
                        if (remindTime <= now) {
                            notificationSound.play().catch(e => console.log("Sound play prevented"));
                            if ("Notification" in window && Notification.permission === "granted") {
                                new Notification("Corporate Portal Reminder", { body: `⏰ "${rem.messageText}"`, icon: "https://cdn-icons-png.flaticon.com/512/825/825590.png" });
                            } else {
                                alert(`⏰ Reminder: "${rem.messageText}"`);
                            }
                            try { await window.updateDoc(window.doc(window.db, "reminders", rem.id), { isTriggered: true }); } 
                            catch (error) {}
                        }
                    });
                }, 15000); 
                return () => clearInterval(interval);
            }, [activeReminders]);

            // Synchronize User Data
            useEffect(() => {
                const syncUserToDB = async () => {
                    try { 
                        await window.setDoc(window.doc(window.db, "users", user.uid), { 
                            uid: user.uid, email: user.email, name: user.email.split('@')[0].toUpperCase(),
                            lastActive: window.serverTimestamp() // Real-time Heartbeat
                        }, { merge: true }); 
                    } catch (error) {}
                };
                syncUserToDB();

                // Feature: Online Heartbeat Interval (Updates every 1 minute)
                const heartbeatInterval = setInterval(() => {
                    window.updateDoc(window.doc(window.db, "users", user.uid), { 
                        lastActive: window.serverTimestamp() 
                    }).catch(()=>{});
                }, 60000);

                const unsubCurrent = window.onSnapshot(window.doc(window.db, "users", user.uid), (doc) => { 
                    if (doc.exists()) setCurrentUserData(doc.data()); 
                });
                const unsubUsers = window.onSnapshot(window.query(window.collection(window.db, "users"), window.orderBy("email", "asc")), (snapshot) => {
                    setDbUsers(snapshot.docs.map(doc => doc.data()));
                });
                const unsubGroups = window.onSnapshot(window.collection(window.db, "groups"), (snapshot) => {
                    setGroups(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });

                return () => { clearInterval(heartbeatInterval); unsubCurrent(); unsubUsers(); unsubGroups(); };
            }, [user]);

            // Feature: Fetch Live Chat Messages
            useEffect(() => {
                const q = window.query(window.collection(window.db, "messages"), window.orderBy("timestamp", "asc"));
                const unsubscribe = window.onSnapshot(q, (snapshot) => {
                    const loadedMessages = snapshot.docs.map(doc => {
                        const data = doc.data();
                        return {
                            id: doc.id, ...data,
                            sender: data.senderEmail,
                            isMine: data.senderUid === user.uid, 
                            time: data.timestamp ? new Date(data.timestamp.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'Sending...',
                            dateString: data.timestamp ? new Date(data.timestamp.toDate()).toISOString().split('T')[0] : '', 
                            isTask: data.isTask === true, 
                            groupId: data.groupId || "main",
                            reactions: data.reactions || {}
                        };
                    });
                    setMessages(loadedMessages);
                    setTimeout(() => messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }), 150);
                });
                return () => unsubscribe();
            }, [user.uid]);

            // Calculate active notifications
            const activeActionableTasks = messages.filter(m => m.isTask && m.taskData?.currentAssignee === user.email && m.taskData?.status !== "Completed" && !(m.taskData?.dismissedBy || []).includes(user.uid));
            const totalNotifications = activeActionableTasks.length + genericNotifications.length;

            // Trigger sound on new notifications
            useEffect(() => {
                if (totalNotifications > prevNotifCountRef.current) {
                    notificationSound.play().catch(e => console.log("Sound play prevented"));
                }
                prevNotifCountRef.current = totalNotifications;
            }, [totalNotifications]);

            // Feature: Typing Indicator Listener
            useEffect(() => {
                const q = window.query(window.collection(window.db, "typing"), window.where("groupId", "==", activeGroup.id));
                const unsubTyping = window.onSnapshot(q, (snapshot) => {
                    const now = Date.now();
                    const typingUsers = snapshot.docs
                        .map(d => ({ id: d.id, ...d.data() }))
                        .filter(d => d.id !== `${activeGroup.id}_${user.uid}`) // Exclude self
                        .filter(d => d.timestamp && (now - d.timestamp.toMillis() < 4000)); // Only show if active within 4 seconds
                    setTypingStatus(typingUsers);
                });
                return () => unsubTyping();
            }, [activeGroup.id, user.uid]);

            // Feature: Auto-Grammar formatting
            const formatMessage = (txt) => {
                if(!txt.trim()) return txt;
                let formatted = txt.trim();
                formatted = formatted.charAt(0).toUpperCase() + formatted.slice(1);
                if (!/[.!?]$/.test(formatted) && !formatted.includes('\n')) {
                    formatted += '.';
                }
                return formatted;
            };

            const handleSendMessage = async () => {
                if (!inputText.trim()) return;
                const messageText = formatMessage(inputText);
                setInputText(""); 
                
                const mentions = [];
                dbUsers.forEach(u => { if (messageText.includes(`@${u.name}`)) mentions.push(u.email); });
                const isPrivate = mentions.length > 0;
                const allowedUsers = isPrivate ? [user.email, ...mentions] : [];

                // Handle Reply Metadata
                let replyData = null;
                if (replyingTo) {
                    const threadCount = messages.filter(m => m.replyToId === replyingTo.id).length;
                    replyData = { 
                        replyToId: replyingTo.id, 
                        replyNumber: threadCount + 1, 
                        originalText: replyingTo.text || replyingTo.fileName || 'Attachment', 
                        originalSender: replyingTo.sender.split('@')[0] 
                    };

                    // ENHANCED: Real-time notification for Replies
                    if (replyingTo.senderUid !== user.uid) {
                        try {
                            await window.addDoc(window.collection(window.db, "notifications"), {
                                userId: replyingTo.senderUid,
                                type: "reply",
                                text: `${user.email.split('@')[0]} replied to your message in ${activeGroup.name}.`,
                                timestamp: window.serverTimestamp(),
                                isRead: false
                            });
                        } catch (e) { console.log("Failed to send reply notification"); }
                    }
                }

                try {
                    await window.addDoc(window.collection(window.db, "messages"), {
                        text: messageText, 
                        senderUid: user.uid, 
                        senderEmail: user.email, 
                        timestamp: window.serverTimestamp(),
                        isTask: false, 
                        hasReminder: false, 
                        isPrivateMention: isPrivate, 
                        allowedUsers: allowedUsers,
                        fileUrl: null, 
                        fileName: null, 
                        fileType: null, 
                        groupId: activeGroup.id, 
                        reactions: {}, 
                        ...(replyData || {})
                    });
                    setReplyingTo(null);
                } catch (error) { alert("Failed to send message."); }
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) { 
                    e.preventDefault(); 
                    handleSendMessage(); 
                }
            };

            const handleTypingEvent = () => {
                try {
                    window.setDoc(window.doc(window.db, "typing", `${activeGroup.id}_${user.uid}`), {
                        groupId: activeGroup.id,
                        name: currentUserData?.name || user.email.split('@')[0],
                        timestamp: window.serverTimestamp()
                    }, { merge: true });
                } catch (e) {}
            };

            // Feature: Universal Reactions with Notifications
            const handleReaction = async (msgId, emoji) => {
                const msg = messages.find(m => m.id === msgId);
                if(!msg) return;
                
                let updatedReactions = { ...msg.reactions };
                let usersForEmoji = updatedReactions[emoji] || [];
                const isAdding = !usersForEmoji.includes(user.email);

                if (isAdding) {
                    usersForEmoji = [...usersForEmoji, user.email];
                } else {
                    usersForEmoji = usersForEmoji.filter(e => e !== user.email);
                }

                if (usersForEmoji.length === 0) {
                    delete updatedReactions[emoji];
                } else {
                    updatedReactions[emoji] = usersForEmoji;
                }

                try {
                    await window.updateDoc(window.doc(window.db, "messages", msgId), { 
                        reactions: updatedReactions 
                    });
                    
                    if (isAdding && msg.senderUid !== user.uid) {
                        await window.addDoc(window.collection(window.db, "notifications"), {
                            userId: msg.senderUid, 
                            type: "reaction", 
                            text: `${user.email.split('@')[0]} reacted ${emoji} to your message.`,
                            timestamp: window.serverTimestamp(), 
                            isRead: false
                        });
                    }
                } catch (err) { console.error("Reaction failed", err); }
            };

            // Main Chat File Upload
            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsUploading(true); 
                setUploadProgress(0);
                
                const uniqueFileName = `${Date.now()}_${file.name}`;
                const storageRef = window.ref(window.storage, `chat_uploads/${uniqueFileName}`);
                const uploadTask = window.uploadBytesResumable(storageRef, file);

                uploadTask.on('state_changed', 
                    (snapshot) => setUploadProgress((snapshot.bytesTransferred / snapshot.totalBytes) * 100), 
                    (error) => { setIsUploading(false); alert("File upload failed."); }, 
                    async () => {
                        try {
                            const downloadURL = await window.getDownloadURL(uploadTask.snapshot.ref);
                            await window.addDoc(window.collection(window.db, "messages"), {
                                text: `Shared a file: ${file.name}`, 
                                senderUid: user.uid, 
                                senderEmail: user.email, 
                                timestamp: window.serverTimestamp(),
                                isTask: false, 
                                hasReminder: false, 
                                isPrivateMention: false, 
                                allowedUsers: [], 
                                fileUrl: downloadURL, 
                                fileName: file.name, 
                                fileType: file.type,
                                groupId: activeGroup.id, 
                                reactions: {}
                            });
                        } catch (err) {} 
                        finally { 
                            setIsUploading(false); 
                            setUploadProgress(0); 
                            if(fileInputRef.current) fileInputRef.current.value = ""; 
                        }
                    }
                );
            };

            // Feature: Task Trail File Upload
            const handleTrailFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file || !selectedMessage) return;
                setTrailFileUploading(true);
                
                const uniqueFileName = `${Date.now()}_${file.name}`;
                const storageRef = window.ref(window.storage, `task_updates/${uniqueFileName}`);
                const uploadTask = window.uploadBytesResumable(storageRef, file);

                uploadTask.on('state_changed', null, 
                    (error) => { setTrailFileUploading(false); alert("Upload failed."); }, 
                    async () => {
                        try {
                            const downloadURL = await window.getDownloadURL(uploadTask.snapshot.ref);
                            const now = new Date();
                            const updatedTrail = [...selectedMessage.taskData.trail, { 
                                action: "File Uploaded", 
                                by: user.email, 
                                time: now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + ', ' + now.toLocaleDateString(), 
                                comment: "Attached file via system", 
                                fileUrl: downloadURL, 
                                fileName: file.name 
                            }];
                            await window.updateDoc(window.doc(window.db, "messages", selectedMessage.id), { 
                                "taskData.trail": updatedTrail 
                            });
                            setSelectedMessage(prev => ({...prev, taskData: {...prev.taskData, trail: updatedTrail}}));
                        } catch(e) {} 
                        finally { 
                            setTrailFileUploading(false); 
                            if(trailFileInputRef.current) trailFileInputRef.current.value = ""; 
                        }
                    }
                );
            };

            // Group Form Submission
            const handleGroupSubmit = async (e) => {
                e.preventDefault();
                if(!groupForm.name.trim()) return;
                try {
                    const finalMembers = [...new Set([...groupForm.members, user.email])];
                    if (editingGroup) {
                        await window.updateDoc(window.doc(window.db, "groups", editingGroup.id), { 
                            name: groupForm.name, 
                            members: finalMembers 
                        });
                    } else {
                        await window.addDoc(window.collection(window.db, "groups"), { 
                            name: groupForm.name, 
                            members: finalMembers, 
                            admins: [user.email], 
                            createdBy: user.email, 
                            createdAt: window.serverTimestamp() 
                        });
                    }
                    setActiveModal(null); 
                    setEditingGroup(null); 
                    setGroupForm({name: "", members: []});
                } catch (error) { alert("Failed to save group."); }
            };

            const handleUpdateGroupMembers = async (e) => {
                e.preventDefault();
                try {
                    const finalMembers = [...new Set([...groupForm.members, ...activeGroup.admins])];
                    await window.updateDoc(window.doc(window.db, "groups", activeGroup.id), { 
                        members: finalMembers 
                    });
                    setActiveModal(null); 
                    setActiveGroup({...activeGroup, members: finalMembers});
                } catch (error) { alert("Failed to update members."); }
            };

            const checkVisibility = (msg) => {
                if (msg.groupId !== activeGroup.id) return false;
                if (msg.isTask) {
                    if (msg.sender === user.email || msg.taskData?.currentAssignee === user.email) return true;
                    if (msg.taskData?.trail?.some(t => t.by === user.email || t.to === user.email)) return true;
                    return false; 
                }
                if (msg.isPrivateMention) return msg.allowedUsers.includes(user.email);
                return true;
            };

            const handleSearchFilter = (msg) => {
                if (!searchQuery.trim()) return true;
                const q = searchQuery.toLowerCase();
                return msg.text?.toLowerCase().includes(q) || msg.sender?.toLowerCase().includes(q) || (msg.isTask && msg.taskData?.currentAssignee?.toLowerCase().includes(q));
            };

            const handleMessageClick = (msg) => {
                if(editingMessageId === msg.id) return;
                setSelectedMessage(msg);
                setActiveModal(msg.isTask ? 'task_trail' : 'context');
            };

            // Feature: Clear All Notifications
            const handleClearNotifications = async () => {
                const taskPromises = activeActionableTasks.map(task => 
                    window.updateDoc(window.doc(window.db, "messages", task.id), { 
                        "taskData.dismissedBy": [...(task.taskData.dismissedBy || []), user.uid] 
                    })
                );
                const alertPromises = genericNotifications.map(n => 
                    window.updateDoc(window.doc(window.db, "notifications", n.id), { 
                        isRead: true 
                    })
                );
                await Promise.all([...taskPromises, ...alertPromises]);
                setShowNotifications(false);
            };

            const handleDeleteMessage = async (msgId) => {
                if(window.confirm("Permanently delete this message?")) {
                    await window.deleteDoc(window.doc(window.db, "messages", msgId));
                }
            };

            const handleSaveEdit = async (msgId) => {
                if (!editMessageText.trim()) return;
                await window.updateDoc(window.doc(window.db, "messages", msgId), { 
                    text: editMessageText, 
                    isEdited: true 
                });
                setEditingMessageId(null);
            };

            const setReminder = async () => {
                if (!selectedMessage || !reminderDateTime) return;
                try {
                    await window.addDoc(window.collection(window.db, "reminders"), { 
                        userId: user.uid, 
                        userEmail: user.email, 
                        messageId: selectedMessage.id, 
                        messageText: selectedMessage.text || selectedMessage.fileName || "File Attachment", 
                        remindAt: reminderDateTime, 
                        isTriggered: false 
                    });
                    await window.updateDoc(window.doc(window.db, "messages", selectedMessage.id), { 
                        hasReminder: true 
                    });
                    setActiveModal(null); 
                    setReminderDateTime("");
                } catch (error) { alert("Failed to save reminder."); }
            };

            const convertToTask = async () => {
                if (!selectedMessage || !taskDeadline || !taskAssignee) return alert("Please select Assignee and Deadline.");
                try {
                    const now = new Date();
                    await window.setDoc(window.doc(window.db, "messages", selectedMessage.id), {
                        isTask: true, 
                        taskData: { 
                            deadline: taskDeadline, 
                            currentAssignee: taskAssignee, 
                            status: "Pending", 
                            dismissedBy: [], 
                            trail: [{ action: "Task Created", by: user.email, time: now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + ', ' + now.toLocaleDateString(), to: taskAssignee }] 
                        }
                    }, { merge: true });
                    setActiveModal(null);
                } catch (error) {}
            };

            const handleDelegateTask = async () => {
                if (!selectedMessage || !delegateAssignee) return;
                try {
                    const now = new Date();
                    const updatedTrail = [...selectedMessage.taskData.trail, { 
                        action: "Delegated", by: user.email, time: now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + ', ' + now.toLocaleDateString(), to: delegateAssignee 
                    }];
                    await window.updateDoc(window.doc(window.db, "messages", selectedMessage.id), { 
                        "taskData.currentAssignee": delegateAssignee, 
                        "taskData.status": "In Progress", 
                        "taskData.trail": updatedTrail, 
                        "taskData.dismissedBy": [] 
                    });
                    setActiveModal(null);
                } catch (error) {}
            };

            const handleCompleteTask = async () => {
                if (!selectedMessage) return;
                if (user.email !== selectedMessage.taskData.currentAssignee && !currentUserData?.isAdmin) return alert("Only the Assignee or Admin can complete this.");
                try {
                    const now = new Date();
                    const updatedTrail = [...selectedMessage.taskData.trail, { 
                        action: "Marked Completed", by: user.email, time: now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + ', ' + now.toLocaleDateString(), to: "System" 
                    }];
                    await window.updateDoc(window.doc(window.db, "messages", selectedMessage.id), { 
                        "taskData.status": "Completed", 
                        "taskData.trail": updatedTrail 
                    });
                    setActiveModal(null);
                } catch (error) {}
            };

            const handleAddComment = async () => {
                if (!selectedMessage || !trailComment.trim()) return;
                try {
                    const now = new Date();
                    const updatedTrail = [...selectedMessage.taskData.trail, { 
                        action: "Update Added", by: user.email, time: now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + ', ' + now.toLocaleDateString(), comment: trailComment 
                    }];
                    await window.updateDoc(window.doc(window.db, "messages", selectedMessage.id), { 
                        "taskData.trail": updatedTrail 
                    });
                    setTrailComment(""); 
                    setSelectedMessage(prev => ({...prev, taskData: {...prev.taskData, trail: updatedTrail}}));
                } catch (error) {}
            };

            // Admin Functions
            const handleRemoveUser = async (uid) => { 
                if (window.confirm("Delete user entirely?")) await window.deleteDoc(window.doc(window.db, "users", uid)); 
            };
            const handleToggleApprove = async (u) => {
                await window.updateDoc(window.doc(window.db, "users", u.uid), { isApproved: !u.isApproved });
            };
            const handleAddUserSubmit = async (e) => { 
                e.preventDefault(); 
                try { 
                    const cred = await window.createUserWithEmailAndPassword(window.secondaryAuth, adminForm.email, adminForm.password); 
                    await window.setDoc(window.doc(window.db, "users", cred.user.uid), { 
                        uid: cred.user.uid, 
                        email: cred.user.email, 
                        name: adminForm.name || cred.user.email.split('@')[0].toUpperCase(), 
                        isApproved: true, 
                        isAdmin: adminForm.isAdmin, 
                        canCreateGroups: adminForm.canCreateGroups 
                    }); 
                    window.signOut(window.secondaryAuth); 
                    setActiveModal(null); 
                    setAdminForm({ uid: '', name: '', email: '', password: '', isAdmin: false, canCreateGroups: false }); 
                } catch(err){alert(err.message);} 
            };
            const handleEditUserSubmit = async (e) => { 
                e.preventDefault(); 
                await window.updateDoc(window.doc(window.db, "users", adminForm.uid), { 
                    name: adminForm.name, 
                    isAdmin: adminForm.isAdmin, 
                    canCreateGroups: adminForm.canCreateGroups 
                }); 
                setActiveModal(null); 
            };
            const handleAdminDeleteMessage = async (msgId) => { 
                if(window.confirm("Delete this record globally?")) await window.deleteDoc(window.doc(window.db, "messages", msgId)); 
            };
            const handleAdminDeleteGroup = async (groupId) => { 
                if(window.confirm("Delete this department completely?")) await window.deleteDoc(window.doc(window.db, "groups", groupId)); 
            };

            // Pending Approval Wall
            if (currentUserData && currentUserData.isApproved !== true && currentUserData.isAdmin !== true) {
                return (
                    <div className="flex items-center justify-center h-screen bg-gray-100 p-4 font-sans text-gray-800">
                        <div className="w-full max-w-md bg-white rounded-3xl shadow-2xl p-8 border-t-8 border-orange-500 text-center">
                            <i className="fa-solid fa-user-clock text-5xl text-orange-500 mb-4 animate-pulse"></i>
                            <h1 className="text-2xl font-bold mb-2">Pending Approval</h1>
                            <p className="text-sm text-gray-600 mb-6">Account requires Admin verification.</p>
                            <button onClick={onLogout} className="bg-gray-100 border text-gray-700 py-2 px-6 rounded-xl font-bold shadow-sm">Sign Out</button>
                        </div>
                    </div>
                );
            }

            // Feature: RESTORED Admin Dashboard Filtering Logic
            const filteredAuditMessages = [...messages].reverse().filter(msg => {
                const safeSender = msg.sender || "";
                const safeAssignee = msg.taskData?.currentAssignee || "";
                const safeDate = msg.dateString || "";
                const matchUser = adminFilterUser === "" || safeSender === adminFilterUser || (msg.isTask && safeAssignee === adminFilterUser);
                const matchDate = adminFilterDate === "" || safeDate === adminFilterDate;
                return matchUser && matchDate;
            });

            // Chat Pre-processing
            const visibleMessages = messages.filter(checkVisibility).filter(handleSearchFilter);
            const childrenMap = {};
            const parentsToRender = [];
            
            // Build Thread hierarchy
            visibleMessages.forEach(m => {
                if (m.replyToId && visibleMessages.some(parent => parent.id === m.replyToId)) {
                    if(!childrenMap[m.replyToId]) childrenMap[m.replyToId] = [];
                    childrenMap[m.replyToId].push(m);
                } else { 
                    parentsToRender.push(m); 
                }
            });

            // Feature: Distinct Bubbles & Oval Replies
            const getBubbleStyles = (msg, isChild) => {
                let baseStyles = "";
                if (msg.isTask) baseStyles = "bg-blue-50 text-blue-900 border-2 border-blue-400";
                else if (msg.isPrivateMention) baseStyles = msg.isMine ? "bg-purple-100 text-purple-900 border border-purple-300" : "bg-purple-50 text-purple-900 border border-purple-200";
                else if (msg.replyToId) baseStyles = msg.isMine ? "bg-teal-50 text-teal-900 border border-teal-300" : "bg-teal-50 text-teal-900 border border-teal-200";
                else baseStyles = msg.isMine ? "bg-[#e4ebd3] text-gray-800 border border-[#c0d1a1]" : "bg-white text-gray-800 border border-gray-200";
                
                // Shape modifier
                if (isChild) return `${baseStyles} rounded-[30px] px-6`; // Distinct Oval Bubble Shape for Replies
                return `${baseStyles} ${msg.isMine ? 'rounded-2xl rounded-tr-none' : 'rounded-2xl rounded-tl-none'}`;
            };

            // Recursive Message Node Renderer
            const renderMessageNode = (msg, isChild = false) => {
                const hasReplies = childrenMap[msg.id] && childrenMap[msg.id].length > 0;
                const hasReactions = Object.keys(msg.reactions || {}).length > 0;
                
                // Constraints on edit/delete
                const canModify = msg.isMine && !hasReplies && !hasReactions;
                const isEditingThis = editingMessageId === msg.id;

                // Feature: STRICT HOVER-ONLY Universal Action Bar
                const ActionBar = () => (
                    <div className="opacity-0 group-hover/msg:opacity-100 transition-opacity flex items-center gap-1 bg-white shadow-sm border border-gray-200 rounded-full px-2 py-1 shrink-0">
                        {canModify && (
                            <>
                                <button onClick={()=>handleDeleteMessage(msg.id)} className="text-red-400 hover:text-red-600 px-1.5 text-xs" title="Delete">
                                    <i className="fa-solid fa-trash"></i>
                                </button>
                                <button onClick={()=>{setEditingMessageId(msg.id); setEditMessageText(msg.text);}} className="text-gray-400 hover:text-blue-500 px-1.5 text-xs" title="Edit">
                                    <i className="fa-solid fa-pen"></i>
                                </button>
                            </>
                        )}
                        <button onClick={()=>setReplyingTo(msg)} className="text-gray-400 hover:text-teal-500 px-1.5 text-xs" title="Reply">
                            <i className="fa-solid fa-reply"></i>
                        </button>
                        {['👍', '❤️', '😂', '😮'].map(e => (
                            <button key={e} onClick={()=>handleReaction(msg.id, e)} className="hover:scale-125 transition-transform text-sm">{e}</button>
                        ))}
                    </div>
                );

                return (
                    <div key={`msg-node-${msg.id}`} className={`w-full flex flex-col ${msg.isMine ? 'items-end' : 'items-start'} animate-in fade-in slide-in-from-bottom-2 mb-3`}>
                        <div className="flex items-center gap-2 relative max-w-full group/msg">
                            
                            {/* Actions Left (If Mine) */}
                            {msg.isMine && <ActionBar />}

                            <div className={`max-w-[85vw] md:max-w-[45vw] p-3 shadow-sm relative ${getBubbleStyles(msg, isChild)}`}>
                                {!msg.isMine && !msg.isTask && <div className="text-[11px] font-bold text-slate-500 mb-1 ml-1">{msg.sender.split('@')[0]}</div>}

                                {isEditingThis ? (
                                    <div className="flex flex-col gap-2 min-w-[200px] md:min-w-[300px]">
                                        <textarea 
                                            value={editMessageText} 
                                            onChange={(e)=>setEditMessageText(e.target.value)} 
                                            className="w-full text-sm p-2 rounded border border-blue-300 text-black outline-none resize-none" 
                                            rows="2">
                                        </textarea>
                                        <div className="flex justify-end gap-2">
                                            <button onClick={()=>setEditingMessageId(null)} className="text-xs text-gray-500 font-bold px-2 py-1">Cancel</button>
                                            <button onClick={()=>handleSaveEdit(msg.id)} className="text-xs bg-blue-500 text-white px-3 py-1 rounded-full font-bold">Save</button>
                                        </div>
                                    </div>
                                ) : (
                                    <div onClick={() => handleMessageClick(msg)} className="cursor-pointer">
                                        
                                        {/* Context Headers */}
                                        {msg.isTask && (
                                            <div className="flex justify-between mb-2 pb-2 border-b border-black/10">
                                                <span className="flex items-center gap-1 text-[11px] font-bold"><i className="fa-regular fa-square-check"></i> OFFICIAL TASK</span>
                                                <span className={`text-[9px] uppercase font-bold px-2 py-0.5 rounded-full ${msg.taskData.status === 'Completed' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}`}>{msg.taskData.status}</span>
                                            </div>
                                        )}
                                        
                                        {msg.isPrivateMention && (
                                            <div className="text-[10px] font-bold flex items-center gap-1 mb-1 pb-1 border-b border-black/10 text-purple-700">
                                                <i className="fa-solid fa-lock"></i> Private Mention
                                            </div>
                                        )}
                                        
                                        {msg.replyToId && !isChild && (
                                            <div className="bg-black/5 p-2 rounded-lg mb-2 border-l-2 border-teal-500 text-xs">
                                                <div className="font-bold text-teal-800 flex justify-between">
                                                    <span><i className="fa-solid fa-reply mr-1"></i> Replying to {msg.originalSender}</span>
                                                    <span className="text-[9px] bg-teal-200 text-teal-900 px-1.5 py-0.5 rounded">Thread #{msg.replyNumber}</span>
                                                </div>
                                                <div className="text-teal-900/70 italic line-clamp-1 mt-0.5">"{msg.originalText}"</div>
                                            </div>
                                        )}
                                        
                                        {/* Main Content */}
                                        {msg.fileUrl ? (
                                            <div className="flex flex-col gap-2">
                                                {msg.fileType?.startsWith('image/') ? (
                                                    <img src={msg.fileUrl} alt="Shared" className="rounded-lg max-w-full max-h-64 object-cover cursor-pointer hover:opacity-90" onClick={(e) => { e.stopPropagation(); window.open(msg.fileUrl, '_blank'); }}/> 
                                                ) : (
                                                    <div className="flex items-center gap-3 p-2 rounded-lg border border-black/10 bg-white/30 hover:bg-white/50 transition-colors" onClick={(e) => { e.stopPropagation(); window.open(msg.fileUrl, '_blank'); }}>
                                                        <div className="w-10 h-10 rounded flex items-center justify-center text-xl bg-black/5"><i className="fa-regular fa-file-lines"></i></div>
                                                        <div className="flex-1 overflow-hidden"><p className="text-sm font-bold truncate">{msg.fileName}</p></div>
                                                    </div>
                                                )}
                                            </div>
                                        ) : (
                                            <p className="text-[15px] leading-relaxed whitespace-pre-wrap">{msg.text}</p>
                                        )}

                                        {/* Task Footer */}
                                        {msg.isTask && (
                                            <div className="mt-3 bg-white/50 p-2 rounded-xl border border-black/5 flex items-center justify-between">
                                                <span className="flex items-center gap-1 text-xs font-semibold text-blue-900">
                                                    <div className="w-5 h-5 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center"><i className="fa-regular fa-user text-[10px]"></i></div> 
                                                    {msg.taskData.currentAssignee.split('@')[0]}
                                                </span>
                                                <span className="text-[10px] text-red-600 font-bold"><i className="fa-regular fa-calendar mr-1"></i>{new Date(msg.taskData.deadline).toLocaleDateString()}</span>
                                            </div>
                                        )}
                                        
                                        {/* Timestamps */}
                                        <div className="flex items-center justify-end gap-1 mt-1 text-[10px] font-semibold opacity-60">
                                            {msg.isEdited && <span className="italic mr-1">(edited)</span>}
                                            {msg.hasReminder && <i className="fa-regular fa-clock text-amber-600 text-[11px] mr-0.5"></i>}
                                            <span>{msg.time}</span>
                                            {msg.isMine && <i className="fa-solid fa-check-double"></i>}
                                        </div>
                                    </div>
                                )}

                                {/* Reactions Bar Display */}
                                {Object.keys(msg.reactions || {}).length > 0 && (
                                    <div className={`absolute -bottom-3 ${msg.isMine ? 'right-2' : 'left-2'} flex gap-1 z-10`}>
                                        {Object.entries(msg.reactions).map(([emoji, users]) => (
                                            <div key={emoji} onClick={(e)=>{e.stopPropagation(); handleReaction(msg.id, emoji);}} className={`text-xs bg-white border border-gray-200 rounded-full px-1.5 py-0.5 shadow-sm flex items-center gap-1 cursor-pointer ${users.includes(user.email) ? 'bg-blue-50 border-blue-200' : ''}`}>
                                                <span>{emoji}</span><span className="text-[9px] font-bold text-gray-500">{users.length}</span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>

                            {/* Actions Right (If Theirs) */}
                            {!msg.isMine && <ActionBar />}
                            
                        </div>

                        {/* Thread Replies Recurse */}
                        {childrenMap[msg.id] && (
                            <div className={`mt-3 w-full flex flex-col ${msg.isMine ? 'items-end pr-6 md:pr-12 border-r-2 border-teal-300' : 'items-start pl-6 md:pl-12 border-l-2 border-teal-300'} space-y-2`}>
                                {childrenMap[msg.id].map(child => renderMessageNode(child, true))}
                            </div>
                        )}
                    </div>
                );
            };

            const myGroups = [{id: "main", name: "Academic Council Group"}, ...groups.filter(g => g.members?.includes(user.email) || currentUserData?.isAdmin)];

            return (
                <div className="flex h-screen w-full bg-white font-sans text-gray-800 overflow-hidden">
                    {viewMode === "admin" ? (
                        /* --- ADMIN DASHBOARD FULLY RESTORED --- */
                        <div className="flex flex-col h-full w-full bg-slate-100 overflow-hidden animate-in fade-in">
                            <div className="bg-slate-900 text-white p-4 flex items-center justify-between shadow-md shrink-0">
                                <div className="flex items-center gap-3">
                                    <i className="fa-solid fa-shield-halved text-2xl text-blue-400"></i>
                                    <div><h1 className="font-bold text-lg">Admin Control Center</h1></div>
                                </div>
                                <button onClick={() => setViewMode("chat")} className="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2">
                                    <i className="fa-solid fa-arrow-left"></i> Back to Chat
                                </button>
                            </div>

                            <div className="flex-1 overflow-y-auto p-4 md:p-8 space-y-6">
                                
                                {/* Feature: RESTORED Filter Block */}
                                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-wrap gap-4 items-end">
                                    <div>
                                        <label className="text-xs font-bold text-slate-500 uppercase block mb-1">Filter by User</label>
                                        <select value={adminFilterUser} onChange={(e)=>setAdminFilterUser(e.target.value)} className="p-2 border border-slate-300 rounded-lg text-sm bg-slate-50 min-w-[200px] outline-none focus:border-blue-500">
                                            <option value="">All Users</option>
                                            {dbUsers.map(u => <option key={u.uid} value={u.email}>{u.name} ({u.email})</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-500 uppercase block mb-1">Filter by Date</label>
                                        <input type="date" value={adminFilterDate} onChange={(e)=>setAdminFilterDate(e.target.value)} className="p-2 border border-slate-300 rounded-lg text-sm bg-slate-50 outline-none focus:border-blue-500" />
                                    </div>
                                    <button onClick={()=>{setAdminFilterUser(""); setAdminFilterDate("");}} className="bg-slate-200 text-slate-700 px-4 py-2 rounded-lg text-sm font-bold hover:bg-slate-300">Clear</button>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
                                    
                                    {/* Users Block */}
                                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden lg:col-span-2 flex flex-col max-h-[400px]">
                                        <div className="bg-slate-50 p-4 border-b border-slate-200 flex justify-between items-center shrink-0">
                                            <h2 className="font-bold text-slate-800 flex items-center gap-2"><i className="fa-solid fa-users text-blue-600"></i> Users & Roles</h2>
                                            <button onClick={() => { setAdminForm({ uid: '', name: '', email: '', password: '', isAdmin: false, canCreateGroups: false }); setActiveModal('admin_add_user'); }} className="bg-blue-600 text-white text-xs font-bold px-2 py-1 rounded hover:bg-blue-700"><i className="fa-solid fa-plus"></i></button>
                                        </div>
                                        <div className="p-0 overflow-y-auto flex-1">
                                            <table className="w-full text-left text-sm">
                                                <tbody className="divide-y divide-slate-100">
                                                    {dbUsers.map(u => (
                                                        <tr key={u.uid} className="hover:bg-slate-50">
                                                            <td className="px-4 py-3">
                                                                <div className="font-semibold text-slate-800 flex items-center gap-1">{u.name}{u.isAdmin && <i className="fa-solid fa-star text-yellow-400 text-[10px]"></i>}</div>
                                                                <div className="text-[10px] text-slate-500">{u.email}</div>
                                                            </td>
                                                            <td className="px-4 py-3 text-right">
                                                                <button onClick={() => handleToggleApprove(u)} className={`mr-2 px-2 py-1 rounded-full text-[9px] font-bold ${u.isApproved ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'}`}>{u.isApproved ? 'Approved' : 'Pending'}</button>
                                                                <button onClick={() => { setAdminForm({ ...u, canCreateGroups: u.canCreateGroups || false }); setActiveModal('admin_edit_user'); }} className="text-blue-500 hover:text-blue-700 mr-2"><i className="fa-solid fa-pen"></i></button>
                                                                <button onClick={() => handleRemoveUser(u.uid)} disabled={u.email === user.email} className="text-red-500 hover:text-red-700"><i className="fa-solid fa-trash"></i></button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>

                                    {/* Departments Block */}
                                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden lg:col-span-2 flex flex-col max-h-[400px]">
                                        <div className="bg-slate-50 p-4 border-b border-slate-200 flex justify-between items-center shrink-0">
                                            <h2 className="font-bold text-slate-800 flex items-center gap-2"><i className="fa-solid fa-layer-group text-teal-600"></i> Departments & Groups</h2>
                                        </div>
                                        <div className="p-0 overflow-y-auto flex-1">
                                            <table className="w-full text-left text-sm">
                                                <tbody className="divide-y divide-slate-100">
                                                    {groups.length === 0 && <tr><td className="p-4 text-center text-gray-500 italic">No custom groups created yet.</td></tr>}
                                                    {groups.map(g => (
                                                        <tr key={g.id} className="hover:bg-slate-50">
                                                            <td className="px-4 py-3">
                                                                <div className="font-bold text-slate-800">{g.name}</div>
                                                                <div className="text-[10px] text-slate-500">{g.members?.length || 0} Members | Created by {g.createdBy?.split('@')[0]}</div>
                                                            </td>
                                                            <td className="px-4 py-3 text-right">
                                                                <button onClick={() => { setGroupForm({name: g.name, members: g.members}); setEditingGroup(g); setActiveModal('group_form_modal'); }} className="text-blue-500 hover:text-blue-700 text-xs font-bold bg-blue-50 px-2 py-1 rounded mr-2"><i className="fa-solid fa-pen"></i> Edit</button>
                                                                <button onClick={() => handleAdminDeleteGroup(g.id)} className="text-red-500 hover:text-red-700 text-xs font-bold bg-red-50 px-2 py-1 rounded"><i className="fa-solid fa-trash"></i> Delete</button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>

                                    {/* Feature: RESTORED Global Chat & Task Audit */}
                                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden lg:col-span-4 flex flex-col max-h-[500px]">
                                        <div className="bg-slate-50 p-4 border-b border-slate-200 shrink-0">
                                            <h2 className="font-bold text-slate-800 flex items-center gap-2"><i className="fa-solid fa-list-check text-purple-600"></i> Global Chat & Task Audit</h2>
                                        </div>
                                        <div className="p-0 overflow-y-auto flex-1">
                                            <table className="w-full text-left text-sm">
                                                <thead className="bg-slate-50 text-slate-500 text-xs uppercase sticky top-0 shadow-sm z-10">
                                                    <tr><th className="px-4 py-2">Time</th><th className="px-4 py-2">Type</th><th className="px-4 py-2">Details</th><th className="px-4 py-2 text-right">Action</th></tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {filteredAuditMessages.length === 0 && <tr><td colSpan="4" className="text-center py-4 text-slate-500 italic">No records found matching filters.</td></tr>}
                                                    {filteredAuditMessages.map(msg => (
                                                        // Feature: Admin can click tasks to see trail
                                                        <tr key={msg.id} className={`hover:bg-slate-50 ${msg.isTask ? 'cursor-pointer hover:bg-blue-50' : ''}`} onClick={() => { if(msg.isTask) { setSelectedMessage(msg); setActiveModal('task_trail'); } }}>
                                                            <td className="px-4 py-2 text-xs text-slate-500">{msg.dateString}<br/>{msg.time}</td>
                                                            <td className="px-4 py-2">
                                                                {msg.isTask ? <span className="text-[10px] font-bold bg-blue-100 text-blue-700 px-2 py-1 rounded">TASK</span> : 
                                                                msg.isPrivateMention ? <span className="text-[10px] font-bold bg-purple-100 text-purple-700 px-2 py-1 rounded">PRIVATE</span> : 
                                                                msg.fileUrl ? <span className="text-[10px] font-bold bg-orange-100 text-orange-700 px-2 py-1 rounded">MEDIA</span> : 
                                                                msg.replyToId ? <span className="text-[10px] font-bold bg-teal-100 text-teal-700 px-2 py-1 rounded">REPLY</span> :
                                                                <span className="text-[10px] font-bold bg-gray-100 text-gray-700 px-2 py-1 rounded">PUBLIC</span>}
                                                            </td>
                                                            <td className="px-4 py-2">
                                                                <div className="font-semibold text-slate-700 text-xs">From: {(msg.sender||'').split('@')[0]} {msg.isTask && `→ To: ${(msg.taskData?.currentAssignee||'').split('@')[0]}`}</div>
                                                                <div className="text-slate-600 italic truncate max-w-[200px] text-xs">{msg.text || msg.fileName}</div>
                                                            </td>
                                                            <td className="px-4 py-2 text-right">
                                                                <button onClick={(e) => { e.stopPropagation(); handleAdminDeleteMessage(msg.id); }} className="text-red-500 hover:text-red-700 text-xs font-bold bg-red-50 px-2 py-1 rounded"><i className="fa-solid fa-trash"></i></button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                    
                                    {/* Reminders Block */}
                                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden lg:col-span-4 flex flex-col max-h-[300px]">
                                        <div className="bg-slate-50 p-4 border-b border-slate-200 shrink-0">
                                            <h2 className="font-bold text-slate-800 flex items-center gap-2"><i className="fa-solid fa-clock text-yellow-600"></i> Global Reminders Log</h2>
                                        </div>
                                        <div className="p-0 overflow-y-auto flex-1">
                                            <table className="w-full text-left text-sm">
                                                <thead className="bg-slate-50 text-slate-500 text-xs uppercase sticky top-0 shadow-sm z-10">
                                                    <tr><th className="px-4 py-2">Status</th><th className="px-4 py-2">Set By</th><th className="px-4 py-2">Target Date</th><th className="px-4 py-2">Content</th></tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {allAdminReminders.map(rem => (
                                                        <tr key={rem.id} className="hover:bg-slate-50">
                                                            <td className="px-4 py-2">{rem.isTriggered ? <span className="text-[10px] font-bold text-green-600">Fired</span> : <span className="text-[10px] font-bold text-yellow-600">Pending</span>}</td>
                                                            <td className="px-4 py-2 font-semibold text-slate-700 text-xs">{(rem.userEmail || rem.userId || 'Unknown').split('@')[0]}</td>
                                                            <td className="px-4 py-2 text-xs text-slate-600">{new Date(rem.remindAt).toLocaleString()}</td>
                                                            <td className="px-4 py-2 text-slate-600 italic truncate max-w-[300px] text-xs">"{rem.messageText}"</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>

                                </div>
                            </div>
                        </div>
                    ) : (
                        /* --- TELEGRAM / WHATSAPP UI --- */
                        <div className="flex h-full w-full">
                            
                            {/* Sidebar */}
                            <div className="hidden md:flex w-80 bg-white border-r border-gray-200 flex-col shrink-0 z-20">
                                <div className="p-4 bg-slate-50 border-b border-gray-200 flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold text-lg shadow-sm">
                                        {user.email.substring(0,1).toUpperCase()}
                                    </div>
                                    <div className="overflow-hidden">
                                        <h2 className="font-bold text-sm text-gray-800 truncate">{currentUserData?.name || user.email.split('@')[0]}</h2>
                                        <p className="text-[10px] text-gray-500 truncate">{user.email}</p>
                                    </div>
                                    <div className="ml-auto flex gap-2">
                                        {(currentUserData?.isAdmin || currentUserData?.canCreateGroups) && (
                                            <button onClick={()=>{setEditingGroup(null); setGroupForm({name:"", members:[]}); setActiveModal('group_form_modal');}} className="text-gray-500 hover:text-blue-600" title="New Group">
                                                <i className="fa-solid fa-pen-to-square"></i>
                                            </button>
                                        )}
                                    </div>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto">
                                    <div className="px-4 pt-4 pb-2 text-[10px] font-bold text-gray-400 uppercase tracking-wider">Your Departments</div>
                                    {myGroups.map(g => (
                                        <div key={g.id} onClick={() => setActiveGroup(g)} className={`flex items-center gap-3 p-3 mx-2 rounded-xl cursor-pointer transition-colors ${activeGroup.id === g.id ? 'bg-blue-50 border border-blue-100' : 'hover:bg-gray-50 border border-transparent'}`}>
                                            <div className={`w-12 h-12 rounded-full flex items-center justify-center text-white font-bold text-lg shadow-sm ${g.id==='main' ? 'bg-gradient-to-br from-blue-500 to-indigo-600' : 'bg-gradient-to-br from-emerald-400 to-teal-600'}`}>
                                                {g.name.substring(0,1).toUpperCase()}
                                            </div>
                                            <div className="flex-1 overflow-hidden">
                                                <div className="font-bold text-sm text-gray-800 truncate">{g.name}</div>
                                                <div className="text-[11px] text-gray-500 truncate">{g.id==='main' ? 'Organization Wide' : `${g.members?.length || 0} Members`}</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="p-3 bg-gray-50 border-t border-gray-200 space-y-1">
                                    <button onClick={() => setShowNotifications(!showNotifications)} className="w-full flex items-center gap-3 p-2 hover:bg-gray-200 rounded-lg text-left text-sm font-semibold text-gray-700 transition-colors relative">
                                        <i className="fa-solid fa-bell text-gray-500 w-5 text-center"></i> Notifications
                                        {totalNotifications > 0 && <span className="bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full ml-auto">{totalNotifications}</span>}
                                    </button>
                                    {currentUserData?.isAdmin && (
                                        <button onClick={() => setViewMode("admin")} className="w-full flex items-center gap-3 p-2 hover:bg-gray-200 rounded-lg text-left text-sm font-semibold text-gray-700 transition-colors">
                                            <i className="fa-solid fa-shield-halved text-gray-500 w-5 text-center"></i> Admin Dashboard
                                        </button>
                                    )}
                                    <button onClick={onLogout} className="w-full flex items-center gap-3 p-2 hover:bg-red-50 rounded-lg text-left text-sm font-semibold text-red-600 transition-colors">
                                        <i className="fa-solid fa-right-from-bracket w-5 text-center"></i> Logout
                                    </button>
                                </div>
                            </div>

                            <div className="flex-1 flex flex-col relative h-full">
                                <div className="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-4 md:px-6 shrink-0 z-10 shadow-sm">
                                    <div className="flex items-center gap-3">
                                        <div className={`w-10 h-10 rounded-full flex items-center justify-center text-white font-bold shadow-sm ${activeGroup.id==='main' ? 'bg-gradient-to-br from-blue-500 to-indigo-600' : 'bg-gradient-to-br from-emerald-400 to-teal-600'}`}>
                                            {activeGroup.name.substring(0,1).toUpperCase()}
                                        </div>
                                        <div>
                                            <h1 className="font-bold text-sm md:text-base text-gray-800">{activeGroup.name}</h1>
                                            <p className="text-xs text-gray-500 cursor-pointer hover:text-blue-500" onClick={()=>{ if(activeGroup.id!=='main') setActiveModal('group_settings'); }}>
                                                {activeGroup.id==='main' ? 'All Staff' : `${activeGroup.members?.length||0} Members`}
                                            </p>
                                        </div>
                                    </div>

                                    {/* Feature: Online Active Users Presence */}
                                    <div className="hidden lg:flex items-center gap-2 overflow-hidden mx-4 flex-1 justify-end px-2">
                                        {dbUsers.filter(u => {
                                            if (activeGroup.id !== 'main' && !activeGroup.members?.includes(u.email)) return false;
                                            return u.lastActive && (Date.now() - u.lastActive.toMillis() < 180000) && u.uid !== user.uid; // Active in last 3 mins
                                        }).slice(0, 5).map(onlineUser => (
                                            <div key={onlineUser.uid} className="relative group cursor-default" title={`${onlineUser.name} is Online`}>
                                                <div className="w-7 h-7 rounded-full bg-slate-200 border border-slate-300 flex items-center justify-center text-[10px] font-bold text-slate-600 shadow-sm">
                                                    {onlineUser.name.substring(0,2)}
                                                </div>
                                                <div className="absolute bottom-0 right-0 w-2 h-2 bg-green-500 border border-white rounded-full"></div>
                                            </div>
                                        ))}
                                        {dbUsers.filter(u => u.lastActive && (Date.now() - u.lastActive.toMillis() < 180000) && u.uid !== user.uid).length > 5 && (
                                            <div className="w-7 h-7 rounded-full bg-slate-100 border border-slate-200 flex items-center justify-center text-[10px] font-bold text-slate-500">
                                                +{dbUsers.filter(u => u.lastActive && (Date.now() - u.lastActive.toMillis() < 180000) && u.uid !== user.uid).length - 5}
                                            </div>
                                        )}
                                    </div>

                                    <div className="flex items-center gap-4">
                                        <div className="hidden md:flex items-center bg-gray-100 rounded-full px-3 py-1.5 transition-all focus-within:ring-2 focus-within:ring-blue-100">
                                            <i className="fa-solid fa-magnifying-glass text-gray-400 text-xs"></i>
                                            <input type="text" placeholder="Search..." className="bg-transparent outline-none text-xs ml-2 w-32 focus:w-48 transition-all text-gray-700" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                                        </div>
                                    </div>
                                </div>

                                {/* Notification Dropdown */}
                                {showNotifications && (
                                    <div className="absolute top-16 right-4 w-80 bg-white rounded-xl shadow-2xl border border-gray-200 z-30 overflow-hidden animate-in fade-in">
                                        <div className="bg-gray-50 p-3 border-b border-gray-200 flex justify-between items-center">
                                            <span className="font-bold text-sm text-gray-800">Updates & Tasks</span>
                                            <div className="flex items-center gap-2">
                                                <button onClick={handleClearNotifications} className="text-[10px] bg-red-100 text-red-600 px-2 py-1 rounded font-bold hover:bg-red-200 transition-colors">
                                                    <i className="fa-solid fa-broom mr-1"></i>Clear All
                                                </button>
                                                <i className="fa-solid fa-xmark cursor-pointer text-gray-400 hover:text-gray-600" onClick={() => setShowNotifications(false)}></i>
                                            </div>
                                        </div>
                                        <div className="max-h-80 overflow-y-auto">
                                            {totalNotifications === 0 ? <div className="p-4 text-center text-xs text-gray-500">All caught up!</div> : 
                                                <>
                                                    {activeActionableTasks.map(task => (
                                                        <div key={task.id} className="p-3 border-b hover:bg-blue-50 cursor-pointer" onClick={() => { setShowNotifications(false); setActiveGroup(groups.find(g=>g.id===task.groupId)||{id:'main',name:'Academic Council'}); handleMessageClick(task); }}>
                                                            <div className="text-xs font-bold text-blue-600 mb-1 flex items-center gap-1"><i className="fa-regular fa-square-check"></i> Pending Task</div>
                                                            <div className="text-xs text-gray-700 line-clamp-2 italic">"{task.text}"</div>
                                                            <div className="text-[10px] text-red-500 mt-1 font-semibold">Due: {new Date(task.taskData.deadline).toLocaleDateString()}</div>
                                                        </div>
                                                    ))}
                                                    {genericNotifications.map(n => (
                                                        <div key={n.id} className="p-3 border-b bg-amber-50 hover:bg-amber-100 text-xs text-amber-900 cursor-default flex items-start gap-2">
                                                            {n.type === 'reply' ? <i className="fa-solid fa-reply mt-0.5 text-amber-500"></i> : <i className="fa-solid fa-bolt mt-0.5 text-amber-500"></i>}
                                                            <div>
