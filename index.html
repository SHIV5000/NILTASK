<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MPGS TaskFlow - WhatsApp Style Layout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <style>
        /* WhatsApp-like theme */
        :root {
            --bg-body: #111b21;
            --bg-sidebar: #202c33;
            --bg-chat: #0b141a;
            --bg-message-own: #005c4b;
            --bg-message-other: #202c33;
            --text-primary: #e9edef;
            --text-secondary: #aebac1;
            --accent: #00a884;
            --sent-bg: #005c4b;
            --received-bg: #202c33;
        }
        [data-theme="light"] {
            --bg-body: #e1e1e1;
            --bg-sidebar: #f0f2f5;
            --bg-chat: #efeae2;
            --bg-message-own: #d9f0ec;
            --bg-message-other: #ffffff;
            --text-primary: #111b21;
            --text-secondary: #667781;
            --accent: #00a884;
            --sent-bg: #d9f0ec;
            --received-bg: #ffffff;
        }
        body {
            background-color: var(--bg-body);
            color: var(--text-primary);
            transition: background-color 0.2s;
        }
        .glass-panel { background: transparent; backdrop-filter: none; border: none; box-shadow: none; }
        .chat-area { background: var(--bg-chat); }
        .message-bubble { max-width: 75%; margin-bottom: 0.5rem; display: flex; flex-direction: column; }
        .message-bubble.sent { align-self: flex-end; }
        .message-bubble.received { align-self: flex-start; }
        .message-bubble .bubble-content {
            border-radius: 18px;
            padding: 8px 12px;
            word-wrap: break-word;
        }
        .sent .bubble-content { background: var(--sent-bg); color: var(--text-primary); }
        .received .bubble-content { background: var(--received-bg); color: var(--text-primary); }
        .message-meta { font-size: 0.7rem; margin-bottom: 4px; display: flex; justify-content: space-between; gap: 8px; color: var(--text-secondary); }
        .menu-dots, .reply-btn { cursor: pointer; opacity: 0.6; margin-left: 8px; }
        .menu-dots:hover, .reply-btn:hover { opacity: 1; }
        .inline-reply { margin-top: 8px; border-top: 1px solid var(--text-secondary); padding-top: 4px; display: none; }
        .inline-reply.active { display: block; }
        .task-panel-card { background: var(--bg-sidebar); border-radius: 12px; margin-bottom: 12px; padding: 12px; border-left: 4px solid var(--accent); }
        .btn-primary { background: var(--accent); color: white; border-radius: 20px; padding: 6px 12px; }
        .channel-item { padding: 8px; border-radius: 8px; cursor: pointer; }
        .channel-item:hover { background: rgba(255,255,255,0.1); }
        .active-channel { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body class="antialiased">
    <div id="root" class="h-screen flex overflow-hidden"></div>
    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
        const SUPABASE_URL = 'https://apfymygzwkzjhhgmtkaj.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFwZnlteWd6d2t6amhoZ210a2FqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MjM5MTIsImV4cCI6MjA5NjQ5OTkxMn0.RiV6kDDeSq5ZIP68RGwtpLtqPALFloq23owoNm2aA-c';
        const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null, currentRoom = 'general';
        let messageSubscription, taskSubscription, assigneeSubscription, notificationSubscription;
        let currentTheme = localStorage.getItem('theme') || 'light';
        let quillEditor = null;

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m] || m)); }
        function showToast(msg) { const t=document.createElement('div'); t.className='fixed bottom-4 right-4 bg-black/50 text-white px-4 py-2 rounded z-50'; t.innerText=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }
        function applyTheme() { document.documentElement.setAttribute('data-theme', currentTheme); }

        // Auth & Profile
        async function ensureProfile() { if(!currentUser) return; const {data:ex}=await sb.from('profiles').select('id').eq('id',currentUser.id).maybeSingle(); if(!ex) await sb.from('profiles').insert({id:currentUser.id, email:currentUser.email, full_name:currentUser.email.split('@')[0], role:'teacher'}); }
        async function signIn(email,pwd) { const {data,error}=await sb.auth.signInWithPassword({email,password:pwd}); if(!error && data?.user) { currentUser=data.user; await ensureProfile(); renderMainApp(); startSubscriptions(); return true; } return false; }
        async function signUp(email,pwd) { const {error}=await sb.auth.signUp({email,password:pwd}); if(error) throw error; alert('Check email!'); }
        async function logout() { await sb.auth.signOut(); currentUser=null; renderAuthScreen(); }
        function renderAuthScreen() { document.getElementById('root').innerHTML=`<div class="min-h-screen flex items-center justify-center bg-gray-900"><div class="bg-gray-800 p-8 rounded shadow-md w-96"><h1 class="text-2xl font-bold text-center mb-6 text-white">MPGS TaskFlow</h1><input id="email" placeholder="Email" class="w-full p-2 mb-2 rounded bg-gray-700 text-white"><input id="password" type="password" placeholder="Password" class="w-full p-2 mb-4 rounded bg-gray-700 text-white"><div class="flex gap-2"><button id="loginBtn" class="flex-1 p-2 rounded bg-green-600 text-white">Login</button><button id="signupBtn" class="flex-1 p-2 rounded bg-gray-600 text-white">Sign Up</button></div><div id="authMsg" class="mt-4 text-red-500 text-sm"></div></div></div>`; 
            document.getElementById('loginBtn').onclick=async()=>{ const ok=await signIn(document.getElementById('email').value,document.getElementById('password').value); if(!ok) document.getElementById('authMsg').innerText='Invalid credentials'; };
            document.getElementById('signupBtn').onclick=async()=>{ try{ await signUp(document.getElementById('email').value,document.getElementById('password').value); document.getElementById('authMsg').innerText='Check email!'; } catch(e){ document.getElementById('authMsg').innerText=e.message; } }; }

        // Main App - WhatsApp style layout
        function renderMainApp() {
            applyTheme();
            document.getElementById('root').innerHTML = `
                <div class="flex h-full w-full">
                    <!-- Left Sidebar: Chats (Groups + Direct Messages) -->
                    <div class="w-80 bg-[var(--bg-sidebar)] flex flex-col border-r border-gray-700">
                        <div class="p-4 flex justify-between items-center">
                            <h2 class="text-xl font-semibold">Chats</h2>
                            <div class="flex gap-2">
                                <button id="themeToggleBtn" class="p-2 rounded-full"><i class="fas fa-moon"></i></button>
                                ${currentUser?.role === 'admin' ? '<button id="adminPanelBtn" class="p-2 rounded-full bg-green-600 text-white"><i class="fas fa-user-shield"></i></button>' : ''}
                                <button id="logoutBtn" class="p-2 rounded-full"><i class="fas fa-sign-out-alt"></i></button>
                            </div>
                        </div>
                        <div class="p-3"><input type="text" id="globalSearch" placeholder="Search chats..." class="w-full p-2 rounded-full bg-gray-700 text-white"></div>
                        <div id="chatsList" class="flex-1 overflow-y-auto"></div>
                    </div>
                    <!-- Center: Chat Area -->
                    <div class="flex-1 flex flex-col bg-[var(--bg-chat)]">
                        <div class="p-3 bg-[var(--bg-sidebar)] border-b border-gray-700 flex justify-between items-center">
                            <span class="text-lg font-semibold" id="currentRoomTitle"># ${currentRoom}</span>
                            <div><input type="text" id="messageSearchBar" placeholder="Search messages..." class="p-1 rounded-full bg-gray-700 text-white w-48"></div>
                        </div>
                        <div id="messagesContainer" class="flex-1 overflow-y-auto p-4 flex flex-col space-y-2"></div>
                        <div class="p-3 bg-[var(--bg-sidebar)]"><div id="richEditor" style="height: 100px;"></div><div class="flex justify-between mt-2"><button id="scheduleMsgBtn" class="text-sm text-gray-400"><i class="far fa-calendar-alt"></i> Schedule</button><button id="sendBtn" class="btn-primary">Send</button></div></div>
                    </div>
                    <!-- Right Sidebar: Tasks Panel -->
                    <div class="w-80 bg-[var(--bg-sidebar)] border-l border-gray-700 flex flex-col">
                        <div class="p-4 border-b"><h3 class="font-bold">Tasks</h3></div>
                        <div id="tasksPanel" class="flex-1 overflow-y-auto p-2 space-y-2"></div>
                    </div>
                </div>
                <!-- Modals (same as before) -->
                <div id="taskModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50"><div class="bg-gray-800 rounded p-6 w-96"><h3>Convert to Task</h3><input id="taskTitle" class="w-full p-2 mb-2 rounded"><select id="taskAssignees" multiple size="4" class="w-full p-2 mb-2 rounded"></select><input type="date" id="taskDeadline" class="w-full p-2 mb-2 rounded"><select id="taskPriority" class="w-full p-2 mb-2 rounded"><option>Low</option><option>Medium</option><option>High</option></select><label><input type="checkbox" id="taskRequireProof"> Require proof</label><div class="flex gap-2 mt-4"><button id="cancelTaskBtn" class="flex-1 p-2 rounded bg-gray-600">Cancel</button><button id="saveTaskBtn" class="flex-1 p-2 rounded bg-green-600">Create</button></div></div></div>
                <div id="reminderModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50"><div class="bg-gray-800 rounded p-6 w-96"><h3>Set Reminder</h3><p id="reminderMessagePreview"></p><input type="datetime-local" id="reminderDateTime" class="w-full p-2 my-2 rounded"><div class="flex gap-2"><button id="cancelReminderBtn" class="flex-1 p-2 rounded bg-gray-600">Cancel</button><button id="saveReminderBtn" class="flex-1 p-2 rounded bg-green-600">Set</button></div></div></div>
                <div id="scheduleModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50"><div class="bg-gray-800 rounded p-6 w-96"><h3>Schedule Message</h3><textarea id="scheduleMessageText" rows="3" class="w-full p-2 mb-2 rounded"></textarea><select id="scheduleChannel" class="w-full p-2 mb-2 rounded"><option>general</option><option>math</option><option>science</option></select><input type="datetime-local" id="scheduleDateTime" class="w-full p-2 mb-2 rounded"><div class="flex gap-2"><button id="cancelScheduleBtn" class="flex-1 p-2 rounded bg-gray-600">Cancel</button><button id="saveScheduleBtn" class="flex-1 p-2 rounded bg-green-600">Schedule</button></div></div></div>
                <div id="adminModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50"><div class="bg-gray-800 rounded p-6 w-96"><h3>Admin Panel</h3><p>Coming soon: user management, statistics, etc.</p><button id="closeAdminBtn" class="mt-4 p-2 rounded bg-gray-600">Close</button></div></div>
            `;
            // Quill editor
            quillEditor = new Quill('#richEditor', { theme: 'snow', placeholder: 'Type a message...', modules: { toolbar: [['bold','italic','underline']] } });
            // Event listeners
            document.getElementById('sendBtn').onclick = sendMessage;
            quillEditor.root.addEventListener('keydown', (e) => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); } });
            document.getElementById('themeToggleBtn')?.addEventListener('click',()=>{ currentTheme=currentTheme==='light'?'dark':'light'; localStorage.setItem('theme',currentTheme); applyTheme(); });
            document.getElementById('logoutBtn')?.addEventListener('click', logout);
            document.getElementById('adminPanelBtn')?.addEventListener('click',()=>document.getElementById('adminModal').classList.remove('hidden'));
            document.getElementById('closeAdminBtn')?.addEventListener('click',()=>document.getElementById('adminModal').classList.add('hidden'));
            document.getElementById('scheduleMsgBtn')?.addEventListener('click',()=>showScheduleModal(quillEditor.root.innerText));
            document.getElementById('messageSearchBar')?.addEventListener('input',(e)=>filterMessages(e.target.value));
            document.getElementById('globalSearch')?.addEventListener('input',(e)=>filterChats(e.target.value));
            loadChatsList(); loadMessages(); loadTasksForPanel(); attachModalButtons();
        }

        // Load chats list (groups + direct messages)
        async function loadChatsList() {
            const groups = ['general', 'math', 'science'];
            const {data: users} = await sb.from('profiles').select('id, email, full_name').neq('id', currentUser.id);
            let html = `<div class="px-3 py-2 text-xs text-gray-400">GROUPS</div>`;
            groups.forEach(g => { html += `<div class="channel-item" data-room="${g}"># ${g}</div>`; });
            html += `<div class="px-3 py-2 text-xs text-gray-400">DIRECT MESSAGES</div>`;
            users?.forEach(u => { html += `<div class="channel-item" data-room="dm_${u.id}">💬 ${u.full_name || u.email}</div>`; });
            document.getElementById('chatsList').innerHTML = html;
            document.querySelectorAll('.channel-item').forEach(el => {
                el.addEventListener('click', () => {
                    currentRoom = el.dataset.room;
                    renderMainApp(); // re-render to update chat header and messages
                });
            });
        }
        function filterChats(keyword) {
            document.querySelectorAll('.channel-item').forEach(el => {
                el.style.display = el.innerText.toLowerCase().includes(keyword.toLowerCase()) ? 'block' : 'none';
            });
        }

        // Chat & messages with inline replies
        async function sendMessage() {
            const text = quillEditor.root.innerText.trim();
            if (!text) return;
            await sb.from('messages').insert({ room_id: currentRoom, sender_id: currentUser.id, text, created_at: new Date().toISOString() });
            quillEditor.root.innerHTML = '';
            loadMessages();
        }
        async function loadMessages() {
            const {data: msgs} = await sb.from('messages').select('*, profiles(full_name, email)').eq('room_id', currentRoom).order('created_at', {ascending: true});
            renderMessages(msgs || []);
            const c = document.getElementById('messagesContainer');
            c.scrollTop = c.scrollHeight;
        }
        function renderMessages(messages) {
            const c = document.getElementById('messagesContainer');
            if (!c) return;
            if (!messages.length) { c.innerHTML = '<div class="text-center text-gray-500">No messages</div>'; return; }
            c.innerHTML = messages.map(msg => {
                const isOwn = msg.sender_id === currentUser.id;
                const senderName = msg.profiles?.full_name || msg.profiles?.email || 'Unknown';
                const time = new Date(msg.created_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
                return `<div id="msg-${msg.id}" class="message-bubble ${isOwn ? 'sent' : 'received'}">
                            <div class="bubble-content">
                                <div class="message-meta"><span>${escapeHtml(senderName)}</span><span>${time}</span></div>
                                <div>${escapeHtml(msg.text)}</div>
                                <div class="flex justify-end gap-2 mt-1">
                                    <button class="reply-btn text-xs text-gray-400" data-msg-id="${msg.id}"><i class="fas fa-reply"></i> Reply</button>
                                    <div class="menu-dots text-xs text-gray-400" data-msg-id="${msg.id}" data-msg-text="${escapeHtml(msg.text)}"><i class="fas fa-ellipsis-v"></i></div>
                                </div>
                                <div id="reply-${msg.id}" class="inline-reply"><input type="text" placeholder="Write a reply..." class="w-full p-1 rounded bg-gray-700 text-white"></div>
                            </div>
                        </div>`;
            }).join('');
            // Attach reply toggles and menu
            document.querySelectorAll('.reply-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const msgId = btn.dataset.msgId;
                    const replyDiv = document.getElementById(`reply-${msgId}`);
                    replyDiv.classList.toggle('active');
                    if (replyDiv.classList.contains('active')) {
                        const input = replyDiv.querySelector('input');
                        input.focus();
                        input.onkeypress = async (e) => { if(e.key === 'Enter') { const replyText = input.value.trim(); if(replyText) { await sb.from('messages').insert({ room_id: currentRoom, sender_id: currentUser.id, text: replyText, parent_message_id: msgId, created_at: new Date().toISOString() }); input.value = ''; replyDiv.classList.remove('active'); loadMessages(); } } };
                    }
                });
            });
            document.querySelectorAll('.menu-dots').forEach(el => {
                el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const mid = el.dataset.msgId, mtext = el.dataset.msgText;
                    const menu = document.createElement('div');
                    menu.className = 'absolute bg-gray-800 rounded p-2 z-50';
                    menu.innerHTML = `<div class="cursor-pointer p-1" data-action="reminder">🔔 Reminder</div><div class="cursor-pointer p-1" data-action="task">📋 Task</div><div class="cursor-pointer p-1" data-action="schedule">📅 Schedule</div><div class="cursor-pointer p-1" data-action="bookmark">⭐ Bookmark</div>`;
                    document.body.appendChild(menu);
                    menu.style.top = e.clientY + 'px';
                    menu.style.left = e.clientX + 'px';
                    menu.querySelector('[data-action="reminder"]').onclick = () => { showReminderModal(mid, mtext); menu.remove(); };
                    menu.querySelector('[data-action="task"]').onclick = () => { openTaskModal(mid, mtext); menu.remove(); };
                    menu.querySelector('[data-action="schedule"]').onclick = () => { showScheduleModal(mtext); menu.remove(); };
                    menu.querySelector('[data-action="bookmark"]').onclick = () => { toggleBookmark(mid, mtext, null); menu.remove(); };
                    setTimeout(() => menu.remove(), 5000);
                });
            });
        }
        function filterMessages(kwd) { document.querySelectorAll('.message-bubble').forEach(m => { m.style.display = m.innerText.toLowerCase().includes(kwd.toLowerCase()) ? 'flex' : 'none'; }); }
        function subscribeToMessages() { if(messageSubscription) messageSubscription.unsubscribe(); messageSubscription = sb.channel('public:messages').on('postgres_changes', {event:'INSERT', schema:'public', table:'messages'}, (payload) => { if(payload.new.room_id === currentRoom) loadMessages(); }).subscribe(); }

        // Tasks Panel (right sidebar)
        async function loadTasksForPanel() {
            const {data: tasks} = await sb.from('tasks').select('*, creator:profiles!assigned_by(full_name, email)').order('created_at', {ascending: false});
            if (!tasks) return;
            const ids = tasks.map(t => t.id);
            const {data: assignees} = await sb.from('task_assignees').select('task_id, assignee_id, status, profiles!assignee_id(full_name, email)').in('task_id', ids);
            const assigneesMap = {};
            if (assignees) assignees.forEach(a => { if (!assigneesMap[a.task_id]) assigneesMap[a.task_id] = []; assigneesMap[a.task_id].push({ assignee_id: a.assignee_id, status: a.status, profiles: a.profiles }); });
            const filtered = tasks.filter(t => t.assigned_by === currentUser.id || (assigneesMap[t.id] && assigneesMap[t.id].some(a => a.assignee_id === currentUser.id)));
            const tasksWith = filtered.map(t => ({ ...t, assignees: assigneesMap[t.id] || [] }));
            renderTasksPanel(tasksWith);
        }
        function renderTasksPanel(tasks) {
            const container = document.getElementById('tasksPanel');
            if (!container) return;
            if (!tasks.length) { container.innerHTML = '<div class="text-center text-gray-500">No tasks</div>'; return; }
            container.innerHTML = tasks.map(task => {
                const isCreator = task.assigned_by === currentUser.id;
                const assignees = task.assignees;
                const allAccepted = assignees.length && assignees.every(a => a.status === 'accepted');
                const borderClass = allAccepted ? 'border-green-500 border-2' : '';
                const assigneeHtml = assignees.map(ass => {
                    const name = ass.profiles?.full_name || ass.profiles?.email || 'Unknown';
                    const status = ass.status;
                    let actions = '';
                    if (ass.assignee_id === currentUser.id && status === 'pending_ack') actions = `<button data-task-id="${task.id}" data-assignee-id="${ass.assignee_id}" data-action="ack" class="task-action bg-green-600 text-white text-xs px-2 py-1 rounded">Acknowledge</button>`;
                    if (ass.assignee_id === currentUser.id && (status === 'in_progress' || status === 'needs_review')) actions = `<button data-task-id="${task.id}" data-assignee-id="${ass.assignee_id}" data-action="submit" class="task-action bg-blue-600 text-white text-xs px-2 py-1 rounded">Submit</button>`;
                    if (isCreator && status === 'submitted') actions = `<button data-task-id="${task.id}" data-assignee-id="${ass.assignee_id}" data-action="accept" class="task-action bg-green-600 text-white text-xs px-2 py-1 rounded">Accept</button><button data-task-id="${task.id}" data-assignee-id="${ass.assignee_id}" data-action="review_again" class="task-action bg-red-600 text-white text-xs px-2 py-1 rounded">Review Again</button>`;
                    return `<div class="flex justify-between text-xs py-1"><span>${escapeHtml(name)}</span><span>${status}</span>${actions}</div>`;
                }).join('');
                return `<div class="task-panel-card ${borderClass}"><div class="font-semibold">${escapeHtml(task.title)}</div><div>${assigneeHtml}</div></div>`;
            }).join('');
            document.querySelectorAll('.task-action').forEach(btn => btn.addEventListener('click', async (e) => {
                const tid = btn.dataset.taskId, aid = btn.dataset.assigneeId, act = btn.dataset.action;
                await performTaskAction(tid, aid, act);
            }));
        }
        async function performTaskAction(taskId, assigneeId, action) {
            let newStatus = '';
            if (action === 'ack') newStatus = 'in_progress';
            else if (action === 'submit') newStatus = 'submitted';
            else if (action === 'accept') newStatus = 'accepted';
            else if (action === 'review_again') newStatus = 'needs_review';
            else return;
            await sb.from('task_assignees').update({ status: newStatus }).eq('task_id', taskId).eq('assignee_id', assigneeId);
            await addTaskTrail(taskId, action, 'Task action performed');
            loadTasksForPanel();
        }
        async function addTaskTrail(taskId, action, comment) { await sb.from('task_trails').insert({ task_id: taskId, user_id: currentUser.id, action, comment }); }

        // Task creation (same as before)
        let currentMessageId = null;
        async function openTaskModal(mid, text) { currentMessageId = mid; document.getElementById('taskModal').classList.remove('hidden'); document.getElementById('taskTitle').value = text.substring(0,100); const {data: users} = await sb.from('profiles').select('id,email,full_name'); document.getElementById('taskAssignees').innerHTML = users.map(u => `<option value="${u.id}">${u.full_name || u.email}</option>`).join(''); }
        function closeTaskModal() { document.getElementById('taskModal').classList.add('hidden'); currentMessageId = null; }
        async function saveTaskMultiAssignee() { if(!currentMessageId) return; const title = document.getElementById('taskTitle').value; const aids = Array.from(document.getElementById('taskAssignees').selectedOptions).map(opt => opt.value); if(!title || !aids.length){ alert('Title and assignee required'); return; } const {data: task} = await sb.from('tasks').insert({ original_message_id: currentMessageId, title, assigned_by: currentUser.id, deadline: document.getElementById('taskDeadline').value || null, priority: document.getElementById('taskPriority').value, require_proof: document.getElementById('taskRequireProof').checked, status: 'pending' }).select().single(); if(!task) return; await sb.from('task_assignees').insert(aids.map(aid => ({ task_id: task.id, assignee_id: aid, status: 'pending_ack' }))); alert('Task created'); closeTaskModal(); loadTasksForPanel(); loadMessages(); }

        // Other features (reminders, scheduled, bookmarks, notifications) - simplified but functional
        let currentReminderId = null;
        function showReminderModal(mid,text) { currentReminderId = mid; document.getElementById('reminderMessagePreview').innerText = text; document.getElementById('reminderModal').classList.remove('hidden'); }
        function closeReminderModal() { document.getElementById('reminderModal').classList.add('hidden'); }
        async function saveReminder() { const dt = document.getElementById('reminderDateTime').value; if(!dt) return; await sb.from('reminders').insert({ user_id: currentUser.id, message_id: currentReminderId, reminder_time: new Date(dt).toISOString(), triggered: false }); alert('Reminder set'); closeReminderModal(); }
        let currSchedText = '';
        function showScheduleModal(text) { currSchedText = text; document.getElementById('scheduleMessageText').value = text; document.getElementById('scheduleModal').classList.remove('hidden'); }
        function closeScheduleModal() { document.getElementById('scheduleModal').classList.add('hidden'); }
        async function saveScheduledMessage() { const msg = document.getElementById('scheduleMessageText').value.trim(), room = document.getElementById('scheduleChannel').value, time = document.getElementById('scheduleDateTime').value; if(!msg||!time) return; await sb.from('scheduled_messages').insert({ sender_id: currentUser.id, room_id: room, message_text: msg, scheduled_time: new Date(time).toISOString(), status: 'pending' }); alert('Scheduled'); closeScheduleModal(); }
        async function toggleBookmark(mid,text,btn) { const {data: ex} = await sb.from('bookmarks').select('id').eq('user_id',currentUser.id).eq('message_id',mid).maybeSingle(); if(ex) await sb.from('bookmarks').delete().eq('id',ex.id); else await sb.from('bookmarks').insert({ user_id: currentUser.id, message_id: mid }); }

        function attachModalButtons() {
            document.getElementById('cancelTaskBtn')?.addEventListener('click', closeTaskModal);
            document.getElementById('saveTaskBtn')?.addEventListener('click', saveTaskMultiAssignee);
            document.getElementById('cancelReminderBtn')?.addEventListener('click', closeReminderModal);
            document.getElementById('saveReminderBtn')?.addEventListener('click', saveReminder);
            document.getElementById('cancelScheduleBtn')?.addEventListener('click', closeScheduleModal);
            document.getElementById('saveScheduleBtn')?.addEventListener('click', saveScheduledMessage);
        }
        function startSubscriptions() { subscribeToMessages(); if(taskSubscription) taskSubscription.unsubscribe(); taskSubscription = sb.channel('tasks-changes').on('postgres_changes', {event:'*', schema:'public', table:'tasks'}, () => loadTasksForPanel()).subscribe(); if(assigneeSubscription) assigneeSubscription.unsubscribe(); assigneeSubscription = sb.channel('assignees-changes').on('postgres_changes', {event:'*', schema:'public', table:'task_assignees'}, () => loadTasksForPanel()).subscribe(); }

        (async() => { const {data: {session}} = await sb.auth.getSession(); if(!session) renderAuthScreen(); else { currentUser = session.user; await ensureProfile(); renderMainApp(); startSubscriptions(); } })();
    </script>
</body>
</html>
