    <script>
      // ── GLOBAL CONSOLE RECORDER (must be the FIRST script) ─────────────────
      // Captures EVERY console.log/info/warn/error/debug + uncaught errors +
      // unhandled promise rejections, from the very first line of the app, with a
      // relative timestamp per line. Persists to localStorage so the logs SURVIVE a
      // reload or crash (the previous session's tail is prepended) — which is exactly
      // when we need them. Tap the version badge (or window._copyLogs()) to copy all.
      (function () {
        try {
          var CAP = 1500, KEY = 'nfa_console_log', buf = [];
          try {
            var prev = JSON.parse(localStorage.getItem(KEY) || '[]');
            if (prev && prev.length) { buf.push('──── previous session ────'); buf = buf.concat(prev.slice(-400)); buf.push('──── this session ────'); }
          } catch (e) {}
          window.__LOG = buf;
          var sessionStart = buf.length;   // persist only THIS session (no compounding of prev sessions)
          var t0 = Date.now(), saveT = null;
          function fmt(a) {
            try {
              if (typeof a === 'string') return a;
              if (a instanceof Error) return a.stack || a.message;
              return JSON.stringify(a, function (k, v) { return (v instanceof Error) ? (v.stack || v.message) : v; });
            } catch (e) { return String(a); }
          }
          function save() { if (saveT) return; saveT = setTimeout(function () { saveT = null; try { localStorage.setItem(KEY, JSON.stringify(buf.slice(sessionStart).slice(-600))); } catch (e) {} }, 1500); }
          function push(lvl, args) {
            var ms = ((Date.now() - t0) / 1000).toFixed(2);
            buf.push('[' + ms + 's][' + lvl + '] ' + Array.prototype.map.call(args, fmt).join(' '));
            if (buf.length > CAP) buf.shift();
            save();
          }
          ['log', 'info', 'warn', 'error', 'debug'].forEach(function (m) {
            var o = console[m] ? console[m].bind(console) : function () {};
            console[m] = function () { try { push(m.charAt(0).toUpperCase(), arguments); } catch (e) {} o.apply(null, arguments); };
          });
          window.addEventListener('error', function (e) {
            var w = e.filename ? (e.filename.split('/').pop() + ':' + e.lineno + ':' + e.colno) : '?';
            push('ERR', [(e.message || 'error') + ' @ ' + w + (e.error && e.error.stack ? '\n' + e.error.stack : '')]);
          });
          window.addEventListener('unhandledrejection', function (e) {
            var r = e.reason; push('REJ', [r && r.stack ? r.stack : (r && r.message ? r.message : String(r))]);
          });
          window.__clearLog = function () { buf.length = 0; try { localStorage.removeItem(KEY); } catch (e) {} };
        } catch (e) {}
      })();
    </script>
    <script>
      // Pre-paint theme guard: on mobile devices, never let the saved WEB theme
      // (e.g. ocean-teal) color the first paint / login page — apply the user's
      // mobile theme choice (system/light/dark) before any CSS renders.
      (function () {
        try {
          var mob = window.innerWidth <= 768 ||
            (window.matchMedia && matchMedia('(pointer:coarse)').matches && window.innerWidth <= 1366);
          if (!mob) return;
          var mode = localStorage.getItem('mob_theme') || 'system';
          var dark = mode === 'dark' ||
            (mode === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.setAttribute('data-theme', 'dark');
          else document.documentElement.removeAttribute('data-theme');
          // Mark so the web boot theme code knows mobile owns the attribute.
          window.__mobThemeLock = true;
          // GREEN GUTTER FIX (definitive): the saved web theme (ocean-teal) tints the
          // <body> background green (#ecfdf5), which shows through the safe-area gutter
          // around the fixed app as a thin margin. Force html+body to the app color on
          // mobile with !important — independent of whatever theme var resolves to.
          var appbg = dark ? '#000000' : '#eef0f8';
          document.documentElement.style.background = appbg;
          var _bl = document.createElement('style');
          _bl.id = 'mobBgLock';
          _bl.textContent = 'html,body{background:' + appbg + ' !important;margin:0 !important;}';
          document.head.appendChild(_bl);
        } catch (e) {}
      })();
    </script>

<style>
    /* ── GLOBAL FONT: Inter — no other font anywhere in the app ── */
    html, body, input, select, textarea, button, h1, h2, h3, h4, h5, h6,
    p, span, div, td, th, label, a, li {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    /* Inlined from css/mobile-app.css — that external file kept being served
       with the wrong MIME type (text/plain instead of text/css) in
       production despite the file content and routing config both looking
       correct, and repeated attempts to diagnose it via Vercel's config
       didn't resolve it. Inlining removes the failure mode entirely: an
       inline <style> block can never have a content-type or static-file-
       routing problem, regardless of what's happening server-side. */

    /* IMPORTANT: do not add a blanket "#root{display:none}" media-query rule
       here. #root is also where the LOGIN FORM renders (see auth.js) — a
       rule that hides #root on any mobile-width viewport hides the login
       screen itself before the user has even logged in, with nothing else
       on screen to replace it (mobile.js's UI only gets built *after* a
       successful login). That exact bug shipped once already and made the
       app unusable on mobile until login. The correct, safely-scoped fix
       lives in mobile.js's initMobileApp(): #root is hidden via JS only at
       the instant mobile.js actually takes over (i.e. only post-login),
       which can't block the login screen. */

    /* These banners were missing CSS entirely at one point, so they had no
       default-hidden state and rendered unconditionally on every page load
       regardless of the platform-detection JS below (beforeinstallprompt /
       isIOS) — invisible before only because #mobileApp's z-index happened
       to cover it. Explicitly hidden until JS adds .show. */
    #pwaInstallBanner, #iosInstallHint {
      display: none;
      position: fixed;
      left: 12px; right: 12px;
      z-index: 10500;
      border-radius: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,.18);
    }
    #pwaInstallBanner.show, #iosInstallHint.show { display: flex; align-items: center; gap: 10px; }
    #pwaInstallBanner {

    }
    #iosInstallHint {

      background: #111;
      color: #fff;
      padding: 12px 16px;
      font-size: 13px;
    }

    <!-- Boot splash (Instagram-style): paints INSTANTLY before any JS/CSS loads,

    <style>@keyframes bootspin{to{transform:rotate(360deg)}}</style>
    <script>
      // App calls this when its first screen is painted; safety timeout guarantees
      // the splash NEVER traps the user even if boot code fails.
      window._hideSplash = function () {
        var s = document.getElementById('bootSplash');
        if (!s || s.dataset.hiding) return;
        s.dataset.hiding = '1';
        s.style.opacity = '0';
        setTimeout(function () { s.remove(); }, 500);
      };
      setTimeout(function () { window._hideSplash(); }, 6000);
    </script>

<script type="module">
// ── Logger: global error capture ─────────────────────────
import logger from './js/utils/logger.js';
window.onerror = function(message, source, lineno, colno, error) {
  logger.logError(error || new Error(message), { source, lineno, colno });
  return false;
};
window.addEventListener('unhandledrejection', function(event) {
  logger.logError(event.reason || 'Unhandled rejection', {});
});
</script>
<script>
// ── Service Worker registration ───────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .then(reg => { try { reg.update(); } catch (e) {} })
    .catch(() => {});
  // When a new service worker takes control, reload once so the fresh
  // HTML/JS is used immediately (self-heals stuck cached builds).
  let _swReloaded = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (_swReloaded) return; _swReloaded = true; window.location.reload();
  });
}

// ── Android/Chrome: capture install prompt ────────────────
let _installPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _installPrompt = e;
  if (!sessionStorage.getItem('pwa_dismissed')) {
    setTimeout(() => {
      document.getElementById('pwaInstallBanner')?.classList.add('show');
    }, 5000);
  }
});

window.installPWA = async () => {
  const b = document.getElementById('pwaInstallBanner');
  if (_installPrompt) {
    _installPrompt.prompt();
    await _installPrompt.userChoice;
    _installPrompt = null;
    b?.classList.remove('show');
  }
};

window.dismissInstall = () => {
  document.getElementById('pwaInstallBanner')?.classList.remove('show');
  document.getElementById('iosInstallHint')?.classList.remove('show');
  sessionStorage.setItem('pwa_dismissed', '1');
};

// ── iOS Safari: show manual instruction ──────────────────
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent)
           && !window.MSStream;
const isInApp = window.navigator.standalone === true;
if (isIOS && !isInApp && !sessionStorage.getItem('pwa_dismissed')) {
  setTimeout(() => {
    document.getElementById('iosInstallHint')?.classList.add('show');
    setTimeout(() => {
      document.getElementById('iosInstallHint')?.classList.remove('show');
    }, 7000);
  }, 4000);
}

window.addEventListener('appinstalled', () => {
  document.getElementById('pwaInstallBanner')?.classList.remove('show');
  _installPrompt = null;
});
</script>
