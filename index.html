<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corporate Chat App - Enterprise Edition</title>
    
    <!-- Professional Assets -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase 10.8.1 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, updateDoc, setDoc, getDocs, where, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAoOsog2NP6Pf8YNSxn0rRYK4MSLEVNNZc",
            authDomain: "niltask.firebaseapp.com",
            projectId: "niltask",
            storageBucket: "niltask.firebasestorage.app",
            messagingSenderId: "868641827920",
            appId: "1:868641827920:web:70d9db79a361a76468f555"
        };

        const app = initializeApp(firebaseConfig);
        
        // Strict Flat Architecture Mapping for Maximum Stability
        window.auth = getAuth(app);
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
        window.signOut = signOut;
        window.onAuthStateChanged = onAuthStateChanged;

        window.db = getFirestore(app);
        window.collection = collection;
        window.addDoc = addDoc;
        window.onSnapshot = onSnapshot;
        window.query = query;
        window.orderBy = orderBy;
        window.serverTimestamp = serverTimestamp;
        window.doc = doc;
        window.updateDoc = updateDoc;
        window.setDoc = setDoc;
        window.getDocs = getDocs;
        window.where = where;
        window.deleteDoc = deleteDoc;
        window.writeBatch = writeBatch; // Added for Bulk Clear Feature
        
        window.storage = getStorage(app);
        window.ref = ref;
        window.uploadBytesResumable = uploadBytesResumable;
        window.getDownloadURL = getDownloadURL;

        window.secondaryApp = initializeApp(firebaseConfig, "Secondary");
        window.secondaryAuth = getAuth(window.secondaryApp);

        window.dispatchEvent(new Event('firebaseReady'));
    </script>

    <style>
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .telegram-bg { background-color: #e6eee0; background-image: url('https://www.transparenttextures.com/patterns/cubes.png'); }
        @keyframes pop { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop { animation: pop 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body class="bg-slate-200 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const NOTIFICATION_SOUND = "https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3";

        function ChatApp({ user, onLogout }) {
            const [activeModal, setActiveModal] = useState(null);
            const [selectedMessage, setSelectedMessage] = useState(null);
            const [replyingTo, setReplyingTo] = useState(null);
            const [inputText, setInputText] = useState("");
            const [messages, setMessages] = useState([]); 
            const messagesEndRef = useRef(null); 
            const audioRef = useRef(new Audio(NOTIFICATION_SOUND));

            // Logic States
            const [dbUsers, setDbUsers] = useState([]); 
            const [groups, setGroups] = useState([]);
            const [activeGroup, setActiveGroup] = useState({ id: "main", name: "Organization Wide" });
            const [currentUserData, setCurrentUserData] = useState(null);
            const [activeReminders, setActiveReminders] = useState([]);
            
            // Admin & Search
            const [viewMode, setViewMode] = useState("chat"); 
            const [adminTab, setAdminTab] = useState("users"); 
            const [searchQuery, setSearchQuery] = useState("");
            const [showNotifications, setShowNotifications] = useState(false);
            
            // Forms
            const [adminForm, setAdminForm] = useState({ uid: '', name: '', email: '', password: '', isAdmin: false, canCreateGroups: false });
            const [groupForm, setGroupForm] = useState({ id: null, name: "", members: [] });
            const [taskAssignee, setTaskAssignee] = useState("");
            const [taskDeadline, setTaskDeadline] = useState("");
            const [trailComment, setTrailComment] = useState("");
            const [reminderDateTime, setReminderDateTime] = useState("");
            const [isUploading, setIsUploading] = useState(false);
            const [uploadProgress, setUploadProgress] = useState(0);
            const fileInputRef = useRef(null);

            // Play notification sound safely
            const playAlertSound = () => {
                if (audioRef.current) {
                    audioRef.current.currentTime = 0;
                    audioRef.current.play().catch(e => console.warn("Audio blocked:", e));
                }
            };

            const openGroupSettings = () => {
                if (activeGroup.id === 'main') return;
                setGroupForm(prev => ({ ...prev, members: activeGroup.members || [] }));
                setActiveModal('group_settings');
            };

            // 1. Database Listeners
            useEffect(() => {
                if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") {
                    Notification.requestPermission();
                }

                const unsubCurrent = window.onSnapshot(window.doc(window.db, "users", user.uid), (doc) => {
                    if (doc.exists()) setCurrentUserData(doc.data());
                });
                const unsubUsers = window.onSnapshot(window.query(window.collection(window.db, "users"), window.orderBy("email", "asc")), (snapshot) => {
                    setDbUsers(snapshot.docs.map(doc => doc.data()));
                });
                const unsubGroups = window.onSnapshot(window.collection(window.db, "groups"), (snapshot) => {
                    setGroups(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                const qMsg = window.query(window.collection(window.db, "messages"), window.orderBy("timestamp", "asc"));
                const unsubMsg = window.onSnapshot(qMsg, (snapshot) => {
                    const loaded = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    
                    setMessages(prev => {
                        // Play sound if a new private mention arrives
                        if (loaded.length > prev.length && prev.length > 0) {
                            const lastMsg = loaded[loaded.length - 1];
                            if (lastMsg.isPrivateMention && !lastMsg.isMine && lastMsg.allowedUsers?.includes(user.email)) {
                                playAlertSound();
                            }
                        }
                        return loaded;
                    });
                    setTimeout(() => messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }), 100);
                });
                
                const qRem = window.query(window.collection(window.db, "reminders"), window.where("userId", "==", user.uid), window.where("isTriggered", "==", false));
                const unsubRem = window.onSnapshot(qRem, (snapshot) => {
                    const newRems = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    if (newRems.length > activeReminders.length && activeReminders.length > 0) playAlertSound();
                    setActiveReminders(newRems);
                });
                
                let unsubAdmin = () => {};
                if (currentUserData?.isAdmin) {
                    const qAdmin = window.query(window.collection(window.db, "reminders"), window.orderBy("remindAt", "desc"));
                    unsubAdmin = window.onSnapshot(qAdmin, (snapshot) => {
                        setAllAdminReminders(snapshot.docs.map(d => ({ id: d.id, ...d.data() })));
                    });
                }
                return () => { unsubCurrent(); unsubUsers(); unsubGroups(); unsubMsg(); unsubRem(); unsubAdmin(); };
            }, [user.uid, currentUserData?.isAdmin]);

            // Reminder Polling Engine
            useEffect(() => {
                const interval = setInterval(() => {
                    const now = new Date();
                    activeReminders.forEach(async (rem) => {
                        if (new Date(rem.remindAt) <= now) {
                            playAlertSound();
                            if ("Notification" in window && Notification.permission === "granted") {
                                new Notification("Corporate Alert", { body: rem.messageText });
                            }
                            await window.updateDoc(window.doc(window.db, "reminders", rem.id), { isTriggered: true });
                        }
                    });
                }, 10000);
                return () => clearInterval(interval);
            }, [activeReminders]);

            // Ergonmic Input Handler (Enter to Post)
            const handleKeyDown = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSendMessage();
                }
            };

            const handleSendMessage = async () => {
                if (!inputText.trim()) return;
                const text = inputText;
                const parentId = replyingTo?.id || null;
                
                // Calculate Thread Number
                let threadNum = null;
                if (parentId) {
                    const existingReplies = messages.filter(m => m.replyTo === parentId);
                    threadNum = existingReplies.length + 1;
                }

                setInputText(""); 
                setReplyingTo(null);
                document.getElementById('chatInput').style.height = 'auto'; // reset textarea height

                const mentions = dbUsers.filter(u => text.includes(`@${u.name}`)).map(u => u.email);
                const isPrivate = mentions.length > 0;
                
                try {
                    await window.addDoc(window.collection(window.db, "messages"), {
                        text, senderUid: user.uid, senderEmail: user.email,
                        timestamp: window.serverTimestamp(),
                        groupId: activeGroup.id,
                        isPrivateMention: isPrivate,
                        allowedUsers: isPrivate ? [user.email, ...mentions] : [],
                        replyTo: parentId,
                        threadNumber: threadNum,
                        reactions: {}
                    });
                } catch (e) { console.error(e); }
            };

            const handleReaction = async (msgId, emoji) => {
                const msg = messages.find(m => m.id === msgId);
                const currentReactions = msg.reactions || {};
                const users = currentReactions[emoji] || [];
                const newUsers = users.includes(user.email) ? users.filter(u => u !== user.email) : [...users, user.email];
                await window.updateDoc(window.doc(window.db, "messages", msgId), {
                    [`reactions.${emoji}`]: newUsers
                });
            };

            const clearAllNotifications = async () => {
                if (activeReminders.length === 0) return;
                const batch = window.writeBatch(window.db);
                activeReminders.forEach(rem => {
                    batch.update(window.doc(window.db, "reminders", rem.id), { isTriggered: true });
                });
                await batch.commit();
                setShowNotifications(false);
            };

            const handleFileUpload = async (e) => {
                if (isUploading) return;
                const file = e.target.files[0];
                if (!file) return;
                setIsUploading(true);
                setUploadProgress(0);

                const uniqueFileName = `${Date.now()}_${file.name}`;
                const storageRef = window.ref(window.storage, `chat_uploads/${uniqueFileName}`);
                const uploadTask = window.uploadBytesResumable(storageRef, file);

                uploadTask.on('state_changed', 
                    (snapshot) => setUploadProgress((snapshot.bytesTransferred / snapshot.totalBytes) * 100), 
                    (error) => { setIsUploading(false); alert("File upload failed."); }, 
                    async () => {
                        try {
                            const downloadURL = await window.getDownloadURL(uploadTask.snapshot.ref);
                            await window.addDoc(window.collection(window.db, "messages"), {
                                text: `Shared file: ${file.name}`, senderUid: user.uid, senderEmail: user.email,
                                timestamp: window.serverTimestamp(),
                                isTask: false, hasReminder: false, isPrivateMention: false, allowedUsers: [],
                                fileUrl: downloadURL, fileName: file.name, fileType: file.type,
                                groupId: activeGroup.id, reactions: {}
                            });
                        } catch (err) { console.warn(err); } 
                        finally {
                            setIsUploading(false); setUploadProgress(0);
                            if(fileInputRef.current) fileInputRef.current.value = ""; 
                        }
                    }
                );
            };

            // Admin & Task Functions
            const convertToTask = async () => {
                if (!selectedMessage || !taskDeadline || !taskAssignee) return alert("Select assignee and deadline.");
                const now = new Date();
                await window.setDoc(window.doc(window.db, "messages", selectedMessage.id), {
                    isTask: true,
                    taskData: {
                        deadline: taskDeadline, currentAssignee: taskAssignee, status: "Pending",
                        trail: [{ action: "Task Created", by: user.email, time: now.toLocaleTimeString(), to: taskAssignee }]
                    }
                }, { merge: true });
                setActiveModal(null);
            };

            const handleCreateGroup = async (e) => {
                e.preventDefault();
                const members = [...new Set([...groupForm.members, user.email])];
                await window.addDoc(window.collection(window.db, "groups"), {
                    name: groupForm.name, members, admins: [user.email], createdAt: window.serverTimestamp()
                });
                setActiveModal(null);
                setGroupForm({ id: null, name: "", members: [] });
            };

            const deleteGroup = async (groupId) => {
                if (window.confirm("Delete this department and all its data?")) {
                    await window.deleteDoc(window.doc(window.db, "groups", groupId));
                }
            };
            
            const handleUpdateGroupMembers = async (e) => {
                e.preventDefault();
                const groupAdmins = activeGroup.admins || [];
                const finalMembers = [...new Set([...groupForm.members, ...groupAdmins])];
                await window.updateDoc(window.doc(window.db, "groups", activeGroup.id), { members: finalMembers });
                setActiveModal(null);
                setActiveGroup({...activeGroup, members: finalMembers});
            };

            const setReminder = async () => {
                if (!selectedMessage || !reminderDateTime) return;
                await window.addDoc(window.collection(window.db, "reminders"), {
                    userId: user.uid, userEmail: user.email, messageId: selectedMessage.id,
                    messageText: selectedMessage.text || selectedMessage.fileName || "File Attachment",
                    remindAt: reminderDateTime, isTriggered: false
                });
                await window.updateDoc(window.doc(window.db, "messages", selectedMessage.id), { hasReminder: true });
                setActiveModal(null); setReminderDateTime("");
            };

            const handleDelegateTask = async () => {
                if (!selectedMessage?.taskData || !delegateAssignee) return;
                const updatedTrail = [...selectedMessage.taskData.trail, { action: "Delegated", by: user.email, time: new Date().toLocaleTimeString(), to: delegateAssignee }];
                await window.updateDoc(window.doc(window.db, "messages", selectedMessage.id), { "taskData.currentAssignee": delegateAssignee, "taskData.status": "In Progress", "taskData.trail": updatedTrail });
                setActiveModal(null);
            };

            const handleCompleteTask = async () => {
                if (!selectedMessage?.taskData) return;
                if (user.email !== selectedMessage.taskData.currentAssignee && !currentUserData?.isAdmin) return alert("Only the Assignee or Admin can complete this.");
                const updatedTrail = [...selectedMessage.taskData.trail, { action: "Marked Completed", by: user.email, time: new Date().toLocaleTimeString(), to: "System" }];
                await window.updateDoc(window.doc(window.db, "messages", selectedMessage.id), { "taskData.status": "Completed", "taskData.trail": updatedTrail });
                setActiveModal(null);
            };

            const handleAddComment = async () => {
                if (!selectedMessage?.taskData || !trailComment.trim()) return;
                const updatedTrail = [...selectedMessage.taskData.trail, { action: "Update Added", by: user.email, time: new Date().toLocaleTimeString(), comment: trailComment }];
                await window.updateDoc(window.doc(window.db, "messages", selectedMessage.id), { "taskData.trail": updatedTrail });
                setTrailComment(""); 
            };
            
            const handleAddUserSubmit = async (e) => { 
                e.preventDefault(); 
                try { 
                    const cred = await window.createUserWithEmailAndPassword(window.secondaryAuth, adminForm.email, adminForm.password); 
                    await window.setDoc(window.doc(window.db, "users", cred.user.uid), { uid: cred.user.uid, email: cred.user.email, name: adminForm.name, isApproved: true, isAdmin: adminForm.isAdmin, canCreateGroups: adminForm.canCreateGroups }); 
                    window.signOut(window.secondaryAuth); setActiveModal(null); setAdminForm({ uid: '', name: '', email: '', password: '', isAdmin: false, canCreateGroups: false }); 
                } catch(err){alert(err.message);} 
            };
            
            const handleEditUserSubmit = async (e) => { e.preventDefault(); await window.updateDoc(window.doc(window.db, "users", adminForm.uid), { name: adminForm.name, isAdmin: adminForm.isAdmin, canCreateGroups: adminForm.canCreateGroups }); setActiveModal(null); };

            const handleMessageClick = (msg) => {
                setSelectedMessage(msg);
                setActiveModal(msg.isTask ? 'task_trail' : 'context');
            };

            const visibleMessages = messages.filter(m => {
                if (m.groupId !== activeGroup.id) return false;
                if (m.isPrivateMention && !m.allowedUsers?.includes(user.email)) return false;
                if (searchQuery && !m.text?.toLowerCase().includes(searchQuery.toLowerCase())) return false;
                return true;
            });

            const myGroups = [{id: "main", name: "Organization Wide"}, ...groups.filter(g => g.members?.includes(user.email) || currentUserData?.isAdmin)];

            return (
                <div className="flex h-screen w-full bg-white overflow-hidden text-slate-800">
                    
                    {viewMode === "admin" ? (
                        /* --- ADMIN CONSOLE VIEW --- */
                        <div className="flex flex-col h-full w-full bg-slate-50">
                            <div className="bg-slate-900 text-white p-4 flex justify-between items-center">
                                <div className="flex items-center gap-3"><i className="fa-solid fa-shield-halved text-blue-400 text-xl"></i><h1 className="font-bold">Enterprise Admin Console</h1></div>
                                <button onClick={() => setViewMode("chat")} className="bg-slate-700 px-4 py-2 rounded-lg text-sm font-bold hover:bg-slate-600 transition-colors">Exit Admin</button>
                            </div>
                            <div className="flex border-b bg-white">
                                {['users', 'groups', 'audit'].map(t => (
                                    <button key={t} onClick={()=>setAdminTab(t)} className={`px-8 py-3 text-sm font-bold uppercase tracking-wider ${adminTab === t ? 'border-b-2 border-blue-600 text-blue-600' : 'text-slate-400 hover:text-slate-600'}`}>{t}</button>
                                ))}
                            </div>
                            <div className="flex-1 overflow-y-auto p-6">
                                {adminTab === 'users' && (
                                    <div className="bg-white rounded-xl shadow-sm border overflow-hidden">
                                        <table className="w-full text-left text-sm">
                                            <thead className="bg-slate-50 text-slate-500 uppercase text-[10px] font-black border-b">
                                                <tr><th className="p-4">Name</th><th className="p-4">Email</th><th className="p-4">Status</th><th className="p-4 text-right">Actions</th></tr>
                                            </thead>
                                            <tbody className="divide-y">
                                                {dbUsers.map(u => (
                                                    <tr key={u.uid} className="hover:bg-slate-50">
                                                        <td className="p-4 font-bold">{u.name} {u.isAdmin && <i className="fa-solid fa-star text-yellow-500 text-xs ml-1" title="Admin"></i>}</td>
                                                        <td className="p-4 text-slate-500">{u.email}</td>
                                                        <td className="p-4"><span className={`px-2 py-1 rounded-full text-[10px] font-black ${u.isApproved ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'}`}>{u.isApproved ? 'VERIFIED' : 'PENDING'}</span></td>
                                                        <td className="p-4 text-right">
                                                            <button onClick={() => window.updateDoc(window.doc(window.db, "users", u.uid), { isApproved: !u.isApproved })} className="text-blue-600 mr-4 font-bold">Toggle Auth</button>
                                                            <button onClick={() => { setAdminForm({...u, canCreateGroups: u.canCreateGroups||false}); setActiveModal('admin_edit_user'); }} className="text-blue-500 mr-4"><i className="fa-solid fa-pen"></i></button>
                                                            <button onClick={() => { if(window.confirm("Delete User?")) window.deleteDoc(window.doc(window.db, "users", u.uid)); }} className="text-red-500 font-bold"><i className="fa-solid fa-trash-can"></i></button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}
                                {adminTab === 'groups' && (
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {groups.map(g => (
                                            <div key={g.id} className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                                                <div className="flex justify-between items-start mb-4">
                                                    <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white font-black text-xl">{g.name[0]}</div>
                                                    <button onClick={()=>deleteGroup(g.id)} className="text-slate-300 hover:text-red-500"><i className="fa-solid fa-trash-can"></i></button>
                                                </div>
                                                <h3 className="font-black text-slate-800 mb-1">{g.name}</h3>
                                                <p className="text-xs text-slate-500 mb-4">{g.members?.length} Active Members</p>
                                                <div className="flex flex-wrap gap-1 mb-4">
                                                    {g.members?.slice(0,3).map(m => <span key={m} className="bg-slate-100 text-slate-600 px-2 py-1 rounded text-[9px] font-bold">{m.split('@')[0]}</span>)}
                                                    {g.members?.length > 3 && <span className="text-[9px] text-slate-400 font-bold">+{g.members.length - 3} more</span>}
                                                </div>
                                                <button onClick={()=>{ setActiveGroup(g); setGroupForm(prev=>({...prev, members: g.members})); setActiveModal('group_settings'); }} className="w-full bg-slate-50 text-slate-700 font-bold text-xs py-2 rounded-lg border hover:bg-slate-100 transition-colors">Manage Members</button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                {adminTab === 'audit' && (
                                    <div className="bg-white rounded-xl shadow-sm border overflow-hidden max-h-[600px] flex flex-col">
                                        <div className="bg-slate-50 p-4 border-b flex justify-between items-center shrink-0">
                                            <div className="flex gap-2">
                                                <select value={adminFilterUser} onChange={(e)=>setAdminFilterUser(e.target.value)} className="p-2 border rounded-lg text-xs font-bold outline-none">
                                                    <option value="">All Users</option>
                                                    {dbUsers.map(u => <option key={u.uid} value={u.email}>{u.name}</option>)}
                                                </select>
                                                <input type="date" value={adminFilterDate} onChange={(e)=>setAdminFilterDate(e.target.value)} className="p-2 border rounded-lg text-xs font-bold outline-none" />
                                            </div>
                                        </div>
                                        <div className="overflow-y-auto flex-1 p-0">
                                            <table className="w-full text-left text-sm">
                                                <thead className="bg-slate-50 text-slate-500 text-[10px] uppercase sticky top-0 shadow-sm border-b z-10">
                                                    <tr><th className="p-4">Time</th><th className="p-4">Type</th><th className="p-4">Snippet</th><th className="p-4 text-right">Delete</th></tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-50">
                                                    {[...messages].reverse().map(msg => {
                                                        const dateStr = msg.timestamp ? new Date(msg.timestamp.toDate()).toISOString().split('T')[0] : '';
                                                        if (adminFilterDate && dateStr !== adminFilterDate) return null;
                                                        if (adminFilterUser && msg.sender !== adminFilterUser && msg.taskData?.currentAssignee !== adminFilterUser) return null;
                                                        return (
                                                            <tr key={msg.id} className="hover:bg-slate-50">
                                                                <td className="p-4 text-xs text-slate-500">{dateStr} <br/>{msg.time}</td>
                                                                <td className="p-4 font-bold text-[10px] uppercase tracking-wider text-blue-600">{msg.isTask ? 'Task' : msg.isPrivateMention ? 'Private' : 'Public'}</td>
                                                                <td className="p-4 text-xs italic text-slate-700 max-w-[200px] truncate">"{msg.text || msg.fileName}"</td>
                                                                <td className="p-4 text-right"><button onClick={() => { if(window.confirm("Erase globally?")) window.deleteDoc(window.doc(window.db, "messages", msg.id)); }} className="text-red-500"><i className="fa-solid fa-trash"></i></button></td>
                                                            </tr>
                                                        );
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    ) : (
                        /* --- MAIN CHAT UI --- */
                        <div className="flex h-full w-full">
                            {/* SIDEBAR */}
                            <div className="hidden md:flex w-72 bg-slate-50 border-r flex-col shrink-0">
                                <div className="p-4 flex items-center gap-3 bg-white border-b shadow-sm z-10">
                                    <div className="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center text-white font-black shadow-inner">{user.email[0].toUpperCase()}</div>
                                    <div className="overflow-hidden">
                                        <div className="font-bold text-sm truncate">{currentUserData?.name}</div>
                                        <div className="text-[10px] text-green-500 font-bold uppercase tracking-widest">Secured</div>
                                    </div>
                                    <button onClick={()=>setActiveModal('create_group')} className="ml-auto text-blue-500 hover:scale-110 transition-transform"><i className="fa-solid fa-plus-circle text-lg"></i></button>
                                </div>
                                <div className="flex-1 overflow-y-auto py-2">
                                    {myGroups.map(g => (
                                        <div key={g.id} onClick={() => setActiveGroup(g)} className={`flex items-center gap-3 p-3 mx-2 rounded-xl cursor-pointer mb-1 transition-all ${activeGroup.id === g.id ? 'bg-blue-600 text-white shadow-md' : 'hover:bg-slate-200 text-slate-600'}`}>
                                            <div className={`w-10 h-10 rounded-lg flex items-center justify-center font-black shrink-0 shadow-inner ${activeGroup.id === g.id ? 'bg-white/20' : 'bg-white text-slate-400 border border-slate-200'}`}>{g.name[0]}</div>
                                            <div className="overflow-hidden">
                                                <div className="font-bold text-sm truncate">{g.name}</div>
                                                <div className={`text-[10px] truncate ${activeGroup.id === g.id ? 'text-white/70' : 'text-slate-400'}`}>{g.id === 'main' ? 'Global Broadcast' : 'Department'}</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="p-3 border-t bg-white space-y-1">
                                    <button onClick={() => setShowNotifications(!showNotifications)} className="w-full flex items-center gap-3 p-2 rounded-lg text-sm font-bold text-slate-600 hover:bg-slate-100 transition-colors">
                                        <i className="fa-solid fa-bell w-5 text-center"></i> Alerts
                                        {activeReminders.length > 0 && <span className="bg-red-500 text-white text-[10px] px-2 rounded-full ml-auto animate-pulse">{activeReminders.length}</span>}
                                    </button>
                                    {currentUserData?.isAdmin && (
                                        <button onClick={() => setViewMode("admin")} className="w-full flex items-center gap-3 p-2 rounded-lg text-sm font-bold text-slate-600 hover:bg-slate-100 transition-colors">
                                            <i className="fa-solid fa-shield-halved w-5 text-center"></i> Admin Shield
                                        </button>
                                    )}
                                    <button onClick={onLogout} className="w-full flex items-center gap-3 p-2 rounded-lg text-sm font-bold text-red-500 hover:bg-red-50 transition-colors">
                                        <i className="fa-solid fa-power-off w-5 text-center"></i> Logout
                                    </button>
                                </div>
                            </div>

                            {/* ACTIVE CHAT ZONE */}
                            <div className="flex-1 flex flex-col relative h-full bg-white">
                                <div className="h-16 bg-white/90 backdrop-blur-sm border-b flex items-center justify-between px-6 shrink-0 shadow-sm z-10">
                                    <div className="flex items-center gap-3">
                                        <div className="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center text-slate-400 font-black shadow-inner">{activeGroup.name[0]}</div>
                                        <div>
                                            <h1 className="font-bold text-sm">{activeGroup.name}</h1>
                                            <p className="text-[10px] text-green-500 font-bold tracking-tight uppercase">Active Encrypted Session</p>
                                        </div>
                                    </div>
                                    <div className="hidden md:flex items-center bg-slate-100 rounded-full px-4 py-1.5 border border-slate-200 focus-within:border-blue-300 transition-colors">
                                        <i className="fa-solid fa-magnifying-glass text-slate-400 text-xs"></i>
                                        <input type="text" placeholder="Search archive..." className="bg-transparent outline-none text-xs ml-2 w-32 focus:w-48 transition-all" value={searchQuery} onChange={(e)=>setSearchQuery(e.target.value)} />
                                    </div>
                                </div>

                                {showNotifications && (
                                    <div className="absolute top-16 right-6 w-80 bg-white rounded-2xl shadow-2xl border z-30 overflow-hidden animate-pop">
                                        <div className="bg-slate-900 text-white p-3 flex justify-between items-center">
                                            <span className="font-bold text-xs uppercase tracking-widest">Pending Alerts</span>
                                            <button onClick={clearAllNotifications} className="text-[10px] bg-white/20 px-2 py-1 rounded hover:bg-white/30 font-black transition-colors">CLEAR ALL</button>
                                        </div>
                                        <div className="max-h-96 overflow-y-auto">
                                            {activeReminders.length === 0 ? <div className="p-8 text-center text-xs text-slate-400 font-bold italic">No active alerts.</div> : 
                                                activeReminders.map(rem => (
                                                    <div key={rem.id} className="p-4 border-b hover:bg-slate-50 cursor-default">
                                                        <div className="text-[10px] font-black text-blue-600 mb-1 tracking-widest uppercase">⏰ Reminder</div>
                                                        <div className="text-sm text-slate-800 font-semibold leading-snug">"{rem.messageText}"</div>
                                                    </div>
                                                ))
                                            }
                                        </div>
                                    </div>
                                )}

                                <div className="flex-1 overflow-y-auto p-4 md:p-8 space-y-5 telegram-bg relative">
                                    {visibleMessages.map((msg) => {
                                        const parentMsg = msg.replyTo ? messages.find(m => m.id === msg.replyTo) : null;
                                        
                                        // Enterprise Bubble System
                                        let bubbleClass = msg.isMine ? "bg-[#e2ffc9] border-l-2 border-green-200 ml-auto rounded-tr-none" : "bg-white border-r-2 border-slate-100 rounded-tl-none";
                                        if (msg.isTask) bubbleClass = "bg-white border-l-4 border-l-blue-600 shadow-md w-full md:w-[70%]";
                                        if (msg.isPrivateMention) bubbleClass = msg.isMine ? "bg-purple-600 text-white ml-auto rounded-tr-none" : "bg-purple-50 text-purple-900 border-l-4 border-purple-300 rounded-tl-none";
                                        if (msg.replyTo) bubbleClass = msg.isMine ? "bg-[#dcf8c6] ml-auto border-r-4 border-green-400 rounded-tr-none" : "bg-cyan-50 border-l-4 border-blue-400 rounded-tl-none";

                                        return (
                                            <div key={msg.id} className={`flex flex-col ${msg.isMine ? 'items-end' : 'items-start'} animate-pop relative`}>
                                                {!msg.isMine && <div className="text-[10px] font-black text-slate-500 mb-0.5 ml-2 uppercase tracking-widest opacity-80">{msg.sender.split('@')[0]}</div>}
                                                
                                                <div className={`max-w-[90%] md:max-w-[70%] p-3 rounded-[1rem] shadow-sm relative group transition-transform hover:-translate-y-px ${bubbleClass}`}>
                                                    
                                                    {/* Nested Threading */}
                                                    {parentMsg && (
                                                        <div className="mb-2 p-2 rounded-lg bg-black/5 border-l-2 border-blue-400 text-[11px] overflow-hidden">
                                                            <div className="font-black text-blue-600 mb-0.5 flex justify-between">
                                                                <span>{parentMsg.sender.split('@')[0]}</span>
                                                                <span className="opacity-50 tracking-widest uppercase">Thread #{msg.threadNumber}</span>
                                                            </div>
                                                            <div className="truncate italic font-bold opacity-60">"{parentMsg.text || parentMsg.fileName}"</div>
                                                        </div>
                                                    )}

                                                    {msg.isPrivateMention && <div className="text-[9px] font-black uppercase mb-1 opacity-60 tracking-widest"><i className="fa-solid fa-lock mr-1"></i> Private Channel</div>}

                                                    {msg.isTask ? (
                                                        <div onClick={() => handleMessageClick(msg)} className="cursor-pointer">
                                                            <div className="flex justify-between items-center mb-2">
                                                                <span className="text-[10px] font-black bg-blue-100 text-blue-600 px-2 py-0.5 rounded tracking-widest">OFFICIAL TASK</span>
                                                                <span className="text-[9px] font-black px-2 py-0.5 rounded-full bg-slate-100 uppercase">{msg.taskData.status}</span>
                                                            </div>
                                                            <div className="text-[15px] font-bold mb-3">{msg.text}</div>
                                                            <div className="bg-slate-50 p-2 rounded-lg text-[11px] flex justify-between border">
                                                                <span className="font-bold text-slate-600"><i className="fa-regular fa-user mr-1"></i> {msg.taskData.currentAssignee.split('@')[0]}</span>
                                                                <span className="text-red-500 font-black tracking-tighter">DUE: {new Date(msg.taskData.deadline).toLocaleDateString()}</span>
                                                            </div>
                                                        </div>
                                                    ) : (
                                                        <div onClick={() => handleMessageClick(msg)} className="cursor-pointer">
                                                            {msg.fileUrl ? (
                                                                msg.fileType?.startsWith('image/') ? <img src={msg.fileUrl} className="rounded-lg mb-1 max-h-64 w-full object-cover" /> :
                                                                <div className="flex items-center gap-3 p-3 bg-white/50 rounded-lg border border-black/5">
                                                                    <div className="w-10 h-10 bg-white rounded flex items-center justify-center shadow-sm text-blue-600"><i className="fa-solid fa-file-invoice text-xl"></i></div>
                                                                    <div className="text-[12px] font-black truncate">{msg.fileName}</div>
                                                                </div>
                                                            ) : <p className="text-[15px] font-medium leading-relaxed whitespace-pre-wrap">{msg.text}</p>}
                                                        </div>
                                                    )}

                                                    <div className="flex items-center justify-end gap-1 mt-1 text-[9px] font-bold opacity-40 uppercase tracking-tighter">
                                                        {msg.hasReminder && <i className="fa-regular fa-clock text-amber-600"></i>}
                                                        <span>{msg.time}</span>
                                                        {msg.isMine && <i className="fa-solid fa-check-double text-blue-600"></i>}
                                                    </div>

                                                    {/* Emoji Reactions */}
                                                    <div className="absolute -bottom-3 left-2 flex gap-1 z-10">
                                                        {Object.entries(msg.reactions || {}).map(([emoji, users]) => (
                                                            users.length > 0 && (
                                                                <div key={emoji} onClick={(e)=>{e.stopPropagation(); handleReaction(msg.id, emoji);}} className="bg-white border rounded-full px-1.5 py-0.5 text-[10px] shadow-sm flex items-center gap-1 hover:bg-slate-100 transition-colors font-black cursor-pointer">
                                                                    {emoji} <span className="text-slate-500">{users.length}</span>
                                                                </div>
                                                            )
                                                        ))}
                                                    </div>

                                                    {/* Hover Actions */}
                                                    <div className={`absolute top-1 ${msg.isMine ? '-left-20' : '-right-20'} opacity-0 group-hover:opacity-100 transition-opacity flex gap-1 bg-white/80 backdrop-blur rounded shadow-sm border p-0.5 z-20`}>
                                                        <button onClick={(e)=>{e.stopPropagation(); setReplyingTo(msg); setInputText(""); setTimeout(() => document.getElementById('chatInput').focus(), 50); }} className="w-6 h-6 rounded hover:bg-slate-200 flex items-center justify-center text-[10px] text-slate-600"><i className="fa-solid fa-reply"></i></button>
                                                        <button onClick={(e)=>{e.stopPropagation(); handleReaction(msg.id, '👍');}} className="w-6 h-6 rounded hover:bg-slate-200 flex items-center justify-center text-[11px]">👍</button>
                                                        <button onClick={(e)=>{e.stopPropagation(); handleReaction(msg.id, '❤️');}} className="w-6 h-6 rounded hover:bg-slate-200 flex items-center justify-center text-[11px]">❤️</button>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                    <div ref={messagesEndRef} className="h-10"></div>
                                </div>

                                {/* Ergonomic Input Footer */}
                                <div className="p-3 bg-white border-t shrink-0 z-10 shadow-[0_-5px_15px_rgba(0,0,0,0.02)]">
                                    {replyingTo && (
                                        <div className="p-2 mb-2 mx-2 bg-cyan-50 border-l-4 border-cyan-400 rounded-lg flex justify-between items-center animate-pop">
                                            <div className="text-[10px] overflow-hidden">
                                                <div className="font-black text-cyan-700 uppercase tracking-widest">Replying to {replyingTo.sender.split('@')[0]}</div>
                                                <div className="truncate font-bold text-slate-500 italic">"{replyingTo.text || replyingTo.fileName}"</div>
                                            </div>
                                            <button onClick={()=>setReplyingTo(null)} className="text-slate-400 p-2 hover:text-red-500 transition-colors"><i className="fa-solid fa-circle-xmark text-lg"></i></button>
                                        </div>
                                    )}
                                    <div className="flex items-end gap-3 max-w-5xl mx-auto">
                                        <button onClick={()=>fileInputRef.current.click()} className="p-2 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-full transition-all" disabled={isUploading}>
                                            <i className="fa-solid fa-paperclip text-xl md:text-2xl"></i>
                                        </button>
                                        <input type="file" ref={fileInputRef} className="hidden" onChange={handleFileUpload} />
                                        
                                        <div className="flex-1 bg-slate-100 rounded-[1.2rem] p-1.5 shadow-inner focus-within:bg-white focus-within:ring-2 focus-within:ring-blue-100 transition-all border border-transparent focus-within:border-blue-300">
                                            <textarea 
                                                id="chatInput"
                                                placeholder="Write an enterprise message... (Enter to Send, Shift+Enter for New Line)" 
                                                className="bg-transparent w-full outline-none text-[15px] px-3 py-1.5 resize-none max-h-32 font-medium text-slate-800"
                                                rows="1"
                                                value={inputText}
                                                onChange={(e)=>setInputText(e.target.value)}
                                                onKeyDown={handleKeyDown}
                                                onInput={(e)=>{e.target.style.height='auto'; e.target.style.height=(e.target.scrollHeight)+'px';}}
                                            />
                                        </div>

                                        <button onClick={handleSendMessage} className="w-12 h-12 bg-blue-600 text-white rounded-full flex items-center justify-center shadow-lg shadow-blue-200 hover:bg-blue-700 active:scale-95 transition-all shrink-0">
                                            <i className="fa-solid fa-paper-plane text-lg"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* SHARED MODALS */}
                    {activeModal === 'create_group' && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-sm rounded-[2rem] p-8 shadow-2xl animate-pop">
                                <h3 className="font-black text-xl mb-6 flex items-center gap-2 text-slate-800"><i className="fa-solid fa-layer-group text-blue-600"></i> New Department</h3>
                                <form onSubmit={handleCreateGroup} className="space-y-4">
                                    <input required placeholder="Department Title" className="w-full p-4 bg-slate-50 border rounded-xl outline-none font-bold focus:border-blue-500" value={groupForm.name} onChange={(e)=>setGroupForm({...groupForm, name: e.target.value})} />
                                    <div className="h-40 overflow-y-auto border p-2 rounded-xl bg-slate-50 space-y-1">
                                        {dbUsers.map(u => (
                                            <label key={u.uid} className="flex items-center gap-3 p-2 hover:bg-white rounded-lg cursor-pointer transition-colors">
                                                <input type="checkbox" checked={groupForm.members.includes(u.email)} onChange={(e)=>setGroupForm({...groupForm, members: e.target.checked ? [...groupForm.members, u.email] : groupForm.members.filter(m=>m!==u.email)})} className="w-4 h-4 rounded text-blue-600"/>
                                                <span className="text-sm font-bold text-slate-700">{u.name}</span>
                                            </label>
                                        ))}
                                    </div>
                                    <div className="flex gap-2 pt-2">
                                        <button type="button" onClick={()=>setActiveModal(null)} className="flex-1 py-3 font-black text-slate-400 uppercase tracking-widest text-xs">Cancel</button>
                                        <button type="submit" className="flex-2 bg-blue-600 text-white px-8 py-3 rounded-xl font-black shadow-lg uppercase tracking-widest text-xs">Create</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                    
                    {activeModal === 'task_convert' && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-md rounded-[2rem] p-8 shadow-2xl animate-pop">
                                <h3 className="font-black text-xl mb-6 text-slate-800"><i className="fa-regular fa-square-check text-blue-600 mr-2"></i> Official Directive</h3>
                                <div className="space-y-5">
                                    <div className="p-3 bg-slate-50 border rounded-xl italic font-bold text-slate-500 text-sm">"{selectedMessage?.text}"</div>
                                    <select className="w-full p-4 bg-slate-50 border rounded-xl font-bold text-sm outline-none focus:border-blue-500" value={taskAssignee} onChange={(e)=>setTaskAssignee(e.target.value)}>
                                        <option value="">Assign To...</option>
                                        {dbUsers.map(u => <option key={u.uid} value={u.email}>{u.name}</option>)}
                                    </select>
                                    <input type="datetime-local" className="w-full p-4 bg-slate-50 border rounded-xl font-bold text-sm outline-none focus:border-blue-500" value={taskDeadline} onChange={(e)=>setTaskDeadline(e.target.value)} />
                                    <button onClick={convertToTask} className="w-full bg-blue-600 text-white py-4 rounded-xl font-black shadow-lg uppercase tracking-widest text-xs">Dispatch Task</button>
                                    <button onClick={()=>setActiveModal(null)} className="w-full font-black text-slate-400 py-2 uppercase tracking-widest text-xs">Close</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {activeModal === 'context' && (
                        <div className="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4" onClick={()=>setActiveModal(null)}>
                            <div className="bg-white w-full max-w-sm rounded-[2rem] p-6 shadow-2xl animate-pop" onClick={e=>e.stopPropagation()}>
                                <div className="space-y-3">
                                    <button onClick={()=>setActiveModal('task_convert')} className="w-full flex items-center gap-4 p-4 hover:bg-blue-50 rounded-2xl border border-transparent hover:border-blue-100 text-left transition-all">
                                        <div className="w-10 h-10 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center"><i className="fa-solid fa-list-check"></i></div>
                                        <div><div className="font-black text-sm text-slate-800">Formalize Task</div><div className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Assign ownership</div></div>
                                    </button>
                                    <button onClick={()=>setActiveModal('reminder')} className="w-full flex items-center gap-4 p-4 hover:bg-amber-50 rounded-2xl border border-transparent hover:border-amber-100 text-left transition-all">
                                        <div className="w-10 h-10 bg-amber-100 text-amber-600 rounded-xl flex items-center justify-center"><i className="fa-solid fa-bell"></i></div>
                                        <div><div className="font-black text-sm text-slate-800">Set Reminder</div><div className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Personal push alert</div></div>
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {activeModal === 'reminder' && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-sm rounded-[2rem] p-8 shadow-2xl animate-pop">
                                <h3 className="font-black text-xl mb-6 text-slate-800"><i className="fa-regular fa-clock text-amber-500 mr-2"></i> Schedule Alert</h3>
                                <div className="space-y-5">
                                    <input type="datetime-local" className="w-full p-4 bg-slate-50 border rounded-xl outline-none focus:border-amber-500 font-bold text-sm" value={reminderDateTime} onChange={(e)=>setReminderDateTime(e.target.value)} />
                                    <button onClick={setReminder} className="w-full bg-amber-500 text-white py-4 rounded-xl font-black shadow-lg uppercase tracking-widest text-xs">Set Alarm</button>
                                    <button onClick={()=>setActiveModal(null)} className="w-full font-black text-slate-400 py-2 uppercase tracking-widest text-xs">Cancel</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function App() {
            const [user, setUser] = useState(null);
            const [ready, setReady] = useState(false);
            const [email, setEmail] = useState("");
            const [pass, setPass] = useState("");
            const [err, setErr] = useState("");

            useEffect(() => {
                const setup = () => { 
                    if (window.auth) {
                        window.onAuthStateChanged(window.auth, (u) => {
                            setUser(u);
                            setReady(true);
                        });
                    } else {
                        setReady(true);
                    }
                };
                if (window.auth) setup(); 
                else window.addEventListener('firebaseReady', setup);
                return () => window.removeEventListener('firebaseReady', setup);
            }, []);

            const authenticate = (mode) => {
                setErr("");
                if (!email || !pass) return setErr("Corporate credentials required.");
                const act = mode === 'in' ? window.signInWithEmailAndPassword : window.createUserWithEmailAndPassword;
                act(window.auth, email, pass).catch(e => setErr(e.message));
            };

            if (!ready) return <div className="h-screen w-full flex flex-col items-center justify-center bg-slate-900 text-blue-400 font-black tracking-[0.4em] uppercase text-sm animate-pulse"><i className="fa-solid fa-satellite-dish text-4xl mb-6"></i> Establishing Secure Gateway...</div>;

            if (!user) return (
                <div className="h-screen w-full flex items-center justify-center telegram-bg p-4">
                    <div className="w-full max-w-md bg-white rounded-[3rem] shadow-2xl p-10 flex flex-col items-center border-t-[8px] border-blue-600 animate-pop">
                        <div className="w-20 h-20 bg-blue-600 rounded-[1.5rem] flex items-center justify-center text-white text-3xl shadow-xl shadow-blue-200 mb-6"><i className="fa-solid fa-building-circle-check"></i></div>
                        <h1 className="text-2xl font-black text-slate-900 mb-1">Corporate Node</h1>
                        <p className="text-[9px] text-slate-400 font-black mb-8 uppercase tracking-[0.3em]">MPGS Encrypted Access</p>
                        {err && <div className="w-full bg-red-50 text-red-500 p-4 rounded-2xl text-[10px] font-black border border-red-100 mb-6 text-center">{err}</div>}
                        <div className="w-full space-y-4">
                            <input type="email" placeholder="Identifier (Email)" className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-500 font-bold text-sm" value={email} onChange={(e)=>setEmail(e.target.value)} />
                            <input type="password" placeholder="Passkey" className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-500 font-bold text-sm" value={pass} onChange={(e)=>setPass(e.target.value)} />
                            <div className="flex gap-3 pt-4">
                                <button onClick={()=>authenticate('in')} className="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all uppercase tracking-widest text-xs">Sign In</button>
                                <button onClick={()=>authenticate('up')} className="flex-1 bg-white border-2 border-slate-200 text-slate-500 py-4 rounded-2xl font-black hover:bg-slate-50 transition-all uppercase tracking-widest text-xs">Request</button>
                            </div>
                        </div>
                    </div>
                </div>
            );

            return <ChatApp user={user} onLogout={() => window.signOut(window.auth)} />;
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
