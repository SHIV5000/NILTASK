<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MPGS TaskFlow - Enterprise Chat</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    
    <link rel="icon" href="data:,">

    <style>
        :root {
            --bg-body: #f0f2f5;
            --bg-sidebar: rgba(255, 255, 255, 0.95);
            --bg-chat: #efeae2;
            --bg-message-own: #f2e6e6;
            --bg-message-other: #ffffff;
            --text-primary: #111b21;
            --text-secondary: #667781;
            --accent: #800000; /* Maroon */
            --accent-hover: #660000;
            --sent-bg: #f2e6e6;
            --received-bg: #ffffff;
            --border-color: rgba(134, 150, 160, 0.15);
            --chat-pattern: url("https://www.transparenttextures.com/patterns/cubes.png");
        }
        
        [data-theme="dark"] {
            --bg-body: #111b21;
            --bg-sidebar: rgba(32, 44, 51, 0.98);
            --bg-chat: #0b141a;
            --bg-message-own: #4d0000;
            --bg-message-other: #202c33;
            --text-primary: #e9edef;
            --text-secondary: #8696a0;
            --accent: #b30000;
            --accent-hover: #cc0000;
            --sent-bg: #4d0000;
            --received-bg: #202c33;
            --border-color: rgba(134, 150, 160, 0.15);
        }

        body, .jira-card, .jira-card *, .message-bubble, input, select, textarea, button { 
            font-family: 'Inter', sans-serif !important; 
        }
        
        body { background-color: var(--bg-body); color: var(--text-primary); transition: background-color 0.3s, color 0.3s; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(134, 150, 160, 0.3); border-radius: 10px; }

        .sidebar-glass { background: var(--bg-sidebar); backdrop-filter: blur(10px); border-color: var(--border-color); }
        .chat-area { background-color: var(--bg-chat); background-image: var(--chat-pattern); background-blend-mode: overlay; }

        .message-bubble { 
            max-width: 75%; 
            margin-bottom: 0.75rem; 
            display: flex; 
            flex-direction: column; 
            position: relative;
        }
        .message-bubble.sent { align-self: flex-end; }
        .message-bubble.received { align-self: flex-start; }
        
        .message-bubble .bubble-content {
            padding: 10px 14px;
            word-wrap: break-word;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            position: relative;
        }
        
        .sent .bubble-content { background: var(--sent-bg); border-radius: 16px 0px 16px 16px; }
        .received .bubble-content { background: var(--received-bg); border-radius: 0px 16px 16px 16px; }

        .bubble-controls {
            position: absolute; top: 4px; right: 8px;
            display: flex; gap: 8px; opacity: 0; transition: opacity 0.2s;
            background: inherit; padding-left: 10px; border-radius: 8px;
            z-index: 10;
        }
        .message-bubble:hover .bubble-controls { opacity: 1; }
        .bubble-controls i { cursor: pointer; color: var(--text-secondary); transition: color 0.2s; font-size: 14px; }
        .bubble-controls i:hover { color: var(--accent); }

        .inline-reply-box { display: none; margin-top: 8px; border-top: 1px solid var(--border-color); padding-top: 8px; }
        .inline-reply-box.active { display: flex; gap: 8px; align-items: center; }

        @keyframes flashHighlight {
            0% { background-color: rgba(128, 0, 0, 0.3); transform: scale(1.02); box-shadow: 0 0 15px rgba(128,0,0,0.5); }
            100% { background-color: transparent; transform: scale(1); box-shadow: none; }
        }
        .highlight-active .bubble-content, .highlight-active.jira-card {
            animation: flashHighlight 4s ease-out forwards;
        }

        .badge { padding: 4px 10px; border-radius: 9999px; font-weight: 700; font-size: 11px; letter-spacing: 0.5px; display: inline-flex; align-items: center; gap: 4px; border: 1px solid rgba(0,0,0,0.05); }
        .badge-pending { background-color: #fef9c3; color: #854d0e; }
        .badge-progress { background-color: #dbeafe; color: #1e40af; }
        .badge-review { background-color: #ffedd5; color: #9a3412; }
        .badge-changes { background-color: #fee2e2; color: #991b1b; }
        .badge-done { background-color: #dcfce7; color: #166534; }

        .modal-overlay { background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); }
        .modal-content { background: var(--bg-sidebar); border: 1px solid var(--border-color); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        
        .center-toast {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(17, 27, 33, 0.95); color: white;
            padding: 24px 40px; border-radius: 16px; z-index: 9999;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            text-align: center; font-weight: 500; font-size: 1.1rem;
            transition: opacity 0.5s ease; pointer-events: none;
        }

        .msg-menu-dropdown, .top-panel-dropdown {
            position: absolute; background: var(--bg-sidebar); border: 1px solid var(--border-color);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border-radius: 12px; z-index: 100;
        }

        .input-container { background: var(--bg-sidebar); border-top: 1px solid var(--border-color); padding: 12px 20px; }
        .quill-wrapper { background: var(--bg-message-other); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
        .ql-toolbar.ql-snow { border: none !important; border-bottom: 1px solid var(--border-color) !important; background: rgba(0,0,0,0.02); padding: 6px 12px !important; }
        .ql-container.ql-snow { border: none !important; font-size: 0.95rem; min-height: 40px; max-height: 120px; overflow-y: auto; }
        
        .btn-primary { background: var(--accent); color: white; border-radius: 8px; padding: 6px 14px; font-weight: 600; cursor: pointer; border: none; font-size: 12px; transition: 0.2s;}
        .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }

        .btn-outline { background: transparent; color: var(--text-primary); border: 1px solid var(--border-color); border-radius: 8px; padding: 6px 14px; font-weight: 600; cursor: pointer; font-size: 12px; transition: 0.2s;}
        .btn-outline:hover { background: rgba(0,0,0,0.05); }

        .ui-input { background: var(--bg-body); color: var(--text-primary); border: 1px solid var(--border-color); }
        .ui-input:focus { border-color: var(--accent); outline: none; }
        
        .task-trail-box { display: none; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border-color); }
        .task-trail-box.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
    </style>
</head>
<body class="antialiased overflow-hidden">
    <div id="root" class="h-screen flex overflow-hidden"></div>
    
    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
        const SUPABASE_URL = 'https://apfymygzwkzjhhgmtkaj.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFwZnlteWd6d2t6amhoZ210a2FqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MjM5MTIsImV4cCI6MjA5NjQ5OTkxMn0.RiV6kDDeSq5ZIP68RGwtpLtqPALFloq23owoNm2aA-c';
        const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null, currentRoom = 'general';
        let messageSubscription, taskSubscription, assigneeSubscription, trailSubscription;
        let currentTheme = localStorage.getItem('theme') || 'light';
        let quillEditor = null;
        let currSchedText = ''; 
        let currentReminderId = null;
        let currentMessageId = null; 
        let currentMessageTextRaw = '';
        let globalUsersCache = [];

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m] || m)); }
        
        window.showCenterToast = function(msg, icon = 'fa-check-circle', color = 'text-green-400') { 
            const t = document.createElement('div'); 
            t.className = 'center-toast opacity-0'; 
            t.innerHTML = `<i class="fas ${icon} ${color} text-4xl block mb-3"></i> ${msg}`; 
            document.body.appendChild(t); 
            setTimeout(() => t.classList.remove('opacity-0'), 10);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 500); }, 5000); 
        }

        window.scrollToAndHighlight = function(id) {
            const el = document.getElementById(id);
            if(el) {
                el.scrollIntoView({behavior: 'smooth', block: 'center'});
                el.classList.add('highlight-active');
                setTimeout(() => el.classList.remove('highlight-active'), 4000);
            }
        }

        function applyTheme() { document.documentElement.setAttribute('data-theme', currentTheme); }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.menu-dots') && !e.target.closest('.msg-menu-dropdown')) {
                document.querySelectorAll('.msg-menu-dropdown').forEach(m => m.remove());
            }
            if (!e.target.closest('.top-bar-icon') && !e.target.closest('.top-panel-dropdown')) {
                document.querySelectorAll('.top-panel-dropdown').forEach(m => m.remove());
            }
        });

        async function ensureProfile() { if(!currentUser) return; const {data:ex}=await sb.from('profiles').select('id').eq('id',currentUser.id).maybeSingle(); if(!ex) await sb.from('profiles').insert({id:currentUser.id, email:currentUser.email, full_name:currentUser.email.split('@')[0], role:'teacher'}); }
        async function signIn(email,pwd) { const {data,error}=await sb.auth.signInWithPassword({email,password:pwd}); if(!error && data?.user) { currentUser=data.user; await ensureProfile(); renderMainApp(); startSubscriptions(); return true; } return false; }
        window.logout = async function() { await sb.auth.signOut(); currentUser=null; renderAuthScreen(); }
        
        function renderAuthScreen() { 
            applyTheme();
            document.getElementById('root').innerHTML=`
                <div class="min-h-screen w-full flex items-center justify-center" style="background-color: var(--bg-body);">
                    <div class="modal-content p-10 rounded-3xl shadow-2xl w-full max-w-md relative overflow-hidden">
                        <div class="text-center mb-8">
                            <h1 class="text-3xl font-bold tracking-tight">MPGS TaskFlow</h1>
                            <p class="text-sm mt-2" style="color: var(--text-secondary)">Enterprise Communication Portal</p>
                        </div>
                        <div class="space-y-4">
                            <input id="email" placeholder="Email Address" class="ui-input w-full px-4 py-3 rounded-xl">
                            <input id="password" type="password" placeholder="Password" class="ui-input w-full px-4 py-3 rounded-xl">
                            <div class="flex gap-3 pt-2">
                                <button id="loginBtn" class="flex-1 py-3 px-4 rounded-xl bg-[var(--accent)] hover:bg-[var(--accent-hover)] text-white font-medium shadow-md transition-colors">Login</button>
                            </div>
                            <div id="authMsg" class="mt-4 text-center text-red-500 text-sm font-medium h-5"></div>
                        </div>
                    </div>
                </div>`; 
            document.getElementById('loginBtn').onclick=async()=>{ const ok=await signIn(document.getElementById('email').value,document.getElementById('password').value); if(!ok) document.getElementById('authMsg').innerText='Invalid credentials'; };
        }

        function renderMainApp() {
            applyTheme();
            
            // Extract the user's name for display
            const userNameDisplay = currentUser?.user_metadata?.full_name || currentUser?.email?.split('@')[0] || 'User';

            document.getElementById('root').innerHTML = `
                <div class="flex h-full w-full">
                    <div class="w-80 sidebar-glass flex flex-col border-r z-20 shadow-sm">
                        <div class="p-4 flex justify-between items-center border-b" style="border-color: var(--border-color)">
                            <h2 class="text-xl font-bold tracking-tight flex items-center gap-2">
                                <i class="fas fa-comments" style="color: var(--accent)"></i> Chats
                            </h2>
                            <button onclick="logout()" class="w-8 h-8 rounded-full hover:bg-red-100 hover:text-red-500 flex items-center justify-center transition-colors"><i class="fas fa-sign-out-alt text-sm"></i></button>
                        </div>
                        <div class="p-3"><input type="text" id="globalSearch" placeholder="Search chats" class="ui-input w-full p-2 rounded-xl text-sm"></div>
                        <div id="chatsList" class="flex-1 overflow-y-auto px-2 pb-4"></div>
                        
                        <div class="p-3 border-t flex flex-col items-center justify-center gap-1.5" style="border-color: var(--border-color)">
                            <div class="text-[13px] font-bold text-gray-700 flex items-center gap-2 bg-black/5 px-3 py-1.5 rounded-full w-full justify-center">
                                <div class="w-5 h-5 rounded-full bg-[var(--accent)] text-white flex items-center justify-center text-[10px]">${userNameDisplay.charAt(0).toUpperCase()}</div>
                                ${escapeHtml(userNameDisplay.toUpperCase())}
                            </div>
                            <div class="text-[9px] font-bold tracking-wider text-gray-400 uppercase mt-1">
                                v1.5.0 - Status Fix Applied
                            </div>
                        </div>
                    </div>

                    <div class="flex-1 flex flex-col chat-area relative">
                        <div class="p-4 sidebar-glass border-b z-10 flex justify-between items-center shadow-sm" style="border-color: var(--border-color)">
                            <div class="flex items-center gap-3">
                                <span id="roomTitleDisplay" class="text-lg font-bold tracking-tight"># ${currentRoom}</span>
                            </div>
                            <div class="flex items-center gap-5 text-xl" style="color: var(--text-secondary)">
                                <i class="far fa-clock cursor-pointer hover:text-[var(--accent)] top-bar-icon" onclick="openTopPanel('scheduled')" title="Scheduled Messages"></i>
                                <i class="far fa-bookmark cursor-pointer hover:text-[var(--accent)] top-bar-icon" onclick="openTopPanel('bookmarks')" title="Bookmarks"></i>
                                <i class="far fa-bell cursor-pointer hover:text-[var(--accent)] top-bar-icon" onclick="openTopPanel('alerts')" title="Notifications"></i>
                                <input type="text" id="messageSearchBar" placeholder="Search..." class="ui-input px-3 py-1 rounded-full text-sm w-48">
                            </div>
                        </div>
                        
                        <div id="messagesContainer" class="flex-1 overflow-y-auto p-6 flex flex-col"></div>
                        
                        <div class="input-container">
                            <div class="quill-wrapper">
                                <div id="richEditor"></div>
                            </div>
                            <div class="flex justify-between items-center mt-2 px-2">
                                <div class="flex gap-4 text-xl" style="color: var(--text-secondary)">
                                    <i class="far fa-smile cursor-pointer hover:text-[var(--accent)]" title="Emoji" onclick="addEmoji()"></i>
                                    <i class="fas fa-paperclip cursor-pointer hover:text-[var(--accent)]" title="Attach File" onclick="document.getElementById('fileAttachment').click()"></i>
                                    <input type="file" id="fileAttachment" class="hidden">
                                </div>
                                <div class="flex gap-2">
                                    <button id="scheduleMsgBtn" class="px-4 py-2 rounded-full font-medium text-sm border bg-transparent hover:bg-black/5" style="color: var(--text-secondary); border-color: var(--border-color); cursor: pointer;">
                                        <i class="far fa-clock"></i> Schedule
                                    </button>
                                    <button id="sendBtn" class="bg-[var(--accent)] hover:bg-[var(--accent-hover)] text-white rounded-full px-5 py-2 font-medium flex items-center gap-2 transition-colors">
                                        Send <i class="fas fa-paper-plane text-sm"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="w-[450px] sidebar-glass border-l flex flex-col z-20 shadow-sm hidden md:flex" style="border-color: var(--border-color)">
                        <div class="p-4 border-b flex justify-between items-center">
                            <h3 class="font-bold text-lg"><i class="fas fa-tasks mr-2 text-[var(--accent)]"></i> Task Overview</h3>
                        </div>
                        <div id="tasksPanel" class="flex-1 overflow-y-auto p-4 bg-gray-50/50"></div>
                    </div>
                </div>

                <div id="scheduleModal" class="fixed inset-0 modal-overlay hidden items-center justify-center z-50">
                    <div class="modal-content rounded-2xl p-6 w-full max-w-sm mx-4 text-center">
                        <i class="far fa-clock text-4xl mb-4" style="color: var(--accent)"></i>
                        <h3 class="text-xl font-bold mb-2">Schedule Message</h3>
                        <p class="text-sm mb-6" style="color: var(--text-secondary)">Select when to send your composed message.</p>
                        <input type="datetime-local" id="scheduleDateTime" class="ui-input w-full p-3 rounded-xl mb-6">
                        <div class="flex gap-3">
                            <button onclick="closeScheduleModal()" class="flex-1 py-2.5 rounded-xl font-medium ui-input border-none cursor-pointer">Cancel</button>
                            <button onclick="saveScheduledMessage()" class="flex-1 py-2.5 rounded-xl font-medium bg-[var(--accent)] text-white">Confirm</button>
                        </div>
                    </div>
                </div>

                <div id="taskModal" class="fixed inset-0 modal-overlay hidden items-center justify-center z-50">
                    <div class="modal-content rounded-2xl p-6 w-full max-w-md mx-4">
                        <h3 class="text-xl font-bold mb-4">Create Jira Task</h3>
                        <input id="taskTitle" class="ui-input w-full p-3 rounded-xl mb-3" placeholder="Task Title">
                        <p class="text-xs font-bold text-gray-500 mb-1">Assign To:</p>
                        <select id="taskAssignees" multiple size="4" class="ui-input w-full p-2 rounded-xl mb-3"></select>
                        <div class="grid grid-cols-2 gap-3 mb-3">
                            <div>
                                <p class="text-xs font-bold text-gray-500 mb-1">Deadline:</p>
                                <input type="date" id="taskDeadline" class="ui-input w-full p-2.5 rounded-xl">
                            </div>
                            <div>
                                <p class="text-xs font-bold text-gray-500 mb-1">Priority:</p>
                                <select id="taskPriority" class="ui-input w-full p-2.5 rounded-xl">
                                    <option value="Low">Low</option>
                                    <option value="Medium" selected>Medium</option>
                                    <option value="High">High</option>
                                </select>
                            </div>
                        </div>
                        <label class="flex items-center gap-2 text-sm cursor-pointer mt-2 mb-4 p-2 bg-black/5 rounded-lg"><input type="checkbox" id="taskRequireProof"> Require Proof File to Complete</label>
                        <div class="flex gap-3 mt-4">
                            <button onclick="closeTaskModal()" class="flex-1 py-2.5 rounded-xl ui-input border-none cursor-pointer hover:bg-gray-100">Cancel</button>
                            <button onclick="saveTaskMultiAssignee()" class="flex-1 py-2.5 rounded-xl bg-[var(--accent)] text-white font-bold">Create Ticket</button>
                        </div>
                    </div>
                </div>

                <div id="reminderModal" class="fixed inset-0 modal-overlay hidden items-center justify-center z-50">
                    <div class="modal-content rounded-2xl p-6 w-full max-w-sm mx-4">
                        <h3 class="text-xl font-bold mb-4">Set Reminder</h3>
                        <p id="reminderMessagePreview" class="text-sm mb-4 truncate text-gray-500"></p>
                        <input type="datetime-local" id="reminderDateTime" class="ui-input w-full p-3 rounded-xl mb-6">
                        <div class="flex gap-3">
                            <button onclick="closeReminderModal()" class="flex-1 py-2.5 rounded-xl ui-input border-none cursor-pointer">Cancel</button>
                            <button onclick="saveReminder()" class="flex-1 py-2.5 rounded-xl bg-[var(--accent)] text-white font-bold">Set</button>
                        </div>
                    </div>
                </div>
            `;
            
            quillEditor = new Quill('#richEditor', { 
                theme: 'snow', 
                placeholder: 'Type a message...', 
                modules: { toolbar: [['bold','italic','underline','strike'], [{'list': 'ordered'}, {'list': 'bullet'}], ['clean']] } 
            });

            document.getElementById('sendBtn').onclick = sendMessage;
            quillEditor.root.addEventListener('keydown', (e) => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); } });
            
            document.getElementById('fileAttachment').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const sizeKB = Math.round(file.size / 1024);
                    quillEditor.root.innerHTML += `<div class="p-2 border rounded bg-black/5 mt-2 inline-block"><i class="fas fa-file-alt text-blue-500"></i> <b>${file.name}</b> (${sizeKB} KB)</div><br>`;
                    window.showCenterToast('File attached!', 'fa-paperclip', 'text-blue-500');
                }
            });

            document.getElementById('scheduleMsgBtn').onclick = showScheduleModal;
            document.getElementById('messageSearchBar').addEventListener('input', applyFilters);
            
            loadChatsList(); loadMessages(); loadTasksForPanel(); 
        }

        function applyFilters() {
            const search = document.getElementById('messageSearchBar').value.toLowerCase();
            document.querySelectorAll('#messagesContainer > div.message-bubble').forEach(el => {
                let show = true;
                const text = el.innerText.toLowerCase();
                if (search && !text.includes(search)) show = false;
                el.style.display = show ? 'flex' : 'none';
            });
        }

        window.openTopPanel = async function(type) {
            document.querySelectorAll('.top-panel-dropdown').forEach(m => m.remove());
            const panel = document.createElement('div');
            panel.className = 'top-panel-dropdown right-10 top-16 w-80 max-h-96 overflow-y-auto p-4';
            
            if (type === 'scheduled') {
                panel.innerHTML = `<h4 class="font-bold border-b pb-2 mb-2"><i class="far fa-clock"></i> Scheduled Messages</h4>`;
                const {data} = await sb.from('scheduled_messages').select('*').eq('sender_id', currentUser.id).eq('status', 'pending');
                if(!data || data.length===0) panel.innerHTML += `<p class="text-xs text-gray-500">No scheduled messages.</p>`;
                data?.forEach(d => {
                    panel.innerHTML += `<div class="mb-2 p-2 bg-black/5 rounded text-sm flex justify-between items-center">
                        <span class="truncate w-48">${escapeHtml(d.message_text)}</span>
                        <i class="fas fa-times text-red-500 cursor-pointer" onclick="deleteScheduled('${d.id}')"></i>
                    </div>`;
                });
            } else if (type === 'bookmarks') {
                panel.innerHTML = `<h4 class="font-bold border-b pb-2 mb-2"><i class="far fa-bookmark"></i> Bookmarks</h4>`;
                const {data} = await sb.from('bookmarks').select('*, messages(text)').eq('user_id', currentUser.id);
                if(!data || data.length===0) panel.innerHTML += `<p class="text-xs text-gray-500">No bookmarks.</p>`;
                data?.forEach(d => {
                    panel.innerHTML += `<div class="mb-2 p-2 bg-black/5 rounded text-sm cursor-pointer hover:bg-black/10" onclick="scrollToAndHighlight('msg-${d.message_id}')">
                        <span class="truncate block">${escapeHtml(d.messages?.text)}</span>
                    </div>`;
                });
            } else if (type === 'alerts') {
                panel.innerHTML = `<h4 class="font-bold border-b pb-2 mb-2"><i class="far fa-bell"></i> Alerts</h4>`;
                const {data} = await sb.from('notifications').select('*').eq('user_id', currentUser.id).order('created_at', {ascending: false}).limit(10);

        function renderMessages(messages) {
            const c = document.getElementById('messagesContainer');
            if (!c) return;
            if (!messages.length) { c.innerHTML = '<div class="m-auto flex flex-col items-center opacity-50"><i class="far fa-comments text-5xl mb-3"></i><p>Say hello!</p></div>'; return; }
            
            const msgMap = new Map();
            messages.forEach(m => msgMap.set(m.id, m));
            const topLevel = [];
            const replies = {};
            
            messages.forEach(msg => {
                if (msg.parent_message_id) {
                    let rootId = msg.parent_message_id;
                    const visited = new Set();
                    while (msgMap.has(rootId) && msgMap.get(rootId).parent_message_id) {
                        if(visited.has(rootId)) break;
                        visited.add(rootId);
                        rootId = msgMap.get(rootId).parent_message_id;
                    }
                    if (!replies[rootId]) replies[rootId] = [];
                    replies[rootId].push(msg);
                } else {
                    topLevel.push(msg);
                }
            });

            function buildMsgHTML(msg) {
                const isOwn = msg.sender_id === currentUser.id;
                const senderName = msg.profiles?.full_name || msg.profiles?.email || 'Unknown';
                const time = new Date(msg.created_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
                const alignClass = isOwn ? 'sent' : 'received';
                
                let html = `<div id="msg-${msg.id}" class="message-bubble ${alignClass}">
                            <div class="bubble-content">
                                <div class="bubble-controls top-bar-icon">
                                    <i class="fas fa-reply" title="Reply" onclick="window.toggleReplyBox('${msg.id}')"></i>
                                    <i class="fas fa-ellipsis-v menu-dots" data-msg-id="${msg.id}" data-msg-text="${escapeHtml(msg.text)}"></i>
                                </div>
                                <div class="message-meta">
                                    <span class="font-bold" style="${isOwn ? 'display:none;' : 'color: var(--accent)'}">${escapeHtml(senderName)}</span>
                                    <span class="ml-auto opacity-60 text-xs">${time} ${isOwn ? '<i class="fas fa-check-double text-blue-400"></i>' : ''}</span>
                                </div>
                                <div class="text-[15px] leading-relaxed pr-8">${msg.text}</div>
                                
                                <div id="reply-box-${msg.id}" class="inline-reply-box">
                                    <input type="text" id="reply-input-${msg.id}" placeholder="Write a reply..." class="ui-input w-full px-2 py-1 rounded-md text-sm">
                                    <button onclick="window.sendReply('${msg.id}')" class="px-3 py-1 rounded-md bg-[var(--accent)] text-white text-xs border-none cursor-pointer">Send</button>
                                </div>
                            </div>
                        </div>`;
                
                if (replies[msg.id] && replies[msg.id].length > 0) {
                    html += `<div class="ml-12 pl-2 border-l-2 mb-4 flex flex-col gap-2" style="border-color: var(--accent)">`;
                    replies[msg.id].forEach((child, idx) => { 
                        const cName = child.profiles?.full_name || child.profiles?.email || 'Unknown';
                        const cTime = new Date(child.created_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
                        html += `
                        <div class="message-bubble received w-full max-w-[90%] mb-0">
                            <div class="bubble-content" style="background: var(--received-bg);">
                                <div class="message-meta text-[11px] mb-1">
                                    <span class="font-bold" style="color: var(--accent)">${idx + 1}. ${escapeHtml(cName)}</span>
                                    <span class="ml-auto opacity-60">${cTime}</span>
                                </div>
                                <div class="text-[14px] leading-snug">${child.text}</div>
                            </div>
                        </div>`;
                    });
                    html += `</div>`;
                }
                return html;
            }

            c.innerHTML = topLevel.map(msg => buildMsgHTML(msg)).join('');

            document.querySelectorAll('.menu-dots').forEach(el => {
                el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    document.querySelectorAll('.msg-menu-dropdown').forEach(m => m.remove());
                    const mid = el.dataset.msgId, mtext = el.dataset.msgText;
                    const menu = document.createElement('div');
                    menu.className = 'msg-menu-dropdown p-1';
                    menu.style.minWidth = '160px';
                    menu.innerHTML = `
                        <div class="cursor-pointer px-3 py-2 text-sm hover:bg-black/5 transition flex items-center gap-2" onclick="window.openTaskModal('${mid}', '${mtext.replace(/'/g, "\\'")}')"><i class="fas fa-tasks text-emerald-500 w-4"></i> Create Task</div>
                        <div class="cursor-pointer px-3 py-2 text-sm hover:bg-black/5 transition flex items-center gap-2" onclick="window.showReminderModal('${mid}', '${mtext.replace(/'/g, "\\'")}')"><i class="fas fa-bell text-yellow-500 w-4"></i> Reminder</div>
                        <div class="cursor-pointer px-3 py-2 text-sm hover:bg-black/5 transition flex items-center gap-2" onclick="window.toggleBookmark('${mid}')"><i class="fas fa-star text-orange-400 w-4"></i> Bookmark</div>
                    `;
                    document.body.appendChild(menu);
                    const rect = el.getBoundingClientRect();
                    menu.style.top = (rect.bottom + window.scrollY) + 'px';
                    menu.style.left = (rect.left - 120 + window.scrollX) + 'px';
                });
            });
        }

        window.taskAction = async function(taskId, assigneeId, action, requireProof = false) {
            let actionText = ''; let newStatus = ''; let comment = '';
            
            // Immediate Optimistic UI Feedback for Acknowledge
            if (action === 'ack') {
                const btn = document.getElementById(`ack-btn-${taskId}-${assigneeId}`);
                if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Acknowledging...'; }
            }

            const {data: taskData} = await sb.from('tasks').select('*').eq('id', taskId).single();
            const creatorId = taskData.assigned_by;

            if (action === 'ack') {
                newStatus = 'in_progress'; actionText = 'Acknowledged the task';
                await notifyUser(creatorId, `Task Acknowledged by an Assignee`);
            } else if (action === 'update') {
                const el = document.getElementById(`update-txt-${taskId}-${assigneeId}`);
                comment = el.value;
                if(!comment) return window.showCenterToast('Comment cannot be empty', 'fa-times', 'text-red-500');
                actionText = 'Added Comment';
                await notifyUser(creatorId, `Task Update Added`);
                el.value = '';
                document.getElementById(`comment-box-${taskId}-${assigneeId}`).classList.add('hidden');
            } else if (action === 'upload') {
                const el = document.getElementById(`upload-box-${taskId}-${assigneeId}`);
                if(!el.files.length) return window.showCenterToast('Select a file', 'fa-times', 'text-red-500');
                comment = `Uploaded file: ${el.files[0].name}`; actionText = 'File Uploaded';
                await notifyUser(creatorId, `File Uploaded on Task`);
                el.value = '';
            } else if (action === 'submit') {
                if (requireProof) {
                    const {data: trails} = await sb.from('task_trails').select('*').eq('task_id', taskId).eq('user_id', currentUser.id).ilike('action', '%File Uploaded%');
                    if(!trails || trails.length === 0) return window.showCenterToast('Proof required - please attach a file.', 'fa-exclamation-triangle', 'text-red-500');
                }
                newStatus = 'submitted'; actionText = 'Submitted for Review';
                await notifyUser(creatorId, `Task Submitted for Review`);
            } else if (action === 'accept') {
                newStatus = 'accepted'; actionText = 'Accepted completion';
                await notifyUser(assigneeId, `Your task submission was Accepted`);
            } else if (action === 'review_again') {
                comment = prompt("Enter mandatory feedback/reason for the assignee:");
                if(!comment) return window.showCenterToast('Feedback is mandatory for rework!', 'fa-times', 'text-red-500');
                newStatus = 'needs_review'; actionText = 'Requested rework';
                await notifyUser(assigneeId, `Task needs review/rework`);
            } else if (action === 'delegate') {
                const newAssignee = document.getElementById(`delegate-sel-${taskId}-${assigneeId}`).value;
                if(!newAssignee) return window.showCenterToast('Select user to delegate', 'fa-times', 'text-red-500');
                actionText = 'Delegated task';
                await sb.from('task_assignees').insert({ task_id: taskId, assignee_id: newAssignee, status: 'pending_ack', state: 'pending' });
                await notifyUser(newAssignee, `A task was delegated to you`); await notifyUser(creatorId, `Task was delegated`);
                document.getElementById(`delegate-box-${taskId}-${assigneeId}`).classList.add('hidden');
            } else if (action === 'transfer') {
                const newAssignee = document.getElementById(`transfer-sel-${taskId}-${assigneeId}`).value;
                if(!newAssignee) return window.showCenterToast('Select user to transfer', 'fa-times', 'text-red-500');
                actionText = 'Transferred task';
                await sb.from('task_assignees').delete().eq('task_id', taskId).eq('assignee_id', assigneeId);
                await sb.from('task_assignees').insert({ task_id: taskId, assignee_id: newAssignee, status: 'pending_ack', state: 'pending' });
                await notifyUser(newAssignee, `A task was transferred to you`); await notifyUser(assigneeId, `Your task was transferred`);
            }

            if (newStatus) { 
                let updatePayload = { status: newStatus, state: newStatus }; // Explicitly send state too
                if (action === 'ack') updatePayload.acked = true;
                
                // We use .select() to ensure the DB actually updated the row.
                const {data: updatedData, error} = await sb.from('task_assignees').update(updatePayload).eq('task_id', taskId).eq('assignee_id', assigneeId).select(); 
                
                if (error || !updatedData || updatedData.length === 0) {
                    window.showCenterToast('Database Blocked Status Update! Run RLS SQL Fix.', 'fa-lock', 'text-red-500');
                    console.error('Update Failed or Blocked by RLS:', error || '0 rows updated');
                    
                    // Revert UI optimism if failed
                    if(action === 'ack') {
                        const btn = document.getElementById(`ack-btn-${taskId}-${assigneeId}`);
                        if(btn) { btn.disabled = false; btn.innerHTML = 'Acknowledge Task'; }
                    }
                    return;
                }
            }
            await sb.from('task_trails').insert({ task_id: taskId, user_id: currentUser.id, action: actionText, comment: comment }); 
            loadTasksForPanel(); 
        }

        window.toggleTrail = function(taskId) {

        async function loadTasksForPanel() {
            const {data: tasks} = await sb.from('tasks').select('*, creator:profiles!assigned_by(full_name, email)').order('created_at', {ascending: false});
            if (!tasks) return;
            
            const ids = tasks.map(t => t.id);
            if(ids.length === 0) { document.getElementById('tasksPanel').innerHTML = '<p class="text-sm opacity-50 text-center mt-6"><i class="fas fa-inbox text-3xl mb-2 block"></i> No tasks active.</p>'; return; }

            const {data: assignees} = await sb.from('task_assignees').select('task_id, assignee_id, status, profiles!assignee_id(full_name, email)').in('task_id', ids);
            const {data: trails} = await sb.from('task_trails').select('*, profiles(full_name, email)').in('task_id', ids).order('created_at', {ascending: true});

            const assigneesMap = {};
            if (assignees) assignees.forEach(a => { if (!assigneesMap[a.task_id]) assigneesMap[a.task_id] = []; assigneesMap[a.task_id].push({ assignee_id: a.assignee_id, status: a.status, profiles: a.profiles }); });
            
            const trailsMap = {};
            if (trails) trails.forEach(t => { if (!trailsMap[t.task_id]) trailsMap[t.task_id] = []; trailsMap[t.task_id].push(t); });

            const filteredTasks = tasks.filter(t => t.assigned_by === currentUser.id || (assigneesMap[t.id] && assigneesMap[t.id].some(a => a.assignee_id === currentUser.id)));
            const container = document.getElementById('tasksPanel');
            if(!container) return;
            if(!filteredTasks.length) { container.innerHTML = '<p class="text-sm opacity-50 text-center mt-6"><i class="fas fa-inbox text-3xl mb-2 block"></i> No tasks active.</p>'; return; }

            container.innerHTML = filteredTasks.map(task => {
                const asgList = assigneesMap[task.id] || [];
                const trlList = trailsMap[task.id] || [];
                
                const activeAssignees = asgList.filter(a => a.status !== 'delegated' && a.status !== 'transferred');
                const allAccepted = activeAssignees.length > 0 && activeAssignees.every(a => a.status === 'accepted');
                
                let globalState = 'pending_ack';
                if (asgList.length > 0) {
                    const statuses = asgList.map(a => a.status);
                    if (statuses.every(s => s === 'accepted' || s === 'transferred')) globalState = 'accepted';
                    else if (statuses.includes('submitted')) globalState = 'submitted';
                    else if (statuses.includes('needs_review')) globalState = 'needs_review';
                    else if (statuses.includes('in_progress')) globalState = 'in_progress';
                }

                let badgeClass = 'badge-pending'; let badgeText = '⏳ Needs Ack';
                if(globalState==='in_progress') { badgeClass = 'badge-progress'; badgeText = '⚙️ In Progress'; }
                if(globalState==='submitted') { badgeClass = 'badge-review'; badgeText = '📬 Pending Review'; }
                if(globalState==='needs_review') { badgeClass = 'badge-changes'; badgeText = '🔄 Changes Needed'; }
                if(globalState==='accepted') { badgeClass = 'badge-done'; badgeText = '🎉 Done'; }

                let priorityColor = '#3b82f6';
                if (task.priority === 'Medium') priorityColor = '#f97316';
                if (task.priority === 'High') priorityColor = '#ef4444';
                if (globalState === 'accepted') priorityColor = '#22c55e';

                let deadlineHtml = task.deadline || 'None';
                if (task.deadline && new Date(task.deadline) < new Date() && globalState !== 'accepted') {
                    deadlineHtml = `<span class="text-red-600 font-bold bg-red-50 px-1 rounded">${task.deadline} ⚠️ Overdue</span>`;
                }

                const assigneesNames = asgList.map(a => {
                    let suffix = '';
                    if(a.status === 'submitted') suffix = ' (submitted)';
                    else if(a.status === 'accepted') suffix = ' (completed)';
                    return `@${(a.profiles?.full_name || a.profiles?.email || 'Unknown').split('@')[0]}${suffix}`;
                }).join(', ');
                const reviewerName = `@${(task.creator?.full_name || task.creator?.email || 'Unknown').split('@')[0]}`;
                const isCreator = task.assigned_by === currentUser.id;

                const delegateOptions = globalUsersCache.filter(u => u.id !== currentUser.id && u.id !== task.assigned_by).map(u => `<option value="${u.id}">${escapeHtml(u.full_name || u.email)}</option>`).join('');
                const transferOptions = globalUsersCache.filter(u => u.id !== currentUser.id).map(u => `<option value="${u.id}">${escapeHtml(u.full_name || u.email)}</option>`).join('');

                let actionsHtml = '';
                const myAss = asgList.find(a => a.assignee_id === currentUser.id);
                
                if (myAss && !allAccepted) {
                    const st = myAss.status;
                    const uId = currentUser.id;
                    if (st === 'pending_ack') {
                        actionsHtml += `<button id="ack-btn-${task.id}-${uId}" onclick="window.taskAction('${task.id}', '${uId}', 'ack')" class="btn-primary w-full bg-yellow-500 hover:bg-yellow-600 transition-colors">Acknowledge Task</button>`;
                    } else if (st === 'in_progress' || st === 'needs_review') {
                        actionsHtml += `
                            <div class="flex flex-wrap gap-2 mb-2">
                                <button onclick="document.getElementById('comment-box-${task.id}-${uId}').classList.toggle('hidden')" class="btn-outline">Add Comment</button>
                                <button onclick="document.getElementById('upload-box-${task.id}-${uId}').click()" class="btn-outline">Upload File</button>
                                <button onclick="document.getElementById('delegate-box-${task.id}-${uId}').classList.toggle('hidden')" class="btn-outline">Delegate</button>
                                <button onclick="window.taskAction('${task.id}', '${uId}', 'submit', ${task.require_proof})" class="btn-primary ${st==='needs_review'?'bg-orange-600':'bg-blue-600'} text-white ml-auto">${st==='needs_review'?'Resubmit':'Submit for Review'}</button>
                            </div>
                            
                            <div id="comment-box-${task.id}-${uId}" class="hidden flex gap-2 mt-2">
                                <input type="text" id="update-txt-${task.id}-${uId}" placeholder="Type comment..." class="ui-input flex-1 text-xs px-2 py-1 rounded">
                                <button onclick="window.taskAction('${task.id}', '${uId}', 'update')" class="btn-primary">Post</button>
                            </div>
                            
                            <input type="file" id="upload-box-${task.id}-${uId}" class="hidden" onchange="window.taskAction('${task.id}', '${uId}', 'upload')">
                            
                            <div id="delegate-box-${task.id}-${uId}" class="hidden flex gap-2 mt-2">
                                <select id="delegate-sel-${task.id}-${uId}" class="ui-input flex-1 text-xs px-2 py-1 rounded">${delegateOptions}</select>
                                <button onclick="window.taskAction('${task.id}', '${uId}', 'delegate')" class="btn-primary">Confirm</button>
                            </div>
                        `;
                    }
                }

                if (isCreator && !allAccepted) {
                    const submittedAss = asgList.filter(a => a.status === 'submitted');
                    submittedAss.forEach(sa => {
                        const sName = sa.profiles?.full_name || sa.profiles?.email || 'Unknown';
                        actionsHtml += `
                            <div class="bg-orange-50 p-2 rounded border border-orange-100 mt-2">
                                <div class="text-xs font-bold text-orange-800 mb-2">Review required for: @${sName.split('@')[0]}</div>
                                <div class="flex flex-wrap gap-2">
                                    <button onclick="window.taskAction('${task.id}', '${sa.assignee_id}', 'accept')" class="btn-primary bg-green-600 hover:bg-green-700 text-white">Accept</button>
                                    <button onclick="window.taskAction('${task.id}', '${sa.assignee_id}', 'review_again')" class="btn-primary bg-red-600 hover:bg-red-700 text-white">Review Again</button>
                                    <button onclick="document.getElementById('transfer-box-${task.id}-${sa.assignee_id}').classList.toggle('hidden')" class="btn-outline bg-white">Transfer</button>
                                </div>
                                <div id="transfer-box-${task.id}-${sa.assignee_id}" class="hidden flex gap-2 mt-2">
                                    <select id="transfer-sel-${task.id}-${sa.assignee_id}" class="ui-input flex-1 text-xs px-2 py-1 rounded">${transferOptions}</select>
                                    <button onclick="window.taskAction('${task.id}', '${sa.assignee_id}', 'transfer')" class="btn-primary">Confirm</button>
                                </div>
                            </div>
                        `;
                    });
                }

                const trailRows = trlList.slice(-3).map(t => {
                    const tName = t.profiles?.full_name || t.profiles?.email || 'System';
                    const tTime = new Date(t.created_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
                    return `<div class="text-[12px] text-gray-700 leading-snug">
                        • ${tTime} – <b>${escapeHtml(tName.split('@')[0])}</b> ${escapeHtml(t.action)}
                        ${t.comment ? `<br><span class="italic text-gray-500">"${escapeHtml(t.comment)}"</span>` : ''}
                    </div>`;
                }).join('');

                return `
                <div class="jira-card bg-white rounded-2xl shadow-sm border border-gray-200 mb-4 overflow-hidden relative" style="border-left-width: 6px; border-left-style: solid; border-left-color: ${priorityColor};">
                    <div class="p-4">
                        <div class="flex justify-between items-start mb-3">
                            <div class="font-bold text-gray-800 text-[16px] flex items-start gap-2">
                                <i class="fas fa-thumbtack text-gray-400 mt-1"></i> Task: ${escapeHtml(task.title)}
                            </div>
                            <i class="fas fa-ellipsis-v text-gray-400 cursor-pointer hover:text-gray-600 menu-dots px-2" data-msg-id="${task.original_message_id}" data-msg-text="${escapeHtml(task.title)}"></i>
                        </div>
                        
                        ${task.description ? `<div class="text-[12px] text-gray-600 bg-gray-50 p-2.5 rounded-lg mb-3 border border-gray-100">📝 Original message: "${escapeHtml(task.description)}"</div>` : ''}
                        
                        <div class="text-[12px] text-gray-700 space-y-1.5 mb-4">
                            <div>👥 <span class="font-semibold text-gray-900">Assignees:</span> ${assigneesNames || 'None'}</div>
                            <div>👑 <span class="font-semibold text-gray-900">Reviewer:</span> ${reviewerName}</div>
                            <div>📅 <span class="font-semibold text-gray-900">Deadline:</span> ${deadlineHtml}</div>
                            <div>⚡ <span class="font-semibold text-gray-900">Priority:</span> ${task.priority}</div>
                            <div class="mt-2 flex items-center gap-2">🏷️ <span class="font-semibold text-gray-900">Status:</span> <span class="badge ${badgeClass}">${badgeText}</span></div>
                        </div>

                        ${actionsHtml ? `<div class="border-t border-gray-100 pt-3 pb-1">${actionsHtml}</div>` : ''}
                        
                        <div class="mt-2 pt-3 border-t border-gray-100">
                            <button onclick="window.toggleTrail('${task.id}')" class="text-[12px] font-bold text-gray-500 hover:text-gray-800 flex items-center gap-1 transition-colors w-full text-left">
                                📜 Recent Trail <span class="font-normal">(${trlList.length} entries)</span> <i class="fas fa-chevron-down ml-auto"></i>
                            </button>
                            <div id="trail-${task.id}" class="task-trail-box bg-gray-50 p-3 rounded-lg mt-2 space-y-2">
                                ${trailRows || '<div class="text-xs text-gray-400 italic">No activity yet.</div>'}
                                ${trlList.length > 3 ? `<div class="text-center text-[10px] text-indigo-600 mt-2 cursor-pointer font-bold uppercase" onclick="window.showCenterToast('Full trail modal opening...', 'fa-history', 'text-blue-500')">See full trail</div>` : ''}
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        window.showReminderModal = function(mid, text) { 
            currentReminderId = mid; 
            document.querySelectorAll('.msg-menu-dropdown').forEach(m=>m.remove());
            document.getElementById('reminderMessagePreview').innerText = text; 
            document.getElementById('reminderModal').classList.remove('hidden'); 
            document.getElementById('reminderModal').classList.add('flex'); 
        }
        window.closeReminderModal = function() { document.getElementById('reminderModal').classList.add('hidden'); document.getElementById('reminderModal').classList.remove('flex'); }
        window.saveReminder = async function() { 
            const dt = document.getElementById('reminderDateTime').value; 
            if(!dt) return; 
            await sb.from('reminders').insert({ user_id: currentUser.id, message_id: currentReminderId, reminder_time: new Date(dt).toISOString(), triggered: false }); 
            window.showCenterToast('Reminder Set Successfully'); 
            window.closeReminderModal(); 
        }

        window.toggleBookmark = async function(mid) { 
            document.querySelectorAll('.msg-menu-dropdown').forEach(m=>m.remove());
            const {data: ex} = await sb.from('bookmarks').select('id').eq('user_id',currentUser.id).eq('message_id',mid).maybeSingle(); 
            if(ex) { await sb.from('bookmarks').delete().eq('id',ex.id); window.showCenterToast('Bookmark removed', 'fa-info-circle', 'text-yellow-400'); } 
            else { await sb.from('bookmarks').insert({ user_id: currentUser.id, message_id: mid }); window.showCenterToast('Message Bookmarked'); } 
        }

        function startSubscriptions() { 
            if(messageSubscription) messageSubscription.unsubscribe();
            messageSubscription = sb.channel('public:messages').on('postgres_changes', {event:'INSERT', schema:'public', table:'messages'}, (p) => { if(p.new.room_id === currentRoom) loadMessages(); }).subscribe();
            
            if(taskSubscription) taskSubscription.unsubscribe(); 
            taskSubscription = sb.channel('tasks-changes').on('postgres_changes', {event:'*', schema:'public', table:'tasks'}, () => { loadTasksForPanel(); }).subscribe(); 
            
            if(assigneeSubscription) assigneeSubscription.unsubscribe(); 
            assigneeSubscription = sb.channel('assignees-changes').on('postgres_changes', {event:'*', schema:'public', table:'task_assignees'}, () => { loadTasksForPanel(); }).subscribe(); 
            
            if(trailSubscription) trailSubscription.unsubscribe(); 
            trailSubscription = sb.channel('trails-changes').on('postgres_changes', {event:'*', schema:'public', table:'task_trails'}, () => { loadTasksForPanel(); }).subscribe(); 
        }

        (async() => { const {data: {session}} = await sb.auth.getSession(); if(!session) renderAuthScreen(); else { currentUser = session.user; await ensureProfile(); renderMainApp(); startSubscriptions(); } })();
    </script>
</body>
</html>
