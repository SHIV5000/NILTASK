<!DOCTYPE html>
<html>
<head>
    <title>MPGS TaskFlow - Chat, Tasks & Reminders</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100">
    <div id="root" class="container mx-auto p-4"></div>

    <script type="module">
        // -------------------- Supabase configuration --------------------
        const SUPABASE_URL = 'https://apfymygzwkzjhhgmtkaj.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFwZnlteWd6d2t6amhoZ210a2FqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MjM5MTIsImV4cCI6MjA5NjQ5OTkxMn0.RiV6kDDeSq5ZIP68RGwtpLtqPALFloq23owoNm2aA-c';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // -------------------- Global variables --------------------
        let currentUser = null;
        let currentRoom = 'general';
        let messageSubscription = null;
        let taskSubscription = null;
        let trailSubscription = null;

        const root = document.getElementById('root');

        // -------------------- Helper: escape HTML --------------------
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // -------------------- Helper: show a dropdown modal (for delegate) --------------------
        function showDelegateModal(taskId, currentAssigneeId, usersList) {
            const modalDiv = document.createElement('div');
            modalDiv.className = 'fixed inset-0 bg-gray-600 bg-opacity-50 flex items-center justify-center z-50';
            modalDiv.innerHTML = `
                <div class="bg-white rounded-lg p-6 w-96">
                    <h3 class="text-lg font-bold mb-4">Delegate Task</h3>
                    <select id="delegateSelect" class="border p-2 w-full mb-4 rounded">
                        <option value="">Select new assignee</option>
                        ${usersList.map(u => `<option value="${u.id}">${u.full_name || u.email}</option>`).join('')}
                    </select>
                    <div class="flex justify-end gap-2">
                        <button id="delegateCancel" class="px-4 py-2 bg-gray-300 rounded">Cancel</button>
                        <button id="delegateConfirm" class="px-4 py-2 bg-green-600 text-white rounded">Delegate</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modalDiv);
            document.getElementById('delegateCancel').onclick = () => modalDiv.remove();
            document.getElementById('delegateConfirm').onclick = async () => {
                const newAssigneeId = document.getElementById('delegateSelect').value;
                if (!newAssigneeId) {
                    alert('Please select an assignee');
                    return;
                }
                await sb.from('tasks').update({ assigned_to: newAssigneeId }).eq('id', taskId);
                await addTaskTrail(taskId, 'delegate', `Delegated to user ${newAssigneeId}`);
                loadTasks();
                modalDiv.remove();
            };
        }

        // -------------------- Reminder modal helpers --------------------
        let currentReminderMessageId = null;
        let currentReminderMessageText = '';

        function showReminderModal(messageId, messageText) {
            currentReminderMessageId = messageId;
            currentReminderMessageText = messageText;
            const modal = document.getElementById('reminderModal');
            document.getElementById('reminderMessagePreview').innerText = messageText.substring(0, 100);
            // Default to 1 hour from now
            const defaultDateTime = new Date(Date.now() + 60*60*1000).toISOString().slice(0, 16);
            document.getElementById('reminderDateTime').value = defaultDateTime;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeReminderModal() {
            const modal = document.getElementById('reminderModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            currentReminderMessageId = null;
        }

        async function saveReminder() {
            if (!currentReminderMessageId) return;
            const reminderTime = document.getElementById('reminderDateTime').value;
            if (!reminderTime) {
                alert('Please select a date and time');
                return;
            }
            const { error } = await sb.from('reminders').insert({
                user_id: currentUser.id,
                message_id: currentReminderMessageId,
                reminder_time: new Date(reminderTime).toISOString(),
                triggered: false
            });
            if (error) {
                alert('Failed to set reminder: ' + error.message);
            } else {
                alert('Reminder set!');
                closeReminderModal();
            }
        }

        // -------------------- Authentication & Profile --------------------
        async function ensureProfile() {
            const { data: existing } = await sb
                .from('profiles')
                .select('id')
                .eq('id', currentUser.id)
                .maybeSingle();
            if (!existing) {
                await sb.from('profiles').insert({
                    id: currentUser.id,
                    email: currentUser.email,
                    full_name: currentUser.email.split('@')[0],
                    role: 'teacher'
                });
            }
        }

        async function renderApp() {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) {
                renderAuth();
                return;
            }
            currentUser = session.user;
            await ensureProfile();
            renderMainUI();
            subscribeToMessages();
            subscribeToTasks();
            subscribeToTrails();
        }

        function renderAuth() {
            root.innerHTML = `
                <div class="max-w-md mx-auto bg-white p-6 rounded shadow mt-10">
                    <h1 class="text-2xl font-bold text-green-600 mb-4">MPGS TaskFlow</h1>
                    <input type="email" id="email" placeholder="Email" class="border p-2 w-full mb-2 rounded">
                    <input type="password" id="password" placeholder="Password" class="border p-2 w-full mb-2 rounded">
                    <div class="flex gap-2">
                        <button id="loginBtn" class="bg-green-600 text-white p-2 rounded flex-1">Login</button>
                        <button id="signupBtn" class="bg-blue-600 text-white p-2 rounded flex-1">Sign Up</button>
                    </div>
                    <div id="authMsg" class="mt-4 text-sm text-red-500"></div>
                </div>
            `;
            document.getElementById('loginBtn').onclick = async () => {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const { error } = await sb.auth.signInWithPassword({ email, password });
                if (error) document.getElementById('authMsg').innerText = error.message;
                else renderApp();
            };
            document.getElementById('signupBtn').onclick = async () => {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const { error } = await sb.auth.signUp({ email, password });
                if (error) document.getElementById('authMsg').innerText = error.message;
                else document.getElementById('authMsg').innerText = 'Check email for confirmation!';
            };
        }

        // -------------------- Main UI --------------------
        function renderMainUI() {
            root.innerHTML = `
                <div class="flex h-screen max-h-screen">
                    <!-- Left: Task Sidebar -->
                    <div class="w-80 bg-white border-r flex flex-col">
                        <div class="p-4 border-b">
                            <h2 class="font-bold text-lg">My Tasks</h2>
                        </div>
                        <div id="tasksList" class="flex-1 overflow-y-auto p-2 space-y-2">
                            Loading tasks...
                        </div>
                    </div>
                    <!-- Middle: Channels Sidebar -->
                    <div class="w-64 bg-white border-r flex flex-col">
                        <h2 class="font-bold p-4 border-b">Channels</h2>
                        <div id="channelList" class="flex-1 p-2">
                            <div class="channel-item p-2 rounded cursor-pointer hover:bg-gray-100" data-room="general"># general</div>
                            <div class="channel-item p-2 rounded cursor-pointer hover:bg-gray-100" data-room="math"># math</div>
                            <div class="channel-item p-2 rounded cursor-pointer hover:bg-gray-100" data-room="science"># science</div>
                        </div>
                        <div class="p-4 border-t">
                            <button id="logoutBtn" class="text-red-500 text-sm">Logout</button>
                        </div>
                    </div>
                    <!-- Right: Chat Area -->
                    <div class="flex-1 flex flex-col">
                        <div class="bg-white border-b p-4">
                            <h2 class="text-xl font-semibold"># ${currentRoom}</h2>
                        </div>
                        <div id="messagesContainer" class="flex-1 overflow-y-auto p-4 space-y-2"></div>
                        <div class="bg-white border-t p-4">
                            <div class="flex gap-2">
                                <input type="text" id="messageInput" placeholder="Type a message..." class="flex-1 border rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                                <button id="sendBtn" class="bg-green-600 text-white px-4 py-2 rounded-full">Send</button>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Task Modal -->
                <div id="taskModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden items-center justify-center z-50">
                    <div class="bg-white rounded-lg p-6 w-96">
                        <h3 class="text-lg font-bold mb-4">Convert to Task</h3>
                        <input type="text" id="taskTitle" placeholder="Task title" class="border p-2 w-full mb-2 rounded">
                        <select id="taskAssignee" class="border p-2 w-full mb-2 rounded">
                            <option value="">Select assignee</option>
                        </select>
                        <input type="date" id="taskDeadline" class="border p-2 w-full mb-2 rounded">
                        <select id="taskPriority" class="border p-2 w-full mb-2 rounded">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                        </select>
                        <label class="flex items-center mb-4">
                            <input type="checkbox" id="taskRequireProof" class="mr-2"> Require proof
                        </label>
                        <div class="flex justify-end gap-2">
                            <button id="cancelTaskBtn" class="px-4 py-2 bg-gray-300 rounded">Cancel</button>
                            <button id="saveTaskBtn" class="px-4 py-2 bg-green-600 text-white rounded">Create Task</button>
                        </div>
                    </div>
                </div>
                <!-- Reminder Modal -->
                <div id="reminderModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden items-center justify-center z-50">
                    <div class="bg-white rounded-lg p-6 w-96">
                        <h3 class="text-lg font-bold mb-4">Set Reminder</h3>
                        <p class="text-sm text-gray-600 mb-2" id="reminderMessagePreview"></p>
                        <input type="datetime-local" id="reminderDateTime" class="border p-2 w-full mb-4 rounded">
                        <div class="flex justify-end gap-2">
                            <button id="cancelReminderBtn" class="px-4 py-2 bg-gray-300 rounded">Cancel</button>
                            <button id="saveReminderBtn" class="px-4 py-2 bg-green-600 text-white rounded">Set Reminder</button>
                        </div>
                    </div>
                </div>
            `;

            // Channel switching
            document.querySelectorAll('.channel-item').forEach(el => {
                el.addEventListener('click', () => {
                    currentRoom = el.getAttribute('data-room');
                    renderMainUI();
                });
            });
            document.getElementById('logoutBtn').onclick = async () => {
                await sb.auth.signOut();
                if (messageSubscription) messageSubscription.unsubscribe();
                if (taskSubscription) taskSubscription.unsubscribe();
                if (trailSubscription) trailSubscription.unsubscribe();
                renderApp();
            };
            document.getElementById('sendBtn').onclick = sendMessage;
            document.getElementById('messageInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });
            document.getElementById('cancelTaskBtn').onclick = closeTaskModal;
            document.getElementById('saveTaskBtn').onclick = saveTask;
            document.getElementById('cancelReminderBtn').onclick = closeReminderModal;
            document.getElementById('saveReminderBtn').onclick = saveReminder;

            loadMessages();
            loadTasks();
        }

        // -------------------- Chat functions --------------------
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            const { error } = await sb.from('messages').insert({
                room_id: currentRoom,
                sender_id: currentUser.id,
                text: text,
                created_at: new Date().toISOString()
            });
            if (error) console.error('Send error:', error);
            else input.value = '';
        }

        async function loadMessages() {
            const { data: messages, error } = await sb
                .from('messages')
                .select('*, profiles(full_name, email)')
                .eq('room_id', currentRoom)
                .order('created_at', { ascending: true });
            if (error) { console.error(error); return; }
            renderMessages(messages);
        }

        function renderMessages(messages) {
            const container = document.getElementById('messagesContainer');
            if (!container) return;
            if (!messages || messages.length === 0) {
                container.innerHTML = '<div class="text-gray-500 text-center">No messages yet. Say hello!</div>';
                return;
            }
            container.innerHTML = messages.map(msg => {
                const senderName = msg.profiles?.full_name || msg.profiles?.email || 'Unknown';
                const isOwn = msg.sender_id === currentUser.id;
                return `
                    <div class="flex ${isOwn ? 'justify-end' : 'justify-start'} group">
                        <div class="max-w-xs ${isOwn ? 'bg-green-100' : 'bg-white'} rounded-lg p-2 shadow relative">
                            <div class="text-xs text-gray-500">${senderName}</div>
                            <div class="text-sm">${escapeHtml(msg.text)}</div>
                            <div class="text-xs text-gray-400 text-right">${new Date(msg.created_at).toLocaleTimeString()}</div>
                            <div class="absolute top-1 right-1 flex gap-1 opacity-0 group-hover:opacity-100 transition">
                                <button class="reminder-btn text-gray-400 hover:text-yellow-600" data-message-id="${msg.id}" data-message-text="${escapeHtml(msg.text)}">🔔</button>
                                <button class="task-convert-btn text-gray-400 hover:text-green-600" data-message-id="${msg.id}" data-message-text="${escapeHtml(msg.text)}">📋</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            container.scrollTop = container.scrollHeight;
            document.querySelectorAll('.task-convert-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openTaskModal(btn.getAttribute('data-message-id'), btn.getAttribute('data-message-text'));
                });
            });
            document.querySelectorAll('.reminder-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    showReminderModal(btn.getAttribute('data-message-id'), btn.getAttribute('data-message-text'));
                });
            });
        }

        function subscribeToMessages() {
            if (messageSubscription) messageSubscription.unsubscribe();
            messageSubscription = sb
                .channel('public:messages')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (payload) => {
                    if (payload.new.room_id === currentRoom) {
                        sb.from('profiles').select('full_name, email').eq('id', payload.new.sender_id).then(({ data }) => {
                            const newMsg = { ...payload.new, profiles: data?.[0] || null };
                            const container = document.getElementById('messagesContainer');
                            if (!container) return;
                            const isOwn = newMsg.sender_id === currentUser.id;
                            const msgHtml = `
                                <div class="flex ${isOwn ? 'justify-end' : 'justify-start'} group">
                                    <div class="max-w-xs ${isOwn ? 'bg-green-100' : 'bg-white'} rounded-lg p-2 shadow relative">
                                        <div class="text-xs text-gray-500">${newMsg.profiles?.full_name || newMsg.profiles?.email || 'Unknown'}</div>
                                        <div class="text-sm">${escapeHtml(newMsg.text)}</div>
                                        <div class="text-xs text-gray-400 text-right">${new Date(newMsg.created_at).toLocaleTimeString()}</div>
                                        <div class="absolute top-1 right-1 flex gap-1 opacity-0 group-hover:opacity-100 transition">
                                            <button class="reminder-btn text-gray-400 hover:text-yellow-600" data-message-id="${newMsg.id}" data-message-text="${escapeHtml(newMsg.text)}">🔔</button>
                                            <button class="task-convert-btn text-gray-400 hover:text-green-600" data-message-id="${newMsg.id}" data-message-text="${escapeHtml(newMsg.text)}">📋</button>
                                        </div>
                                    </div>
                                </div>
                            `;
                            container.insertAdjacentHTML('beforeend', msgHtml);
                            container.scrollTop = container.scrollHeight;
                            const newTaskBtn = container.querySelector('.task-convert-btn:last-child');
                            if (newTaskBtn) newTaskBtn.addEventListener('click', (e) => openTaskModal(newTaskBtn.dataset.messageId, newTaskBtn.dataset.messageText));
                            const newReminderBtn = container.querySelector('.reminder-btn:last-child');
                            if (newReminderBtn) newReminderBtn.addEventListener('click', (e) => showReminderModal(newReminderBtn.dataset.messageId, newReminderBtn.dataset.messageText));
                        });
                    }
                })
                .subscribe();
        }

        // -------------------- Task Modal (Convert to Task) --------------------
        let currentMessageId = null;
        async function openTaskModal(messageId, messageText) {
            currentMessageId = messageId;
            const modal = document.getElementById('taskModal');
            document.getElementById('taskTitle').value = messageText.substring(0, 100);
            document.getElementById('taskDeadline').value = '';
            document.getElementById('taskPriority').value = 'medium';
            document.getElementById('taskRequireProof').checked = false;
            const { data: users, error } = await sb.from('profiles').select('id, email, full_name');
            if (!error && users) {
                const select = document.getElementById('taskAssignee');
                select.innerHTML = '<option value="">Select assignee</option>' + users.map(u => `<option value="${u.id}">${u.full_name || u.email}</option>`).join('');
            }
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }
        function closeTaskModal() {
            const modal = document.getElementById('taskModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            currentMessageId = null;
        }
        async function saveTask() {
            if (!currentMessageId) return;
            const title = document.getElementById('taskTitle').value;
            const assigneeId = document.getElementById('taskAssignee').value;
            const deadline = document.getElementById('taskDeadline').value;
            const priority = document.getElementById('taskPriority').value;
            const requireProof = document.getElementById('taskRequireProof').checked;
            if (!title || !assigneeId) {
                alert('Please provide title and assignee');
                return;
            }
            const { error } = await sb.from('tasks').insert({
                original_message_id: currentMessageId,
                title: title,
                assigned_to: assigneeId,
                assigned_by: currentUser.id,
                deadline: deadline || null,
                priority: priority,
                require_proof: requireProof,
                status: 'pending_ack'
            });
            if (error) {
                alert('Failed to create task: ' + error.message);
            } else {
                alert('Task created!');
                closeTaskModal();
                loadTasks();
            }
        }

        // -------------------- Task Trail --------------------
        async function addTaskTrail(taskId, action, comment, fileUrl = null) {
            await sb.from('task_trails').insert({
                task_id: taskId,
                user_id: currentUser.id,
                action: action,
                comment: comment,
                file_url: fileUrl
            });
        }

        async function loadTaskTrail(taskId) {
            const { data: trails, error } = await sb
                .from('task_trails')
                .select('*')
                .eq('task_id', taskId)
                .order('created_at', { ascending: true });
            if (error || !trails || trails.length === 0) return;
            const trailContainer = document.getElementById(`trail-${taskId}`);
            if (trailContainer) {
                trailContainer.innerHTML = trails.map(t => {
                    let line = `${new Date(t.created_at).toLocaleString()} - ${t.action}: ${t.comment || ''}`;
                    if (t.file_url) line += ` <a href="${t.file_url}" target="_blank" class="text-blue-500">[file]</a>`;
                    return `<div>${escapeHtml(line)}</div>`;
                }).join('');
                trailContainer.classList.remove('hidden');
            }
        }

        // -------------------- Task Lifecycle Actions --------------------
        async function performTaskAction(taskId, action) {
            let newStatus = '';
            let comment = '';
            switch (action) {
                case 'ack':
                    newStatus = 'in_progress';
                    comment = 'Task acknowledged and in progress';
                    break;
                case 'submit':
                    newStatus = 'submitted';
                    comment = 'Task submitted for review';
                    break;
                case 'accept':
                    newStatus = 'accepted';
                    comment = 'Task accepted as complete';
                    break;
                case 'review_again':
                    newStatus = 'needs_review';
                    comment = 'Task needs rework';
                    break;
                case 'delegate':
                    const { data: users } = await sb.from('profiles').select('id, email, full_name');
                    if (!users || users.length === 0) {
                        alert('No users found to delegate');
                        return;
                    }
                    const currentTask = await sb.from('tasks').select('assigned_to').eq('id', taskId).single();
                    const filteredUsers = users.filter(u => u.id !== currentTask.data.assigned_to);
                    showDelegateModal(taskId, currentTask.data.assigned_to, filteredUsers);
                    return;
                default:
                    return;
            }
            const { error } = await sb.from('tasks').update({ status: newStatus }).eq('id', taskId);
            if (error) {
                alert('Action failed: ' + error.message);
                return;
            }
            await addTaskTrail(taskId, action, comment);
            loadTasks();
        }

        function getActionButtons(task, isAssignedToMe, isCreatedByMe) {
            const status = task.status;
            let buttons = '';
            if (status === 'pending_ack' && isAssignedToMe) {
                buttons += `<button data-task-id="${task.id}" data-action="ack" class="task-action-btn bg-green-500 text-white text-xs px-2 py-1 rounded">Acknowledge</button>`;
            }
            if ((status === 'in_progress' || status === 'needs_review') && isAssignedToMe) {
                buttons += `<button data-task-id="${task.id}" data-action="submit" class="task-action-btn bg-blue-500 text-white text-xs px-2 py-1 rounded">Submit for Review</button>`;
                buttons += `<button data-task-id="${task.id}" data-action="delegate" class="task-action-btn bg-gray-500 text-white text-xs px-2 py-1 rounded">Delegate</button>`;
            }
            if (status === 'submitted' && isCreatedByMe) {
                buttons += `<button data-task-id="${task.id}" data-action="accept" class="task-action-btn bg-green-500 text-white text-xs px-2 py-1 rounded">Accept</button>`;
                buttons += `<button data-task-id="${task.id}" data-action="review_again" class="task-action-btn bg-red-500 text-white text-xs px-2 py-1 rounded">Review Again</button>`;
            }
            return buttons || '<span class="text-xs text-gray-400">No actions</span>';
        }

        // -------------------- Task List Rendering --------------------
        async function loadTasks() {
            const { data: tasks, error } = await sb
                .from('tasks')
                .select(`
                    *,
                    assignee:profiles!assigned_to(full_name, email),
                    creator:profiles!assigned_by(full_name, email)
                `)
                .or(`assigned_to.eq.${currentUser.id},assigned_by.eq.${currentUser.id}`)
                .order('created_at', { ascending: false });
            if (error) {
                console.error(error);
                const tasksDiv = document.getElementById('tasksList');
                if (tasksDiv) tasksDiv.innerHTML = '<div class="text-red-500">Error loading tasks</div>';
                return;
            }
            renderTasks(tasks);
        }

        function renderTasks(tasks) {
            const container = document.getElementById('tasksList');
            if (!container) return;
            if (!tasks || tasks.length === 0) {
                container.innerHTML = '<div class="text-gray-500 text-center p-4">No tasks yet</div>';
                return;
            }
            container.innerHTML = tasks.map(task => {
                const isAssignedToMe = task.assigned_to === currentUser.id;
                const isCreatedByMe = task.assigned_by === currentUser.id;
                const assigneeName = task.assignee?.full_name || task.assignee?.email || 'Unknown';
                const creatorName = task.creator?.full_name || task.creator?.email || 'Unknown';
                const statusColors = {
                    pending_ack: 'bg-yellow-100 text-yellow-800',
                    in_progress: 'bg-blue-100 text-blue-800',
                    submitted: 'bg-purple-100 text-purple-800',
                    accepted: 'bg-green-100 text-green-800',
                    needs_review: 'bg-red-100 text-red-800'
                };
                const statusColor = statusColors[task.status] || 'bg-gray-100';
                const isAccepted = task.status === 'accepted';
                const borderClass = isAccepted ? 'border-green-500 border-2' : 'border';
                
                let updateFormHtml = '';
                if ((task.status === 'in_progress' || task.status === 'needs_review') && isAssignedToMe) {
                    updateFormHtml = `
                        <div class="mt-3 border-t pt-2">
                            <textarea id="comment-${task.id}" placeholder="Add progress update..." class="w-full text-xs border rounded p-1" rows="2"></textarea>
                            <div class="flex gap-2 mt-1">
                                <input type="file" id="file-${task.id}" class="text-xs">
                                <button data-task-id="${task.id}" class="task-update-btn bg-indigo-500 text-white text-xs px-2 py-1 rounded">Add Update</button>
                            </div>
                        </div>
                    `;
                }
                
                return `
                    <div class="rounded-lg p-3 bg-white shadow-sm ${borderClass} task-card" data-task-id="${task.id}">
                        <div class="flex justify-between items-start">
                            <h3 class="font-semibold text-sm">${escapeHtml(task.title)}</h3>
                            <span class="text-xs px-2 py-1 rounded-full ${statusColor}">${task.status.replace('_', ' ')}</span>
                        </div>
                        <div class="text-xs text-gray-500 mt-1">Assignee: ${assigneeName}</div>
                        <div class="text-xs text-gray-500">Creator: ${creatorName}</div>
                        ${task.deadline ? `<div class="text-xs text-gray-500">Deadline: ${new Date(task.deadline).toLocaleDateString()}</div>` : ''}
                        <div class="flex flex-wrap gap-2 mt-2">
                            ${getActionButtons(task, isAssignedToMe, isCreatedByMe)}
                        </div>
                        ${updateFormHtml}
                        <div id="trail-${task.id}" class="mt-2 text-xs text-gray-500 max-h-24 overflow-y-auto border-t pt-1 hidden"></div>
                    </div>
                `;
            }).join('');
            
            document.querySelectorAll('.task-action-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const taskId = btn.dataset.taskId;
                    const action = btn.dataset.action;
                    await performTaskAction(taskId, action);
                });
            });
            
            document.querySelectorAll('.task-update-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const taskId = btn.dataset.taskId;
                    const commentTextarea = document.getElementById(`comment-${taskId}`);
                    const comment = commentTextarea?.value.trim() || '';
                    const fileInput = document.getElementById(`file-${taskId}`);
                    let fileUrl = null;
                    if (fileInput && fileInput.files.length > 0) {
                        const file = fileInput.files[0];
                        const fileExt = file.name.split('.').pop();
                        const fileName = `${taskId}_${Date.now()}.${fileExt}`;
                        const { error } = await sb.storage.from('task-proofs').upload(fileName, file);
                        if (error) {
                            alert('File upload failed: ' + error.message);
                            return;
                        }
                        const { data: { publicUrl } } = sb.storage.from('task-proofs').getPublicUrl(fileName);
                        fileUrl = publicUrl;
                    }
                    if (comment || fileUrl) {
                        await addTaskTrail(taskId, 'update', comment, fileUrl);
                        if (commentTextarea) commentTextarea.value = '';
                        if (fileInput) fileInput.value = '';
                        loadTasks();
                    } else {
                        alert('Please enter a comment or select a file');
                    }
                });
            });
            
            tasks.forEach(task => {
                loadTaskTrail(task.id);
            });
        }

        // -------------------- Real-time subscriptions --------------------
        function subscribeToTasks() {
            if (taskSubscription) taskSubscription.unsubscribe();
            taskSubscription = sb
                .channel('tasks-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'tasks' }, () => loadTasks())
                .subscribe();
        }

        function subscribeToTrails() {
            if (trailSubscription) trailSubscription.unsubscribe();
            trailSubscription = sb
                .channel('trails-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'task_trails' }, () => loadTasks())
                .subscribe();
        }

        // -------------------- Start the app --------------------
        renderApp();
    </script>
</body>
</html>
