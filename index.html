                                        {activeGroup.isDM ? <div className="w-10 h-10 rounded-full bg-[#dfe5e7] flex items-center justify-center text-[#54656f] shadow-sm"><i className="fa-solid fa-user"></i></div> : activeGroup.profilePicUrl ? <img src={activeGroup.profilePicUrl} className="w-10 h-10 rounded-full object-cover shadow-sm"/> : <div className="w-10 h-10 rounded-full bg-[#dfe5e7] flex items-center justify-center text-[#54656f] shadow-sm"><i className="fa-solid fa-people-group"></i></div>}
                                        <div><h1 className="text-[16px] text-[#111b21]">{toSentenceCase(activeGroup.name)}</h1><p className="text-[13px] text-[#54656f]">{activeGroup.isDM ? 'Private Chat' : `${activeGroup.members?.length||0} Members`}</p></div>
                                    </div>

                                    <div className="hidden lg:flex items-center gap-2 overflow-hidden mx-4 flex-1 justify-center px-2 border-x border-gray-200/50">
                                        <span className="text-[11px] font-bold text-gray-400 uppercase tracking-widest mr-2">Online</span>
                                        {dbUsers.filter(u => {
                                            if (activeGroup.isDM) {
                                                return activeGroup.members?.includes(u.email) && u.lastActive && (Date.now() - u.lastActive.toMillis() < 900000) && u.uid !== user.uid;
                                            }
                                            if (!activeGroup.members?.includes(u.email)) return false;
                                            return u.lastActive && (Date.now() - u.lastActive.toMillis() < 900000) && u.uid !== user.uid;
                                        }).slice(0, 7).map(onlineUser => (
                                            <div key={onlineUser.uid} className="relative group cursor-default" title={`${toSentenceCase(onlineUser.name)} is Online`}>
                                                {onlineUser.profilePicUrl ? <img src={onlineUser.profilePicUrl} className="w-7 h-7 rounded-full object-cover shadow-sm" /> : <div className="w-7 h-7 rounded-full bg-[#dfe5e7] flex items-center justify-center text-[9px] font-bold text-[#54656f] shadow-sm">{toSentenceCase(onlineUser.name).substring(0,2)}</div>}
                                                <div className="absolute bottom-0 right-0 w-2.5 h-2.5 bg-[#00a884] border-2 border-[#f0f2f5] rounded-full"></div>
                                            </div>
                                        ))}
                                        {dbUsers.filter(u => u.lastActive && (Date.now() - u.lastActive.toMillis() < 900000)).length === 0 && <span className="text-xs text-gray-400 italic">Just you</span>}
                                    </div>

                                    <div className="flex items-center gap-4 text-[#54656f]">
                                        
                                        <div className="relative">
                                            <button onClick={() => setShowNotifications(!showNotifications)} className="hover:bg-gray-200 rounded-full p-2 transition-colors relative" title="Notifications">
                                                <i className="fa-solid fa-bell text-lg"></i>
                                                {totalNotifications > 0 && <span className="absolute top-0 right-0 bg-red-500 text-white text-[10px] w-4 h-4 flex items-center justify-center rounded-full font-bold border-2 border-[#f0f2f5]">{totalNotifications}</span>}
                                            </button>
                                            
                                            {showNotifications && (
                                                <div className="absolute top-full right-0 mt-2 w-80 bg-white rounded-lg shadow-2xl border border-gray-200 z-50 overflow-hidden animate-in fade-in zoom-in-95">
                                                    <div className="bg-[#f0f2f5] p-3 flex justify-between items-center border-b border-gray-200">
                                                        <span className="text-[15px] font-bold text-[#111b21]">Updates & Alerts</span>
                                                        <div className="flex items-center gap-3">
                                                            <button onClick={handleClearNotifications} className="text-[12px] text-[#008069] font-bold hover:underline">Clear</button>
                                                        </div>
                                                    </div>
                                                    <div className="max-h-80 overflow-y-auto">
                                                        {totalNotifications === 0 ? <div className="p-6 text-center text-[14px] text-[#54656f]">No new updates</div> : 
                                                            <>
                                                                {activeActionableTasks.map(task => (
                                                                    <div key={task.id} className="p-3 border-b hover:bg-[#f5f6f6] cursor-pointer" onClick={() => { 
                                                                        setShowNotifications(false); 
                                                                        if (activeGroup.id !== task.groupId) { setActiveGroup(groups.find(g=>g.id===task.groupId)||{id:'demo',name:'Default Group'}); }
                                                                        setTimeout(()=>scrollToMessage(task.id), 300); 
                                                                    }}>
                                                                        <div className="text-[14px] font-bold text-[#008069] mb-1 flex items-center gap-1"><i className="fa-regular fa-square-check"></i> Pending Task</div>
                                                                        <div className="text-[13px] text-[#111b21] line-clamp-2">"{task.text}"</div>
                                                                        <div className="text-[11px] font-semibold text-[#54656f] mt-1">Due: {new Date(task.taskData.deadline).toLocaleDateString()}</div>
                                                                    </div>
                                                                ))}
                                                                {genericNotifications.map(n => (
                                                                    <div key={n.id} className="p-3 border-b hover:bg-[#f5f6f6] cursor-pointer flex items-start gap-3" onClick={() => { setShowNotifications(false); if(n.messageId) scrollToMessage(n.messageId); }}>
                                                                        <div className="w-8 h-8 rounded-full bg-[#d9fdd3] flex items-center justify-center text-[#008069] shrink-0 mt-1 shadow-sm"><i className={n.type === 'reply' ? "fa-solid fa-reply" : "fa-solid fa-bolt"}></i></div>
                                                                        <div>
                                                                            <div className="text-[14px] font-bold text-[#111b21]">{n.type === 'reply' ? 'New Reply' : 'New Reaction'}</div>
                                                                            <div className="text-[13px] text-[#54656f]">{n.text}</div>
                                                                        </div>
                                                                    </div>
                                                                ))}
                                                            </>
                                                        }
                                                    </div>
                                                </div>
                                            )}
                                        </div>

                                        <div className="relative">
                                            <button onClick={() => setShowFilterMenu(!showFilterMenu)} className="hover:bg-gray-200 rounded-full p-2 transition-colors"><i className="fa-solid fa-filter text-lg"></i></button>
                                            {showFilterMenu && (
                                                <div className="absolute right-0 mt-2 w-56 bg-white shadow-2xl rounded-lg border border-gray-100 z-50 overflow-hidden animate-in fade-in py-2">
                                                    {['all', 'tasks-pending', 'tasks-completed', 'messages', 'today', 'bookmarked'].map(f => (
                                                        <div key={f} onClick={() => { setChatFilter(f); setShowFilterMenu(false); }} className={`px-4 py-2 text-[14.5px] cursor-pointer hover:bg-[#f5f6f6] transition-colors flex items-center gap-3 ${chatFilter === f ? 'text-[#008069]' : 'text-[#111b21]'}`}>
                                                            {f === 'all' && <i className="fa-solid fa-layer-group w-5 text-center"></i>}
                                                            {f === 'tasks-pending' && <i className="fa-regular fa-clock w-5 text-center"></i>}
                                                            {f === 'tasks-completed' && <i className="fa-regular fa-square-check w-5 text-center"></i>}
                                                            {f === 'messages' && <i className="fa-regular fa-comment w-5 text-center"></i>}
                                                            {f === 'today' && <i className="fa-regular fa-calendar-day w-5 text-center"></i>}
                                                            {f === 'bookmarked' && <i className="fa-solid fa-bookmark w-5 text-center"></i>}
                                                            {f === 'bookmarked' ? 'Saved Messages' : f === 'all' ? 'All Content' : f.replace('-', ' ').replace(/\b\w/g, l => l.toUpperCase())}
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                        <div className="hidden md:flex items-center bg-white rounded-lg px-3 py-1.5 border border-gray-200"><i className="fa-solid fa-magnifying-glass text-xs"></i><input type="text" placeholder="Search" className="bg-transparent outline-none text-[14px] ml-2 w-24 focus:w-40 transition-all text-[#111b21]" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} /></div>
                                        
                                        <button onClick={() => setShowRightSidebar(!showRightSidebar)} className={`hover:bg-gray-200 rounded-full p-2 transition-colors ${showRightSidebar ? 'text-[#008069] bg-gray-200' : ''}`} title="Task Manager"><i className="fa-solid fa-list-check text-lg"></i></button>
                                    </div>
                                </div>

                                {/* CHAT FEED */}
                                <div ref={chatContainerRef} onScroll={handleChatScroll} className="flex-1 overflow-y-auto p-4 md:px-[6%] space-y-2 wa-bg relative pb-10" onClick={() => setShowFilterMenu(false)}>

                                    <div className="bg-[#f0f2f5] px-4 py-2 flex items-center justify-between shrink-0 animate-in slide-in-from-bottom-2 border-l-4 border-[#008069] z-10">

                                            <div className="text-[13px] font-bold text-[#008069]">{toSentenceCase(replyingTo.sender.split('@')[0])}</div>

                                        </div>
                                        <button onClick={()=>setReplyingTo(null)} className="text-[#54656f] hover:text-red-500 p-2"><i className="fa-solid fa-xmark"></i></button>
                                    </div>
                                )}

                                {/* MENTIONS POPUP */}
                                {inputText.split(/\s+/).pop().startsWith('@') && inputText.split(/\s+/).pop().length > 0 && (
                                    <div className="absolute bottom-[70px] left-4 md:left-[5%] bg-white shadow-lg rounded-lg w-64 max-h-48 overflow-y-auto z-20 border border-gray-100">

                                            <div key={u.uid} onMouseDown={(e) => e.preventDefault()} onClick={() => { const words = inputText.split(/\s+/); words[words.length - 1] = `@${u.name} `; setInputText(words.join(' ')); chatInputRef.current?.focus(); }} className="p-3 border-b border-gray-50 hover:bg-[#f5f6f6] cursor-pointer text-[14px] flex items-center gap-3 text-[#111b21]">
                                                {u.profilePicUrl ? <img src={u.profilePicUrl} className="w-6 h-6 rounded-full object-cover shadow-sm"/> : <div className="w-6 h-6 rounded-full bg-[#008069] text-white flex items-center justify-center text-[10px] shadow-sm"><i className="fa-solid fa-at"></i></div>}
                                                {toSentenceCase(u.name)}
                                            </div>
                                        ))}
                                        {groups.filter(g => g.name.toLowerCase().includes(inputText.split(/\s+/).pop().substring(1).toLowerCase()) && !g.isArchived).map(g => (
                                            <div key={g.id} onMouseDown={(e) => e.preventDefault()} onClick={() => { const words = inputText.split(/\s+/); words[words.length - 1] = `@${g.name.replace(/\s+/g, '')} `; setInputText(words.join(' ')); chatInputRef.current?.focus(); }} className="p-3 border-b border-gray-50 hover:bg-blue-50 cursor-pointer text-[14px] flex items-center gap-3 text-blue-800 font-bold">
                                                {g.profilePicUrl ? <img src={g.profilePicUrl} className="w-6 h-6 rounded-full object-cover shadow-sm"/> : <div className="w-6 h-6 rounded-full bg-blue-600 text-white flex items-center justify-center text-[10px] shadow-sm"><i className="fa-solid fa-people-group"></i></div>}

                                            </div>
                                        ))}
                                    </div>
                                )}

                                {/* CLEAN INPUT AREA */}
                                <div className="min-h-[62px] bg-[#f0f2f5] px-3 py-2 flex items-end gap-2 shrink-0 z-10 relative">
                                    <input type="file" ref={fileInputRef} className="hidden" onChange={handleFileUpload} accept="image/*,.pdf,.doc,.docx,.xls,.xlsx"/>
                                    <button className="p-2.5 text-[#54656f] hover:bg-gray-200 rounded-full transition-colors shrink-0 mb-0.5" onClick={() => fileInputRef.current.click()} disabled={isUploading}><i className="fa-solid fa-plus text-[20px]"></i></button>
                                    <div className="flex-1 bg-white rounded-xl px-4 py-2 flex items-center min-h-[42px] shadow-sm ml-2">
                                        <textarea ref={chatInputRef} rows={1} placeholder="Type a message... (Shift+Enter for new line)" className="bg-transparent w-full outline-none text-[15px] text-[#111b21] resize-none py-1" style={{ minHeight: '24px', maxHeight: '100px' }} value={inputText} onChange={(e) => { setInputText(e.target.value); handleTypingEvent(); e.target.style.height = 'auto'; e.target.style.height = (e.target.scrollHeight < 100 ? e.target.scrollHeight : 100) + 'px'; }} onKeyDown={handleKeyDown} />
                                    </div>
                                    <button onClick={handleSendMessage} className={`shrink-0 mb-0.5 w-[42px] h-[42px] rounded-full transition-colors flex justify-center items-center shadow-sm ${inputText.trim() ? 'bg-[#00a884] text-white hover:bg-[#008f6f]' : 'bg-gray-300 text-gray-100 cursor-not-allowed'}`} disabled={!inputText.trim()}><i className="fa-solid fa-paper-plane text-[18px] ml-[-2px] mt-[2px]"></i></button>
                                </div>
                            </div>
                            
                            {/* RIGHT SIDEBAR (Tasks Assigned By/To Me) */}
                            {showRightSidebar && (

                                        <div className="font-bold text-[15px] text-[#111b21]"><i className="fa-solid fa-list-check text-[#008069] mr-2"></i>Task Command Center</div>
                                        <button onClick={() => setShowRightSidebar(false)} className="text-[#54656f] hover:text-red-500 p-2"><i className="fa-solid fa-xmark text-lg"></i></button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto bg-white flex flex-col">
                                        <div className="px-4 pt-4 pb-2 text-[11px] font-semibold text-[#54656f] uppercase tracking-wider border-b border-gray-100 bg-white sticky top-0 z-10">Tasks Assigned To Me</div>

                                            {tasksAssignedToMe.length === 0 ? (
                                                <div className="text-[13px] text-[#54656f] text-center p-6 bg-gray-50 m-2 rounded border border-dashed">No pending tasks</div>
                                            ) : (
                                                tasksAssignedToMe.map(task => (
                                                    <div key={task.id} onClick={() => { setActiveGroup(groups.find(g=>g.id===task.groupId)||{id:'demo',name:'Demo', isDM: false}); setSelectedMessage(task); setActiveModal('task_trail'); }} className="flex items-center gap-3 p-3 cursor-pointer hover:bg-[#f5f6f6] border-b border-gray-50">

                                                            <div className="flex justify-between items-center text-[11px] mt-0.5"><span className="text-[#54656f] truncate">{groups.find(g=>g.id===task.groupId)?.name || 'Main'}</span><span className="text-red-500 font-semibold">{new Date(task.taskData.deadline).toLocaleDateString()}</span></div>
                                                        </div>
                                                    </div>
                                                ))
                                            )}
                                        </div>

                                        <div className="px-4 pt-4 pb-2 text-[11px] font-semibold text-[#54656f] uppercase tracking-wider border-b border-t border-gray-100 bg-white sticky top-0 z-10 mt-auto md:mt-0">Tasks Assigned By Me</div>
                                        <div className="flex-1 overflow-y-auto pb-4">
                                            {tasksAssignedByMe.length === 0 ? (
                                                <div className="text-[13px] text-[#54656f] text-center p-6 bg-gray-50 m-2 rounded border border-dashed">No pending tasks</div>
                                            ) : (
                                                tasksAssignedByMe.map(task => (
                                                    <div key={task.id} onClick={() => { setActiveGroup(groups.find(g=>g.id===task.groupId)||{id:'demo',name:'Demo', isDM: false}); setSelectedMessage(task); setActiveModal('task_trail'); }} className="flex items-center gap-3 p-3 cursor-pointer hover:bg-[#f5f6f6] border-b border-gray-50">
                                                        <div className="w-10 h-10 rounded-full bg-[#e5d5fb] flex items-center justify-center text-purple-600 shadow-sm"><i className="fa-solid fa-arrow-up-right-from-square"></i></div>
                                                        <div className="flex-1 overflow-hidden">
                                                            <div className="text-[14px] text-[#111b21] truncate">{task.text || 'File Task'}</div>
                                                            <div className="flex justify-between items-center text-[11px] mt-0.5"><span className="text-[#54656f] truncate">To: {(task.taskData.assignees||[]).map(a=>toSentenceCase(a.split('@')[0])).join(', ')}</span><span className="text-red-500 font-semibold">{new Date(task.taskData.deadline).toLocaleDateString()}</span></div>
                                                        </div>
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}

                        </div>
                    )}

                    {/* MODALS */}
                    {activeModal === 'context' && selectedMessage && (

                                </div>
                                <div className="space-y-3 pr-1">
                                    <button onClick={() => { setActiveModal(null); setReplyingTo(selectedMessage); setTimeout(()=>chatInputRef.current?.focus(), 100); }} className="w-full flex items-center gap-4 p-3 hover:bg-[#f5f6f6] rounded-xl transition-all border border-transparent hover:border-gray-200 text-left group">
                                        <div className="bg-teal-50 p-3 rounded-xl text-teal-600 group-hover:scale-110 transition-transform"><i className="fa-solid fa-reply text-xl"></i></div>
                                        <div><div className="font-bold text-[15px] text-[#111b21]">Reply to Message</div></div>
                                    </button>
                                    <button onClick={() => setActiveModal('reminder')} className="w-full flex items-center gap-4 p-3 hover:bg-[#f5f6f6] rounded-xl transition-all border border-transparent hover:border-gray-200 text-left group">

                                    </button>
                                    <button onClick={() => setActiveModal('task_convert')} className="w-full flex items-center gap-4 p-3 hover:bg-[#f5f6f6] rounded-xl transition-all border border-transparent hover:border-gray-200 text-left group">
                                        <div className="bg-blue-50 p-3 rounded-xl text-blue-600 group-hover:scale-110 transition-transform"><i className="fa-regular fa-square-check text-xl"></i></div>
                                        <div><div className="font-bold text-[15px] text-[#111b21]">Convert to Official Task</div></div>
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {activeModal === 'edit_profile' && (
                        <div className="absolute inset-0 bg-black/40 z-[60] flex items-center justify-center p-4 animate-in fade-in" onClick={() => setActiveModal(null)}>
                            <div className="bg-white w-full max-w-sm rounded-xl shadow-2xl animate-in zoom-in-95 overflow-hidden" onClick={e => e.stopPropagation()}>
                                <div className="bg-[#008069] text-white px-6 py-4 flex items-center gap-4"><i className="fa-solid fa-arrow-left cursor-pointer" onClick={() => setActiveModal(null)}></i><h3 className="font-semibold text-lg">Profile</h3></div>
                                <div className="p-6 space-y-6">
                                    <div className="flex flex-col items-center gap-3">
                                        <div className="w-32 h-32 rounded-full bg-[#dfe5e7] flex items-center justify-center overflow-hidden relative cursor-pointer group shadow-inner" onClick={() => profilePicInputRef.current?.click()}>
                                            {currentUserData?.profilePicUrl ? <img src={currentUserData.profilePicUrl} className="w-full h-full object-cover" /> : <i className="fa-solid fa-user text-5xl text-[#54656f]"></i>}
                                            <div className="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"><i className="fa-solid fa-camera text-white text-2xl"></i></div>
                                        </div>
                                        <input type="file" ref={profilePicInputRef} className="hidden" accept="image/*" />
                                    </div>
                                    <div><label className="text-[13px] text-[#008069] font-semibold mb-1 block">Name</label><input required type="text" value={profileForm.name} onChange={(e) => setProfileForm({...profileForm, name: e.target.value})} className="w-full p-2 border-b-2 border-[#008069] text-[15px] outline-none bg-transparent" /></div>
                                    <button onClick={handleProfileSubmit} disabled={profileUploadProgress > 0} className="w-full bg-[#008069] text-white py-3 rounded shadow hover:bg-[#006e5a]">{profileUploadProgress > 0 ? `Uploading ${Math.round(profileUploadProgress)}%` : 'Save'}</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {activeModal === 'admin_add_user' && (
                        <div className="absolute inset-0 bg-black/40 z-[70] flex items-center justify-center p-4"><div className="bg-white w-full max-w-sm rounded-xl p-8 shadow-2xl animate-in zoom-in-95"><div className="flex justify-between items-center mb-6"><h3 className="font-bold text-xl"><i className="fa-solid fa-user-plus text-[#008069] mr-2"></i> Register Staff</h3><i className="fa-solid fa-xmark cursor-pointer text-slate-400" onClick={() => setActiveModal(null)}></i></div><form onSubmit={handleAddUserSubmit} className="space-y-4"><input required type="text" placeholder="Full Name" value={adminForm.name} onChange={(e) => setAdminForm({...adminForm, name: e.target.value})} className="w-full p-3 border rounded-xl text-sm outline-none focus:border-[#008069]" /><input required type="email" placeholder="Email" value={adminForm.email} onChange={(e) => setAdminForm({...adminForm, email: e.target.value})} className="w-full p-3 border rounded-xl text-sm outline-none focus:border-[#008069]" /><input required minLength="6" type="password" placeholder="Password" value={adminForm.password} onChange={(e) => setAdminForm({...adminForm, password: e.target.value})} className="w-full p-3 border rounded-xl text-sm outline-none focus:border-[#008069]" /><div className="bg-slate-50 p-4 rounded-xl border border-slate-200 space-y-3"><label className="flex items-center gap-3 text-[13px] font-bold text-slate-800 cursor-pointer"><input type="checkbox" checked={adminForm.isAdmin} onChange={(e) => setAdminForm({...adminForm, isAdmin: e.target.checked})} className="w-4 h-4 accent-[#008069]"/> Grant Full Admin Rights</label><label className="flex items-center gap-3 text-[13px] font-bold text-slate-800 cursor-pointer"><input type="checkbox" checked={adminForm.canCreateGroups} onChange={(e) => setAdminForm({...adminForm, canCreateGroups: e.target.checked})} className="w-4 h-4 accent-[#008069]"/> Allow Department Creation</label></div><button type="submit" className="w-full bg-[#008069] text-white py-3 rounded-xl font-bold hover:bg-[#006e5a]">Create Account</button></form></div></div>
                    )}

                    {activeModal === 'admin_edit_user' && (
                        <div className="absolute inset-0 bg-black/40 z-[70] flex items-center justify-center p-4"><div className="bg-white w-full max-w-sm rounded-xl p-8 shadow-2xl animate-in zoom-in-95"><div className="flex justify-between items-center mb-6"><h3 className="font-bold text-xl"><i className="fa-solid fa-user-pen text-[#008069] mr-2"></i> Edit Staff Role</h3><i className="fa-solid fa-xmark cursor-pointer text-slate-400" onClick={() => setActiveModal(null)}></i></div><form onSubmit={handleEditUserSubmit} className="space-y-4"><input disabled type="email" value={adminForm.email} className="w-full p-3 border rounded-xl text-sm bg-gray-100 text-gray-500" /><input required type="text" value={adminForm.name} onChange={(e) => setAdminForm({...adminForm, name: e.target.value})} className="w-full p-3 border rounded-xl text-sm outline-none focus:border-[#008069]" /><div className="bg-slate-50 p-4 rounded-xl border border-slate-200 space-y-3"><label className="flex items-center gap-3 text-[13px] font-bold text-slate-800 cursor-pointer"><input type="checkbox" checked={adminForm.isAdmin} onChange={(e) => setAdminForm({...adminForm, isAdmin: e.target.checked})} className="w-4 h-4 accent-[#008069]"/> Grant Full Admin Rights</label><label className="flex items-center gap-3 text-[13px] font-bold text-slate-800 cursor-pointer"><input type="checkbox" checked={adminForm.canCreateGroups} onChange={(e) => setAdminForm({...adminForm, canCreateGroups: e.target.checked})} className="w-4 h-4 accent-[#008069]"/> Allow Department Creation</label></div><button type="submit" className="w-full bg-[#008069] text-white py-3 rounded-xl font-bold hover:bg-[#006e5a]">Save Changes</button></form></div></div>
                    )}

                    {activeModal === 'group_form_modal' && (
                        <div className="absolute inset-0 bg-black/40 z-[60] flex items-center justify-center p-4" onClick={() => setActiveModal(null)}>
                            <div className="bg-white w-full max-w-sm rounded-xl p-6 shadow-2xl animate-in zoom-in-95" onClick={e => e.stopPropagation()}>
                                <div className="text-[18px] font-semibold text-[#111b21] mb-4">{editingGroup ? 'Edit Department' : 'New Department'}</div>
                                <div className="flex flex-col items-center gap-2 mb-4">
                                    <div className="w-16 h-16 rounded-full bg-[#dfe5e7] flex items-center justify-center overflow-hidden relative cursor-pointer group shadow-sm" onClick={() => groupPicInputRef.current?.click()}>
                                        {groupForm.profilePicUrl ? <img src={groupForm.profilePicUrl} className="w-full h-full object-cover" /> : <i className="fa-solid fa-people-group text-2xl text-[#54656f]"></i>}
                                        <div className="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"><i className="fa-solid fa-camera text-white text-xs"></i></div>
                                    </div>
                                    <input type="file" ref={groupPicInputRef} className="hidden" accept="image/*" onChange={handleGroupPicUpload} />
                                    {groupPicUploadProgress > 0 && <div className="text-[10px] text-[#008069] font-bold animate-pulse">Uploading {Math.round(groupPicUploadProgress)}%</div>}
                                </div>
                                <form onSubmit={handleGroupSubmit} className="space-y-4">
                                    <input required type="text" value={groupForm.name} onChange={(e) => setGroupForm({...groupForm, name: e.target.value})} className="w-full p-2 border-b-2 border-[#008069] text-[15px] outline-none" placeholder="Group Name" />
                                    <div className="text-[13px] text-[#54656f] mt-4 mb-2">Members</div>
                                    <div className="h-40 overflow-y-auto space-y-2">{dbUsers.map(u => (<label key={u.uid} className="flex items-center gap-3 cursor-pointer"><input type="checkbox" checked={groupForm.members.includes(u.email)} onChange={(e) => { const newMembers = e.target.checked ? [...groupForm.members, u.email] : groupForm.members.filter(m => m !== u.email); setGroupForm({...groupForm, members: newMembers}); }} className="w-4 h-4 accent-[#008069]"/><span className="text-[15px] text-[#111b21]">{toSentenceCase(u.name)}</span></label>))}</div>
                                    <div className="flex justify-end gap-3 mt-4"><button type="button" onClick={()=>setActiveModal(null)} className="text-[#008069] font-semibold">Cancel</button><button type="submit" disabled={groupPicUploadProgress > 0} className="text-white bg-[#008069] px-4 py-2 rounded shadow disabled:opacity-50">{editingGroup ? 'Save' : 'Create'}</button></div>
                                </form>
                            </div>
                        </div>
                    )}

                    {activeModal === 'group_settings' && (
                        <div className="absolute inset-0 bg-black/40 z-[60] flex items-center justify-center p-4" onClick={() => setActiveModal(null)}>
                            <div className="bg-white w-full max-w-sm rounded-xl p-6 shadow-2xl animate-in zoom-in-95" onClick={e => e.stopPropagation()}>
                                <div className="flex items-center gap-3 mb-4 border-b border-gray-100 pb-4">
                                    {activeGroup.profilePicUrl ? <img src={activeGroup.profilePicUrl} className="w-12 h-12 rounded-full object-cover shadow-sm"/> : <div className="w-12 h-12 rounded-full bg-[#dfe5e7] flex items-center justify-center text-[#54656f]"><i className="fa-solid fa-people-group"></i></div>}
                                    <div className="text-[18px] font-semibold text-[#111b21]">{toSentenceCase(activeGroup.name)}</div>
                                </div>
                                <div className="text-[13px] text-[#54656f] mb-4">Group Info</div>
                                <div className="space-y-4">
                                    <div className="h-48 overflow-y-auto space-y-3">{dbUsers.map(u => { const isAdmin = activeGroup.admins?.includes(user.email) || currentUserData?.isAdmin; const isMember = activeGroup.members?.includes(u.email); return (<label key={u.uid} className="flex items-center gap-3"><input type="checkbox" disabled={!isAdmin || activeGroup.admins?.includes(u.email)} checked={groupForm.members.includes(u.email) || isMember} onChange={(e) => { if(!isAdmin) return; const newMembers = e.target.checked ? [...groupForm.members, u.email] : groupForm.members.filter(m => m !== u.email); setGroupForm({...groupForm, members: newMembers}); }} className="w-4 h-4 accent-[#008069] disabled:opacity-50"/><span className="text-[15px] text-[#111b21] flex-1">{toSentenceCase(u.name)}</span>{activeGroup.admins?.includes(u.email) && <span className="text-[11px] text-[#008069] border border-[#008069] px-1 rounded">Admin</span>}</label>) })}</div>
                                    {(activeGroup.admins?.includes(user.email) || currentUserData?.isAdmin) && (<button onClick={handleUpdateGroupMembers} className="w-full bg-[#008069] text-white py-2.5 rounded shadow hover:bg-[#006e5a]">Save Members</button>)}
                                </div>
                            </div>
                        </div>
                    )}

                    {activeModal === 'task_trail' && selectedMessage?.taskData && (
                        <div className="absolute inset-0 bg-black/40 z-[60] flex items-center justify-center md:p-4 animate-in fade-in" onClick={() => setActiveModal(null)}>
                            <div className="bg-[#efeae2] w-full h-full md:h-auto md:max-h-[90vh] md:max-w-2xl md:rounded-xl flex flex-col shadow-2xl overflow-hidden animate-in zoom-in-95" onClick={e => e.stopPropagation()}>
                                <div className="bg-[#008069] text-white p-4 flex items-center gap-4"><i className="fa-solid fa-arrow-left cursor-pointer" onClick={() => setActiveModal(null)}></i><h2 className="font-semibold text-[17px]">Task Trail</h2></div>
                                <div className="flex-1 overflow-y-auto p-4 space-y-4">
                                    <div className="bg-[#d1e8ff] p-3 rounded-xl rounded-tl-sm shadow-sm">
                                        <p className="text-[15px] text-[#111b21] mb-2">{selectedMessage.text}</p>
                                        <div className="text-[12px] text-[#54656f] flex justify-between"><span>Assigned: {(selectedMessage.taskData.assignees||[]).map(a=>toSentenceCase(a.split('@')[0])).join(', ')}</span><span className="text-red-500 font-semibold">Due: {new Date(selectedMessage.taskData.deadline).toLocaleDateString()}</span></div>
                                    </div>
                                    {selectedMessage.taskData.trail.map((item, idx) => (
                                        <div key={idx} className="flex gap-3">
                                            <div className={`w-8 h-8 rounded-full flex items-center justify-center text-white shrink-0 shadow-sm ${item.action === 'Marked Completed' ? 'bg-[#00a884]' : 'bg-[#53bdeb]'}`}><i className={item.action === 'Marked Completed' ? "fa-solid fa-check" : "fa-solid fa-info"}></i></div>
                                            <div className="bg-white p-2.5 rounded-xl rounded-tl-sm shadow-sm flex-1">
                                                <div className="text-[11px] text-[#54656f] flex justify-between mb-1"><span className="font-bold text-[#008069] uppercase">{item.action}</span><span>{item.time.split(',')[0]}</span></div>
                                                <div className="text-[14px] text-[#111b21] font-semibold">{toSentenceCase((item.by||'').split('@')[0])} {item.to && item.to !== 'System' && <span className="text-gray-500 font-normal">→ {toSentenceCase((item.to||'').split('@')[0])}</span>}</div>
                                                {item.comment && <div className="mt-1 text-[13px] text-[#54656f] italic">"{item.comment}"</div>}
                                                {item.fileUrl && (<a href={item.fileUrl} target="_blank" className="mt-2 text-[13px] text-[#02b289] hover:underline flex items-center gap-1"><i className="fa-solid fa-download"></i> Attachment</a>)}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                {selectedMessage.taskData.status !== "Completed" && (selectedMessage.taskData.assignees?.includes(user.email) || currentUserData?.isAdmin) && (
                                    <div className="bg-[#f0f2f5] p-3 flex flex-col gap-2 shrink-0 border-t border-gray-200">
                                        <div className="text-[11px] text-gray-500 font-bold uppercase mb-1">Reassign Task (Optional)</div>
                                        <div className="h-24 overflow-y-auto space-y-1 bg-white border border-gray-200 p-2 rounded mb-1">
                                            {(activeGroup.id === 'main' ? dbUsers : dbUsers.filter(u=>activeGroup.members?.includes(u.email))).map(u => (
                                                <label key={u.uid} className="flex items-center gap-3 cursor-pointer">
                                                    <input type="checkbox" checked={delegateAssignees.includes(u.email)} onChange={(e) => {
                                                        if (e.target.checked) setDelegateAssignees([...delegateAssignees, u.email]);
                                                        else setDelegateAssignees(delegateAssignees.filter(m => m !== u.email));
                                                    }} className="w-4 h-4 accent-[#008069]" />
                                                    <span className="text-[13px] text-[#111b21]">{toSentenceCase(u.name)}</span>
                                                </label>
                                            ))}
                                        </div>
                                        <div className="flex gap-2 mb-2">
                                            <button onClick={handleDelegateTask} disabled={delegateAssignees.length === 0} className="flex-1 bg-[#008069] text-white px-4 py-2 rounded-lg text-[14px] disabled:opacity-50 font-bold shadow-sm hover:bg-[#006e5a] transition-colors">Transfer Task</button>
                                            <button onClick={handleCompleteTask} className="flex-1 bg-[#00a884] text-white px-4 py-2 rounded-lg text-[14px] font-bold shadow-sm hover:bg-[#008f6f] transition-colors"><i className="fa-solid fa-check"></i> Mark Complete</button>
                                        </div>
                                        <div className="text-[11px] text-gray-500 font-bold uppercase mt-1 mb-1">Add Comment / File</div>
                                        <div className="flex items-center bg-white rounded-full px-3 py-1 mb-2 border border-gray-200 shadow-sm">
                                            <input type="text" value={trailComment} onChange={(e) => setTrailComment(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleAddComment()} placeholder="Add update... (Press Enter to send)" className="flex-1 outline-none text-[15px] py-1.5" />
                                            <input type="file" ref={trailFileInputRef} className="hidden" onChange={handleTrailFileUpload} />
                                            <button onClick={() => trailFileInputRef.current.click()} className="text-[#54656f] p-2 hover:bg-gray-100 rounded-full"><i className="fa-solid fa-paperclip"></i></button>
                                            <button onClick={handleAddComment} className={`p-2 rounded-full transition-colors ${trailComment.trim() ? 'text-[#008069] hover:bg-gray-100' : 'text-gray-300'}`} disabled={!trailComment.trim()}><i className="fa-solid fa-paper-plane"></i></button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {activeModal === 'reminder' && (
                        <div className="absolute inset-0 bg-black/40 z-[70] flex items-center justify-center p-4" onClick={() => setActiveModal(null)}><div className="bg-white w-full max-w-sm rounded-xl p-6 shadow-2xl animate-in zoom-in-95" onClick={e => e.stopPropagation()}><div className="text-[18px] font-semibold text-[#111b21] mb-4">Set Reminder</div><div className="space-y-4"><input type="datetime-local" value={reminderDateTime} onChange={(e) => setReminderDateTime(e.target.value)} className="w-full p-2 border-b-2 border-[#008069] outline-none text-[15px]" /><div className="flex justify-end gap-3 mt-4"><button onClick={()=>setActiveModal(null)} className="text-[#008069] font-semibold">Cancel</button><button onClick={setReminder} className="bg-[#008069] text-white px-4 py-2 rounded shadow">Save</button></div></div></div></div>
                    )}

                    {activeModal === 'task_convert' && (
                        <div className="absolute inset-0 bg-black/40 z-[70] flex items-center justify-center p-4" onClick={() => setActiveModal(null)}>
                            <div className="bg-white w-full max-w-sm rounded-xl p-6 shadow-2xl animate-in zoom-in-95" onClick={e => e.stopPropagation()}>
                                <div className="text-[18px] font-semibold text-[#111b21] mb-4">Convert to Task</div>
                                <div className="space-y-4">
                                    <div className="text-[13px] text-[#54656f] mt-4 mb-2 font-semibold">Select Multiple Assignees</div>
                                    <div className="h-32 overflow-y-auto space-y-2 border border-gray-200 p-2 rounded bg-slate-50">
                                        {(activeGroup.id === 'main' ? dbUsers : dbUsers.filter(u=>activeGroup.members?.includes(u.email))).map(u => (
                                            <label key={u.uid} className="flex items-center gap-3 cursor-pointer hover:bg-gray-200 p-1 rounded">
                                                <input type="checkbox" checked={taskAssignees.includes(u.email)} onChange={(e) => {
                                                    if (e.target.checked) setTaskAssignees([...taskAssignees, u.email]);
                                                    else setTaskAssignees(taskAssignees.filter(email => email !== u.email));
                                                }} className="w-4 h-4 accent-[#008069]" />
                                                <span className="text-[14px] text-[#111b21]">{toSentenceCase(u.name)}</span>
                                            </label>
                                        ))}
                                    </div>
                                    <div className="text-[13px] text-[#54656f] mt-4 mb-2 font-semibold">Set Deadline</div>
                                    <input type="datetime-local" value={taskDeadline} onChange={(e) => setTaskDeadline(e.target.value)} className="w-full p-2 border-b-2 border-[#008069] outline-none text-[15px]" />
                                    <div className="flex justify-end gap-3 mt-4"><button onClick={()=>setActiveModal(null)} className="text-[#008069] font-semibold">Cancel</button><button onClick={convertToTask} className="bg-[#008069] text-white px-4 py-2 rounded shadow">Assign</button></div>
                                </div>
                            </div>
                        </div>
                    )}

                    {isUploading && (
                        <div className="absolute inset-0 bg-white/80 z-[80] flex items-center justify-center p-4"><div className="bg-white w-full max-w-xs rounded-xl p-6 shadow-2xl flex flex-col items-center text-center animate-in zoom-in-95"><div className="w-12 h-12 border-4 border-[#008069] border-t-transparent rounded-full animate-spin mb-4"></div><h3 className="font-semibold text-[16px] text-[#111b21]">Sending File... {Math.round(uploadProgress)}%</h3></div></div>
                    )}

                </div>
            );
        }

        function App() {
            const [user, setUser] = useState(null);
            const [isFirebaseLoaded, setIsFirebaseLoaded] = useState(false);
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [showPassword, setShowPassword] = useState(false);
            const [authError, setAuthError] = useState("");

            useEffect(() => {
                const setupAuth = () => { window.onAuthStateChanged(window.auth, setUser); setIsFirebaseLoaded(true); };
                if (window.auth) setupAuth(); else window.addEventListener('firebaseReady', setupAuth);
                return () => window.removeEventListener('firebaseReady', setupAuth);
            }, []);

            const handleLogin = (e) => { e.preventDefault(); setAuthError(""); window.signInWithEmailAndPassword(window.auth, email, password).catch(err => setAuthError("Login Failed")); };
            const handleRegister = async (e) => {
                e.preventDefault(); setAuthError("");
                try {
                    const cred = await window.createUserWithEmailAndPassword(window.auth, email, password);
                    const isVp = cred.user.email.toLowerCase() === 'viceprincipal@mpgs.edu.in';
                    await window.setDoc(window.doc(window.db, "users", cred.user.uid), { uid: cred.user.uid, email: cred.user.email, name: toSentenceCase(cred.user.email.split('@')[0]), isApproved: isVp, isAdmin: isVp, canCreateGroups: isVp });
                } catch (err) { setAuthError("Registration Failed"); }
            };

            if (!isFirebaseLoaded) return <div className="flex justify-center items-center h-screen bg-[#f0f2f5] font-semibold text-[#54656f]">Connecting...</div>;

            if (!user) {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen bg-[#f0f2f5] p-4 relative">
                        <div className="absolute top-0 left-0 w-full h-48 bg-[#00a884] z-0"></div>
                        <div className="w-full max-w-sm bg-white rounded-xl shadow-lg p-8 z-10">
                            <div className="flex justify-center mb-6">
                                <div className="w-20 h-20 bg-[#00a884] rounded-full flex items-center justify-center text-white text-3xl shadow-md">
                                    <i className="fa-regular fa-comments"></i>
                                    <i className="fa-solid fa-list-check ml-1 text-2xl"></i>
                                </div>
                            </div>
                            <h1 className="text-xl font-bold text-center text-[#111b21] mb-2 tracking-wide">Talk & Task</h1>
                            <p className="text-xs text-[#54656f] text-center mb-6 font-semibold uppercase tracking-wider">Enterprise Portal</p>
                            
                            {authError && <div className="bg-red-50 text-red-600 p-3 rounded mb-4 text-[13px]">{authError}</div>}
                            <form className="space-y-4">
                                <input type="email" placeholder="Email Address" value={email} onChange={(e) => setEmail(e.target.value)} className="w-full p-3 border-b-2 border-gray-300 focus:border-[#00a884] outline-none transition-colors text-[15px]" />
                                <div className="relative">
                                    <input type={showPassword ? "text" : "password"} placeholder="Password" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full p-3 border-b-2 border-gray-300 focus:border-[#00a884] outline-none transition-colors text-[15px] pr-10" />
                                    <i className={`fa-solid ${showPassword ? 'fa-eye-slash' : 'fa-eye'} absolute right-3 top-4 text-gray-400 hover:text-[#00a884] cursor-pointer`} onClick={() => setShowPassword(!showPassword)}></i>
                                </div>
                                <div className="pt-4"><button onClick={handleLogin} className="w-full bg-[#00a884] text-white py-3 rounded shadow hover:bg-[#008f6f] font-semibold transition-colors mb-3">Log In</button><button onClick={handleRegister} className="w-full bg-white border border-[#00a884] text-[#00a884] py-3 rounded hover:bg-[#f0f2f5] font-semibold transition-colors">Create Account</button></div>
                            </form>
                        </div>
                    </div>
                );
            }
            return <ChatApp user={user} onLogout={() => window.signOut(window.auth)} />;
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
