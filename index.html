<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corporate Chat App Prototype</title>
    
    <!-- Load Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Load React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Load Babel to compile JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Initialize Firebase (Phase 1) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        // Phase 2, 3, 5 & 6: Import Firestore modules including deleteDoc
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, updateDoc, setDoc, getDocs, where, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        // Phase 4: Import Firebase Storage modules
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAoOsog2NP6Pf8YNSxn0rRYK4MSLEVNNZc",
            authDomain: "niltask.firebaseapp.com",
            projectId: "niltask",
            storageBucket: "niltask.firebasestorage.app",
            messagingSenderId: "868641827920",
            appId: "1:868641827920:web:70d9db79a361a76468f555"
        };

        const app = initializeApp(firebaseConfig);
        window.auth = getAuth(app);
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
        window.signOut = signOut;
        window.onAuthStateChanged = onAuthStateChanged;
        
        // Phase 6.1: Secondary Auth for Admin to create users without logging out
        window.secondaryApp = initializeApp(firebaseConfig, "Secondary");
        window.secondaryAuth = getAuth(window.secondaryApp);

        // Phase 2: Initialize Firestore and attach to window
        window.db = getFirestore(app);
        window.collection = collection;
        window.addDoc = addDoc;
        window.onSnapshot = onSnapshot;
        window.query = query;
        window.orderBy = orderBy;
        window.serverTimestamp = serverTimestamp;
        // Phase 3: Bind update methods
        window.doc = doc;
        window.updateDoc = updateDoc;
        window.setDoc = setDoc;
        // Phase 5 & 6: Bind new query methods
        window.getDocs = getDocs;
        window.where = where;
        window.deleteDoc = deleteDoc;
        
        // Phase 4: Initialize Storage and bind methods
        window.storage = getStorage(app);
        window.ref = ref;
        window.uploadBytesResumable = uploadBytesResumable;
        window.getDownloadURL = getDownloadURL;

        // Let React know Firebase is fully connected
        window.dispatchEvent(new Event('firebaseReady'));
    </script>
</head>
<body>
    <div id="root"></div>

    <!-- React Code -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // Renamed previous App to ChatApp, and passed user data into it
        function ChatApp({ user, onLogout }) {
            // State for UI interactions
            const [activeModal, setActiveModal] = useState(null);
            const [selectedMessage, setSelectedMessage] = useState(null);
            const [inputText, setInputText] = useState("");
            const [messages, setMessages] = useState([]); // Start empty, fetch from Firebase
            const messagesEndRef = React.useRef(null); // Used to auto-scroll to bottom

            // Phase 3 & 3.2: State for Task Assignments and Dynamic Users
            const [taskAssignee, setTaskAssignee] = useState("");
            const [taskDeadline, setTaskDeadline] = useState("");
            const [delegateAssignee, setDelegateAssignee] = useState("");
            const [trailComment, setTrailComment] = useState(""); 
            const [dbUsers, setDbUsers] = useState([]); // State for dynamic user list
            
            // Phase 4.1: Search and Notification State
            const [searchQuery, setSearchQuery] = useState("");
            const [showNotifications, setShowNotifications] = useState(false);

            // Phase 6 & 6.1: Admin View State and User Data
            const [viewMode, setViewMode] = useState("chat"); // 'chat' or 'admin'
            const [currentUserData, setCurrentUserData] = useState(null);
            const [adminForm, setAdminForm] = useState({ uid: '', name: '', email: '', password: '', isAdmin: false });

            // Phase 4: State for File Uploading
            const [uploadProgress, setUploadProgress] = useState(0);
            const [isUploading, setIsUploading] = useState(false);
            const fileInputRef = React.useRef(null);

            // Phase 5: Reminder State
            const [reminderDateTime, setReminderDateTime] = useState("");
            const [activeReminders, setActiveReminders] = useState([]);

            // Phase 5: Request Browser Notification Permission on mount
            useEffect(() => {
                if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") {
                    Notification.requestPermission();
                }
            }, []);

            // Phase 5: Fetch Active Reminders for the logged-in user
            useEffect(() => {
                const q = window.query(
                    window.collection(window.db, "reminders"),
                    window.where("userId", "==", user.uid),
                    window.where("isTriggered", "==", false)
                );
                const unsubscribe = window.onSnapshot(q, (snapshot) => {
                    setActiveReminders(snapshot.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                return () => unsubscribe();
            }, [user.uid]);

            // Phase 5: Local Polling Engine (Checks every 15 seconds)
            useEffect(() => {
                const interval = setInterval(() => {
                    const now = new Date();
                    activeReminders.forEach(async (rem) => {
                        const remindTime = new Date(rem.remindAt);
                        if (remindTime <= now) {
                            // 1. Trigger OS Notification
                            if ("Notification" in window && Notification.permission === "granted") {
                                new Notification("Corporate Chat Reminder", {
                                    body: `⏰ "${rem.messageText}"`,
                                    icon: "https://cdn-icons-png.flaticon.com/512/825/825590.png"
                                });
                            } else {
                                alert(`⏰ Reminder: "${rem.messageText}"`);
                            }
                            
                            // 2. Mark as triggered in database
                            try {
                                await window.updateDoc(window.doc(window.db, "reminders", rem.id), { 
                                    isTriggered: true 
                                });
                            } catch (error) {
                                console.error("Error updating reminder status:", error);
                            }
                        }
                    });
                }, 15000); 
                return () => clearInterval(interval);
            }, [activeReminders]);

            // Phase 3.2 & 6.1: Auto-sync current user and fetch DB users
            useEffect(() => {
                // 1. Ensure current logged-in user is in the public directory
                const syncUserToDB = async () => {
                    try {
                        const userRef = window.doc(window.db, "users", user.uid);
                        await window.setDoc(userRef, {
                            uid: user.uid,
                            email: user.email,
                            name: user.email.split('@')[0].toUpperCase(), 
                            // Only set default approval if field doesn't exist
                        }, { merge: true });
                    } catch (error) {
                        console.error("Error syncing user profile:", error);
                    }
                };
                syncUserToDB();

                // 2. Fetch current user data for Approval/Admin checks
                const unsubCurrent = window.onSnapshot(window.doc(window.db, "users", user.uid), (doc) => {
                    if (doc.exists()) setCurrentUserData(doc.data());
                });

                // 3. Fetch all registered users for the dropdowns
                const usersQuery = window.query(window.collection(window.db, "users"), window.orderBy("email", "asc"));
                const unsubscribeUsers = window.onSnapshot(usersQuery, (snapshot) => {
                    const loadedUsers = snapshot.docs.map(doc => doc.data());
                    setDbUsers(loadedUsers);
                });

                return () => { unsubCurrent(); unsubscribeUsers(); };
            }, [user]);

            // Phase 2: Fetch messages from Firestore in real-time
            useEffect(() => {
                // Create a query against the "messages" collection, ordered by time
                const q = window.query(window.collection(window.db, "messages"), window.orderBy("timestamp", "asc"));
                
                // onSnapshot listens for real-time updates
                const unsubscribe = window.onSnapshot(q, (snapshot) => {
                    const loadedMessages = snapshot.docs.map(doc => {
                        const data = doc.data();
                        return {
                            id: doc.id,
                            text: data.text,
                            sender: data.senderEmail,
                            isMine: data.senderUid === user.uid, 
                            time: data.timestamp ? new Date(data.timestamp.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'Sending...',
                            isTask: data.isTask === true, 
                            hasReminder: data.hasReminder === true,
                            taskData: data.taskData || null,
                            isPrivateMention: data.isPrivateMention || false,
                            allowedUsers: data.allowedUsers || [],
                            // Phase 4: File Data
                            fileUrl: data.fileUrl || null,
                            fileName: data.fileName || null,
                            fileType: data.fileType || null
                        };
                    });
                    setMessages(loadedMessages);
                    // Auto-scroll to bottom when new messages arrive
                    setTimeout(() => messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }), 100);
                });

                // Cleanup listener when component unmounts
                return () => unsubscribe();
            }, [user.uid]);

            // Phase 2: Send message to Firestore
            const handleSendMessage = async () => {
                if (!inputText.trim()) return;
                
                const messageText = inputText;
                setInputText(""); // Clear input immediately for better UX
                
                // Phase 3.4: Parse @mentions to create a Private Message
                const mentions = [];
                dbUsers.forEach(u => {
                    if (messageText.includes(`@${u.name}`)) {
                        mentions.push(u.email);
                    }
                });
                const isPrivate = mentions.length > 0;
                const allowedUsers = isPrivate ? [user.email, ...mentions] : [];

                try {
                    await window.addDoc(window.collection(window.db, "messages"), {
                        text: messageText,
                        senderUid: user.uid,
                        senderEmail: user.email,
                        timestamp: window.serverTimestamp(),
                        isTask: false,
                        hasReminder: false,
                        isPrivateMention: isPrivate,
                        allowedUsers: allowedUsers,
                        // Initialize file fields as null for text messages
                        fileUrl: null,
                        fileName: null,
                        fileType: null
                    });
                } catch (error) {
                    console.error("Error sending message: ", error);
                    alert("Failed to send message.");
                }
            };

            // Phase 4: Handle File Selection and Upload
            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setIsUploading(true);
                setUploadProgress(0);

                // Create a unique file name to prevent overwriting
                const uniqueFileName = `${Date.now()}_${file.name}`;
                const storageRef = window.ref(window.storage, `chat_uploads/${uniqueFileName}`);

                const uploadTask = window.uploadBytesResumable(storageRef, file);

                uploadTask.on('state_changed', 
                    (snapshot) => {
                        // Observe state change events such as progress, pause, and resume
                        const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                        setUploadProgress(progress);
                    }, 
                    (error) => {
                        // Handle unsuccessful uploads
                        console.error("Upload failed:", error);
                        setIsUploading(false);
                        alert("File upload failed. Please try again.");
                    }, 
                    async () => {
                        // Handle successful uploads on complete
                        try {
                            const downloadURL = await window.getDownloadURL(uploadTask.snapshot.ref);
                            
                            // Send a message containing the file URL
                            await window.addDoc(window.collection(window.db, "messages"), {
                                text: `Shared a file: ${file.name}`, // Fallback text
                                senderUid: user.uid,
                                senderEmail: user.email,
                                timestamp: window.serverTimestamp(),
                                isTask: false,
                                hasReminder: false,
                                isPrivateMention: false, // Defaulting file shares to public group for now
                                allowedUsers: [],
                                fileUrl: downloadURL,
                                fileName: file.name,
                                fileType: file.type
                            });
                        } catch (err) {
                            console.error("Error saving file message:", err);
                        } finally {
                            setIsUploading(false);
                            setUploadProgress(0);
                            // Reset input so the same file can be selected again if needed
                            if(fileInputRef.current) fileInputRef.current.value = ""; 
                        }
                    }
                );
            };


            // Phase 3.3 & 3.4: Master Visibility Gatekeeper
            const checkVisibility = (msg) => {
                if (msg.isTask) {
                    // Only creator, current assignee, and people in the delegation trail can see it
                    if (msg.sender === user.email) return true;
                    if (msg.taskData?.currentAssignee === user.email) return true;
                    if (msg.taskData?.trail?.some(t => t.by === user.email || t.to === user.email)) return true;
                    return false; // Hide from everyone else in the group!
                }
                if (msg.isPrivateMention) {
                    // Only sender and the specifically mentioned users can see it
                    return msg.allowedUsers.includes(user.email);
                }
                return true; // Normal public message
            };

            // Phase 4.1: Search Filter Logic
            const handleSearchFilter = (msg) => {
                if (!searchQuery.trim()) return true;
                const q = searchQuery.toLowerCase();
                const textMatch = msg.text?.toLowerCase().includes(q);
                const senderMatch = msg.sender?.toLowerCase().includes(q);
                const taskAssigneeMatch = msg.isTask && msg.taskData?.currentAssignee?.toLowerCase().includes(q);
                return textMatch || senderMatch || taskAssigneeMatch;
            };

            // Phase 4.1: Calculate Active Notifications (Actionable Tasks)
            const activeActionableTasks = messages.filter(m => 
                m.isTask && 
                m.taskData?.currentAssignee === user.email && 
                m.taskData?.status !== "Completed"
            );
            const notificationCount = activeActionableTasks.length;

            const handleMessageClick = (msg) => {
                if (msg.isTask) {
                    setSelectedMessage(msg);
                    setActiveModal('task_trail');
                } else {
                    setSelectedMessage(msg);
                    setActiveModal('context');
                }
            };

            // Phase 5: Save Reminder to Firestore
            const setReminder = async () => {
                if (!selectedMessage || !reminderDateTime) {
                    alert("Please select a valid date and time.");
                    return;
                }

                try {
                    // 1. Create the reminder document
                    await window.addDoc(window.collection(window.db, "reminders"), {
                        userId: user.uid,
                        messageId: selectedMessage.id,
                        messageText: selectedMessage.text || selectedMessage.fileName || "File Attachment",
                        remindAt: reminderDateTime,
                        isTriggered: false
                    });

                    // 2. Update the original message visually to show the clock icon
                    const messageRef = window.doc(window.db, "messages", selectedMessage.id);
                    await window.updateDoc(messageRef, {
                        hasReminder: true
                    });

                    setActiveModal(null);
                    setReminderDateTime("");
                } catch (error) {
                    console.error("Error setting reminder: ", error);
                    alert("Failed to save reminder.");
                }
            };

            // Phase 3: Convert Message to Task in Firestore
            const convertToTask = async () => {
                if (!selectedMessage || !taskDeadline || !taskAssignee) {
                    alert("Please select an Assignee and a Deadline.");
                    return;
                }
                
                try {
                    const messageRef = window.doc(window.db, "messages", selectedMessage.id);
                    const now = new Date();
                    const initialTrail = [{
                        action: "Task Created",
                        by: user.email,
                        time: now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + ', ' + now.toLocaleDateString(),
                        to: taskAssignee
                    }];

                    // FIX: Using setDoc with merge: true forces all clients to see the new structure instantly
                    await window.setDoc(messageRef, {
                        isTask: true,
                        taskData: {
                            deadline: taskDeadline,
                            currentAssignee: taskAssignee,
                            status: "Pending",
                            trail: initialTrail
                        }
                    }, { merge: true });
                    
                    setActiveModal(null);
                } catch (error) {
                    console.error("Error converting to task: ", error);
                    alert("Failed to create task.");
                }
            };

            // Phase 3: Delegate Task to another user
            const handleDelegateTask = async () => {
                if (!selectedMessage || !delegateAssignee) return;

                try {
                    const messageRef = window.doc(window.db, "messages", selectedMessage.id);
                    const now = new Date();
                    
                    const newTrailItem = {
                        action: "Delegated",
                        by: user.email,
                        time: now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + ', ' + now.toLocaleDateString(),
                        to: delegateAssignee
                    };

                    const updatedTrail = [...selectedMessage.taskData.trail, newTrailItem];

                    await window.updateDoc(messageRef, {
                        "taskData.currentAssignee": delegateAssignee,
                        "taskData.status": "In Progress",
                        "taskData.trail": updatedTrail
                    });
                    
                    // Close modal after delegation
                    setActiveModal(null);
                } catch (error) {
                    console.error("Error delegating task: ", error);
                    alert("Failed to delegate task.");
                }
            };

            // Phase 3: Mark Task as Completed
            const handleCompleteTask = async () => {
                if (!selectedMessage) return;

                // Check if current user is the end-assignee
                if (user.email !== selectedMessage.taskData.currentAssignee) {
                    alert("Only the current Assignee can mark this task as completed.");
                    return;
                }

                try {
                    const messageRef = window.doc(window.db, "messages", selectedMessage.id);
                    const now = new Date();
                    
                    const newTrailItem = {
                        action: "Marked Completed",
                        by: user.email,
                        time: now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + ', ' + now.toLocaleDateString(),
                        to: "System"
                    };

                    const updatedTrail = [...selectedMessage.taskData.trail, newTrailItem];

                    await window.updateDoc(messageRef, {
                        "taskData.status": "Completed",
                        "taskData.trail": updatedTrail
                    });
                    
                    // Close modal after completion
                    setActiveModal(null);
                } catch (error) {
                    console.error("Error completing task: ", error);
                    alert("Failed to complete task.");
                }
            };

            // Phase 3.1: Add Comment to Trail
            const handleAddComment = async () => {
                if (!selectedMessage || !trailComment.trim()) return;

                try {
                    const messageRef = window.doc(window.db, "messages", selectedMessage.id);
                    const now = new Date();
                    
                    const newTrailItem = {
                        action: "Update Added",
                        by: user.email,
                        time: now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + ', ' + now.toLocaleDateString(),
                        comment: trailComment
                    };

                    const updatedTrail = [...selectedMessage.taskData.trail, newTrailItem];

                    await window.updateDoc(messageRef, {
                        "taskData.trail": updatedTrail
                    });
                    
                    setTrailComment(""); // Clear input box
                    
                    // Update local state immediately so user sees their comment without closing modal
                    setSelectedMessage(prev => ({
                        ...prev,
                        taskData: {
                            ...prev.taskData,
                            trail: updatedTrail
                        }
                    }));

                } catch (error) {
                    console.error("Error adding comment: ", error);
                    alert("Failed to post update.");
                }
            };

            // Phase 6.1: Admin - Remove User from Directory
            const handleRemoveUser = async (targetUid) => {
                if (window.confirm("Are you sure you want to completely delete this user?")) {
                    try {
                        await window.deleteDoc(window.doc(window.db, "users", targetUid));
                    } catch (error) {
                        console.error("Error removing user:", error);
                        alert("Failed to remove user.");
                    }
                }
            };

            // Phase 6.1: Admin - Toggle Approval
            const handleToggleApprove = async (u) => {
                try {
                    await window.updateDoc(window.doc(window.db, "users", u.uid), { isApproved: !u.isApproved });
                } catch(e) { alert("Error updating approval status."); }
            };

            // Phase 6.1: Admin - Add User Form Submit
            const handleAddUserSubmit = async (e) => {
                e.preventDefault();
                try {
                    const cred = await window.createUserWithEmailAndPassword(window.secondaryAuth, adminForm.email, adminForm.password);
                    await window.setDoc(window.doc(window.db, "users", cred.user.uid), {
                        uid: cred.user.uid,
                        email: cred.user.email,
                        name: adminForm.name || cred.user.email.split('@')[0].toUpperCase(),
                        isApproved: true, // Auto-approve users created by Admin
                        isAdmin: adminForm.isAdmin
                    });
                    window.signOut(window.secondaryAuth);
                    setActiveModal(null);
                    setAdminForm({ uid: '', name: '', email: '', password: '', isAdmin: false });
                } catch(err) { alert("Failed to add user: " + err.message); }
            };

            // Phase 6.1: Admin - Edit User Form Submit
            const handleEditUserSubmit = async (e) => {
                e.preventDefault();
                try {
                    await window.updateDoc(window.doc(window.db, "users", adminForm.uid), {
                        name: adminForm.name,
                        isAdmin: adminForm.isAdmin
                    });
                    setActiveModal(null);
                    setAdminForm({ uid: '', name: '', email: '', password: '', isAdmin: false });
                } catch(err) { alert("Failed to update user."); }
            };

            // Phase 6.1: Approval Gate Check
            if (currentUserData && currentUserData.isApproved !== true && currentUserData.isAdmin !== true) {
                return (
                    <div className="flex items-center justify-center min-h-screen bg-gray-200 p-4 font-sans text-gray-800">
                        <div className="w-full max-w-md bg-white rounded-3xl shadow-2xl p-8 border-t-8 border-orange-500 text-center animate-in fade-in slide-in-from-bottom-4">
                            <i className="fa-solid fa-user-clock text-5xl text-orange-500 mb-4 animate-pulse"></i>
                            <h1 className="text-2xl font-bold text-gray-800 mb-2">Pending Approval</h1>
                            <p className="text-sm text-gray-600 mb-6">Your account is registered but requires Admin verification before accessing corporate data.</p>
                            <button onClick={onLogout} className="bg-gray-100 border border-gray-200 text-gray-700 py-2 px-6 rounded-xl font-bold hover:bg-gray-200 shadow-sm">Sign Out for now</button>
                        </div>
                    </div>
                );
            }

            // Phase 6.1: Unified Render Structure (Dynamic Width Animation)
            return (
                <div className="flex items-center justify-center min-h-screen bg-gray-200 p-4 font-sans text-gray-800">
                    <div className={`w-full h-[800px] bg-gray-50 border-[8px] border-gray-900 rounded-[2.5rem] overflow-hidden flex flex-col shadow-2xl relative transition-all duration-500 ease-in-out ${viewMode === 'admin' ? 'max-w-5xl' : 'max-w-md'}`}>
                        
                        {viewMode === "admin" ? (
                            <div className="flex flex-col h-full w-full animate-in fade-in zoom-in-95 duration-300">
                                {/* Admin Header */}
                                <div className="bg-slate-900 text-white p-4 flex items-center justify-between shadow-md z-10">
                                    <div className="flex items-center gap-3">
                                        <i className="fa-solid fa-shield-halved text-2xl text-blue-400"></i>
                                        <div>
                                            <h1 className="font-bold text-lg leading-tight">Admin Control Center</h1>
                                            <p className="text-xs text-slate-400">System Oversight & Audit Logs</p>
                                        </div>
                                    </div>
                                    <button 
                                        onClick={() => setViewMode("chat")}
                                        className="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg text-sm font-bold transition-colors flex items-center gap-2"
                                    >
                                        <i className="fa-solid fa-arrow-left"></i> Back to Chat
                                    </button>
                                </div>

                                <div className="flex-1 overflow-y-auto p-6 space-y-8 bg-slate-100">
                                    {/* Section 1: User Directory Management */}
                                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                        <div className="bg-slate-50 p-4 border-b border-slate-200 flex justify-between items-center">
                                            <h2 className="font-bold text-slate-800 flex items-center gap-2"><i className="fa-solid fa-users text-blue-600"></i> Active Directory</h2>
                                            <div className="flex gap-3 items-center">
                                                <span className="text-xs font-bold bg-blue-100 text-blue-800 px-2 py-1 rounded-full">{dbUsers.length} Users</span>
                                                <button onClick={() => { setAdminForm({ uid: '', name: '', email: '', password: '', isAdmin: false }); setActiveModal('admin_add_user'); }} className="bg-blue-600 text-white text-xs font-bold px-3 py-1.5 rounded-lg hover:bg-blue-700"><i className="fa-solid fa-plus mr-1"></i> Add User</button>
                                            </div>
                                        </div>
                                        <div className="p-0">
                                            <table className="w-full text-left text-sm">
                                                <thead className="bg-slate-50 text-slate-500 text-xs uppercase">
                                                    <tr>
                                                        <th className="px-4 py-3">Status</th>
                                                        <th className="px-4 py-3">User Name</th>
                                                        <th className="px-4 py-3">Email Address</th>
                                                        <th className="px-4 py-3">Role</th>
                                                        <th className="px-4 py-3 text-right">Actions</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {dbUsers.map(u => (
                                                        <tr key={u.uid} className="hover:bg-slate-50">
                                                            <td className="px-4 py-3">
                                                                <button onClick={() => handleToggleApprove(u)} className={`px-3 py-1 rounded-full text-[10px] font-bold ${u.isApproved ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'} shadow-sm`}>
                                                                    {u.isApproved ? 'Approved' : 'Pending'}
                                                                </button>
                                                            </td>
                                                            <td className="px-4 py-3 font-semibold text-slate-800">{u.name}</td>
                                                            <td className="px-4 py-3 text-slate-600">{u.email}</td>
                                                            <td className="px-4 py-3">
                                                                {u.isAdmin ? <span className="text-[10px] bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded font-bold">ADMIN</span> : <span className="text-[10px] text-gray-500">STAFF</span>}
                                                            </td>
                                                            <td className="px-4 py-3 text-right flex justify-end gap-3 items-center h-full pt-4">
                                                                <button onClick={() => { setAdminForm(u); setActiveModal('admin_edit_user'); }} className="text-blue-500 hover:text-blue-700" title="Edit Profile"><i className="fa-solid fa-pen-to-square"></i></button>
                                                                <button onClick={() => handleRemoveUser(u.uid)} className="text-red-500 hover:text-red-700" disabled={u.email === user.email} title="Delete User"><i className="fa-solid fa-trash"></i></button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>

                                    {/* Section 2: Global Audit Trail */}
                                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                        <div className="bg-slate-50 p-4 border-b border-slate-200">
                                            <h2 className="font-bold text-slate-800 flex items-center gap-2"><i className="fa-solid fa-list-check text-purple-600"></i> Global Communication Audit</h2>
                                            <p className="text-xs text-slate-500 mt-1">Click on any TASK row to instantly view its full delegation trail.</p>
                                        </div>
                                        <div className="p-0 max-h-96 overflow-y-auto">
                                            <table className="w-full text-left text-sm">
                                                <thead className="bg-slate-50 text-slate-500 text-xs uppercase sticky top-0 shadow-sm z-10">
                                                    <tr>
                                                        <th className="px-4 py-3">Time</th>
                                                        <th className="px-4 py-3">Sender</th>
                                                        <th className="px-4 py-3">Type</th>
                                                        <th className="px-4 py-3">Content Snippet</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {[...messages].reverse().map(msg => (
                                                        <tr 
                                                            key={msg.id} 
                                                            className={`hover:bg-slate-50 transition-colors ${msg.isTask ? 'cursor-pointer hover:bg-blue-50' : ''}`}
                                                            onClick={() => { if(msg.isTask) { setSelectedMessage(msg); setActiveModal('task_trail'); } }}
                                                            title={msg.isTask ? "Click to view full task trail" : ""}
                                                        >
                                                            <td className="px-4 py-3 text-xs text-slate-500 whitespace-nowrap">{msg.time}</td>
                                                            <td className="px-4 py-3 font-medium text-slate-700">{msg.sender.split('@')[0]}</td>
                                                            <td className="px-4 py-3">
                                                                {msg.isTask ? (
                                                                    <span className="text-[10px] font-bold bg-blue-100 text-blue-700 px-2 py-1 rounded shadow-sm"><i className="fa-solid fa-link text-[8px] mr-1"></i>TASK</span>
                                                                ) : msg.isPrivateMention ? (
                                                                    <span className="text-[10px] font-bold bg-purple-100 text-purple-700 px-2 py-1 rounded">PRIVATE</span>
                                                                ) : msg.fileUrl ? (
                                                                    <span className="text-[10px] font-bold bg-orange-100 text-orange-700 px-2 py-1 rounded">MEDIA</span>
                                                                ) : (
                                                                    <span className="text-[10px] font-bold bg-gray-100 text-gray-700 px-2 py-1 rounded">PUBLIC</span>
                                                                )}
                                                            </td>
                                                            <td className="px-4 py-3 text-slate-600 italic truncate max-w-[300px]" title={msg.text || msg.fileName}>
                                                                {msg.text || msg.fileName}
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="flex flex-col h-full w-full animate-in fade-in zoom-in-95 duration-300">
                                {/* Chat Header */}
                                <div className="bg-blue-800 text-white p-4 flex items-center justify-between shadow-md z-10">
                                    <div className="flex items-center gap-3">
                                        {/* Phase 6: Admin Toggle Button */}
                                        {currentUserData?.isAdmin && (
                                            <i 
                                                className="fa-solid fa-shield-halved cursor-pointer text-xl hover:text-blue-200 transition-colors" 
                                                title="Open Admin Dashboard"
                                                onClick={() => setViewMode("admin")}
                                            ></i>
                                        )}
                                        <div className="flex -space-x-2">
                                            <div className="w-10 h-10 rounded-full bg-blue-500 border-2 border-blue-800 flex items-center justify-center font-bold text-sm">CS</div>
                                            <div className="w-10 h-10 rounded-full bg-indigo-500 border-2 border-blue-800 flex items-center justify-center font-bold text-sm">MR</div>
                                        </div>
                                        <div>
                                            <h1 className="font-bold text-lg leading-tight">Academic Council</h1>
                                            <p className="text-xs text-blue-200">{user.email}</p>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-4">
                                        {/* Phase 4.1: Notification Bell */}
                                        <div className="relative cursor-pointer" onClick={() => setShowNotifications(!showNotifications)}>
                                            <i className="fa-solid fa-bell text-xl hover:text-blue-200 transition-colors"></i>
                                            {notificationCount > 0 && (
                                                <div className="absolute -top-1 -right-1 bg-red-500 text-white text-[9px] font-bold w-4 h-4 rounded-full flex justify-center items-center shadow border border-blue-800 animate-pulse">
                                                    {notificationCount}
                                                </div>
                                            )}
                                        </div>
                                        {/* Logout Button */}
                                        <i className="fa-solid fa-right-from-bracket text-xl cursor-pointer hover:text-red-300 transition-colors" onClick={onLogout} title="Logout"></i>
                                    </div>
                                </div>

                                {/* Notifications Dropdown Modal */}
                                {showNotifications && (
                                    <div className="absolute top-16 right-4 w-64 bg-white rounded-xl shadow-2xl border border-gray-200 z-30 overflow-hidden animate-in fade-in slide-in-from-top-2">
                                        <div className="bg-gray-50 p-3 border-b border-gray-200 flex justify-between items-center">
                                            <span className="font-bold text-sm text-gray-800">Action Items</span>
                                            <i className="fa-solid fa-xmark cursor-pointer text-gray-400" onClick={() => setShowNotifications(false)}></i>
                                        </div>
                                        <div className="max-h-60 overflow-y-auto">
                                            {activeActionableTasks.length === 0 ? (
                                                <div className="p-4 text-center text-xs text-gray-500">You are all caught up!</div>
                                            ) : (
                                                activeActionableTasks.map(task => (
                                                    <div 
                                                        key={task.id} 
                                                        className="p-3 border-b hover:bg-blue-50 cursor-pointer"
                                                        onClick={() => {
                                                            setShowNotifications(false);
                                                            handleMessageClick(task);
                                                        }}
                                                    >
                                                        <div className="text-xs font-bold text-blue-600 mb-1 flex items-center gap-1">
                                                            <i className="fa-regular fa-square-check"></i> Pending Task
                                                        </div>
                                                        <div className="text-xs text-gray-700 line-clamp-1 italic">"{task.text}"</div>
                                                        <div className="text-[10px] text-red-500 mt-1 font-semibold">Due: {new Date(task.taskData.deadline).toLocaleDateString()}</div>
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    </div>
                                )}

                                {/* Phase 4.1: Universal Search Bar */}
                                <div className="bg-white border-b border-gray-200 p-2 shadow-sm z-10">
                                    <div className="flex items-center bg-gray-100 rounded-lg px-3 py-1.5">
                                        <i className="fa-solid fa-magnifying-glass text-gray-400 text-sm"></i>
                                        <input 
                                            type="text" 
                                            placeholder="Search messages, tasks, people..." 
                                            className="bg-transparent w-full outline-none text-xs ml-2 text-gray-700"
                                            value={searchQuery}
                                            onChange={(e) => setSearchQuery(e.target.value)}
                                        />
                                        {searchQuery && (
                                            <i className="fa-solid fa-circle-xmark text-gray-400 cursor-pointer text-sm hover:text-gray-600" onClick={() => setSearchQuery("")}></i>
                                        )}
                                    </div>
                                </div>

                                {/* Chat Area */}
                                <div className="flex-1 overflow-y-auto p-4 space-y-4 bg-[#e5ddd5] pb-24" style={{backgroundImage: 'radial-gradient(#d1c8bf 1px, transparent 1px)', backgroundSize: '20px 20px'}}>
                                    <div className="text-center text-xs text-gray-500 my-2">Today, May 1, 2026</div>

                                    {messages.length === 0 && <div className="text-center text-sm text-gray-500 mt-10">No messages yet. Start the conversation!</div>}

                                    {/* Phase 3.3, 3.4 & 4.1: Applied checkVisibility AND handleSearchFilter here */}
                                    {messages.filter(checkVisibility).filter(handleSearchFilter).map((msg) => (
                                        <div key={msg.id} className={`flex flex-col ${msg.isMine ? 'items-end' : 'items-start'}`}>
                                            {/* Only show sender email if it's not the logged in user */}
                                            {!msg.isMine && <div className="text-xs text-gray-500 mb-1 ml-1">{msg.sender}</div>}
                                            
                                            {!msg.isTask && (
                                                <div 
                                                    onClick={() => handleMessageClick(msg)}
                                                    className={`max-w-[80%] p-3 rounded-2xl shadow-sm cursor-pointer relative transition-transform active:scale-95 ${
                                                        msg.isMine 
                                                        ? (msg.isPrivateMention ? 'bg-purple-600 text-white rounded-tr-none' : 'bg-blue-600 text-white rounded-tr-none') 
                                                        : (msg.isPrivateMention ? 'bg-purple-50 text-gray-800 border border-purple-200 rounded-tl-none' : 'bg-white rounded-tl-none')
                                                    }`}
                                                >
                                                    {/* Phase 3.4: Private Mention Badge Indicator */}
                                                    {msg.isPrivateMention && (
                                                        <div className={`text-[10px] font-bold flex items-center gap-1 mb-1 pb-1 border-b ${msg.isMine ? 'border-purple-400 text-purple-200' : 'border-purple-200 text-purple-600'}`}>
                                                            <i className="fa-solid fa-lock"></i> Private Message
                                                        </div>
                                                    )}
                                                    
                                                    {/* Phase 4: Render Media if present, otherwise render text */}
                                                    {msg.fileUrl ? (
                                                        <div className="flex flex-col gap-2">
                                                            {msg.fileType && msg.fileType.startsWith('image/') ? (
                                                                <img src={msg.fileUrl} alt="Shared Image" className="rounded-lg max-w-full max-h-48 object-cover cursor-pointer" onClick={(e) => { e.stopPropagation(); window.open(msg.fileUrl, '_blank'); }}/>
                                                            ) : (
                                                                <div 
                                                                    className={`flex items-center gap-3 p-2 rounded-lg border ${msg.isMine ? (msg.isPrivateMention ? 'bg-purple-700 border-purple-500' : 'bg-blue-700 border-blue-500') : 'bg-gray-50 border-gray-200'}`}
                                                                    onClick={(e) => { e.stopPropagation(); window.open(msg.fileUrl, '_blank'); }}
                                                                >
                                                                    <div className={`w-10 h-10 rounded flex items-center justify-center text-xl ${msg.isMine ? 'bg-white/20 text-white' : 'bg-blue-100 text-blue-600'}`}>
                                                                        <i className="fa-regular fa-file-lines"></i>
                                                                    </div>
                                                                    <div className="flex-1 overflow-hidden">
                                                                        <p className="text-xs font-bold truncate" title={msg.fileName}>{msg.fileName}</p>
                                                                        <p className={`text-[10px] ${msg.isMine ? 'text-blue-200' : 'text-gray-500'}`}>Click to open</p>
                                                                    </div>
                                                                </div>
                                                            )}
                                                        </div>
                                                    ) : (
                                                        <p className="text-sm leading-relaxed">{msg.text}</p>
                                                    )}

                                                    <div className={`flex items-center justify-end gap-1 mt-1 text-[10px] ${msg.isMine ? (msg.isPrivateMention ? 'text-purple-200' : 'text-blue-200') : 'text-gray-400'}`}>
                                                        {msg.hasReminder && <i className="fa-regular fa-clock text-yellow-400"></i>}
                                                        <span>{msg.time}</span>
                                                    </div>
                                                </div>
                                            )}

                                            {msg.isTask && (
                                                <div 
                                                    onClick={() => handleMessageClick(msg)}
                                                    className={`max-w-[85%] w-full bg-white border-y border-r border-l-4 p-3 rounded-xl shadow-md cursor-pointer transition-transform active:scale-95 ${
                                                        msg.isMine ? 'rounded-tr-none border-l-blue-600 border-y-gray-200 border-r-gray-200' : 'rounded-tl-none border-l-gray-500 border-y-gray-200 border-r-gray-200'
                                                    }`}
                                                >
                                                    <div className="flex items-center justify-between mb-2">
                                                        <span className="flex items-center gap-1 text-xs font-bold text-blue-700 bg-blue-50 px-2 py-1 rounded">
                                                            <i className="fa-regular fa-square-check"></i> TASK
                                                        </span>
                                                        <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${
                                                            msg.taskData.status === 'Completed' ? 'bg-green-100 text-green-700' : 
                                                            msg.taskData.status === 'In Progress' ? 'bg-orange-100 text-orange-700' : 
                                                            'bg-gray-100 text-gray-700'
                                                        }`}>
                                                            {msg.taskData.status}
                                                        </span>
                                                    </div>
                                                    <p className="text-sm font-medium text-gray-800 mb-2">{msg.text}</p>
                                                    <div className="bg-gray-50 p-2 rounded border border-gray-100 mb-1">
                                                        <div className="flex items-center justify-between text-xs text-gray-600 mb-1">
                                                            <span className="flex items-center gap-1"><i className="fa-regular fa-user"></i> {msg.taskData.currentAssignee}</span>
                                                        </div>
                                                        <div className="flex items-center text-[11px] text-red-500 font-medium">
                                                            <i className="fa-regular fa-calendar mr-1"></i> Due: {new Date(msg.taskData.deadline).toLocaleDateString()}
                                                        </div>
                                                    </div>
                                                    <div className="text-center text-[10px] text-blue-600 mt-2 font-medium">Tap to view trail & updates</div>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                    {/* Invisible div to scroll to */}
                                    <div ref={messagesEndRef} />
                                </div>

                                {/* Phase 3.4: @Mention Auto-Complete Pop-up UI */}
                                {inputText.split(' ').pop().startsWith('@') && inputText.split(' ').pop().length > 0 && (
                                    <div className="absolute bottom-[70px] left-4 bg-white shadow-xl border border-gray-200 rounded-xl w-64 max-h-40 overflow-y-auto z-20">
                                        {dbUsers
                                            .filter(u => u.name.toLowerCase().includes(inputText.split(' ').pop().substring(1).toLowerCase()))
                                            .map(u => (
                                                <div 
                                                    key={u.uid} 
                                                    onClick={() => {
                                                        const words = inputText.split(' ');
                                                        words[words.length - 1] = `@${u.name} `;
                                                        setInputText(words.join(' '));
                                                    }}
                                                    className="p-3 border-b hover:bg-blue-50 cursor-pointer text-sm font-semibold flex items-center gap-2 text-gray-800"
                                                >
                                                    <div className="w-6 h-6 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-xs"><i className="fa-solid fa-at"></i></div>
                                                    {u.name}
                                                </div>
                                        ))}
                                        {dbUsers.filter(u => u.name.toLowerCase().includes(inputText.split(' ').pop().substring(1).toLowerCase())).length === 0 && (
                                            <div className="p-3 text-xs text-gray-500 italic">No matching users found...</div>
                                        )}
                                    </div>
                                )}

                                {/* Input Area */}
                                <div className="absolute bottom-0 w-full bg-white p-3 flex items-center gap-2 border-t border-gray-200">
                                    {/* Phase 4: Hidden File Input triggered by Paperclip */}
                                    <input 
                                        type="file" 
                                        ref={fileInputRef} 
                                        className="hidden" 
                                        onChange={handleFileUpload}
                                        accept="image/*,.pdf,.doc,.docx,.xls,.xlsx"
                                    />
                                    <button 
                                        className="p-2 text-gray-400 hover:text-blue-600 transition-colors"
                                        onClick={() => fileInputRef.current.click()}
                                        disabled={isUploading}
                                    >
                                        <i className="fa-solid fa-paperclip text-xl"></i>
                                    </button>
                                    
                                    <div className="flex-1 bg-gray-100 rounded-full px-4 py-2 flex items-center">
                                        <input 
                                            type="text" 
                                            placeholder="Type a message..." 
                                            className="bg-transparent w-full outline-none text-sm"
                                            value={inputText}
                                            onChange={(e) => setInputText(e.target.value)}
                                            onKeyPress={(e) => e.key === 'Enter' && handleSendMessage()}
                                        />
                                    </div>
                                    <button 
                                        onClick={handleSendMessage}
                                        className="p-3 bg-blue-600 text-white rounded-full hover:bg-blue-700 shadow-md transition-colors flex justify-center items-center h-10 w-10"
                                    >
                                        <i className="fa-solid fa-paper-plane"></i>
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* --- SHARED OVERLAYS & MODALS (Accessible from Chat AND Admin View) --- */}

                        {/* Phase 6.1: Add User Modal */}
                        {activeModal === 'admin_add_user' && (
                            <div className="absolute inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                                <div className="bg-white w-full max-w-sm rounded-2xl p-6 shadow-2xl">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="font-bold text-lg"><i className="fa-solid fa-user-plus text-blue-600 mr-2"></i> Add New User</h3>
                                        <i className="fa-solid fa-xmark cursor-pointer text-gray-400" onClick={() => setActiveModal(null)}></i>
                                    </div>
                                    <form onSubmit={handleAddUserSubmit} className="space-y-4">
                                        <div><label className="text-xs font-semibold text-gray-500">Full Name</label>
                                        <input required type="text" value={adminForm.name} onChange={(e) => setAdminForm({...adminForm, name: e.target.value})} className="w-full mt-1 p-2 border rounded-lg text-sm bg-gray-50" /></div>
                                        <div><label className="text-xs font-semibold text-gray-500">Corporate Email</label>
                                        <input required type="email" value={adminForm.email} onChange={(e) => setAdminForm({...adminForm, email: e.target.value})} className="w-full mt-1 p-2 border rounded-lg text-sm bg-gray-50" /></div>
                                        <div><label className="text-xs font-semibold text-gray-500">Temporary Password</label>
                                        <input required minLength="6" type="password" value={adminForm.password} onChange={(e) => setAdminForm({...adminForm, password: e.target.value})} className="w-full mt-1 p-2 border rounded-lg text-sm bg-gray-50" /></div>
                                        <div className="flex items-center gap-2 mt-2">
                                            <input type="checkbox" id="isAdminCheck" checked={adminForm.isAdmin} onChange={(e) => setAdminForm({...adminForm, isAdmin: e.target.checked})} className="w-4 h-4 cursor-pointer"/>
                                            <label htmlFor="isAdminCheck" className="text-xs font-bold text-indigo-700 cursor-pointer">Grant Admin Dashboard Access</label>
                                        </div>
                                        <button type="submit" className="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700">Create Account</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* Phase 6.1: Edit User Modal */}
                        {activeModal === 'admin_edit_user' && (
                            <div className="absolute inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                                <div className="bg-white w-full max-w-sm rounded-2xl p-6 shadow-2xl">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="font-bold text-lg"><i className="fa-solid fa-user-pen text-blue-600 mr-2"></i> Edit User Profile</h3>
                                        <i className="fa-solid fa-xmark cursor-pointer text-gray-400" onClick={() => setActiveModal(null)}></i>
                                    </div>
                                    <form onSubmit={handleEditUserSubmit} className="space-y-4">
                                        <div><label className="text-xs font-semibold text-gray-500">Email Address (Read Only)</label>
                                        <input disabled type="email" value={adminForm.email} className="w-full mt-1 p-2 border rounded-lg text-sm bg-gray-200 text-gray-500" /></div>
                                        <div><label className="text-xs font-semibold text-gray-500">Full Name</label>
                                        <input required type="text" value={adminForm.name} onChange={(e) => setAdminForm({...adminForm, name: e.target.value})} className="w-full mt-1 p-2 border rounded-lg text-sm bg-gray-50" /></div>
                                        <div className="flex items-center gap-2 mt-2">
                                            <input type="checkbox" id="editAdminCheck" checked={adminForm.isAdmin} onChange={(e) => setAdminForm({...adminForm, isAdmin: e.target.checked})} className="w-4 h-4 cursor-pointer"/>
                                            <label htmlFor="editAdminCheck" className="text-xs font-bold text-indigo-700 cursor-pointer">Grant Admin Dashboard Access</label>
                                        </div>
                                        <button type="submit" className="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700">Save Changes</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* Phase 4.2: High-Visibility Upload Progress Overlay */}
                        {isUploading && (
                            <div className="absolute inset-0 bg-white/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-in fade-in duration-200">
                                <div className="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl border-2 border-blue-100 flex flex-col items-center text-center">
                                    <div className="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mb-4">
                                        <i className="fa-solid fa-cloud-arrow-up text-3xl text-blue-600 animate-bounce"></i>
                                    </div>
                                    <h3 className="font-bold text-gray-800 text-lg mb-1">Uploading Secure File...</h3>
                                    <p className="text-xs text-gray-500 mb-6">Please wait while we encrypt and transfer.</p>
                                    
                                    <div className="w-full bg-gray-100 rounded-full h-3 mb-2 overflow-hidden shadow-inner">
                                        <div 
                                            className="bg-blue-600 h-full rounded-full transition-all duration-300 relative" 
                                            style={{ width: `${uploadProgress}%` }}
                                        >
                                            <div className="absolute inset-0 bg-white/20 animate-pulse"></div>
                                        </div>
                                    </div>
                                    <div className="flex justify-between w-full text-xs font-bold text-blue-800">
                                        <span>Progress</span>
                                        <span>{Math.round(uploadProgress)}%</span>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Context Menu Modal */}
                        {activeModal === 'context' && (
                            <div className="absolute inset-0 bg-black/50 z-20 flex items-end justify-center" onClick={() => setActiveModal(null)}>
                                <div className="bg-white w-full rounded-t-3xl p-5 shadow-2xl" onClick={e => e.stopPropagation()}>
                                    <div className="w-12 h-1.5 bg-gray-300 rounded-full mx-auto mb-4"></div>
                                    <p className="text-xs text-gray-500 mb-4 line-clamp-1 border-b pb-2">"{selectedMessage?.text}"</p>
                                    
                                    <div className="space-y-2">
                                        <button onClick={() => setActiveModal('reminder')} className="w-full flex items-center gap-3 p-3 hover:bg-gray-50 rounded-xl transition-colors text-left">
                                            <div className="bg-yellow-100 p-2 rounded-lg text-yellow-600"><i className="fa-regular fa-clock text-xl"></i></div>
                                            <div>
                                                <div className="font-semibold text-sm">Remind Me Later</div>
                                                <div className="text-xs text-gray-500">Get a push notification later</div>
                                            </div>
                                        </button>
                                        
                                        <button onClick={() => setActiveModal('task_convert')} className="w-full flex items-center gap-3 p-3 hover:bg-gray-50 rounded-xl transition-colors text-left">
                                            <div className="bg-blue-100 p-2 rounded-lg text-blue-600"><i className="fa-regular fa-square-check text-xl"></i></div>
                                            <div>
                                                <div className="font-semibold text-sm">Convert to Task</div>
                                                <div className="text-xs text-gray-500">Assign this to a team member</div>
                                            </div>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Reminder Modal */}
                        {activeModal === 'reminder' && (
                            <div className="absolute inset-0 bg-black/50 z-30 flex items-center justify-center p-4">
                                <div className="bg-white w-full rounded-2xl p-5 shadow-2xl">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="font-bold text-lg flex items-center gap-2"><i className="fa-regular fa-clock text-yellow-500"></i> Set Reminder</h3>
                                        <i className="fa-solid fa-xmark cursor-pointer text-gray-400 text-xl" onClick={() => setActiveModal(null)}></i>
                                    </div>
                                    <div className="space-y-4">
                                        <div>
                                            <label className="text-xs font-semibold text-gray-500">Date & Time</label>
                                            {/* Phase 5: Bound input to state */}
                                            <input 
                                                type="datetime-local" 
                                                value={reminderDateTime}
                                                onChange={(e) => setReminderDateTime(e.target.value)}
                                                className="w-full mt-1 p-2 border rounded-lg text-sm bg-gray-50 outline-none focus:border-blue-500" 
                                            />
                                        </div>
                                        <button onClick={setReminder} className="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 shadow-md">
                                            Save Reminder
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Convert to Task Modal */}
                        {activeModal === 'task_convert' && (
                            <div className="absolute inset-0 bg-black/50 z-30 flex items-center justify-center p-4">
                                <div className="bg-white w-full rounded-2xl p-5 shadow-2xl">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="font-bold text-lg flex items-center gap-2"><i className="fa-regular fa-square-check text-blue-600"></i> Create Task</h3>
                                        <i className="fa-solid fa-xmark cursor-pointer text-gray-400 text-xl" onClick={() => setActiveModal(null)}></i>
                                    </div>
                                    <div className="space-y-4">
                                        <div className="bg-blue-50 text-blue-800 text-xs p-2 rounded italic border border-blue-100">
                                            "{selectedMessage?.text}"
                                        </div>
                                        <div>
                                            <label className="text-xs font-semibold text-gray-500">Assign To</label>
                                            <select 
                                                value={taskAssignee} 
                                                onChange={(e) => setTaskAssignee(e.target.value)}
                                                className="w-full mt-1 p-2 border rounded-lg text-sm bg-gray-50 outline-none"
                                            >
                                                <option value="" disabled>Select Team Member</option>
                                                {dbUsers.map(u => (
                                                    <option key={u.uid} value={u.email}>{u.name} ({u.email})</option>
                                                ))}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-xs font-semibold text-gray-500">Deadline</label>
                                            <input 
                                                type="datetime-local" 
                                                value={taskDeadline}
                                                onChange={(e) => setTaskDeadline(e.target.value)}
                                                className="w-full mt-1 p-2 border rounded-lg text-sm bg-gray-50 outline-none" 
                                            />
                                        </div>
                                        <button onClick={convertToTask} className="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 shadow-md">
                                            Assign Task
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Task Trail Modal */}
                        {activeModal === 'task_trail' && selectedMessage?.taskData && (
                            <div className="absolute inset-0 bg-white z-40 flex flex-col">
                                <div className="bg-blue-800 text-white p-4 flex items-center gap-3 shadow-md">
                                    <i className="fa-solid fa-chevron-left cursor-pointer text-xl" onClick={() => setActiveModal(null)}></i>
                                    <h2 className="font-bold text-lg">Task Details & Trail</h2>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto p-5 space-y-6 bg-gray-50">
                                    <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                                        <h3 className="font-semibold text-gray-800 text-sm mb-2">Original Message:</h3>
                                        <p className="text-sm text-gray-600 italic bg-gray-50 p-2 rounded">"{selectedMessage.text}"</p>
                                        
                                        <div className="mt-4 grid grid-cols-2 gap-4">
                                            <div>
                                                <p className="text-[10px] font-bold text-gray-400 uppercase">Current Assignee</p>
                                                <p className="text-sm font-semibold flex items-center gap-1 text-gray-800 overflow-hidden text-ellipsis whitespace-nowrap" title={selectedMessage.taskData.currentAssignee}>
